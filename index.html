// ── OCR: อ่านหนังสือรับรองบริษัทอัตโนมัติ ────────────────────────────
let _crOcrParsed=null;

async function _crOcrSend(file){
  const b64=await new Promise((ok,rej)=>{const r=new FileReader();r.onload=e=>ok(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  if(file.type==='application/pdf'){
    const body={requests:[{inputConfig:{content:b64,mimeType:'application/pdf'},features:[{type:'DOCUMENT_TEXT_DETECTION'}],pages:[1]}]};
    const r=await fetch(`https://vision.googleapis.com/v1/files:annotate?key=${VISION_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Vision API error');}
    const d=await r.json();
    return(d.responses?.[0]?.responses||[]).map(x=>x.fullTextAnnotation?.text||'').join('\n');
  }
  const body={requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION'}],imageContext:{languageHints:['th','en']}}]};
  const r=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Vision API error');}
  const d=await r.json();
  return d.responses?.[0]?.fullTextAnnotation?.text||'';
}

function _crParseCert(text){
  const out={};
  // ── normalize: ลบ / ท้ายบรรทัด (DBD ใส่ / เป็น line delimiter)
  const t=text.replace(/\/\s*\n/g,'\n').replace(/\r/g,'');

  // ── 1. ชื่อบริษัท ──────────────────────────────────────────────
  // DBD: "1. ชื่อบริษัท บริษัท XXX จำกัด" หรือ "ชื่อบริษัท บริษัท XXX จำกัด"
  const nameAnchors=[
    /ชื่อบริษัท\s+(?:บริษัท\s+)?(.+?)\s+จำกัด/s,
    /บริษัท\s+(.+?)\s+จำกัด/s,
    /ห้างหุ้นส่วนจำกัด\s+(.+?)(?:\n|จำกัด|$)/,
    /ห้างหุ้นส่วน(?:สามัญนิติบุคคล)?\s+(.+?)(?:\n|$)/,
    /ร้าน\s+(.+?)(?:\n|$)/,
  ];
  for(const pat of nameAnchors){
    const m=t.match(pat);
    if(!m) continue;
    const raw=m[1].replace(/\s+/g,' ').trim();
    if(raw.length<2) continue;
    if(pat.source.includes('ห้างหุ้นส่วนจำกัด')) out.shopname='ห้างหุ้นส่วนจำกัด '+raw;
    else if(pat.source.includes('ห้างหุ้นส่วน')) out.shopname='ห้างหุ้นส่วน '+raw;
    else if(pat.source.startsWith('ร้าน')) out.shopname='ร้าน '+raw;
    else out.shopname='บริษัท '+raw.replace(/^บริษัท\s+/,'')+' จำกัด';
    break;
  }

  // ── 2. เลขทะเบียนนิติบุคคล 13 หลัก ───────────────────────────
  // DBD: "ทะเบียนนิติบุคคลเลขที่ 0105563043141"
  const taxPatterns=[
    /ทะเบียนนิติบุคคลเลขที่\s*([\d\s]{13,16})/,
    /(?:เลขทะเบียน(?:นิติบุคคล)?|เลขประจำตัวผู้เสียภาษีอากร|เลขประจำตัวผู้เสียภาษี)[^\d]*([\d\s\-]{13,17})/,
    /(?:เลขที่|เลขทะเบียน)[^\d]*([\d\s\-]{13,17})/,
  ];
  for(const pat of taxPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const clean=m[1].replace(/[\s\-]/g,'').slice(0,13);
    if(clean.length===13){out.taxid=clean;break;}
  }
  if(!out.taxid){
    // fallback: หา 13 หลักใดก็ได้ ที่ไม่ใช่ reference/date
    const all=[...t.matchAll(/\b(\d{13})\b/g)].map(m=>m[1]);
    if(all.length) out.taxid=all[0];
  }

  // ── 3. ที่อยู่สำนักงานแห่งใหญ่ ───────────────────────────────
  // DBD: "5. สำนักงานแห่งใหญ่ ตั้งอยู่เลขที่ XXX..."
  const addrPatterns=[
    /สำนักงานแห่งใหญ่\s+ตั้งอยู่(?:เลขที่)?\s*([\s\S]+?)(?=\n\d+\.|วัตถุที่|$)/m,
    /สำนักงานแห่งใหญ่[^\n]*\n\s*([\s\S]+?)(?=\n\d+\.|วัตถุที่|$)/m,
    /ที่ตั้ง(?:สำนักงานใหญ่)?\s*[:\n]?\s*([\s\S]+?)(?=\n(?:\d+\.|เลข|ทะเบียน|วัน)|$)/m,
    /ที่อยู่(?:สำนักงาน)?\s*[:\n]?\s*([\s\S]+?)(?=\n\n|$)/m,
  ];
  for(const pat of addrPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const addr=m[1].replace(/\n/g,' ').replace(/\s+/g,' ').trim();
    if(addr.length>10){out.addr=addr.slice(0,300);break;}
  }

  // ── 4. รหัสไปรษณีย์ ─────────────────────────────────────────
  // ดึงจากบริเวณที่อยู่ก่อน แล้วค่อย fallback ทั้ง document
  const addrBlock=out.addr||'';
  const zipInAddr=[...addrBlock.matchAll(/\b(\d{5})\b/g)].map(m=>m[1]).filter(z=>!/^0+$/.test(z));
  if(zipInAddr.length){
    out.zip=zipInAddr[zipInAddr.length-1];
  } else {
    // fallback: หาใน document แต่กรอง ref numbers ออก
    const allZips=[...t.matchAll(/\b([1-9]\d{4})\b/g)].map(m=>m[1]).filter(z=>{
      const n=Number(z);return n>=10000&&n<=99999;
    });
    if(allZips.length) out.zip=allZips[allZips.length-1];
  }

  // ── 5. ชื่อกรรมการคนแรก ─────────────────────────────────────
  // DBD: "1. นางภาวิณี สุจริตพุทธังกูร  2. นายสุรักษ์..."
  const titlePfx='(?:นาง(?:สาว)?|นาย|ดร\\.?|Mr\\.|Ms\\.|Mrs\\.)';
  const dirPatterns=[
    new RegExp(`กรรมการ[\\s\\S]*?1\\.\\s+(${titlePfx}\\s+[ก-๙a-zA-Z]+\\s+[ก-๙a-zA-Z]+)`,'m'),
    new RegExp(`1\\.\\s+(${titlePfx}\\s+[ก-๙a-zA-Z]+\\s+[ก-๙a-zA-Z]+)`,'m'),
    new RegExp(`(${titlePfx}\\s+[ก-๙a-zA-Z]+\\s+[ก-๙a-zA-Z]+)`,'m'),
  ];
  for(const pat of dirPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const n=m[1].replace(/\s+/g,' ').trim();
    if(n.length>4&&n.length<60){out.contact=n;break;}
  }

  return out;
}

function _crCleanVatText(text){
  return String(text||'').replace(/\r/g,'').replace(/[|]/g,' ').replace(/\s+\n/g,'\n').replace(/\n\s+/g,'\n');
}
function _crVatAfter(t,label,nextLabels){
  const start=t.search(label);if(start<0)return '';
  let s=t.slice(start).replace(label,'');
  const next=nextLabels.map(p=>s.search(p)).filter(i=>i>0).sort((a,b)=>a-b)[0];
  if(next) s=s.slice(0,next);
  return s.replace(/\n/g,' ').replace(/[.·•]{2,}/g,' ').replace(/\s+/g,' ').trim();
}
function _crParseVat20(text){
  const out={docType:'ภ.พ.20'};
  const t=_crCleanVatText(text);
  if(!/ภ\.?\s*พ\.?\s*20|ทะเบียนภาษีมูลค่าเพิ่ม|เลขประจำตัวผู้เสียภาษีอากร/.test(t)) return null;
  const top=t.slice(0,900);
  const topDigits=(top.match(/\d/g)||[]).join('');
  if(topDigits.length>=13) out.taxid=topDigits.slice(0,13);
  if(!out.taxid){
    const m=t.match(/(?:เลขประจำตัวผู้เสียภาษีอากร|เลขประจำตัวผู้เสียภาษี|เลขทะเบียน)[^\d]*([\d\s\-]{13,25})/);
    if(m){const clean=(m[1].match(/\d/g)||[]).join('').slice(0,13);if(clean.length===13)out.taxid=clean;}
  }
  const name=_crVatAfter(t,/ชื่อผู้ประกอบการ\s*/,[/ชื่อสถานประกอบการ/,/เป็น\s+สำนักงาน/,/ตั้งอยู่/]);
  if(name&&name.length>2) out.shopname=name.replace(/^[:\-]+/,'').trim();

  else {const br=t.match(/สาขา(?:ที่)?\s*([\d\-]+)/); if(br) out.branch='สาขา '+br[1];}

  labels.forEach(lbl=>{
    const re=new RegExp('(?:'+lbl+')\\s*([^\\n]+?)(?=\\s*(?:อาคาร|ห้องเลขที่|ชั้นที่|หมู่บ้าน|เลขที่|หมู่ที่|ตรอก|ซอย|ถนน|ตำบล|แขวง|อำเภอ|เขต|จังหวัด|รหัสไปรษณีย์|โทรศัพท์|วันที่|ออกให้|$))','m');
    const m=t.match(re); if(m){const val=m[1].replace(/[.·•]+/g,' ').replace(/\s+/g,' ').trim(); if(val&&val!=='-') addrParts.push(val);}

function crConfirmWithWorkflow(wfLevels){
  const d=_cr.data;
  const priceType=[['cr-pr-c','C'],['cr-pr-d','D'],['cr-pr-e','E'],['cr-pr-f','F'],['cr-pr-g','G'],['cr-pr-z','Z'],['cr-pr-special','พิเศษ']].filter(([id])=>d[id]).map(([,lbl])=>lbl).join(', ')||'—';
  const docSnap=CR_DOC_SLOTS.filter(s=>(_cr.slotFiles[s.id]||[]).length>0).map(s=>({id:s.id,label:s.label,files:(_cr.slotFiles[s.id]||[]).map(f=>({name:f.name,size:f.size,type:f.type||'',dataUrl:f.dataUrl||''})),note:_cr.slotNotes[s.id]||''}));
  const ts=new Date().toLocaleString('th-TH',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const ownerUid=crOwnerUid(),ownerName=crSalesName(ownerUid),requestType=crRequestTypes(d);
  // Clone levels with pending status
  const levels=wfLevels.map((lv,i)=>({
    id:lv.id,label:lv.label||`ขั้น ${i+1}`,mode:lv.mode||'any',
    approvers:(lv.approvers||[]).map(a=>({uid:a.uid,name:a.name,role:a.role,status:'pending',comment:'',ts:null}))
  }));
  const sub={
    id:'CR-'+Date.now(),docNo:_cr.docNo,shop:d['cr-shopname']||'(ไม่ระบุ)',
    sales:UNAME,salesUid:UID,createdByUid:UID,ownerSalesUid:ownerUid,ownerSalesName:ownerName,requestType,existingCust:d['cr-existing-cust']||'',driveLink:d['cr-drive-link']||'',externalEmails:d['cr-external-emails']||'',taxAddr:d['cr-tax-addr']||'',taxZip:d['cr-tax-zip']||'',phone:d['cr-phone']||'',taxid:d['cr-taxid']||'',
    crdays:d['cr-crdays']||'',price:priceType,date:ts,note:'',finalNote:d['cr-final-note']||'',
    levels,currentLevel:0,
    // backward compat: flat approvers list = all approvers from all levels
    approvers:levels.flatMap(lv=>lv.approvers),
    status:'pending',custcode:'',docs:docSnap,ts:Date.now()
  };
  const subs=DB.get('custreg_subs')||[];subs.push(sub);DB.set('custreg_subs',subs);
  audit('CUSTREG_SUBMIT',sub.docNo,{shop:sub.shop,levels:levels.length});
  toast('ส่งอนุมัติสำเร็จ '+sub.docNo+' ('+levels.length+' ขั้นตอน)');
  _cr.step=6;crRender();
}

// Multi-level approve: check level completion → advance to next level
function crDoApprove(id){
  const subs=DB.get('custreg_subs')||[];const sub=subs.find(s=>s.id===id);if(!sub)return;
  const comment=document.getElementById('cr-apv-comment')?.value||'';
  const ts=new Date().toISOString();

  if(sub.levels?.length){
    // Multi-level workflow
    const lv=sub.levels[sub.currentLevel];
    if(!lv){toast('ไม่พบขั้นตอนอนุมัติ','warn');return;}
    const a=lv.approvers.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    // Sync flat approvers
    const fa=sub.approvers?.find(x=>x.uid===UID);if(fa){fa.status='approved';fa.comment=comment;fa.ts=ts;}
    // Check level completion
    const lvDone=(lv.mode==='any')?lv.approvers.some(x=>x.status==='approved'):lv.approvers.every(x=>x.status==='approved');
    if(lvDone){
      if(sub.currentLevel+1 < sub.levels.length){
        sub.currentLevel++;
        // Unlock next level's approvers (set to pending if was pending)
        toast(`ผ่านขั้น ${sub.currentLevel} → รออนุมัติขั้น ${sub.currentLevel+1}`);
      } else {
        sub.status='approved';
        toast('✅ อนุมัติครบทุกขั้นตอน '+sub.docNo);
      }
    } else {
      toast('✓ บันทึกการอนุมัติแล้ว — รอผู้อนุมัติคนอื่น');
    }
  } else {
    // Legacy flat approval
    const a=sub.approvers?.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    if((sub.approvers||[]).every(x=>x.status==='approved'))sub.status='approved';
    toast('อนุมัติเรียบร้อย '+sub.docNo);
  }
  DB.set('custreg_subs',subs);audit('CUSTREG_APPROVE',sub.docNo,{shop:sub.shop});crHideDetail();
}

function saveSkuGroupMapping(code,newGrp){
  const groups=DB.get('product_groups')||{};
  const ex=productGroupExclusions();
  Object.entries(productGroups()).forEach(([g,items])=>{
    if((items||[]).includes(code)){
      ex[g]=[...new Set([...(ex[g]||[]),code])];
    }
  });
  Object.keys(groups).forEach(g=>{groups[g]=(groups[g]||[]).filter(c=>c!==code);});
  if(newGrp){if(!groups[newGrp])groups[newGrp]=[];if(!groups[newGrp].includes(code))groups[newGrp].push(code);}
  saveProductGroupExclusions(ex);
  saveProductGroups(groups);audit('EDIT_SKU_GROUP',code,{grp:newGrp});
  toast(newGrp?`กำหนด ${code} → กลุ่ม ${newGrp}`:`นำ ${code} ออกจากกลุ่มแล้ว`);
  renderProdGroups();
}
function removeSkuFromGroup(group,code){
  const groups=DB.get('product_groups')||{};
  groups[group]=(groups[group]||[]).filter(c=>c!==code);
  const ex=productGroupExclusions();
  ex[group]=[...new Set([...(ex[group]||[]),code])];
  saveProductGroups(groups);
  saveProductGroupExclusions(ex);
  audit('REMOVE_SKU_FROM_GROUP',group,{code});
  toast('ลบ '+code+' ออกจาก '+group+' แล้ว');
  renderProdGroups();
}

function addProductGroup(){
  const name=document.getElementById('pg-new')?.value.trim();if(!name)return;
  const groups=DB.get('product_groups')||{};if(!groups[name])groups[name]=[];
  saveProductGroups(groups);audit('ADD_PRODUCT_GROUP',name,{});pgGroupAdmin();
}
function renameProductGroup(oldName,newName){
  newName=(newName||'').trim();if(!newName||oldName===newName)return;
  const groups=DB.get('product_groups')||{};
  groups[newName]=[...new Set([...(groups[newName]||[]),...(productGroups()[oldName]||[])])];
  delete groups[oldName];
  const deleted=deletedProductGroups();
  if(SKU_GROUPS[oldName])deleted.add(oldName);
  deleted.delete(newName);
  saveDeletedProductGroups(deleted);
  saveProductGroups(groups);audit('RENAME_PRODUCT_GROUP',oldName,{newName});pgGroupAdmin();
}
function addSkuToGroup(g){
  const code=document.getElementById('pg-sku-'+g)?.value;if(!code)return;
  const groups=DB.get('product_groups')||{};if(!groups[g])groups[g]=[];
  if(!groups[g].includes(code))groups[g].push(code);
  const deleted=deletedProductGroups();deleted.delete(g);saveDeletedProductGroups(deleted);
  saveProductGroups(groups);audit('ADD_SKU_TO_GROUP',g,{code});pgGroupAdmin();
}

async function applySalesToCustomers(code){
  code=String(code||'').trim();
  if(!code){toast('No sales code');return;}
  let list=SLM_CUSTS?.[code]||[];
  if(!list.length){
    const remote=DB.get('remote_customers_cache')||[];
    list=remote.filter(c=>String(c.slm_id||'').trim()===code).map(c=>String(c.code||'').trim()).filter(Boolean);
  }
  if(!list.length && SB?.getCustomers){
    try{
      const remote=await SB.getCustomers();
      list=(remote||[]).filter(c=>String(c.slm_id||'').trim()===code).map(c=>String(c.code||'').trim()).filter(Boolean);
    }catch(e){console.warn('getCustomers for sales link:',e);}
  }
  if(!list.length){
    list=allCustomerRows().filter(c=>String(c.slm||'').trim()===code).map(c=>c.c).filter(Boolean);
  }
  if(!list.length){toast('No Express customer map for '+code);return;}
  const profs=customerProfiles();
  let count=0;
  list.forEach(c=>{if(!profs[c])profs[c]={};profs[c].slm=code;profs[c].edited_by=UID;profs[c].edited_at=new Date().toISOString();count++;});
  DB.set('customer_profiles',profs);
  audit('LINK_SALES_CUSTOMERS',code,{count});
  toast('Linked '+count+' customers to '+code);
  renderSalesMaster();
}

function applyRoleToGroup(pkey,roleKey){
  if(!roleKey)return;
  const roles=_getRoles();
  const rolePages=roles[roleKey]?.pages||[];
  document.querySelectorAll(`[data-pkey="${pkey}"][data-page]`).forEach(cb=>{
    cb.checked=rolePages.includes(cb.dataset.page);
  });
  toast(`Apply role "${roles[roleKey]?.label}" ให้ ${pkey} แล้ว`);
}
function addCustomRole(){
  const key=(document.getElementById('role-new-key')?.value||'').trim().replace(/\s+/g,'_');
  const lbl=(document.getElementById('role-new-lbl')?.value||'').trim();
  if(!key||!lbl){toast('กรุณากรอก key และชื่อ Role','warn');return;}
  const custom=DB.get('nav_roles')||{};
  custom[key]={label:lbl,pages:[]};
  DB.set('nav_roles',custom);
  audit('ADD_ROLE',key,{lbl});
  pgPerms();
  toast('สร้าง Role '+lbl+' แล้ว');
}
function saveCustomRole(key){
  const custom=DB.get('nav_roles')||{};
  const pages=[];
  document.querySelectorAll(`[data-rkey="${key}"][data-rpage]`).forEach(cb=>{if(cb.checked)pages.push(cb.dataset.rpage);});
  custom[key]={...custom[key],pages};
  DB.set('nav_roles',custom);
  audit('SAVE_ROLE',key,{pages});
  toast('บันทึก Role '+key+' แล้ว');
}
function deleteCustomRole(key){
  if(!confirm('ลบ Role '+key+' ?'))return;
  const custom=DB.get('nav_roles')||{};
  delete custom[key];
  DB.set('nav_roles',custom);
  audit('DEL_ROLE',key,{});
  pgPerms();
}
function savePerms(){
  const groups=_permGroups();
  const perms={};
  groups.forEach(g=>{perms[g.key]={dept:g.dept,pos:g.pos,pages:[]};});
  document.querySelectorAll('[data-pkey][data-page]').forEach(cb=>{if(cb.checked)perms[cb.dataset.pkey].pages.push(cb.dataset.page);});

function saveNewSku(){
  const code=document.getElementById('ns-code')?.value.trim();
  const name=document.getElementById('ns-name')?.value.trim();
  if(!code||!name){toast('กรุณากรอกรหัสสินค้าและชื่อสินค้า','warn');return;}
  const custom=DB.get('custom_skus')||[];
  if(custom.find(s=>s.code===code)||SKUS_MASTER.find(s=>s.code===code)){toast('รหัสสินค้านี้มีอยู่แล้ว','warn');return;}
  const grp=document.getElementById('ns-grp')?.value||'';
  const lt=parseInt(document.getElementById('ns-lt')?.value)||7;
  const moq=parseInt(document.getElementById('ns-moq')?.value)||0;
  const plant=document.getElementById('ns-plant')?.value.trim()||'';
  const newSku={code,name,plant,lt,moq,custom:true};
  custom.push(newSku);
  DB.set('custom_skus',custom);
  if(grp){
    const groups=DB.get('product_groups')||{};
    if(!groups[grp])groups[grp]=[];
    if(!groups[grp].includes(code))groups[grp].push(code);
    saveProductGroups(groups);
  }
  closeM();
  audit('ADD_SKU',code,{name,plant});
  toast('เพิ่มสินค้า '+code+' แล้ว');
  pgSKUAdmin();
}

  try{
    const products=await CACHE.get('group_products',()=>SB.getProducts());
    const rows=(products||[]).map(normalizeSkuRow).filter(s=>s.code);
    if(rows.length){
      DB.set('remote_products_cache',rows);
      DB.set('remote_products_loaded',true);
      if(page==='groups'&&_grpTab==='prod')renderProdGroups();
    }
  }catch(e){console.warn('load products for groups failed',e.message);}
  finally{_groupProductsLoading=false;}
}
function getSkusMerged(opts={}){
  const custom=DB.get('custom_skus')||[];
  const remote=DB.get('remote_products_cache')||[];
  const map=new Map();
  const baseSkus = SKUS_MASTER;
  [...baseSkus,...remote,...custom].map(normalizeSkuRow).filter(s=>s.code).filter(s=>_isAllowedCompanyRecord(s, opts)).forEach(s=>{
    const old=map.get(s.code)||{};
    map.set(s.code,{...old,...s,name:s.name||old.name||s.code});
  });
  return [...map.values()].sort((a,b)=>String(a.code).localeCompare(String(b.code),'th'));
}

// ════════════════════════════════════════════════
// Multi-select SKU Filter with saved presets
// ════════════════════════════════════════════════
let _skuFilter = { active: [], presets: {} };

function buildSkuFilterBtn(containerId, onchangeFn) {
  const active = _skuFilter?.active || [];
  const presets = _skuFilter?.presets || {};
  const label = active.length === 0 ? 'ทุกรายการ' : active.length === 1 ? active[0] : `${active.length} รายการ`;
  const presetBtns = Object.keys(presets).map(p =>
    `<button class="btn btn-xs btn-t" onclick="loadSkuPreset('${esc(p)}','${containerId}','${onchangeFn}')" title="${esc(presets[p].join(','))}">${esc(p)}</button>`
  ).join('');
  return `<div class="ms-drop" id="${containerId}">
    <button class="btn btn-sm" onclick="toggleMsPanel('${containerId}')">🔍 สินค้า: <b>${label}</b> ▾</button>
    <div class="ms-panel hidden" id="${containerId}-panel">
      <div style="padding:4px 6px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--BD);padding-bottom:6px;margin-bottom:4px">
        <button class="btn btn-xs" onclick="clearSkuFilter('${containerId}','${onchangeFn}')">ทั้งหมด</button>
        ${presetBtns}
        ${active.length > 0 ? `<button class="btn btn-xs btn-p" onclick="saveSkuPreset('${containerId}','${onchangeFn}')">💾 บันทึก</button>` : ''}
      </div>
      <input type="text" id="${containerId}-sq" placeholder="ค้นหา..." oninput="filterSkuList('${containerId}')"
        style="width:100%;padding:5px 8px;border:1px solid var(--BD);border-radius:6px;font-size:12px;margin-bottom:4px">
      <div id="${containerId}-list" style="max-height:220px;overflow-y:auto">
        ${buildSkuItems(containerId, onchangeFn, '')}
      </div>
    </div>
  </div>`;
}

function buildSkuItems(containerId, onchangeFn, q) {
  const SKUS = typeof getSkusMerged === 'function' ? getSkusMerged() : SKUS_MASTER;
  const active = _skuFilter?.active || [];
  const filtered = q ? SKUS.filter(s => s.code.toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q)) : SKUS;
  return filtered.slice(0, 80).map(s =>
    `<div class="ms-item${active.includes(s.code)?' sel':''}" onclick="toggleSkuItem('${s.code}','${containerId}','${onchangeFn}')">
      <input type="checkbox" ${active.includes(s.code)?'checked':''} onclick="event.stopPropagation()">
      <span class="mono" style="font-size:11px;color:var(--TX3);min-width:72px">${s.code}</span>
      <span style="font-size:11.5px">${(s.name||'').substring(0,22)}</span>
    </div>`
  ).join('');
}

function toggleMsPanel(id) {
  const panel = document.getElementById(id + '-panel');
  if (panel) panel.classList.toggle('hidden');
  // close others
  document.querySelectorAll('.ms-panel').forEach(p => { if (p.id !== id+'-panel') p.classList.add('hidden'); });
}

function toggleSkuItem(code, containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  const idx = _skuFilter.active.indexOf(code);
  if (idx === -1) _skuFilter.active.push(code);
  else _skuFilter.active.splice(idx, 1);
  // rebuild button
  const container = document.getElementById(containerId);
  if (container) { container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn); }
  const newPanel = document.getElementById(containerId + '-panel');
  if (newPanel) newPanel.classList.remove('hidden');
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function clearSkuFilter(containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.active = [];
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function loadSkuPreset(name, containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.active = [...(_skuFilter.presets[name] || [])];
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function saveSkuPreset(containerId, onchangeFn) {
  const name = prompt('ชื่อ Filter Preset:');
  if (!name || !name.trim()) return;
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.presets[name.trim()] = [..._skuFilter.active];
  DB.set('filter_presets', _skuFilter.presets);
  toast(`💾 บันทึก preset "${name.trim()}" แล้ว`);
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
}

function filterSkuList(containerId) {
  const q = (document.getElementById(containerId + '-sq')?.value || '').toLowerCase();
  const list = document.getElementById(containerId + '-list');
  if (list) list.innerHTML = buildSkuItems(containerId, '', q);
}

// pgPlanBooking() — จองสินค้า PO/SO (Planning)
// ════════════════════════════════════════════════
let _bkFilters = null; // persist filters across re-renders
async function pgPlanBooking() {
  const canEdit = ['planning','manager','superadmin'].includes(ROLE);
  const ct = document.getElementById('ct');
  const localBks = DB.get('bookings') || [];
  if (ct) {
    const cachedBks = CACHE.peek('bookings') || localBks;
    ct.innerHTML = `<div class="al ali">กำลังโหลดข้อมูลการจองจาก Supabase...${cachedBks.length ? ` แสดงข้อมูลล่าสุด ${cachedBks.length} รายการระหว่างรอ` : ''}</div>`;
  }
  let bks = localBks;
  try {
    const remote = await CACHE.get('bookings', () => SB.getBookings());
    if (remote?.length) {
      bks = mergeBookings(remote, localBks).map(normalizeBookingRow);
      DB.set('bookings', bks);
    }
  } catch (e) {
    console.warn('pgPlanBooking: remote bookings load failed', e?.message || e);
  }
  bks = (bks || []).map(normalizeBookingRow);
  let dataConfidence = null;
  try {
    dataConfidence = await CACHE.get('data_confidence', () => SB.getDataConfidence());
  } catch (e) {
    console.warn('pgPlanBooking: data confidence load failed', e?.message || e);
  }

  // restore saved filters (Item 4)
  if(!_bkFilters) _bkFilters = DB.get('bk_filters') || {type:'',status:'',search:'',tab:'active',skuF:''};
  const typeFilter = document.getElementById('bk-tf')?.value ?? _bkFilters.type;
  const statusFilter = document.getElementById('bk-sf')?.value ?? _bkFilters.status;
  const searchText = (document.getElementById('bk-search')?.value ?? _bkFilters.search).toLowerCase();
  const skuFilter = document.getElementById('bk-sku-f')?.value ?? (_bkFilters.skuF||'');
  const bkTab = window._bkTab || _bkFilters.tab || 'active';

  // Tab split: active vs cancelled (Item 3)
  const activeBks = bks.filter(b => b.status !== 'cancelled');
  const cancelledBks = bks.filter(b => b.status === 'cancelled');
  const srcBks = bkTab === 'cancelled' ? cancelledBks : activeBks;

  let filtered = [...srcBks];
  if (typeFilter) filtered = filtered.filter(b => b.type === typeFilter);
  if (statusFilter && bkTab !== 'cancelled') filtered = filtered.filter(b => b.status === statusFilter);
  if (skuFilter) filtered = filtered.filter(b => b.sku === skuFilter);
  if (searchText) filtered = filtered.filter(b =>
    (b.sku || '').toLowerCase().includes(searchText) ||
    (b.skuName || '').toLowerCase().includes(searchText) ||
    (b.custName || '').toLowerCase().includes(searchText) ||
    (b.refNo || '').toLowerCase().includes(searchText) ||
    (b.soNo || '').toLowerCase().includes(searchText) ||
    bookingDocNo(b).toLowerCase().includes(searchText)
  );

  // Save filters (Item 4)
  _bkFilters = {type:typeFilter, status:statusFilter, search:searchText, tab:bkTab, skuF:skuFilter};
  DB.set('bk_filters', _bkFilters);

  // รายการ SKU ที่มีการจอง (สำหรับ filter dropdown)
  const allSkus = [...new Map(activeBks.map(b=>[b.sku,b.skuName||b.sku])).entries()].sort((a,b)=>a[0].localeCompare(b[0]));

  const produceCount = activeBks.filter(b => b.stockStatus === 'produce').length;
  const tTab=(id,lbl)=>`<div class="tab ${bkTab===id?'act':''}" onclick="window._bkTab='${id}';pgPlanBooking()">${lbl}</div>`;
  const syncText = dataConfidence?.syncedAt ? new Date(dataConfidence.syncedAt).toLocaleString('th-TH') : '-';
  const confWarnings = dataConfidence?.warnings || [];
  const confidenceHtml = dataConfidence ? `
  <div class="krow">
    <div class="kpi t"><div class="kl">Sync ล่าสุด</div><div class="kv" style="font-size:15px">${esc(syncText)}</div></div>
    <div class="kpi b"><div class="kl">SO ในระบบ</div><div class="kv">${fmt(dataConfidence.soCount)}</div></div>
    <div class="kpi g"><div class="kl">SO Lines</div><div class="kv">${fmt(dataConfidence.lineCount)}</div></div>
    <div class="kpi ${confWarnings.length?'r':'a'}"><div class="kl">Booking Active</div><div class="kv">${fmt(dataConfidence.activeBookingCount)}</div><div class="kh">${confWarnings.length ? esc(confWarnings.join(' | ')) : 'ข้อมูลเชื่อมครบ'}</div></div>
  </div>` : `<div class="al alw" style="margin-bottom:10px">ยังโหลด Data Confidence ไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่อ Supabase</div>`;

  document.getElementById('ct').innerHTML = `
  ${confidenceHtml}
  <div class="krow">
    <div class="kpi b"><div class="kl">จองทั้งหมด</div><div class="kv">${activeBks.length}</div></div>
    <div class="kpi g"><div class="kl">ยืนยันแล้ว</div><div class="kv">${activeBks.filter(b=>b.status==='confirmed').length}</div></div>
    <div class="kpi a"><div class="kl">รอดำเนินการ</div><div class="kv">${activeBks.filter(b=>b.status==='pending').length}</div></div>
    <div class="kpi r"><div class="kl">ต้องสั่งผลิต</div><div class="kv">${produceCount}</div><div class="kh">รายการ</div></div>
  </div>
  <div class="tabs" style="margin-bottom:10px">
    ${tTab('active','📋 รายการจอง ('+activeBks.length+')')}
    ${tTab('cancelled','❌ ยกเลิก/เปิดใหม่ ('+cancelledBks.length+')')}
  </div>
  <div class="frow" style="gap:8px;flex-wrap:wrap;margin-bottom:10px">
    <input id="bk-search" type="text" placeholder="ค้นหา รหัส/ชื่อสินค้า/ลูกค้า" style="width:200px;padding:6px 10px;border:1px solid var(--BD);border-radius:7px;font-size:13px;font-family:var(--font)" oninput="bkSaveAndRefresh()" value="${esc(searchText)}">
    <select id="bk-sku-f" class="btn btn-sm" onchange="bkSaveAndRefresh()" style="min-width:160px">
      <option value="">สินค้าทั้งหมด</option>
      ${allSkus.map(([c,n])=>`<option value="${esc(c)}" ${skuFilter===c?'selected':''}>${esc(c)} — ${esc((n||'').substring(0,20))}</option>`).join('')}
    </select>
    <select id="bk-tf" class="btn btn-sm" onchange="bkSaveAndRefresh()">
      <option value="">ประเภททั้งหมด</option>
      <option value="PO" ${typeFilter==='PO'?'selected':''}>PO</option>
      <option value="SO" ${typeFilter==='SO'?'selected':''}>SO</option>
    </select>
    ${bkTab!=='cancelled'?`<select id="bk-sf" class="btn btn-sm" onchange="bkSaveAndRefresh()">
      <option value="">สถานะทั้งหมด</option>
      <option value="pending" ${statusFilter==='pending'?'selected':''}>รอดำเนินการ</option>
      <option value="confirmed" ${statusFilter==='confirmed'?'selected':''}>ยืนยันแล้ว</option>
      <option value="received" ${statusFilter==='received'?'selected':''}>รับสินค้าแล้ว</option>
    </select>`:''}
    ${canEdit ? `<button class="btn btn-sm btn-p" onclick="showBkModal()">+ เพิ่มการจอง</button>` : ''}
    <button class="btn btn-sm btn-g" onclick="expBookings()">Export Excel</button>
    <button class="btn btn-xs" onclick="bkClearFilters()" style="color:var(--TX3)">ล้าง filter</button>
  </div>
  <div class="card">
    <div class="ch"><div class="ct2">${bkTab==='cancelled'?'รายการยกเลิก/เปิดใหม่':'รายการจองสินค้า'} (${filtered.length} รายการ)</div></div>
    ${filtered.length === 0 ? '<div style="padding:20px;color:var(--TX3);text-align:center">ยังไม่มีรายการจอง</div>' : `
    <div class="tw tw-scroll"><table>
      <thead><tr>

        <th>ชื่อลูกค้า</th>
        <th>วันที่รับสินค้า</th>

        <th>สต๊อก/ผลิต</th>
        <th>สถานะ</th>
        <th>บันทึกล่าสุดโดย</th>

      <tbody>${filtered.map(b => {
        const docNo = bookingDocNo(b);

        const safeId=String(b.id||'').replace(/'/g,"\\'");

    </table></div>`}
  </div>`;
}

function bkSaveAndRefresh(){
  _bkFilters={
    type: document.getElementById('bk-tf')?.value||'',
    status: document.getElementById('bk-sf')?.value||'',
    search: document.getElementById('bk-search')?.value||'',
    skuF: document.getElementById('bk-sku-f')?.value||'',
    tab: window._bkTab||'active'
  };
  DB.set('bk_filters',_bkFilters);
  pgPlanBooking();
}
function bkClearFilters(){
  window._bkTab='active';
  _bkFilters={type:'',status:'',search:'',skuF:'',tab:'active'};
  DB.set('bk_filters',_bkFilters);
  pgPlanBooking();
}
async function bkChangeStockStatus(id,stockStatus){
  const rows=(DB.get('bookings')||[]).map(normalizeBookingRow);
  DB.set('bookings',rows.map(b=>b.id===id?{...b,stockStatus,stock_status:stockStatus,edited_by:UID,edited_at:new Date().toISOString()}:b));
  CACHE.clear('bookings');
  try{await SB.updateBooking(id,{stock_status:stockStatus});toast('อัปเดตสต๊อก/ผลิตแล้ว');}
  catch(e){toast('บันทึก offline เท่านั้น','warn');}
  pgPlanBooking();
}
async function bkSetConfirmDate(id,confirmDate){
  const rows=(DB.get('bookings')||[]).map(normalizeBookingRow);
  DB.set('bookings',rows.map(b=>b.id===id?{...b,confirmDate,confirm_date:confirmDate,edited_by:UID,edited_at:new Date().toISOString()}:b));

    await SB.updateBooking(id,{confirm_date:confirmDate||null});

        <option value="received" ${b?.status==='received'?'selected':''}>รับสินค้าแล้ว</option>
        <option value="cancelled" ${b?.status==='cancelled'?'selected':''}>ยกเลิก</option>
      </select></div>
    <div class="field" style="grid-column:1/-1"><label>หมายเหตุ</label>
      <input type="text" id="bk-note" value="${esc(b?.note||'')}"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" onclick="closeM()">ยกเลิก</button>
    <button class="btn btn-p" onclick="saveBk('${id}')">บันทึก</button>
  </div>`);
}

function saveBk(id) {
  const type = document.getElementById('bk-type')?.value || 'PO';
  const poNo = (document.getElementById('bk-po')?.value || '').trim();
  const soNo = (document.getElementById('bk-so')?.value || '').trim();
  const refNo = ((document.getElementById('bk-ref')?.value || '').trim()) || (type==='PO'?poNo:soNo);
  const sku  = document.getElementById('bk-sku')?.value;
  const qty  = parseFloat(document.getElementById('bk-qty')?.value) || 0;
  const custName = (document.getElementById('bk-cust')?.value || '').trim();
  const soDate = document.getElementById('bk-so-date')?.value;
  const receiveDate = document.getElementById('bk-date')?.value;
  const stockStatus = document.getElementById('bk-ss')?.value || 'stock';
  const status = document.getElementById('bk-status')?.value || 'pending';
  const note = (document.getElementById('bk-note')?.value || '').trim();
  if (!sku || !qty || !custName || !receiveDate) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }
  const SKUS = typeof getSkusMerged === 'function' ? getSkusMerged() : SKUS_MASTER;
  const sk = SKUS.find(s => s.code === sku) || { name: '' };
  const bks = DB.get('bookings') || [];
  if (id) {
    const idx = bks.findIndex(b => b.id === id);
    const upd = { type, refNo, poNo, soNo, soDate, sku, skuName: sk.name, qty, custName, receiveDate, stockStatus, status, note, edited_by: UID, edited_at: new Date().toISOString() };
    if (idx !== -1) Object.assign(bks[idx], upd);
    audit('EDIT_BK', id, { sku, qty, stockStatus });
    DB.set('bookings', bks);
    CACHE.clear('bookings');
    // sync to Supabase
    SB.updateBooking(id, {
      type, sku, sku_name: sk.name, qty,
      cust_name: custName, cust_code: custName,
      receive_date: receiveDate||null,
      stock_status: stockStatus, status, note: note||null,
      ref_no: refNo||null, po_no: poNo||null, so_no: soNo||null,
      so_date: soDate||null,
    }).catch(e=>toast('บันทึก offline เท่านั้น: '+e.message,'warn'));
  } else {
    const newBk = { id: genId('BK'), type, refNo, poNo, soNo, soDate, sku, skuName: sk.name, qty, custName, receiveDate, stockStatus, status, note, by: UID, ts: Date.now(), edited_by: UID, edited_at: new Date().toISOString() };
    bks.unshift(newBk);
    audit('ADD_BK', newBk.id, { type, refNo, sku, qty, custName, stockStatus });
    if (stockStatus === 'produce') toast(`⚠️ จอง ${type} ${sku} ${qty}กก. — ต้องสั่งผลิต รอ confirm`);
    DB.set('bookings', bks);
    CACHE.clear('bookings');
    // sync to Supabase
    SB.addBooking(newBk).then(saved=>{
      if(saved?.id && saved.id!==newBk.id){
        // อัปเดต id ใน localStorage ให้ตรงกับ Supabase UUID
        const existing=DB.get('bookings')||[];
        DB.set('bookings',existing.map(b=>b.id===newBk.id?{...b,id:saved.id}:b));
      }
    }).catch(e=>toast('บันทึก offline เท่านั้น: '+e.message,'warn'));
  }
  closeM();
  toast('บันทึกการจองแล้ว');
  pgPlanBooking();
}

function bkStatusControl(id, status) {
  const safeId = String(id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  const current = status || 'pending';
  return `<select class="btn btn-xs" style="min-width:116px" onchange="bkChangeStatus('${safeId}',this.value)">
    <option value="pending" ${current==='pending'?'selected':''}>รอดำเนินการ</option>
    <option value="confirmed" ${current==='confirmed'?'selected':''}>ยืนยันแล้ว</option>
    <option value="received" ${current==='received'?'selected':''}>รับสินค้าแล้ว</option>
    <option value="cancelled" ${current==='cancelled'?'selected':''}>ยกเลิก</option>
  </select>`;
}

async function bkChangeStatus(id, status) {
  const rows = (DB.get('bookings') || []).map(normalizeBookingRow);
  DB.set('bookings', rows.map(b => b.id === id ? { ...b, status } : b));
  CACHE.clear('bookings');
  const saved = await SB.updateBooking(id, { status });
  if (!saved) toast('อัปเดตสถานะใน Supabase ไม่สำเร็จ', 'warn');
  else toast('อัปเดตสถานะแล้ว');
  pgPlanBooking();
}
function deleteBk(id) {
  if (!confirm('ลบรายการจองนี้?')) return;
  DB.set('bookings', (DB.get('bookings') || []).filter(b => b.id !== id));
  audit('DEL_BK', id, {});
  pgPlanBooking();
}

let _psv = { period: 'day', ref: new Date().toISOString().slice(0,10) };
function pgProdSummary() {
  const hasActual = (DB.get('stock_in_actual')||[]).length > 0;
  document.getElementById('ct').innerHTML = `
  <div class="frow" style="gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn btn-sm" onclick="psvSetPeriod('day')" style="${_psv.period==='day'?'background:var(--N);color:#fff;border-color:var(--N);font-weight:600':''}">รายวัน</button>
    <button class="btn btn-sm" onclick="psvSetPeriod('week')" style="${_psv.period==='week'?'background:var(--N);color:#fff;border-color:var(--N);font-weight:600':''}">รายสัปดาห์</button>
    <button class="btn btn-sm" onclick="psvSetPeriod('month')" style="${_psv.period==='month'?'background:var(--N);color:#fff;border-color:var(--N);font-weight:600':''}">รายเดือน</button>

    <button class="btn btn-sm btn-g" onclick="expPsvSummary()">Export Excel</button>
  </div>
  ${hasActual?`<div class="al als" style="margin-bottom:10px">มีข้อมูลรับเข้าจริง ${(DB.get('stock_in_actual')||[]).length} รายการ — ใช้ข้อมูลนี้แสดงในกราฟ</div>`:'<div class="al alw" style="margin-bottom:10px">ยังไม่มีข้อมูลรับเข้าจริง — แสดง "ผลิตแล้ว" จากแผนผลิต</div>'}

function psvImportClick(){document.getElementById('psv-file')?.click();}
function psvDownloadTemplate(){
  const cols=['วันที่ (YYYY-MM-DD)','รหัสสินค้า','จำนวนรับเข้า (กก.)','หมายเหตุ'];
  const sample=[['2026-05-01','SKU001',1000,'รับเข้าจากไลน์ A'],['2026-05-01','SKU002',500,'']];
  toXLSX([['StockIn_Template',cols,sample]],'StockIn_Template.xlsx');
}
function psvImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1});
      const rows=[];
      json.slice(1).forEach(r=>{
        const date=String(r[0]||'').trim();
        const sku=String(r[1]||'').trim();
        const qty=parseFloat(r[2])||0;
        const note=String(r[3]||'').trim();
        if(date && sku && qty>0) rows.push({date,sku,qty,note});
      });
      if(!rows.length){toast('ไม่พบข้อมูล — ตรวจสอบรูปแบบ Template');return;}
      const existing=DB.get('stock_in_actual')||[];
      DB.set('stock_in_actual',[...existing,...rows]);
      toast(`นำเข้า ${rows.length} รายการสำเร็จ`);
      e.target.value='';
      pgProdSummary();
    }catch(err){toast('อ่านไฟล์ไม่ได้: '+err.message);}
  };
  reader.readAsBinaryString(file);
}

function psvSetPeriod(p) { _psv.period = p; pgProdSummary(); }

function psvRender() {
  const orders = useProdOrders();
  const ref = new Date(_psv.ref);
  const period = _psv.period;
  const cols = [];
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  if (period === 'day') {
    const s = new Date(ref); s.setDate(s.getDate() - 6);
    for (let i = 0; i < 14; i++) {
      const d = new Date(s); d.setDate(s.getDate() + i);
      cols.push({ key: d.toISOString().slice(0,10), lbl: `${d.getDate()}/${d.getMonth()+1}` });
    }
  } else if (period === 'week') {
    const s = new Date(ref); s.setDate(s.getDate() - s.getDay() + 1 - 14);
    for (let i = 0; i < 8; i++) {
      const ws = new Date(s); ws.setDate(s.getDate() + i*7);
      const we = new Date(ws); we.setDate(ws.getDate() + 6);
      cols.push({ key: ws.toISOString().slice(0,10), end: we.toISOString().slice(0,10), lbl: `${ws.getDate()}/${ws.getMonth()+1}` });
    }
  } else {
    for (let i = -3; i <= 3; i++) {
      const d = new Date(ref.getFullYear(), ref.getMonth() + i, 1);
      cols.push({ key: d.toISOString().slice(0,7), lbl: months[d.getMonth()] + ' ' + String(d.getFullYear()+543).slice(-2) });
    }
  }
  const inCol = (o, col) => {
    if (period === 'month') return (o.planDate||'').slice(0,7) === col.key;
    if (col.end) return (o.planDate||'') >= col.key && (o.planDate||'') <= col.end;
    return (o.planDate||'') === col.key;
  };
  const planData = cols.map(col => orders.filter(o => inCol(o, col) && o.status !== 'replaced').reduce((s,o)=>s+(o.qty||0),0));
  const stockInActual = DB.get('stock_in_actual')||[];
  const inActualCol = (r, col) => {
    if(period==='month') return (r.date||'').slice(0,7)===col.key;
    if(col.end) return (r.date||'')>=col.key&&(r.date||'')<=col.end;
    return (r.date||'')===col.key;
  };
  const doneData = cols.map(col => {
    if(stockInActual.length) return stockInActual.filter(r=>inActualCol(r,col)).reduce((s,r)=>s+(r.qty||0),0);
    return orders.filter(o=>inCol(o,col)&&o.status==='done').reduce((s,o)=>s+(o.qty||0),0);
  });
  const totalPlan = planData.reduce((s,v)=>s+v,0);
  const totalDone = doneData.reduce((s,v)=>s+v,0);
  const pct = totalPlan > 0 ? Math.round(totalDone / totalPlan * 100) : 0;
  const krow = document.getElementById('psv-krow');
  if (krow) krow.innerHTML = `
    <div class="kpi g"><div class="kl">แผนผลิตรวม (กก.)</div><div class="kv">${fmt(totalPlan)}</div></div>
    <div class="kpi b"><div class="kl">ผลิตจริงรวม (กก.)</div><div class="kv">${fmt(totalDone)}</div></div>
    <div class="kpi ${pct>=90?'g':pct>=70?'a':'r'}"><div class="kl">% สำเร็จ</div><div class="kv">${pct}%</div></div>
    <div class="kpi a"><div class="kl">ส่วนต่าง</div><div class="kv" style="font-size:18px">${totalDone-totalPlan>=0?'+':''}${fmt(totalDone-totalPlan)}</div><div class="kh">กก.</div></div>`;
  const cv = document.getElementById('psv-chart');
  if (cv) {
    const ex = Chart.getChart(cv); if (ex) ex.destroy();
    new Chart(cv, {
      type: 'bar',
      data: {
        labels: cols.map(c=>c.lbl),
        datasets: [
          { label: 'แผนผลิต (กก.)', data: planData, backgroundColor: 'rgba(21,83,160,0.6)', borderColor: 'rgba(21,83,160,1)', borderWidth: 1 },
          { label: 'ผลิตจริง (กก.)', data: doneData, backgroundColor: 'rgba(10,89,64,0.7)', borderColor: 'rgba(10,89,64,1)', borderWidth: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { font: { family: "'IBM Plex Sans Thai',sans-serif", size: 11 }, boxWidth: 12 } } }
      }
    });
  }
  const tbl = document.getElementById('psv-tbl');
  if (tbl) tbl.innerHTML = `<div class="tw"><table>
    <thead><tr>
      <th>ช่วงเวลา</th><th class="r">แผนผลิต (กก.)</th><th class="r">ผลิตจริง (กก.)</th><th class="r">ส่วนต่าง</th><th>% สำเร็จ</th>
    </tr></thead>
    <tbody>${cols.map((col,i) => {
      const plan = planData[i], done = doneData[i];
      const diff = done - plan;
      const p = plan > 0 ? Math.round(done/plan*100) : (done > 0 ? 100 : 0);
      const cls = p>=90?'cmp-ok':p>=70?'cmp-warn':'cmp-bad';
      return `<tr>
        <td>${col.lbl}</td>
        <td class="r">${plan>0?fmt(plan):'—'}</td>
        <td class="r">${done>0?fmt(done):'—'}</td>
        <td class="r" style="color:${diff<0?'var(--R)':diff>0?'var(--G)':'inherit'}">${plan>0||done>0?(diff>0?'+':'')+fmt(diff):'—'}</td>
        <td><span class="cmp-pct ${cls}">${p}%</span></td>
      </tr>`;
    }).join('')}</tbody>
    <tfoot><tr style="font-weight:700;background:var(--bg2)">
      <td>รวมทั้งหมด</td>
      <td class="r">${fmt(totalPlan)}</td>
      <td class="r">${fmt(totalDone)}</td>
      <td class="r" style="color:${totalDone-totalPlan<0?'var(--R)':'var(--G)'}">${totalPlan>0?(totalDone-totalPlan>=0?'+':'')+fmt(totalDone-totalPlan):'—'}</td>
      <td><span class="cmp-pct ${pct>=90?'cmp-ok':pct>=70?'cmp-warn':'cmp-bad'}">${pct}%</span></td>
    </tr></tfoot>

}

function expPsvSummary() {
  const orders = useProdOrders();
  const stockInActual = DB.get('stock_in_actual') || [];
  const today7 = new Date(_psv.ref); today7.setDate(today7.getDate() - 6);
  const rows = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(today7); d.setDate(today7.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const plan = orders.filter(o=>o.planDate===key&&o.status!=='replaced').reduce((s,o)=>s+(o.qty||0),0);
    const done = stockInActual.length
      ? stockInActual.filter(r=>r.date===key).reduce((s,r)=>s+(r.qty||0),0)
      : orders.filter(o=>o.planDate===key&&o.status==='done').reduce((s,o)=>s+(o.qty||0),0);
    rows.push([key, plan, done, done-plan, plan>0?Math.round(done/plan*100)+'%':'']);
  }
  toXLSX([['ProdSummary',['ช่วงเวลา','แผนผลิต(กก.)','รับเข้าจริง/ผลิตจริง(กก.)','ส่วนต่าง','%สำเร็จ'],rows]],'ProdSummary_'+todayStr()+'.xlsx');
}

function _srOnCustChange(sel) {
  _sr.form.custCode = sel.value;
  _sr.form.custName = sel.options[sel.selectedIndex]?.getAttribute('data-name') || '';
}
function srItemSku(i, sel) {
  _sr.form.items = _sr.form.items || [];
  _sr.form.items[i] = _sr.form.items[i] || {};
  _sr.form.items[i].sku     = sel.value;
  _sr.form.items[i].skuName = sel.options[sel.selectedIndex]?.getAttribute('data-name') || '';
}
function srItemField(i, field, val) {
  _sr.form.items = _sr.form.items || [];
  _sr.form.items[i] = _sr.form.items[i] || {};
  _sr.form.items[i][field] = val;
}
function srAddItem() {
  _srCollect();
  _sr.form.items = (_sr.form.items || []).concat([{ sku: '', skuName: '', qty: 1, unit: 'กก.', note: '' }]);
  _srRenderForm();
}
function srRemoveItem(i) {
  _srCollect();
  _sr.form.items = (_sr.form.items || []).filter((_, idx) => idx !== i);
  if (!_sr.form.items.length) _sr.form.items = [{ sku: '', skuName: '', qty: 1, unit: 'กก.', note: '' }];
  _srRenderForm();
}
function _srCollect() {
  const custSel = document.getElementById('sr-cust');
  if (custSel) {
    _sr.form.custCode = custSel.value;
    _sr.form.custName = custSel.options[custSel.selectedIndex]?.getAttribute('data-name') || _sr.form.custName || '';
  }
  _sr.form.contact     = document.getElementById('sr-contact')?.value  || _sr.form.contact  || '';
  _sr.form.phone       = document.getElementById('sr-phone')?.value    || _sr.form.phone    || '';
  _sr.form.purpose     = document.getElementById('sr-purpose')?.value  || _sr.form.purpose  || '';
  _sr.form.deliveryDate= document.getElementById('sr-delivery')?.value || _sr.form.deliveryDate || '';
  _sr.form.address     = document.getElementById('sr-addr')?.value     || _sr.form.address  || '';
  _sr.form.note        = document.getElementById('sr-note')?.value     || _sr.form.note     || '';
}
function _srValidate() {
  _srCollect();
  const f = _sr.form;
  if (!f.custCode)     { toast('กรุณาเลือกลูกค้า', 'warn'); return false; }
  if (!f.purpose?.trim()) { toast('กรุณาระบุวัตถุประสงค์', 'warn'); return false; }
  if (!f.deliveryDate) { toast('กรุณาระบุวันที่ต้องการรับ', 'warn'); return false; }
  const valid = (f.items || []).filter(it => it.sku && it.qty > 0);
  if (!valid.length)   { toast('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ', 'warn'); return false; }
  return true;
}
function _srBuild(status) {
  const f   = _sr.form;
  const now = new Date().toISOString();
  const base= _sr.editId ? (getSR().find(r => r.id === _sr.editId) || {}) : {};
  return {
    ...base,
    id:           base.id || genId('SR'),
    custCode:     f.custCode,
    custName:     f.custName || '',
    contact:      f.contact  || '',
    phone:        f.phone    || '',
    purpose:      f.purpose  || '',
    deliveryDate: f.deliveryDate || '',
    address:      f.address  || '',
    note:         f.note     || '',
    items:        (f.items || []).filter(it => it.sku && it.qty > 0),
    status,
    by:           base.by     || UID,
    byName:       base.byName || UNAME,
    date:         base.date   || now.slice(0, 10),
    ts:           base.ts     || Date.now(),
    updated_at:   now,
    updated_by:   UID,
  };
}
function _srSave(rec) {
  saveSR([rec, ...getSR().filter(r => r.id !== rec.id)]);
}
function srSaveDraft() {
  if (!_sr.form.custCode && !document.getElementById('sr-cust')?.value) { toast('กรุณาเลือกลูกค้าก่อนบันทึก', 'warn'); return; }
  _srCollect();
  const rec = _srBuild('draft');
  _srSave(rec);
  toast('บันทึกร่างแล้ว');
  _sr.view = 'home'; pgSample();
}
function srSubmit() {
  if (!_srValidate()) return;
  const rec = _srBuild('pending');
  _srSave(rec);
  audit('SAMPLE_REQUEST', rec.id, { custCode: rec.custCode, items: rec.items.length });
  toast('ส่งคำขออนุมัติแล้ว');
  _sr.view = 'home'; pgSample();
}

// ── หน้ารายละเอียด + ปุ่ม Action ────────────────────────────
function _srRenderDetail(id) {
  const r = getSR().find(x => x.id === id);
  if (!r) { _sr.view = 'home'; pgSample(); return; }

  const canApprove  = ['manager','superadmin'].includes(ROLE);
  const canDispatch = ['planning','warehouse','superadmin'].includes(ROLE);
  const isMine      = r.by === UID;
  const isEditable  = (isMine || canApprove) && ['draft','pending'].includes(r.status);
  const sid = String(id || '').replace(/'/g, "\\'");

  const actions = [];
  if (isMine && r.status === 'draft')
    actions.push(`<button class="btn btn-p" onclick="srSubmitById('${sid}')">📤 ส่งขออนุมัติ</button>`);
  if (isEditable)
    actions.push(`<button class="btn" onclick="_srEditExisting('${sid}')">✏️ แก้ไข</button>`);

  </div>`;

// ── Actions ───────────────────────────────────────────────────
function srApprove(id) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'approved', approved_by: UID, approved_at: new Date().toISOString() });
  saveSR(reqs);
  audit('SAMPLE_APPROVE', id, {});
  toast('อนุมัติคำขอแล้ว');
  _sr.view = 'detail'; pgSample();
}
function srReject(id) {
  const reason = prompt('เหตุผลการปฏิเสธ (กด Cancel เพื่อยกเลิก):');
  if (reason === null) return;
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'rejected', rejected_by: UID, rejected_at: new Date().toISOString(), reject_reason: reason });
  saveSR(reqs);
  audit('SAMPLE_REJECT', id, { reason });
  toast('ปฏิเสธคำขอแล้ว');
  _sr.view = 'detail'; pgSample();
}
function srSetStatus(id, status) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  const now = new Date().toISOString();
  r.status = status;
  if (status === 'preparing')  { r.prep_by  = UID; r.prep_at  = now; }
  if (status === 'dispatched') { r.disp_by  = UID; r.disp_at  = now; }
  if (status === 'received')   { r.recv_by  = UID; r.recv_at  = now; }
  r.updated_by = UID; r.updated_at = now;
  saveSR(reqs);
  audit('SAMPLE_STATUS', id, { status });
  toast('อัปเดตสถานะแล้ว');
  _sr.view = 'detail'; pgSample();
}
function srSubmitById(id) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'pending', submitted_at: new Date().toISOString(), updated_by: UID });
  saveSR(reqs);
  audit('SAMPLE_SUBMIT', id, {});
  toast('ส่งคำขออนุมัติแล้ว');
  _sr.view = 'detail'; pgSample();
}
function srDelete(id) {
  if (!confirm('ลบคำขอนี้?')) return;
  saveSR(getSR().filter(r => r.id !== id));
  audit('SAMPLE_DELETE', id, {});
  toast('ลบคำขอแล้ว');
  _sr.view = 'home'; pgSample();
}
function _srEditExisting(id) {
  const r = getSR().find(x => x.id === id); if (!r) return;
  _sr.editId = id;
  _sr.form = {
    custCode: r.custCode, custName: r.custName,
    contact: r.contact || '', phone: r.phone || '',
    purpose: r.purpose || '', deliveryDate: r.deliveryDate || '',
    address: r.address || '', note: r.note || '',
    items: JSON.parse(JSON.stringify(r.items || [])),
  };
  _sr.view = 'form';
  pgSample();
}

            <div style="font-size:11px;color:var(--TX3);margin-bottom:4px">หมายเหตุ / ข้อสังเกต</div>
            <input id="sr-ir-note-${i}" type="text" value="${esc(ir.note || '')}"
              placeholder="เช่น กลิ่น รสชาติ เนื้อสัมผัส ขนาด"
              style="padding:6px 8px;border:1px solid var(--BD);border-radius:7px;width:100%;font-family:var(--font);font-size:12px;box-sizing:border-box">
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="_sr.view='detail';pgSample()">ยกเลิก</button>
      <button class="btn btn-g" onclick="srSaveTestResult('${String(id).replace(/'/g,"\\'")}')">💾 บันทึกผลทดสอบ</button>
    </div>
  </div>`;
}

function srSaveTestResult(id) {
  const r = getSR().find(x => x.id === id); if (!r) return;
  const date     = document.getElementById('sr-tr-date')?.value;
  const result   = document.getElementById('sr-tr-result')?.value;
  const sat      = parseInt(document.getElementById('sr-tr-sat')?.value) || 0;
  const decision = document.getElementById('sr-tr-decision')?.value;
  const feedback = document.getElementById('sr-tr-feedback')?.value?.trim() || '';
  const note     = document.getElementById('sr-tr-note')?.value?.trim() || '';
  if (!date)   { toast('กรุณาระบุวันที่ทดสอบ', 'warn'); return; }
  if (!result) { toast('กรุณาเลือกผลการทดสอบ', 'warn'); return; }
  const itemResults = (r.items || []).map((it, i) => ({
    sku:     it.sku,
    skuName: it.skuName || '',
    result:  document.getElementById(`sr-ir-result-${i}`)?.value || '',
    note:    document.getElementById(`sr-ir-note-${i}`)?.value?.trim() || '',
  }));
  const reqs = getSR();
  const rec  = reqs.find(x => x.id === id); if (!rec) return;
  rec.testResult = { date, result, satisfaction: sat, decision, feedback, note, itemResults, by: UID, updated_at: new Date().toISOString() };
  saveSR(reqs);
  audit('SAMPLE_TEST_RESULT', id, { result, decision, satisfaction: sat });
  toast('บันทึกผลทดสอบแล้ว');
  _sr.view = 'detail'; pgSample();
}
</script>
</body>
</html>
