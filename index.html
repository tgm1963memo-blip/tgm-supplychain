  const name=_crVatAfter(t,/аёҠаё·а№Ҳаёӯаёңаё№а№үаёӣаёЈаё°аёҒаёӯаёҡаёҒаёІаёЈ\s*/,[/аёҠаё·а№ҲаёӯаёӘаё–аёІаёҷаёӣаёЈаё°аёҒаёӯаёҡаёҒаёІаёЈ/,/а№Җаёӣа№Үаёҷ\s+аёӘаёіаёҷаёұаёҒаёҮаёІаёҷ/,/аё•аёұа№үаёҮаёӯаёўаё№а№Ҳ/]);
  if(name&&name.length>2) out.shopname=name.replace(/^[:\-]+/,'').trim();
  const place=_crVatAfter(t,/аёҠаё·а№ҲаёӯаёӘаё–аёІаёҷаёӣаёЈаё°аёҒаёӯаёҡаёҒаёІаёЈ\s*/,[/а№Җаёӣа№Үаёҷ\s+аёӘаёіаёҷаёұаёҒаёҮаёІаёҷ/,/аё•аёұа№үаёҮаёӯаёўаё№а№Ҳ/,/аёӯаёІаё„аёІаёЈ/]);
  if(place&&place.length>2&&!out.shopname) out.shopname=place.replace(/^[:\-]+/,'').trim();
  if(/аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№ғаё«аёҚа№Ҳ|аёӘа№ҚаёІаёҷаёұаёҒаёҮаёІаёҷа№ғаё«аёҚа№Ҳ/.test(t)) out.branch='аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№ғаё«аёҚа№Ҳ';
  else {const br=t.match(/аёӘаёІаёӮаёІ(?:аё—аёөа№Ҳ)?\s*([\d\-]+)/); if(br) out.branch='аёӘаёІаёӮаёІ '+br[1];}
  const addrParts=[];
  const labels=['аёӯаёІаё„аёІаёЈ','аё«а№үаёӯаёҮа№ҖаёҘаёӮаё—аёөа№Ҳ','аёҠаёұа№үаёҷаё—аёөа№Ҳ','аё«аёЎаё№а№Ҳаёҡа№үаёІаёҷ','а№ҖаёҘаёӮаё—аёөа№Ҳ','аё«аёЎаё№а№Ҳаё—аёөа№Ҳ','аё•аёЈаёӯаёҒ\\/аёӢаёӯаёў|аё•аёЈаёӯаёҒ|аёӢаёӯаёў','аё–аёҷаёҷ','аё•аёіаёҡаёҘ\\/а№ҒаёӮаё§аёҮ|аё•аёіаёҡаёҘ|а№ҒаёӮаё§аёҮ','аёӯаёіа№Җаё аёӯ\\/а№ҖаёӮаё•|аёӯаёіа№Җаё аёӯ|а№ҖаёӮаё•','аёҲаёұаёҮаё«аё§аёұаё”'];
  labels.forEach(lbl=>{
    const re=new RegExp('(?:'+lbl+')\\s*([^\\n]+?)(?=\\s*(?:аёӯаёІаё„аёІаёЈ|аё«а№үаёӯаёҮа№ҖаёҘаёӮаё—аёөа№Ҳ|аёҠаёұа№үаёҷаё—аёөа№Ҳ|аё«аёЎаё№а№Ҳаёҡа№үаёІаёҷ|а№ҖаёҘаёӮаё—аёөа№Ҳ|аё«аёЎаё№а№Ҳаё—аёөа№Ҳ|аё•аёЈаёӯаёҒ|аёӢаёӯаёў|аё–аёҷаёҷ|аё•аёіаёҡаёҘ|а№ҒаёӮаё§аёҮ|аёӯаёіа№Җаё аёӯ|а№ҖаёӮаё•|аёҲаёұаёҮаё«аё§аёұаё”|аёЈаё«аёұаёӘа№„аёӣаёЈаё©аё“аёөаёўа№Ң|а№Ӯаё—аёЈаёЁаёұаёһаё—а№Ң|аё§аёұаёҷаё—аёөа№Ҳ|аёӯаёӯаёҒа№ғаё«а№ү|$))','m');
    const m=t.match(re); if(m){const val=m[1].replace(/[.В·вҖў]+/g,' ').replace(/\s+/g,' ').trim(); if(val&&val!=='-') addrParts.push(val);}
  });
  const addr=addrParts.join(' ').replace(/\s+/g,' ').trim();
  if(addr.length>5) out.addr=addr;
  const zipM=t.match(/аёЈаё«аёұаёӘа№„аёӣаёЈаё©аё“аёөаёўа№Ң\s*([1-9]\d{4})/)||t.match(/\b([1-9]\d{4})\b(?![\d\-])/);
  if(zipM) out.zip=zipM[1];
  const phoneM=t.match(/а№Ӯаё—аёЈаёЁаёұаёһаё—а№Ң\s*([0-9\-\s]{7,20})/);
  if(phoneM) out.phone=phoneM[1].replace(/\s+/g,'').trim();
  const dateM=t.match(/аё§аёұаёҷаё—аёөа№Ҳа№Җаёӣа№Үаёҷаёңаё№а№үаёӣаёЈаё°аёҒаёӯаёҡаёҒаёІаёЈаёҲаё”аё—аё°а№Җаёҡаёөаёўаёҷ\s*([\d\sаёҒ-а№ҷA-Za-z\.]+?)(?=аёӯаёӯаёҒа№ғаё«а№ү|аёңаё№а№ү|$)/)||t.match(/аё§аёұаёҷаё—аёөа№Ҳа№Җаёӣа№Үаёҷаёңаё№а№үаёӣаёЈаё°аёҒаёӯаёҡаёҒаёІаёЈаёҲаё”аё—аё°а№Җаёҡаёөаёўаёҷ[^\n]*\n\s*([^\n]+)/);
  if(dateM) out.vatRegDate=dateM[1].replace(/[.В·вҖў]+/g,' ').replace(/\s+/g,' ').trim();
  if(out.addr){out.taxAddr=out.addr;out.taxZip=out.zip||'';}
  return out;
}
function _crParseAnyOcr(text){

    dz.onclick=crOcrTrigger;
  }

function crOcrRetry(){

function crRenderApprove(){
  const el=document.getElementById('cr-body');if(!el)return;
  const subs=DB.get('custreg_subs')||[];
  if(_cr.viewSubId){
    const sub=subs.find(s=>s.id===_cr.viewSubId);
    if(sub){crRenderApproveDetail(sub,el);return;}
    _cr.viewSubId=null;
  }
  // For multi-level: user is in current level approvers
  const isMyTurn=s=>{
    if(s.levels?.length){
      const lv=s.levels[s.currentLevel||0];
      return s.status==='pending'&&lv?.approvers.some(a=>a.uid===UID&&a.status==='pending');
    }
    return s.approvers?.some(a=>a.uid===UID&&a.status==='pending');
  };
  const list=ROLE==='superadmin'?subs:subs.filter(isMyTurn);
  if(!list.length){el.innerHTML=`<div style="background:var(--bg2);border-radius:8px;padding:24px;text-align:center;color:var(--TX3);font-size:13px">а№„аёЎа№ҲаёЎаёөаёЈаёІаёўаёҒаёІаёЈаёЈаёӯаёӯаёҷаёёаёЎаёұаё•аёҙ</div>`;return;}
  const stBg={pending:'var(--LBL)',approved:'var(--LG)',rejected:'var(--LR)'};
  const stTc={pending:'var(--BL)',approved:'var(--G)',rejected:'var(--R)'};
  const stLbl={pending:'рҹ”ө аёЈаёӯаёӯаёҷаёёаёЎаёұаё•аёҙ',approved:'вң… аёӯаёҷаёёаёЎаёұаё•аёҙа№ҒаёҘа№үаё§',rejected:'вқҢ а№„аёЎа№ҲаёӯаёҷаёёаёЎаёұаё•аёҙ'};
  el.innerHTML=`<div class="card">
  <div style="font-size:13px;font-weight:700;color:var(--TX);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--BD)">рҹ“Ӣ аёЈаёІаёўаёҒаёІаёЈ${ROLE==='superadmin'?'аё—аёұа№үаёҮаё«аёЎаё”':'аёЈаёӯаёӯаёҷаёёаёЎаёұаё•аёҙ'}</div>
  ${list.map(s=>{
    const lvInfo=s.levels?.length?` вҖ” аёӮаёұа№үаёҷ ${(s.currentLevel||0)+1}/${s.levels.length}`:'';
    return `<div class="cr-apv-item" onclick="crShowDetail('${s.id}')">
      <div><div style="font-size:13px;font-weight:600;color:var(--TX)">${s.shop}</div><div style="font-size:11px;color:var(--TX2)">${s.docNo} вҖ” ${s.sales}${lvInfo}</div></div>
      <span style="font-size:11px;padding:3px 10px;border-radius:99px;background:${stBg[s.status]||'var(--bg2)'};color:${stTc[s.status]||'var(--TX3)'}">${stLbl[s.status]||s.status}</span>
    </div>`;
  }).join('')}
</div>`;}

function crRenderApproveDetail(sub,el){

  // Multi-level workflow UI
  let workflowHtml='';
  let canAct=false;
  if(sub.levels?.length){
    const curLvIdx=sub.currentLevel||0;
    workflowHtml=`<div class="card"><div style="font-size:13px;font-weight:700;color:var(--TX);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--BD)">рҹ”Җ аёӮаёұа№үаёҷаё•аёӯаёҷаёҒаёІаёЈаёӯаёҷаёёаёЎаёұаё•аёҙ</div>
    <div class="cr-tl">
    ${sub.levels.map((lv,i)=>{
      const isActive=i===curLvIdx&&sub.status==='pending';
      const isDone=i<curLvIdx||(i===curLvIdx&&sub.status==='approved');
      const stColor=isDone?'var(--G)':isActive?'var(--BL)':'var(--TX3)';
      const stBgC=isDone?'var(--LG)':isActive?'var(--LBL)':'var(--bg2)';
      return `<div class="cr-tl-item">
        <div class="cr-tl-dot" style="background:${stBgC};color:${stColor}">${isDone?'вң“':i+1}</div>
        <div class="cr-tl-body">
          <div style="font-size:12px;font-weight:600;color:${stColor}">${lv.label||`аёӮаёұа№үаёҷ ${i+1}`} <span style="font-weight:400;color:var(--TX3);font-size:11px">(${lv.mode==='any'?'аё„аёҷа№ғаё”аё„аёҷаё«аёҷаё¶а№ҲаёҮ':'аё—аёёаёҒаё„аёҷ'})</span></div>
          ${lv.approvers.map(a=>{
            const astColor={approved:'var(--G)',rejected:'var(--R)',pending:'var(--TX3)'}[a.status]||'var(--TX3)';
            const astIcon={approved:'вң…',rejected:'вқҢ',pending:'вҸі'}[a.status]||'вҸі';
            return `<div style="font-size:11px;color:${astColor};margin-top:2px">${astIcon} ${a.name}${a.comment?' вҖ” "'+a.comment+'"':''}${a.ts?' ('+new Date(a.ts).toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+')':''}</div>`;
          }).join('')}
        </div>

function crWfAddApprover(lvId,sel){

function crConfirmWithWorkflow(wfLevels){

    approvers:(lv.approvers||[]).map(a=>({uid:a.uid,name:a.name,role:a.role,status:'pending',comment:'',ts:null}))
  }));
  const sub={
    id:'CR-'+Date.now(),docNo:_cr.docNo,shop:d['cr-shopname']||'(а№„аёЎа№ҲаёЈаё°аёҡаёё)',
    sales:UNAME,salesUid:UID,createdByUid:UID,ownerSalesUid:ownerUid,ownerSalesName:ownerName,requestType,existingCust:d['cr-existing-cust']||'',driveLink:d['cr-drive-link']||'',externalEmails:d['cr-external-emails']||'',taxAddr:d['cr-tax-addr']||'',taxZip:d['cr-tax-zip']||'',phone:d['cr-phone']||'',taxid:d['cr-taxid']||'',

  _cr.step=6;crRender();
}

// Multi-level approve: check level completion вҶ’ advance to next level
function crDoApprove(id){
  const subs=DB.get('custreg_subs')||[];const sub=subs.find(s=>s.id===id);if(!sub)return;
  const comment=document.getElementById('cr-apv-comment')?.value||'';
  const ts=new Date().toISOString();

  if(sub.levels?.length){
    // Multi-level workflow
    const lv=sub.levels[sub.currentLevel];
    if(!lv){toast('а№„аёЎа№ҲаёһаёҡаёӮаёұа№үаёҷаё•аёӯаёҷаёӯаёҷаёёаёЎаёұаё•аёҙ','warn');return;}
    const a=lv.approvers.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    // Sync flat approvers
    const fa=sub.approvers?.find(x=>x.uid===UID);if(fa){fa.status='approved';fa.comment=comment;fa.ts=ts;}
    // Check level completion
    const lvDone=(lv.mode==='any')?lv.approvers.some(x=>x.status==='approved'):lv.approvers.every(x=>x.status==='approved');
    if(lvDone){
      if(sub.currentLevel+1 < sub.levels.length){
        sub.currentLevel++;
        // Unlock next level's approvers (set to pending if was pending)
        toast(`аёңа№ҲаёІаёҷаёӮаёұа№үаёҷ ${sub.currentLevel} вҶ’ аёЈаёӯаёӯаёҷаёёаёЎаёұаё•аёҙаёӮаёұа№үаёҷ ${sub.currentLevel+1}`);
      } else {
        sub.status='approved';
        toast('вң… аёӯаёҷаёёаёЎаёұаё•аёҙаё„аёЈаёҡаё—аёёаёҒаёӮаёұа№үаёҷаё•аёӯаёҷ '+sub.docNo);
      }
    } else {
      toast('вң“ аёҡаёұаёҷаё—аё¶аёҒаёҒаёІаёЈаёӯаёҷаёёаёЎаёұаё•аёҙа№ҒаёҘа№үаё§ вҖ” аёЈаёӯаёңаё№а№үаёӯаёҷаёёаёЎаёұаё•аёҙаё„аёҷаёӯаё·а№Ҳаёҷ');
    }
  } else {
    // Legacy flat approval
    const a=sub.approvers?.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    if((sub.approvers||[]).every(x=>x.status==='approved'))sub.status='approved';
    toast('аёӯаёҷаёёаёЎаёұаё•аёҙа№ҖаёЈаёөаёўаёҡаёЈа№үаёӯаёў '+sub.docNo);
  }
  DB.set('custreg_subs',subs);audit('CUSTREG_APPROVE',sub.docNo,{shop:sub.shop});crHideDetail();
}

function saveSkuGroupMapping(code,newGrp){
  const groups=DB.get('product_groups')||{};
  const ex=productGroupExclusions();
  Object.entries(productGroups()).forEach(([g,items])=>{
    if((items||[]).includes(code)){
      ex[g]=[...new Set([...(ex[g]||[]),code])];
    }
  });
  Object.keys(groups).forEach(g=>{groups[g]=(groups[g]||[]).filter(c=>c!==code);});
  if(newGrp){if(!groups[newGrp])groups[newGrp]=[];if(!groups[newGrp].includes(code))groups[newGrp].push(code);}
  saveProductGroupExclusions(ex);
  saveProductGroups(groups);audit('EDIT_SKU_GROUP',code,{grp:newGrp});
  toast(newGrp?`аёҒаёіаё«аёҷаё” ${code} вҶ’ аёҒаёҘаёёа№ҲаёЎ ${newGrp}`:`аёҷаёі ${code} аёӯаёӯаёҒаёҲаёІаёҒаёҒаёҘаёёа№ҲаёЎа№ҒаёҘа№үаё§`);
  renderProdGroups();
}
function removeSkuFromGroup(group,code){
  const groups=DB.get('product_groups')||{};
  groups[group]=(groups[group]||[]).filter(c=>c!==code);
  const ex=productGroupExclusions();
  ex[group]=[...new Set([...(ex[group]||[]),code])];
  saveProductGroups(groups);
  saveProductGroupExclusions(ex);
  audit('REMOVE_SKU_FROM_GROUP',group,{code});
  toast('аёҘаёҡ '+code+' аёӯаёӯаёҒаёҲаёІаёҒ '+group+' а№ҒаёҘа№үаё§');
  renderProdGroups();
}

function addProductGroup(){
  const name=document.getElementById('pg-new')?.value.trim();if(!name)return;
  const groups=DB.get('product_groups')||{};if(!groups[name])groups[name]=[];
  saveProductGroups(groups);audit('ADD_PRODUCT_GROUP',name,{});pgGroupAdmin();
}
function renameProductGroup(oldName,newName){
  newName=(newName||'').trim();if(!newName||oldName===newName)return;
  const groups=DB.get('product_groups')||{};
  groups[newName]=[...new Set([...(groups[newName]||[]),...(productGroups()[oldName]||[])])];
  delete groups[oldName];
  const deleted=deletedProductGroups();
  if(SKU_GROUPS[oldName])deleted.add(oldName);
  deleted.delete(newName);
  saveDeletedProductGroups(deleted);
  saveProductGroups(groups);audit('RENAME_PRODUCT_GROUP',oldName,{newName});pgGroupAdmin();
}
function addSkuToGroup(g){
  const code=document.getElementById('pg-sku-'+g)?.value;if(!code)return;
  const groups=DB.get('product_groups')||{};if(!groups[g])groups[g]=[];
  if(!groups[g].includes(code))groups[g].push(code);
  const deleted=deletedProductGroups();deleted.delete(g);saveDeletedProductGroups(deleted);
  saveProductGroups(groups);audit('ADD_SKU_TO_GROUP',g,{code});pgGroupAdmin();
}
function deleteProductGroup(g){
  if(!confirm('аёҘаёҡаёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІ '+g+' ?'))return;
  const groups=DB.get('product_groups')||{};delete groups[g];saveProductGroups(groups);
  const deleted=deletedProductGroups();deleted.add(g);saveDeletedProductGroups(deleted);
  audit('DEL_PRODUCT_GROUP',g,{});pgGroupAdmin();
}
function importProductGroupsFile(){
  const file=document.getElementById('pg-file').files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      await ensureXLSX();
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array'});
      const sheet=workbook.Sheets[workbook.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
      const groups=DB.get('product_groups')||{};
      let count=0;
      rows.slice(1).forEach(row=>{ // Skip header
        const group=row[0]?.toString().trim();
        const code=row[1]?.toString().trim();
        if(group&&code){
          if(!groups[group])groups[group]=[];
          if(!groups[group].includes(code))groups[group].push(code);
          count++;
        }
      });
      saveProductGroups(groups);
      audit('IMPORT_PRODUCT_GROUPS_FILE','product_groups',{count});
      toast('аёҷаёіа№ҖаёӮа№үаёІаёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІаёҲаёІаёҒа№„аёҹаёҘа№ҢаёӘаёіа№ҖаёЈа№ҮаёҲ '+count+' аёЈаёІаёўаёҒаёІаёЈ');
      pgGroupAdmin();
    }catch(err){
      toast('а№ҖаёҒаёҙаё”аёӮа№үаёӯаёңаёҙаё”аёһаёҘаёІаё”а№ғаёҷаёҒаёІаёЈаёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ң: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
function importCustomerGroupsFile(){
  const file=document.getElementById('cg-file').files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      await ensureXLSX();
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array'});
      const sheet=workbook.Sheets[workbook.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
      const profs=customerProfiles();
      let count=0;
      // аё•аёЈаё§аёҲ format: а№ғаё«аёЎа№Ҳ = header[0] аё„аё·аёӯаёЈаё«аёұаёӘаёҘаё№аёҒаё„а№үаёІ, а№ҖаёҒа№ҲаёІ = header[0] аё„аё·аёӯ Corporate group
      const hdr=(rows[0]||[]).map(h=>String(h||'').toLowerCase());
      const isNewFmt=hdr.length>=3&&(hdr[0].includes('аёЈаё«аёұаёӘ')||hdr[0].includes('code'));
      rows.slice(1).forEach(row=>{
        let code,name,corp,category,slm;
        if(isNewFmt){
          code=row[0]?.toString().trim();
          name=row[1]?.toString().trim();
          corp=row[2]?.toString().trim();
          category=row[3]?.toString().trim();
          slm=row[4]?.toString().trim();
        }else{
          corp=row[0]?.toString().trim();
          code=row[1]?.toString().trim();
          name=row[2]?.toString().trim();
        }
        if(!code)return;
        if(!profs[code])profs[code]={};
        if(name)profs[code].name=name;
        if(corp)profs[code].corporate=corp;
        if(category)profs[code].category=category;
        if(slm)profs[code].slm=slm;
        profs[code].edited_by=UID;
        profs[code].edited_at=new Date().toISOString();
        count++;
      });
      DB.set('customer_profiles',profs);
      audit('IMPORT_CUSTOMER_GROUPS_FILE','customer_profiles',{count,fmt:isNewFmt?'new':'legacy'});
      SB?.upsertCustomerProfiles?.(profs);
      CACHE.clearPrefix('sales_rows_v');
      window._dashSalesHistCache=null;
      refreshSalesOverviewGrouping();
      toast('аёҷаёіа№ҖаёӮа№үаёІаёҒаёҘаёёа№ҲаёЎаёҘаё№аёҒаё„а№үаёІаёҲаёІаёҒа№„аёҹаёҘа№ҢаёӘаёіа№ҖаёЈа№ҮаёҲ '+count+' аёЈаёІаёўаёҒаёІаёЈ');
      pgGroupAdmin();
    }catch(err){
      toast('а№ҖаёҒаёҙаё”аёӮа№үаёӯаёңаёҙаё”аёһаёҘаёІаё”а№ғаёҷаёҒаёІаёЈаёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ң: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
async function expProductGroups(){
  await ensureGroupProductsLoaded();
  const groups=productGroups();
  const skuGrpMap={};
  Object.entries(groups).forEach(([g,items])=>(items||[]).forEach(code=>{if(!skuGrpMap[code])skuGrpMap[code]=g;}));
  const rows=getSkusMerged().map(s=>[skuGrpMap[s.code]||'',s.code,s.name||'',s.plant||'']);
  toXLSX([['Product Groups',['аёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІ','аёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ','аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ','а№ӮаёЈаёҮ'],rows]],'Product_Groups_'+todayStr()+'.xlsx');
}
let _cgExtraCodes=null; // null=not started, 'loading'=in-progress, Set=done
let _cgExtraCodesPromise=null;
async function ensureExtraCustCodes(){
  if(_cgExtraCodes instanceof Set) return _cgExtraCodes;
  if(!_cgExtraCodesPromise){
    _cgExtraCodes='loading';
    _cgExtraCodesPromise=SB.getSalesCustCodes()
      .then(codes=>{_cgExtraCodes=codes;return codes;})
      .catch(e=>{console.warn('ensureExtraCustCodes:',e);_cgExtraCodes=new Set();return new Set();});
  }
  return _cgExtraCodesPromise;
}
async function allCustomerRowsComplete(){
  let codes=null;
  try{codes=await ensureExtraCustCodes();}catch(_){codes=new Set();}
  if(SB?.getCustomers){
    try{await SB.getCustomers();}catch(e){console.warn('load customers for export:',e.message||e);}
  }
  return allCustomerRows(codes instanceof Set?codes:null);
}
async function renderCustGroups(){
  const profs=customerProfiles();
  const isLoaded=_cgExtraCodes instanceof Set;
  _renderCustGroupsTable(allCustomerRows(isLoaded?_cgExtraCodes:null),profs,!isLoaded);
  if(!isLoaded){
    const codes=await ensureExtraCustCodes();
    if(codes?.size>0) _renderCustGroupsTable(allCustomerRows(codes),profs,false);
  }
}
function _cgFilter(){
  const q=(document.getElementById('cg-q')?.value||'').toLowerCase().trim();
  const corpF=document.getElementById('cg-corp')?.value||'';
  const catF=document.getElementById('cg-cat')?.value||'';
  const slmF=document.getElementById('cg-slm')?.value||'';
  const rows=[...document.querySelectorAll('#cg-tbody tr')];
  rows.forEach(tr=>{
    const d=tr.dataset;
    const code=d['0']||'', name=d['1']||'', corp=d['2']||'', cat=d['3']||'', slm=d['4']||'';
    let show=true;
    if(q&&!`${code} ${name}`.toLowerCase().includes(q))show=false;
    if(corpF&&corp!==corpF)show=false;
    if(catF&&cat!==catF)show=false;
    if(slmF&&slm!==slmF)show=false;
    tr.style.display=show?'':'none';
  });
  const vis=rows.filter(r=>r.style.display!=='none').length;
  const el=document.getElementById('cg-count');if(el)el.textContent=vis+' аёҘаё№аёҒаё„а№үаёІ';
}

function addSalesMaster(){
  const code=document.getElementById('sm-code')?.value.trim();
  const name=document.getElementById('sm-name')?.value.trim();
  if(!code||!name){toast('Fill sales code and name first');return;}
  saveSalesMasterRow(code,{name,active:true,source:'Manual'});
  audit('ADD_SALES_MASTER',code,{name});
  toast('Sales Master saved');
  renderSalesMaster();
}
function saveSalesMasterField(code,field,val){
  saveSalesMasterRow(code,{[field]:val});
  audit('EDIT_SALES_MASTER',code,{field,val});
  toast('Sales Master saved');
}
function disableSalesMaster(code){
  if(!confirm('Disable Sales '+code+' ?'))return;
  saveSalesMasterRow(code,{active:false});
  audit('DISABLE_SALES_MASTER',code,{});
  renderSalesMaster();
}
async function applySalesToCustomers(code){
  code=String(code||'').trim();
  if(!code){toast('No sales code');return;}
  let list=SLM_CUSTS?.[code]||[];
  if(!list.length){
    const remote=DB.get('remote_customers_cache')||[];
    list=remote.filter(c=>String(c.slm_id||'').trim()===code).map(c=>String(c.code||'').trim()).filter(Boolean);
  }
  if(!list.length && SB?.getCustomers){
    try{
      const remote=await SB.getCustomers();
      list=(remote||[]).filter(c=>String(c.slm_id||'').trim()===code).map(c=>String(c.code||'').trim()).filter(Boolean);
    }catch(e){console.warn('getCustomers for sales link:',e);}
  }
  if(!list.length){
    list=allCustomerRows().filter(c=>String(c.slm||'').trim()===code).map(c=>c.c).filter(Boolean);
  }
  if(!list.length){toast('No Express customer map for '+code);return;}
  const profs=customerProfiles();
  let count=0;
  list.forEach(c=>{if(!profs[c])profs[c]={};profs[c].slm=code;profs[c].edited_by=UID;profs[c].edited_at=new Date().toISOString();count++;});
  DB.set('customer_profiles',profs);
  audit('LINK_SALES_CUSTOMERS',code,{count});
  SB?.upsertCustomerProfiles?.(profs);
  CACHE.clearPrefix('sales_rows_v');
  refreshSalesOverviewGrouping();
  toast('Linked '+count+' customers to '+code);
  renderSalesMaster();
}

function importSalesMasterFile(){
  const file=document.getElementById('sm-file').files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      await ensureXLSX();
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array'});
      const sheet=workbook.Sheets[workbook.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
      let count=0;
      rows.slice(1).forEach(r=>{
        const code=String(r[0]||'').trim();if(!code)return;
        const active=String(r[5]||'Y').trim().toUpperCase();
        saveSalesMasterRow(code,{name:String(r[1]||code).trim(),nickname:String(r[2]||'').trim(),phone:String(r[3]||'').trim(),email:String(r[4]||'').trim(),active:!['N','NO','FALSE','0'].includes(active),source:'Import'});
        count++;
      });
      audit('IMPORT_SALES_MASTER','sales_master',{count});
      toast('Imported '+count+' sales rows');
      renderSalesMaster();
    }catch(err){toast('File import error: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function handleGroupPaste(e,mode){
  e.preventDefault();
  const text=e.clipboardData.getData('text').trim();
  const rows=text.split(/\r?\n/).map(r=>r.split(/\t|;/).map(c=>c.trim()));
  const items=[];
  rows.forEach(r=>{
    if(r.length<2) return;
    const group=r[0]?.trim();
    const code=r[1]?.trim();
    if(group && code) items.push({group,code});
  });
  window._grpImport = {mode,items};
  const pv=document.getElementById('grp-pv');
  if(!pv) return;
  if(!items.length){pv.innerHTML='<div class="al alw">а№„аёЎа№ҲаёһаёҡаёӮа№үаёӯаёЎаё№аёҘаё—аёөа№Ҳа№ғаёҠа№үа№„аё”а№ү</div>';return;}
  pv.innerHTML=`<div class="al als">аёһаёҡ ${items.length} аёЈаёІаёўаёҒаёІаёЈ</div><div style="max-height:240px;overflow:auto;border:1px solid var(--BD);border-radius:10px;padding:10px;background:var(--bg2)">${items.slice(0,20).map(i=>`<div>${esc(i.group)} вҶ’ <span class="mono">${esc(i.code)}</span></div>`).join('')}</div>`;
}
function cfmGroupImport(mode){
  const data=window._grpImport?.items||[];
  if(!data.length){toast('аёўаёұаёҮа№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘаёҷаёіа№ҖаёӮа№үаёІ');return;}
  if(mode==='prod'){
    const groups=DB.get('product_groups')||{};
    data.forEach(({group,code})=>{if(!groups[group])groups[group]=[]; if(!groups[group].includes(code)) groups[group].push(code);});
    saveProductGroups(groups);audit('IMPORT_PRODUCT_GROUPS','product_groups',{count:data.length});
    toast('аёҷаёіа№ҖаёӮа№үаёІаёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІаёӘаёіа№ҖаёЈа№ҮаёҲ '+data.length+' аёЈаёІаёўаёҒаёІаёЈ');
    closeM(); pgGroupAdmin();
  } else {
    const profs=customerProfiles();
    const rows=allCustomerRows();
    const knownCodes=new Set(rows.map(c=>c.c));
    data.forEach(({group,code})=>{if(!knownCodes.has(code)) return; if(!profs[code])profs[code]={}; profs[code].corporate=group; profs[code].edited_by=UID; profs[code].edited_at=new Date().toISOString();});
    DB.set('customer_profiles',profs);audit('IMPORT_CUSTOMER_GROUPS','customer_profiles',{count:data.length});
    SB?.upsertCustomerProfiles?.(profs);
    CACHE.clearPrefix('sales_rows_v');
    window._dashSalesHistCache=null;
    refreshSalesOverviewGrouping();
    toast('аёҷаёіа№ҖаёӮа№үаёІаёҒаёҘаёёа№ҲаёЎаёҘаё№аёҒаё„а№үаёІаёӘаёіа№ҖаёЈа№ҮаёҲ '+data.length+' аёЈаёІаёўаёҒаёІаёЈ');
    closeM(); pgGroupAdmin();
  }
}

function _permGroups(){
  const users=DB.get('users')||[];
  const map={};
  users.forEach(u=>{
    const dept=u.department||'Unassigned department';
    const pos=u.position||'Unassigned position';
    const key=`${dept}|${pos}`;
    if(!map[key])map[key]={key,dept,pos,users:0,role:u.role};
    map[key].users++;
  });
  return Object.values(map).sort((a,b)=>(a.dept+a.pos).localeCompare(b.dept+b.pos,'th'));
}

function applyRoleToGroup(pkey,roleKey){
  if(!roleKey)return;
  const roles=_getRoles();
  const rolePages=roles[roleKey]?.pages||[];
  document.querySelectorAll(`[data-pkey="${pkey}"][data-page]`).forEach(cb=>{
    cb.checked=rolePages.includes(cb.dataset.page);
  });
  toast(`Apply role "${roles[roleKey]?.label}" а№ғаё«а№ү ${pkey} а№ҒаёҘа№үаё§`);
}
function addCustomRole(){
  const key=(document.getElementById('role-new-key')?.value||'').trim().replace(/\s+/g,'_');
  const lbl=(document.getElementById('role-new-lbl')?.value||'').trim();
  if(!key||!lbl){toast('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒ key а№ҒаёҘаё°аёҠаё·а№Ҳаёӯ Role','warn');return;}
  const custom=DB.get('nav_roles')||{};
  custom[key]={label:lbl,pages:[]};
  DB.set('nav_roles',custom);
  audit('ADD_ROLE',key,{lbl});
  pgPerms();
  toast('аёӘаёЈа№үаёІаёҮ Role '+lbl+' а№ҒаёҘа№үаё§');
}
function saveCustomRole(key){
  const custom=DB.get('nav_roles')||{};
  const pages=[];
  document.querySelectorAll(`[data-rkey="${key}"][data-rpage]`).forEach(cb=>{if(cb.checked)pages.push(cb.dataset.rpage);});
  custom[key]={...custom[key],pages};
  DB.set('nav_roles',custom);
  audit('SAVE_ROLE',key,{pages});
  toast('аёҡаёұаёҷаё—аё¶аёҒ Role '+key+' а№ҒаёҘа№үаё§');
}
function deleteCustomRole(key){
  if(!confirm('аёҘаёҡ Role '+key+' ?'))return;
  const custom=DB.get('nav_roles')||{};
  delete custom[key];
  DB.set('nav_roles',custom);
  audit('DEL_ROLE',key,{});
  pgPerms();
}
function savePerms(){
  const groups=_permGroups();
  const perms={};
  groups.forEach(g=>{perms[g.key]={dept:g.dept,pos:g.pos,pages:[]};});
  document.querySelectorAll('[data-pkey][data-page]').forEach(cb=>{if(cb.checked)perms[cb.dataset.pkey].pages.push(cb.dataset.page);});
  DB.set('nav_perms_deptpos',perms);
  toast('аёҡаёұаёҷаё—аё¶аёҒаёӘаёҙаё—аёҳаёҙа№Ңа№ҒаёҘа№үаё§ вҖ” аёЎаёөаёңаёҘа№ҖаёЎаё·а№Ҳаёӯ Login а№ғаё«аёЎа№Ҳ');
}

let _groupProductsLoading=false;
let _groupProductsPromise=null;
function normalizeSkuRow(s){
  return {code:String(s.code||s.sku||s.sku_code||'').trim(),name:String(s.name||s.name_th||s.sku_name||s.code||'').trim(),plant:s.plant||s.group_name||'',lt:s.lt||s.lead_time||7,moq:s.moq||0,custom:!!s.custom};
}
async function ensureGroupProductsLoaded(){
  if(DB.get('remote_products_loaded'))return;
  if(_groupProductsPromise)return _groupProductsPromise;
  _groupProductsLoading=true;
  _groupProductsPromise=(async()=>{
    try{
      const products=await CACHE.get('group_products',()=>SB.getProducts());
      const rows=(products||[]).map(normalizeSkuRow).filter(s=>s.code);
      if(rows.length){
        DB.set('remote_products_cache',rows);
        DB.set('remote_products_loaded',true);
        if(page==='groups'&&_grpTab==='prod')renderProdGroups();
      }
    }catch(e){console.warn('load products for groups failed',e.message);}
    finally{_groupProductsLoading=false;_groupProductsPromise=null;}
  })();
  return _groupProductsPromise;
}
function getSkusMerged(opts={}){
  const custom=DB.get('custom_skus')||[];
  const remote=DB.get('remote_products_cache')||[];
  const map=new Map();
  const baseSkus = SKUS_MASTER;
  [...baseSkus,...remote,...custom].map(normalizeSkuRow).filter(s=>s.code).filter(s=>_isAllowedCompanyRecord(s, opts)).forEach(s=>{
    const old=map.get(s.code)||{};
    map.set(s.code,{...old,...s,name:s.name||old.name||s.code});
  });
  return [...map.values()].sort((a,b)=>String(a.code).localeCompare(String(b.code),'th'));
}

// Multi-select SKU Filter with saved presets
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let _skuFilter = { active: [], presets: {} };

function buildSkuFilterBtn(containerId, onchangeFn) {
  const active = _skuFilter?.active || [];
  const presets = _skuFilter?.presets || {};
  const label = active.length === 0 ? 'аё—аёёаёҒаёЈаёІаёўаёҒаёІаёЈ' : active.length === 1 ? active[0] : `${active.length} аёЈаёІаёўаёҒаёІаёЈ`;
  const presetBtns = Object.keys(presets).map(p =>
    `<button class="btn btn-xs btn-t" onclick="loadSkuPreset('${esc(p)}','${containerId}','${onchangeFn}')" title="${esc(presets[p].join(','))}">${esc(p)}</button>`
  ).join('');
  return `<div class="ms-drop" id="${containerId}">
    <button class="btn btn-sm" onclick="toggleMsPanel('${containerId}')">рҹ”Қ аёӘаёҙаёҷаё„а№үаёІ: <b>${label}</b> в–ҫ</button>
    <div class="ms-panel hidden" id="${containerId}-panel">
      <div style="padding:4px 6px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--BD);padding-bottom:6px;margin-bottom:4px">
        <button class="btn btn-xs" onclick="clearSkuFilter('${containerId}','${onchangeFn}')">аё—аёұа№үаёҮаё«аёЎаё”</button>
        ${presetBtns}
        ${active.length > 0 ? `<button class="btn btn-xs btn-p" onclick="saveSkuPreset('${containerId}','${onchangeFn}')">рҹ’ҫ аёҡаёұаёҷаё—аё¶аёҒ</button>` : ''}
      </div>
      <input type="text" id="${containerId}-sq" placeholder="аё„а№үаёҷаё«аёІ..." oninput="filterSkuList('${containerId}')"
        style="width:100%;padding:5px 8px;border:1px solid var(--BD);border-radius:6px;font-size:12px;margin-bottom:4px">
      <div id="${containerId}-list" style="max-height:220px;overflow-y:auto">
        ${buildSkuItems(containerId, onchangeFn, '')}
      </div>
    </div>
  </div>`;
}

function buildSkuItems(containerId, onchangeFn, q) {
  const SKUS = typeof getSkusMerged === 'function' ? getSkusMerged() : SKUS_MASTER;
  const active = _skuFilter?.active || [];
  const filtered = q ? SKUS.filter(s => s.code.toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q)) : SKUS;
  return filtered.slice(0, 80).map(s =>
    `<div class="ms-item${active.includes(s.code)?' sel':''}" onclick="toggleSkuItem('${s.code}','${containerId}','${onchangeFn}')">
      <input type="checkbox" ${active.includes(s.code)?'checked':''} onclick="event.stopPropagation()">
      <span class="mono" style="font-size:11px;color:var(--TX3);min-width:72px">${s.code}</span>
      <span style="font-size:11.5px">${(s.name||'').substring(0,22)}</span>
    </div>`
  ).join('');
}

function toggleMsPanel(id) {
  const panel = document.getElementById(id + '-panel');
  if (panel) panel.classList.toggle('hidden');
  // close others
  document.querySelectorAll('.ms-panel').forEach(p => { if (p.id !== id+'-panel') p.classList.add('hidden'); });
}

function toggleSkuItem(code, containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  const idx = _skuFilter.active.indexOf(code);
  if (idx === -1) _skuFilter.active.push(code);
  else _skuFilter.active.splice(idx, 1);
  // rebuild button
  const container = document.getElementById(containerId);
  if (container) { container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn); }
  const newPanel = document.getElementById(containerId + '-panel');
  if (newPanel) newPanel.classList.remove('hidden');
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function clearSkuFilter(containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.active = [];
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function loadSkuPreset(name, containerId, onchangeFn) {
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.active = [...(_skuFilter.presets[name] || [])];
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
  if (onchangeFn) { try { eval(onchangeFn + '()'); } catch(e){} }
}

function saveSkuPreset(containerId, onchangeFn) {
  const name = prompt('аёҠаё·а№Ҳаёӯ Filter Preset:');
  if (!name || !name.trim()) return;
  _skuFilter = _skuFilter || { active: [], presets: {} };
  _skuFilter.presets[name.trim()] = [..._skuFilter.active];
  DB.set('filter_presets', _skuFilter.presets);
  toast(`рҹ’ҫ аёҡаёұаёҷаё—аё¶аёҒ preset "${name.trim()}" а№ҒаёҘа№үаё§`);
  const container = document.getElementById(containerId);
  if (container) container.outerHTML = buildSkuFilterBtn(containerId, onchangeFn);
}

function filterSkuList(containerId) {
  const q = (document.getElementById(containerId + '-sq')?.value || '').toLowerCase();
  const list = document.getElementById(containerId + '-list');
  if (list) list.innerHTML = buildSkuItems(containerId, '', q);
}

  </div>` : `<div class="al alw" style="margin-bottom:10px">аёўаёұаёҮа№Ӯаё«аёҘаё” Data Confidence а№„аёЎа№ҲаёӘаёіа№ҖаёЈа№ҮаёҲ аёҒаёЈаёёаё“аёІаё•аёЈаё§аёҲаёӘаёӯаёҡаёҒаёІаёЈа№ҖаёҠаё·а№ҲаёӯаёЎаё•а№Ҳаёӯ Supabase</div>`;

async function bkChangeStockStatus(id,stockStatus){
  const rows=(DB.get('bookings')||[]).map(normalizeBookingRow);
  DB.set('bookings',rows.map(b=>b.id===id?{...b,stockStatus,stock_status:stockStatus,edited_by:UID,edited_at:new Date().toISOString()}:b));
  CACHE.clear('bookings');
  try{await SB.updateBooking(id,{stock_status:stockStatus});toast('аёӯаёұаёӣа№Җаё”аё•аёӘаё•а№ҠаёӯаёҒ/аёңаёҘаёҙаё•а№ҒаёҘа№үаё§');}
  catch(e){toast('аёҡаёұаёҷаё—аё¶аёҒ offline а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ','warn');}
  pgPlanBooking();
}
async function bkSetConfirmDate(id,confirmDate){
  const rows=(DB.get('bookings')||[]).map(normalizeBookingRow);
  DB.set('bookings',rows.map(b=>b.id===id?{...b,confirmDate,confirm_date:confirmDate,edited_by:UID,edited_at:new Date().toISOString()}:b));
  CACHE.clear('bookings');
  try{
    await SB.updateBooking(id,{confirm_date:confirmDate||null});
    toast('аёҡаёұаёҷаё—аё¶аёҒаё§аёұаёҷаёўаё·аёҷаёўаёұаёҷа№ҒаёҘа№үаё§');

}

function saveBk(id) {
  const type = document.getElementById('bk-type')?.value || 'PO';
  const poNo = (document.getElementById('bk-po')?.value || '').trim();
  const soNo = (document.getElementById('bk-so')?.value || '').trim();
  const refNo = ((document.getElementById('bk-ref')?.value || '').trim()) || (type==='PO'?poNo:soNo);
  const sku  = document.getElementById('bk-sku')?.value;
  const qty  = parseFloat(document.getElementById('bk-qty')?.value) || 0;
  const custName = (document.getElementById('bk-cust')?.value || '').trim();
  const soDate = document.getElementById('bk-so-date')?.value;
  const receiveDate = document.getElementById('bk-date')?.value;
  const stockStatus = document.getElementById('bk-ss')?.value || 'stock';
  const status = document.getElementById('bk-status')?.value || 'pending';
  const note = (document.getElementById('bk-note')?.value || '').trim();
  if (!sku || !qty || !custName || !receiveDate) { alert('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒаёӮа№үаёӯаёЎаё№аёҘа№ғаё«а№үаё„аёЈаёҡ'); return; }
  const SKUS = typeof getSkusMerged === 'function' ? getSkusMerged() : SKUS_MASTER;
  const sk = SKUS.find(s => s.code === sku) || { name: '' };
  const bks = DB.get('bookings') || [];
  if (id) {
    const idx = bks.findIndex(b => b.id === id);
    const upd = { type, refNo, poNo, soNo, soDate, sku, skuName: sk.name, qty, custName, receiveDate, stockStatus, status, note, edited_by: UID, edited_at: new Date().toISOString() };
    if (idx !== -1) Object.assign(bks[idx], upd);
    audit('EDIT_BK', id, { sku, qty, stockStatus });
    DB.set('bookings', bks);
    CACHE.clear('bookings');
    // sync to Supabase
    SB.updateBooking(id, {
      type, sku, sku_name: sk.name, qty,
      cust_name: custName, cust_code: custName,
      receive_date: receiveDate||null,
      stock_status: stockStatus, status, note: note||null,
      ref_no: refNo||null, po_no: poNo||null, so_no: soNo||null,
      so_date: soDate||null,
    }).catch(e=>toast('аёҡаёұаёҷаё—аё¶аёҒ offline а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ: '+e.message,'warn'));
  } else {
    const newBk = { id: genId('BK'), type, refNo, poNo, soNo, soDate, sku, skuName: sk.name, qty, custName, receiveDate, stockStatus, status, note, by: UID, ts: Date.now(), edited_by: UID, edited_at: new Date().toISOString() };
    bks.unshift(newBk);
    audit('ADD_BK', newBk.id, { type, refNo, sku, qty, custName, stockStatus });
    if (stockStatus === 'produce') toast(`вҡ пёҸ аёҲаёӯаёҮ ${type} ${sku} ${qty}аёҒаёҒ. вҖ” аё•а№үаёӯаёҮаёӘаёұа№ҲаёҮаёңаёҘаёҙаё• аёЈаёӯ confirm`);
    DB.set('bookings', bks);
    CACHE.clear('bookings');
    // sync to Supabase
    SB.addBooking(newBk).then(saved=>{
      if(saved?.id && saved.id!==newBk.id){
        // аёӯаёұаёӣа№Җаё”аё• id а№ғаёҷ localStorage а№ғаё«а№үаё•аёЈаёҮаёҒаёұаёҡ Supabase UUID
        const existing=DB.get('bookings')||[];
        DB.set('bookings',existing.map(b=>b.id===newBk.id?{...b,id:saved.id}:b));
      }

async function bkChangeStatus(id, status) {
  const rows = (DB.get('bookings') || []).map(normalizeBookingRow);
  DB.set('bookings', rows.map(b => b.id === id ? { ...b, status } : b));
  CACHE.clear('bookings');
  const saved = await SB.updateBooking(id, { status });
  if (!saved) toast('аёӯаёұаёӣа№Җаё”аё•аёӘаё–аёІаёҷаё°а№ғаёҷ Supabase а№„аёЎа№ҲаёӘаёіа№ҖаёЈа№ҮаёҲ', 'warn');

  pgPlanBooking();
}

function psvDownloadTemplate(){
  const cols=['аё§аёұаёҷаё—аёөа№Ҳ (YYYY-MM-DD)','аёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ','аёҲаёіаёҷаё§аёҷаёЈаёұаёҡа№ҖаёӮа№үаёІ (аёҒаёҒ.)','аё«аёЎаёІаёўа№Җаё«аё•аёё'];
  const sample=[['2026-05-01','SKU001',1000,'аёЈаёұаёҡа№ҖаёӮа№үаёІаёҲаёІаёҒа№„аёҘаёҷа№Ң A'],['2026-05-01','SKU002',500,'']];
  toXLSX([['StockIn_Template',cols,sample]],'StockIn_Template.xlsx');
}
function psvImportFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      await ensureXLSX();
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1});
      const rows=[];
      json.slice(1).forEach(r=>{
        const date=String(r[0]||'').trim();
        const sku=String(r[1]||'').trim();
        const qty=parseFloat(r[2])||0;
        const note=String(r[3]||'').trim();
        if(date && sku && qty>0) rows.push({date,sku,qty,note});
      });
      if(!rows.length){toast('а№„аёЎа№ҲаёһаёҡаёӮа№үаёӯаёЎаё№аёҘ вҖ” аё•аёЈаё§аёҲаёӘаёӯаёҡаёЈаё№аёӣа№Ғаёҡаёҡ Template');return;}
      const existing=DB.get('stock_in_actual')||[];
      DB.set('stock_in_actual',[...existing,...rows]);
      toast(`аёҷаёіа№ҖаёӮа№үаёІ ${rows.length} аёЈаёІаёўаёҒаёІаёЈаёӘаёіа№ҖаёЈа№ҮаёҲ`);
      e.target.value='';
      pgProdSummary();
    }catch(err){toast('аёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ңа№„аёЎа№Ҳа№„аё”а№ү: '+err.message);}
  };
  reader.readAsBinaryString(file);
}

function psvSetPeriod(p) { _psv.period = p; pgProdSummary(); }

function psvRender() {
  const orders = useProdOrders();
  const ref = new Date(_psv.ref);
  const period = _psv.period;
  const cols = [];
  const months = ['аёЎ.аё„.','аёҒ.аёһ.','аёЎаёө.аё„.','а№ҖаёЎ.аёў.','аёһ.аё„.','аёЎаёҙ.аёў.','аёҒ.аё„.','аёӘ.аё„.','аёҒ.аёў.','аё•.аё„.','аёһ.аёў.','аёҳ.аё„.'];
  if (period === 'day') {
    const s = new Date(ref); s.setDate(s.getDate() - 6);
    for (let i = 0; i < 14; i++) {
      const d = new Date(s); d.setDate(s.getDate() + i);
      cols.push({ key: d.toISOString().slice(0,10), lbl: `${d.getDate()}/${d.getMonth()+1}` });
    }
  } else if (period === 'week') {
    const s = new Date(ref); s.setDate(s.getDate() - s.getDay() + 1 - 14);
    for (let i = 0; i < 8; i++) {
      const ws = new Date(s); ws.setDate(s.getDate() + i*7);
      const we = new Date(ws); we.setDate(ws.getDate() + 6);
      cols.push({ key: ws.toISOString().slice(0,10), end: we.toISOString().slice(0,10), lbl: `${ws.getDate()}/${ws.getMonth()+1}` });
    }
  } else {
    for (let i = -3; i <= 3; i++) {
      const d = new Date(ref.getFullYear(), ref.getMonth() + i, 1);
      cols.push({ key: d.toISOString().slice(0,7), lbl: months[d.getMonth()] + ' ' + String(d.getFullYear()+543).slice(-2) });
    }
  }
  const inCol = (o, col) => {
    if (period === 'month') return (o.planDate||'').slice(0,7) === col.key;
    if (col.end) return (o.planDate||'') >= col.key && (o.planDate||'') <= col.end;
    return (o.planDate||'') === col.key;
  };
  const planData = cols.map(col => orders.filter(o => inCol(o, col) && o.status !== 'replaced').reduce((s,o)=>s+(o.qty||0),0));
  const stockInActual = DB.get('stock_in_actual')||[];
  const inActualCol = (r, col) => {
    if(period==='month') return (r.date||'').slice(0,7)===col.key;
    if(col.end) return (r.date||'')>=col.key&&(r.date||'')<=col.end;
    return (r.date||'')===col.key;
  };
  const doneData = cols.map(col => {
    if(stockInActual.length) return stockInActual.filter(r=>inActualCol(r,col)).reduce((s,r)=>s+(r.qty||0),0);
    return orders.filter(o=>inCol(o,col)&&o.status==='done').reduce((s,o)=>s+(o.qty||0),0);
  });
  const totalPlan = planData.reduce((s,v)=>s+v,0);
  const totalDone = doneData.reduce((s,v)=>s+v,0);
  const pct = totalPlan > 0 ? Math.round(totalDone / totalPlan * 100) : 0;
  const krow = document.getElementById('psv-krow');
  if (krow) krow.innerHTML = `
    <div class="kpi g"><div class="kl">а№ҒаёңаёҷаёңаёҘаёҙаё•аёЈаё§аёЎ (аёҒаёҒ.)</div><div class="kv">${fmt(totalPlan)}</div></div>
    <div class="kpi b"><div class="kl">аёңаёҘаёҙаё•аёҲаёЈаёҙаёҮаёЈаё§аёЎ (аёҒаёҒ.)</div><div class="kv">${fmt(totalDone)}</div></div>
    <div class="kpi ${pct>=90?'g':pct>=70?'a':'r'}"><div class="kl">% аёӘаёіа№ҖаёЈа№ҮаёҲ</div><div class="kv">${pct}%</div></div>
    <div class="kpi a"><div class="kl">аёӘа№Ҳаё§аёҷаё•а№ҲаёІаёҮ</div><div class="kv" style="font-size:18px">${totalDone-totalPlan>=0?'+':''}${fmt(totalDone-totalPlan)}</div><div class="kh">аёҒаёҒ.</div></div>`;
  const cv = document.getElementById('psv-chart');
  if (cv) {
    mkChart('psv-chart','bar',cols.map(c=>c.lbl),[
      { label: 'а№ҒаёңаёҷаёңаёҘаёҙаё• (аёҒаёҒ.)', data: planData, backgroundColor: 'rgba(21,83,160,0.6)', borderColor: 'rgba(21,83,160,1)', borderWidth: 1 },
      { label: 'аёңаёҘаёҙаё•аёҲаёЈаёҙаёҮ (аёҒаёҒ.)', data: doneData, backgroundColor: 'rgba(10,89,64,0.7)', borderColor: 'rgba(10,89,64,1)', borderWidth: 1 }
    ]);
  }
  const tbl = document.getElementById('psv-tbl');
  if (tbl) tbl.innerHTML = `<div class="tw"><table>
    <thead><tr>
      <th>аёҠа№Ҳаё§аёҮа№Җаё§аёҘаёІ</th><th class="r">а№ҒаёңаёҷаёңаёҘаёҙаё• (аёҒаёҒ.)</th><th class="r">аёңаёҘаёҙаё•аёҲаёЈаёҙаёҮ (аёҒаёҒ.)</th><th class="r">аёӘа№Ҳаё§аёҷаё•а№ҲаёІаёҮ</th><th>% аёӘаёіа№ҖаёЈа№ҮаёҲ</th>
    </tr></thead>
    <tbody>${cols.map((col,i) => {
      const plan = planData[i], done = doneData[i];
      const diff = done - plan;
      const p = plan > 0 ? Math.round(done/plan*100) : (done > 0 ? 100 : 0);
      const cls = p>=90?'cmp-ok':p>=70?'cmp-warn':'cmp-bad';
      return `<tr>
        <td>${col.lbl}</td>
        <td class="r">${plan>0?fmt(plan):'вҖ”'}</td>
        <td class="r">${done>0?fmt(done):'вҖ”'}</td>
        <td class="r" style="color:${diff<0?'var(--R)':diff>0?'var(--G)':'inherit'}">${plan>0||done>0?(diff>0?'+':'')+fmt(diff):'вҖ”'}</td>
        <td><span class="cmp-pct ${cls}">${p}%</span></td>
      </tr>`;
    }).join('')}</tbody>
    <tfoot><tr style="font-weight:700;background:var(--bg2)">
      <td>аёЈаё§аёЎаё—аёұа№үаёҮаё«аёЎаё”</td>
      <td class="r">${fmt(totalPlan)}</td>
      <td class="r">${fmt(totalDone)}</td>
      <td class="r" style="color:${totalDone-totalPlan<0?'var(--R)':'var(--G)'}">${totalPlan>0?(totalDone-totalPlan>=0?'+':'')+fmt(totalDone-totalPlan):'вҖ”'}</td>
      <td><span class="cmp-pct ${pct>=90?'cmp-ok':pct>=70?'cmp-warn':'cmp-bad'}">${pct}%</span></td>
    </tr></tfoot>
  </table></div>`;
}

function expPsvSummary() {
  const orders = useProdOrders();
  const stockInActual = DB.get('stock_in_actual') || [];
  const today7 = new Date(_psv.ref); today7.setDate(today7.getDate() - 6);
  const rows = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(today7); d.setDate(today7.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const plan = orders.filter(o=>o.planDate===key&&o.status!=='replaced').reduce((s,o)=>s+(o.qty||0),0);
    const done = stockInActual.length
      ? stockInActual.filter(r=>r.date===key).reduce((s,r)=>s+(r.qty||0),0)
      : orders.filter(o=>o.planDate===key&&o.status==='done').reduce((s,o)=>s+(o.qty||0),0);
    rows.push([key, plan, done, done-plan, plan>0?Math.round(done/plan*100)+'%':'']);
  }
  toXLSX([['ProdSummary',['аёҠа№Ҳаё§аёҮа№Җаё§аёҘаёІ','а№ҒаёңаёҷаёңаёҘаёҙаё•(аёҒаёҒ.)','аёЈаёұаёҡа№ҖаёӮа№үаёІаёҲаёЈаёҙаёҮ/аёңаёҘаёҙаё•аёҲаёЈаёҙаёҮ(аёҒаёҒ.)','аёӘа№Ҳаё§аёҷаё•а№ҲаёІаёҮ','%аёӘаёіа№ҖаёЈа№ҮаёҲ'],rows]],'ProdSummary_'+todayStr()+'.xlsx');
}

        <option value="аёҠаёҙа№үаёҷ"   ${it.unit === 'аёҠаёҙа№үаёҷ'   ? 'selected' : ''}>аёҠаёҙа№үаёҷ</option>
        <option value="а№Ғаёһа№Үаё„"   ${it.unit === 'а№Ғаёһа№Үаё„'   ? 'selected' : ''}>а№Ғаёһа№Үаё„</option>

      <input type="text" value="${esc(it.note || '')}" placeholder="а№ҖаёҠа№Ҳаёҷ аё—аё”аёӘаёӯаёҡаёӘаё№аё•аёЈ A"
        onchange="srItemField(${i},'note',this.value)"
        style="${inpSt}">
    </div>
    ${total > 1 ? `<button onclick="srRemoveItem(${i})" style="padding:7px 10px;border:1px solid var(--BD);border-radius:7px;cursor:pointer;background:var(--W);color:var(--R);font-size:14px;line-height:1">вң•</button>` : ''}

function _srOnCustChange(sel) {
  _sr.form.custCode = sel.value;
  _sr.form.custName = sel.options[sel.selectedIndex]?.getAttribute('data-name') || '';
}
function srItemSku(i, sel) {
  _sr.form.items = _sr.form.items || [];
  _sr.form.items[i] = _sr.form.items[i] || {};
  _sr.form.items[i].sku     = sel.value;
  _sr.form.items[i].skuName = sel.options[sel.selectedIndex]?.getAttribute('data-name') || '';
}
function srItemField(i, field, val) {
  _sr.form.items = _sr.form.items || [];
  _sr.form.items[i] = _sr.form.items[i] || {};
  _sr.form.items[i][field] = val;
}
function srAddItem() {
  _srCollect();
  _sr.form.items = (_sr.form.items || []).concat([{ sku: '', skuName: '', qty: 1, unit: 'аёҒаёҒ.', note: '' }]);
  _srRenderForm();
}
function srRemoveItem(i) {
  _srCollect();
  _sr.form.items = (_sr.form.items || []).filter((_, idx) => idx !== i);
  if (!_sr.form.items.length) _sr.form.items = [{ sku: '', skuName: '', qty: 1, unit: 'аёҒаёҒ.', note: '' }];
  _srRenderForm();
}
function _srCollect() {
  const custSel = document.getElementById('sr-cust');
  if (custSel) {
    _sr.form.custCode = custSel.value;
    _sr.form.custName = custSel.options[custSel.selectedIndex]?.getAttribute('data-name') || _sr.form.custName || '';
  }
  _sr.form.contact     = document.getElementById('sr-contact')?.value  || _sr.form.contact  || '';
  _sr.form.phone       = document.getElementById('sr-phone')?.value    || _sr.form.phone    || '';
  _sr.form.purpose     = document.getElementById('sr-purpose')?.value  || _sr.form.purpose  || '';
  _sr.form.deliveryDate= document.getElementById('sr-delivery')?.value || _sr.form.deliveryDate || '';
  _sr.form.address     = document.getElementById('sr-addr')?.value     || _sr.form.address  || '';
  _sr.form.note        = document.getElementById('sr-note')?.value     || _sr.form.note     || '';
}
function _srValidate() {
  _srCollect();
  const f = _sr.form;
  if (!f.custCode)     { toast('аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёҘаё№аёҒаё„а№үаёІ', 'warn'); return false; }
  if (!f.purpose?.trim()) { toast('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаё§аёұаё•аё–аёёаёӣаёЈаё°аёӘаёҮаё„а№Ң', 'warn'); return false; }
  if (!f.deliveryDate) { toast('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаё§аёұаёҷаё—аёөа№Ҳаё•а№үаёӯаёҮаёҒаёІаёЈаёЈаёұаёҡ', 'warn'); return false; }
  const valid = (f.items || []).filter(it => it.sku && it.qty > 0);
  if (!valid.length)   { toast('аёҒаёЈаёёаё“аёІа№Җаёһаёҙа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІаёӯаёўа№ҲаёІаёҮаёҷа№үаёӯаёў 1 аёЈаёІаёўаёҒаёІаёЈ', 'warn'); return false; }
  return true;
}
function _srBuild(status) {
  const f   = _sr.form;
  const now = new Date().toISOString();
  const base= _sr.editId ? (getSR().find(r => r.id === _sr.editId) || {}) : {};
  return {
    ...base,
    id:           base.id || genId('SR'),
    custCode:     f.custCode,
    custName:     f.custName || '',
    contact:      f.contact  || '',
    phone:        f.phone    || '',
    purpose:      f.purpose  || '',
    deliveryDate: f.deliveryDate || '',
    address:      f.address  || '',
    note:         f.note     || '',
    items:        (f.items || []).filter(it => it.sku && it.qty > 0),
    status,
    by:           base.by     || UID,
    byName:       base.byName || UNAME,
    date:         base.date   || now.slice(0, 10),
    ts:           base.ts     || Date.now(),
    updated_at:   now,
    updated_by:   UID,
  };
}
function _srSave(rec) {
  saveSR([rec, ...getSR().filter(r => r.id !== rec.id)]);
}
function srSaveDraft() {
  if (!_sr.form.custCode && !document.getElementById('sr-cust')?.value) { toast('аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёҘаё№аёҒаё„а№үаёІаёҒа№Ҳаёӯаёҷаёҡаёұаёҷаё—аё¶аёҒ', 'warn'); return; }
  _srCollect();
  const rec = _srBuild('draft');
  _srSave(rec);
  toast('аёҡаёұаёҷаё—аё¶аёҒаёЈа№ҲаёІаёҮа№ҒаёҘа№үаё§');
  _sr.view = 'home'; pgSample();

function srSubmit() {

// в”Җв”Җ Actions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function srApprove(id) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'approved', approved_by: UID, approved_at: new Date().toISOString() });
  saveSR(reqs);
  audit('SAMPLE_APPROVE', id, {});
  toast('аёӯаёҷаёёаёЎаёұаё•аёҙаё„аёіаёӮаёӯа№ҒаёҘа№үаё§');
  _sr.view = 'detail'; pgSample();
}
function srReject(id) {
  const reason = prompt('а№Җаё«аё•аёёаёңаёҘаёҒаёІаёЈаёӣаёҸаёҙа№ҖаёӘаёҳ (аёҒаё” Cancel а№Җаёһаё·а№ҲаёӯаёўаёҒа№ҖаёҘаёҙаёҒ):');
  if (reason === null) return;
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'rejected', rejected_by: UID, rejected_at: new Date().toISOString(), reject_reason: reason });
  saveSR(reqs);
  audit('SAMPLE_REJECT', id, { reason });
  toast('аёӣаёҸаёҙа№ҖаёӘаёҳаё„аёіаёӮаёӯа№ҒаёҘа№үаё§');
  _sr.view = 'detail'; pgSample();
}
function srSetStatus(id, status) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  const now = new Date().toISOString();
  r.status = status;
  if (status === 'preparing')  { r.prep_by  = UID; r.prep_at  = now; }
  if (status === 'dispatched') { r.disp_by  = UID; r.disp_at  = now; }
  if (status === 'received')   { r.recv_by  = UID; r.recv_at  = now; }
  r.updated_by = UID; r.updated_at = now;
  saveSR(reqs);
  audit('SAMPLE_STATUS', id, { status });
  toast('аёӯаёұаёӣа№Җаё”аё•аёӘаё–аёІаёҷаё°а№ҒаёҘа№үаё§');
  _sr.view = 'detail'; pgSample();
}
function srSubmitById(id) {
  const reqs = getSR();
  const r = reqs.find(x => x.id === id); if (!r) return;
  Object.assign(r, { status: 'pending', submitted_at: new Date().toISOString(), updated_by: UID });
  saveSR(reqs);
  audit('SAMPLE_SUBMIT', id, {});
  toast('аёӘа№ҲаёҮаё„аёіаёӮаёӯаёӯаёҷаёёаёЎаёұаё•аёҙа№ҒаёҘа№үаё§');
  _sr.view = 'detail'; pgSample();
}
function srDelete(id) {
  if (!confirm('аёҘаёҡаё„аёіаёӮаёӯаёҷаёөа№ү?')) return;
  saveSR(getSR().filter(r => r.id !== id));
  audit('SAMPLE_DELETE', id, {});
  toast('аёҘаёҡаё„аёіаёӮаёӯа№ҒаёҘа№үаё§');
  _sr.view = 'home'; pgSample();
}
function _srEditExisting(id) {
  const r = getSR().find(x => x.id === id); if (!r) return;
  _sr.editId = id;
  _sr.form = {
    custCode: r.custCode, custName: r.custName,
    contact: r.contact || '', phone: r.phone || '',
    purpose: r.purpose || '', deliveryDate: r.deliveryDate || '',
    address: r.address || '', note: r.note || '',
    items: JSON.parse(JSON.stringify(r.items || [])),
  };
  _sr.view = 'form';
  pgSample();
}

// в”Җв”Җ аёҹаёӯаёЈа№ҢаёЎаёҡаёұаёҷаё—аё¶аёҒаёңаёҘаё—аё”аёӘаёӯаёҡ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function _srRenderTestResult(id) {
  const r = getSR().find(x => x.id === id);
  if (!r) { _sr.view = 'home'; pgSample(); return; }
  const tr = r.testResult || {};
  const inpSt = 'padding:8px 10px;border:1px solid var(--BD);border-radius:7px;width:100%;font-family:var(--font);font-size:13px;box-sizing:border-box';

  const starBtns = [1,2,3,4,5].map(n =>
    `<button type="button" onclick="document.getElementById('sr-tr-sat').value=${n};document.querySelectorAll('.sr-star').forEach((b,i)=>{b.style.color=i<${n}?'var(--Y)':'var(--TX3)'})"
      class="sr-star" style="font-size:22px;background:none;border:none;cursor:pointer;color:${(tr.satisfaction||0)>=n?'var(--Y)':'var(--TX3)'};padding:0 2px">вӯҗ</button>`
  ).join('');

  document.getElementById('ct').innerHTML = `
  <button onclick="_sr.view='detail';pgSample()" style="display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:7px;font-size:12px;cursor:pointer;background:var(--bg2);border:1px solid var(--BD);color:var(--TX2);font-weight:500;margin-bottom:16px">вҶҗ аёҒаёҘаёұаёҡаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”</button>
  <div class="card">
    <div class="ch">
      <div class="ct2">рҹ”¬ аёҡаёұаёҷаё—аё¶аёҒаёңаёҘаёҒаёІаёЈаё—аё”аёӘаёӯаёҡ</div>
      <div style="font-size:12px;color:var(--TX3)">${esc(r.custName || '')} вҖ” аё„аёіаёӮаёӯ ${esc(r.id || '')}</div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--BD);border-radius:10px;padding:16px;margin-bottom:16px">
      <div style="font-weight:600;font-size:13px;margin-bottom:12px">рҹ“Ӣ аё аёІаёһаёЈаё§аёЎаёңаёҘаё—аё”аёӘаёӯаёҡ</div>
      <div class="cgrid c2" style="gap:12px">
        <div class="field" style="margin:0">
          <label>аё§аёұаёҷаё—аёөа№Ҳаё—аё”аёӘаёӯаёҡ *</label>
          <input id="sr-tr-date" type="date" value="${esc(tr.date || today())}" style="${inpSt}">
        </div>
        <div class="field" style="margin:0">
          <label>аёңаёҘаёҒаёІаёЈаё—аё”аёӘаёӯаёҡ *</label>
          <select id="sr-tr-result" style="${inpSt}">
            <option value="">вҖ” а№ҖаёҘаё·аёӯаёҒаёңаёҘ вҖ”</option>
            <option value="pass"        ${tr.result==='pass'?'selected':''}>вң… аёңа№ҲаёІаёҷ</option>
            <option value="fail"        ${tr.result==='fail'?'selected':''}>вқҢ а№„аёЎа№Ҳаёңа№ҲаёІаёҷ</option>
            <option value="in_progress" ${tr.result==='in_progress'?'selected':''}>рҹ”„ аёҒаёіаёҘаёұаёҮаё—аё”аёӘаёӯаёҡ</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>аё„аё§аёІаёЎаёһаё¶аёҮаёһаёӯа№ғаёҲаёӮаёӯаёҮаёҘаё№аёҒаё„а№үаёІ</label>
          <div style="display:flex;align-items:center;gap:4px;margin-top:4px">
            ${starBtns}
            <input type="hidden" id="sr-tr-sat" value="${tr.satisfaction || 0}">
            <span id="sr-tr-sat-lbl" style="font-size:12px;color:var(--TX3);margin-left:6px">${tr.satisfaction ? tr.satisfaction+'/5' : 'аёўаёұаёҮа№„аёЎа№Ҳа№ғаё«а№үаё„аё°а№Ғаёҷаёҷ'}</span>
          </div>
        </div>
        <div class="field" style="margin:0">
          <label>аёҒаёІаёЈаё•аёұаё”аёӘаёҙаёҷа№ғаёҲаёӮаёӯаёҮаёҘаё№аёҒаё„а№үаёІ</label>
          <select id="sr-tr-decision" style="${inpSt}">
            <option value="">вҖ” аёўаёұаёҮа№„аёЎа№ҲаёЈаё°аёҡаёё вҖ”</option>
            <option value="will_order"  ${tr.decision==='will_order'?'selected':''}>рҹӣ’ аё•аёұаё”аёӘаёҙаёҷа№ғаёҲаёӘаёұа№ҲаёҮаёӢаё·а№үаёӯ</option>
            <option value="wont_order"  ${tr.decision==='wont_order'?'selected':''}>рҹҡ« а№„аёЎа№ҲаёӘаёұа№ҲаёҮаёӢаё·а№үаёӯ</option>
            <option value="need_more"   ${tr.decision==='need_more'?'selected':''}>рҹ”Ғ аё•а№үаёӯаёҮаёҒаёІаёЈаё•аёұаё§аёӯаёўа№ҲаёІаёҮа№Җаёһаёҙа№ҲаёЎ</option>
            <option value="undecided"   ${tr.decision==='undecided'?'selected':''}>вҸі аёўаёұаёҮа№„аёЎа№Ҳаё•аёұаё”аёӘаёҙаёҷа№ғаёҲ</option>
          </select>
        </div>
        <div class="field" style="margin:0;grid-column:1/-1">
          <label>аё„аё§аёІаёЎаё„аёҙаё”а№Җаё«а№Үаёҷ / Feedback аёӮаёӯаёҮаёҘаё№аёҒаё„а№үаёІ</label>
          <textarea id="sr-tr-feedback" placeholder="аёҡаёұаёҷаё—аё¶аёҒаё„аё§аёІаёЎаё„аёҙаё”а№Җаё«а№Үаёҷ аёӮа№үаёӯа№ҖаёӘаёҷаёӯа№Ғаёҷаё° аё«аёЈаё·аёӯаёӮа№үаёӯаёЎаё№аёҘаёҲаёІаёҒаёҘаё№аёҒаё„а№үаёІа№Ӯаё”аёўаё•аёЈаёҮ"
            style="${inpSt};height:72px;resize:vertical">${esc(tr.feedback || '')}</textarea>
        </div>
        <div class="field" style="margin:0;grid-column:1/-1">
          <label>аё«аёЎаёІаёўа№Җаё«аё•аёёа№Җаёһаёҙа№ҲаёЎа№Җаё•аёҙаёЎ</label>
          <input id="sr-tr-note" type="text" value="${esc(tr.note || '')}" placeholder="аё«аёЎаёІаёўа№Җаё«аё•аёё / action аё•а№Ҳаёӯа№„аёӣ" style="${inpSt}">
        </div>
      </div>
    </div>

    <div style="background:var(--bg2);border:1px solid var(--BD);border-radius:10px;padding:16px;margin-bottom:16px">
      <div style="font-weight:600;font-size:13px;margin-bottom:12px">рҹ“Ұ аёңаёҘаё—аё”аёӘаёӯаёҡаёЈаёІаёўаёӘаёҙаёҷаё„а№үаёІ (аё–а№үаёІаёЎаёө)</div>
      ${(r.items || []).map((it, i) => {
        const ir = (tr.itemResults || [])[i] || {};
        return `<div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px;padding:10px;background:var(--W);border-radius:8px;border:1px solid var(--BD)">
          <div style="flex:2;min-width:160px">
            <div style="font-size:11px;color:var(--TX3);margin-bottom:2px">аёӘаёҙаёҷаё„а№үаёІ</div>
            <div style="font-size:13px;font-weight:600">${esc(it.skuName || it.sku || '')}</div>
            <div style="font-size:11px;color:var(--TX3)">${it.qty} ${it.unit || 'аёҒаёҒ.'}</div>
          </div>
          <div style="width:140px">
            <div style="font-size:11px;color:var(--TX3);margin-bottom:4px">аёңаёҘаё—аё”аёӘаёӯаёҡ</div>
            <select id="sr-ir-result-${i}" style="padding:6px 8px;border:1px solid var(--BD);border-radius:7px;width:100%;font-family:var(--font);font-size:12px">
              <option value="">вҖ” аёўаёұаёҮа№„аёЎа№ҲаёЈаё°аёҡаёё вҖ”</option>
              <option value="pass" ${ir.result==='pass'?'selected':''}>вң… аёңа№ҲаёІаёҷ</option>
              <option value="fail" ${ir.result==='fail'?'selected':''}>вқҢ а№„аёЎа№Ҳаёңа№ҲаёІаёҷ</option>
            </select>
          </div>
          <div style="flex:3;min-width:160px">
            <div style="font-size:11px;color:var(--TX3);margin-bottom:4px">аё«аёЎаёІаёўа№Җаё«аё•аёё / аёӮа№үаёӯаёӘаёұаёҮа№ҖаёҒаё•</div>
            <input id="sr-ir-note-${i}" type="text" value="${esc(ir.note || '')}"
              placeholder="а№ҖаёҠа№Ҳаёҷ аёҒаёҘаёҙа№Ҳаёҷ аёЈаёӘаёҠаёІаё•аёҙ а№Җаёҷаё·а№үаёӯаёӘаёұаёЎаёңаёұаёӘ аёӮаёҷаёІаё”"
              style="padding:6px 8px;border:1px solid var(--BD);border-radius:7px;width:100%;font-family:var(--font);font-size:12px;box-sizing:border-box">
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="_sr.view='detail';pgSample()">аёўаёҒа№ҖаёҘаёҙаёҒ</button>
      <button class="btn btn-g" onclick="srSaveTestResult('${String(id).replace(/'/g,"\\'")}')">рҹ’ҫ аёҡаёұаёҷаё—аё¶аёҒаёңаёҘаё—аё”аёӘаёӯаёҡ</button>
    </div>
  </div>`;
}

function srSaveTestResult(id) {
  const r = getSR().find(x => x.id === id); if (!r) return;
  const date     = document.getElementById('sr-tr-date')?.value;
  const result   = document.getElementById('sr-tr-result')?.value;
  const sat      = parseInt(document.getElementById('sr-tr-sat')?.value) || 0;
  const decision = document.getElementById('sr-tr-decision')?.value;
  const feedback = document.getElementById('sr-tr-feedback')?.value?.trim() || '';
  const note     = document.getElementById('sr-tr-note')?.value?.trim() || '';
  if (!date)   { toast('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаё§аёұаёҷаё—аёөа№Ҳаё—аё”аёӘаёӯаёҡ', 'warn'); return; }
  if (!result) { toast('аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёңаёҘаёҒаёІаёЈаё—аё”аёӘаёӯаёҡ', 'warn'); return; }
  const itemResults = (r.items || []).map((it, i) => ({
    sku:     it.sku,
    skuName: it.skuName || '',
    result:  document.getElementById(`sr-ir-result-${i}`)?.value || '',
    note:    document.getElementById(`sr-ir-note-${i}`)?.value?.trim() || '',
  }));
  const reqs = getSR();
  const rec  = reqs.find(x => x.id === id); if (!rec) return;
  rec.testResult = { date, result, satisfaction: sat, decision, feedback, note, itemResults, by: UID, updated_at: new Date().toISOString() };
  saveSR(reqs);
  audit('SAMPLE_TEST_RESULT', id, { result, decision, satisfaction: sat });
  toast('аёҡаёұаёҷаё—аё¶аёҒаёңаёҘаё—аё”аёӘаёӯаёҡа№ҒаёҘа№үаё§');
  _sr.view = 'detail'; pgSample();
}
</script>
</body>
</html>
