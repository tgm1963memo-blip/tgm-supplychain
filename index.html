function ppRender(){
  // Init filter button if not yet rendered
  const ppFEl = document.getElementById('pp-filter-sku');
  if (ppFEl && ppFEl.children.length === 0) {
    _skuFilter = _skuFilter || { active: [], presets: {} };
    _skuFilter.presets = DB.get('filter_presets') || {};
    ppFEl.outerHTML = buildSkuFilterBtn('pp-filter-sku','ppRender');
  }
  const ppSkuActive = _skuFilter?.active || [];

  const orders = window._prodOrders || DB.get('prod_orders') || [];
  const ref    = new Date(_pp.ref);
  const {s,e,lbl} = ppGetRange();

  // KPI
  const allInRange = orders.filter(o => { const d=new Date(o.planDate); return d>=s&&d<e; });
  const inRange = ppSkuActive.length > 0 ? allInRange.filter(o => ppSkuActive.includes(o.sku)) : allInRange;
  const totalQty = inRange.reduce((a,o) => a+o.qty, 0);
  const totalItems= new Set(inRange.map(o=>o.sku)).size;
  const pending  = inRange.filter(o => o.status==='pending').length;
  const done     = inRange.filter(o => o.status==='done').length;
  const kr = document.getElementById('pp-krow');
  if (kr) kr.innerHTML = `
    <div class="kpi b"><div class="kl">ช่วงเวลา</div><div class="kv" style="font-size:16px">${lbl}</div></div>
    <div class="kpi g"><div class="kl">ยอดรวม (กก.)</div><div class="kv">${fmt(totalQty)}</div><div class="kh">${totalItems} SKU</div></div>
    <div class="kpi a"><div class="kl">รอผลิต</div><div class="kv">${pending}</div><div class="kh">รายการ</div></div>
    <div class="kpi t"><div class="kl">ผลิตแล้ว</div><div class="kv">${done}</div><div class="kh">รายการ</div></div>`;

  // Gantt
  const gc = document.getElementById('pp-gantt');
  if (gc) {
    const cols  = ppGanttCols(ref, _pp.pt);
    // สำหรับ Gantt: ใช้ orders ทั้งหมดที่ตรงกับช่วงเวลา Gantt
    const gStart = cols[0]?.key || '';
    const gEnd   = cols[cols.length-1]?.end || cols[cols.length-1]?.key || '';
    const gOrders = orders.filter(o => {
      if (!o.planDate) return false;
      if (_pp.pt === 'year') return (o.planDate||'').slice(0,4) === String(ref.getFullYear());
      return (o.planDate||'') >= gStart && (o.planDate||'') <= gEnd;
    });
    gc.innerHTML = ppRenderGantt(gOrders, cols, _pp.pt);
  }

  // Orders table
  const tbl = document.getElementById('pp-tbl');
  if (tbl) tbl.innerHTML = inRange.length ? `<div class="tw"><table>
    <thead><tr>
      <th>วันผลิต</th><th>รหัสสินค้า</th><th>ชื่อสินค้า</th>
      <th class="r">จำนวน(กก.)</th><th>สายผลิต</th><th>สถานะ</th>
      <th>วันที่รับ/พร้อมส่ง</th><th>หมายเหตุ</th><th>แก้ไขโดย</th><th>Action</th>
    </tr></thead>
    <tbody>${inRange.sort((a,b)=>a.planDate<b.planDate?-1:1).map(o=>`<tr>
      <td><input type="date" value="${o.planDate}" onchange="ppEditOrder('${o.id}','planDate',this.value);ppRender()" style="padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px"></td>
      <td class="mono">${o.sku}</td><td>${(o.skuName||'').substring(0,28)}</td>
      <td class="r"><input type="number" value="${o.qty}" onchange="ppEditOrder('${o.id}','qty',this.value)" style="width:60px;padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px;text-align:right" min="0" step="0.1"></td>
      <td><input type="text" value="${o.line||''}" onchange="ppEditOrder('${o.id}','line',this.value)" style="width:80px;padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px"></td>
      <td><select onchange="ppEditOrder('${o.id}','status',this.value);ppRender()" style="padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px">
        <option value="pending" ${o.status==='pending'?'selected':''}>รอผลิต</option>
        <option value="inprog"  ${o.status==='inprog'?'selected':''}>กำลังผลิต</option>
        <option value="done"    ${o.status==='done'?'selected':''}>ผลิตแล้ว</option>
      </select></td>
      <td><input type="date" value="${o.receiveDate||o.planDate||''}" onchange="ppEditOrder('${o.id}','receiveDate',this.value)" style="padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px"></td>
      <td><input type="text" value="${o.note||''}" onchange="ppEditOrder('${o.id}','note',this.value)" style="width:120px;padding:3px;border:1px solid var(--BD);border-radius:4px;font-size:12px"></td>
      <td><span class="edby">${o.by||''}</span></td>
      <td>
        <button class="btn btn-xs" onclick="ppEditModal('${o.id}')">✏️</button>
        <button class="btn btn-xs btn-r" onclick="ppDeleteOrder('${o.id}')">ลบ</button>
      </td></tr>`).join('')}
    </tbody></table></div>`
    : '<div style="padding:20px;color:var(--TX3);text-align:center">ไม่มีรายการในช่วงเวลานี้</div>';
}
function ppShowOrder(sku='', qty=0){
  const SKUS=typeof getSkusMerged==='function'?getSkusMerged():SKUS_MASTER;
  openMod(`<div class="mh"><div class="mt2">สั่งยอดผลิต</div><span class="mx" onclick="closeM()">✕</span></div>
  <div class="fg">
    <div class="field"><label>รหัสสินค้า</label><select id="pp-sku">${SKUS.map(s=>`<option value="${s.code}" ${s.code===sku?'selected':''}>${s.code} — ${s.name.substring(0,28)}</option>`).join('')}</select></div>
    <div class="field"><label>จำนวน (กก.)</label><input type="number" id="pp-qty" min="1" placeholder="0" value="${qty}"></div>
    <div class="field"><label>วันที่ผลิต</label><input type="date" id="pp-date" value="${_pp.ref}" onchange="const rd=document.getElementById('pp-recv');if(rd&&!rd.value)rd.value=this.value"></div>
    <div class="field"><label>วันที่รับสินค้า/พร้อมส่ง</label><input type="date" id="pp-recv" value="${_pp.ref}"></div>
    <div class="field"><label>สายผลิต</label><input type="text" id="pp-line" placeholder="เช่น สาย A, เครื่อง 1"></div>
    <div class="field"><label>หมายเหตุ</label><input type="text" id="pp-note" placeholder="PO อ้างอิง / ลูกค้า"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" onclick="closeM()">ยกเลิก</button>
    <button class="btn btn-p" onclick="ppSaveOrder()">บันทึก</button>
  </div>`);
}
function ppSaveOrder(){
  const sku=document.getElementById('pp-sku')?.value||'';
  const qty=parseFloat(document.getElementById('pp-qty')?.value)||0;
  const planDate=document.getElementById('pp-date')?.value||'';
  const line=(document.getElementById('pp-line')?.value||'').trim();
  const receiveDate=document.getElementById('pp-recv')?.value||planDate;
  const note=(document.getElementById('pp-note')?.value||'').trim();
  if(!sku||qty<=0||!planDate){alert('กรุณากรอกรหัสสินค้า จำนวน และวันที่ผลิต');return;}
  const SKUS=typeof getSkusMerged==='function'?getSkusMerged():SKUS_MASTER;
  const sk=SKUS.find(s=>s.code===sku)||{name:sku};
  const orders=window._prodOrders||DB.get('prod_orders')||[];
  const order={id:genUUID(),sku,skuName:sk.name||sku,qty,planDate,receiveDate,line,note,status:'pending',by:UID,ts:Date.now(),edited_by:UID,edited_at:new Date().toISOString()};
  orders.unshift(order);
  window._prodOrders=orders;
  DB.set('prod_orders',orders);
  audit('ADD_PROD_ORDER',order.id,{sku,qty,planDate,line});
  closeM();
  toast('บันทึกรายการสั่งผลิตแล้ว');
  SB.upsertProdOrder(order).then(ok=>{
    if(ok){CACHE.clear('fc_prod_links');toast('Sync แผนผลิตแล้ว');}
    else toast('บันทึก offline — Supabase sync ล้มเหลว','warn');
  }).catch(e=>{console.warn('upsertProdOrder:',e);toast('บันทึก offline เท่านั้น: '+e.message,'warn');});
  ppRender();
}
function ppEditOrder(id, field, value){
  const orders = window._prodOrders || DB.get('prod_orders') || [];
  const order = orders.find(o => o.id === id);
  if(!order) return;

  const oldValue = order[field];
  if(field === 'qty') value = parseFloat(value) || 0;
  if(field === 'planDate' && !value) return; // Don't allow empty date

  order[field] = value;
  order.edited_by = UID;
  order.edited_at = new Date().toISOString();

  window._prodOrders=orders;
  DB.set('prod_orders', orders);
  SB.upsertProdOrder(order).then(ok=>{if(ok)CACHE.clear('fc_prod_links');}).catch(console.warn);
  audit('EDIT_PROD_ORDER', id, {field, oldValue, newValue: value});

  // Link to WMS if status changed to done
  if(field === 'status' && value === 'done') {
    ppLinkToWMS(order);
  }

  ppRender();
}

function ppDeleteOrder(id){
  if(!confirm('ลบรายการสั่งผลิตนี้?')) return;
  const orders = window._prodOrders || DB.get('prod_orders') || [];
  const index = orders.findIndex(o => o.id === id);
  if(index === -1) return;

  const deleted = orders.splice(index, 1)[0];
  window._prodOrders=orders;
  DB.set('prod_orders', orders);
  SB.deleteProdOrder(id).then(ok=>{if(ok)CACHE.clear('fc_prod_links');}).catch(console.warn);
  audit('DELETE_PROD_ORDER', id, deleted);
  ppRender();
}

function ppLinkToWMS(order){
  // Link production completion to WMS stock entry
  const stockEntry = {
    sku: order.sku,
    qty: order.qty,
    lot_no: `PROD-${order.id}`,
    exp_date: null, // Production doesn't have expiration
    location: 'PRODUCTION',
    type: 'production_in',
    ref_id: order.id,
    ref_type: 'prod_order',
    created_by: UID,
    created_at: new Date().toISOString(),
    notes: `Production completed: ${order.line || ''} ${order.note || ''}`
  };

  // This would normally call WMS API, but for now we'll store locally
  // In real implementation, this should call WMS API to add stock
  console.log('Linking to WMS:', stockEntry);
  toast(`ส่งข้อมูลการผลิตไป WMS สำหรับ ${order.sku} (${order.qty} กก.)`);
}
function ppExport(){
  const orders=window._prodOrders||DB.get('prod_orders')||[];
  const {s,e,lbl}=ppGetRange();
  const rows=orders.filter(o=>{const d=new Date(o.planDate);return d>=s&&d<e;})
    .map(o=>[o.planDate,o.sku,o.skuName||'',o.qty,o.line||'',o.status,o.note||'',o.by||'']);
  toXLSX([['ProdOrders',['วันผลิต','รหัสสินค้า','ชื่อสินค้า','จำนวน(กก.)','สายผลิต','สถานะ','หมายเหตุ','สร้างโดย'],rows]],`ProdPlan_${lbl.replace(/\//g,'-')}.xlsx`);
}

function expAudit() {
  const log = window._auditCache || [];

}

// ── Company scope helpers ────────────────────────────────────────
// Default app scope shows TSS + TSSNV only. Dashboard can opt in to add TGM.
function _normalizeCompanyScope(v){
  const s=String(v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(s.startsWith('TGM')) return 'TGM';
  if(s.startsWith('CONSI')) return 'CONSI';
  if(s==='TSSNV' || s.startsWith('TSSN') || s.includes('NV')) return 'TSSNV';
  if(s.startsWith('TSS')) return 'TSS';
  return 'TSS';
}
function _plantCompany(plant){ return _normalizeCompanyScope(plant); }
function _skuCompanyFromProduct(prod={}, code=''){
  if(prod?.company) return _normalizeCompanyScope(prod.company);
  if(prod?.plant) return _normalizeCompanyScope(prod.plant);
  if(prod?.branch) return _normalizeCompanyScope(prod.branch);
  const skuCode=String(code || prod?.code || prod?.sku || prod?.sku_code || '').trim();
  const master=(typeof SKUS_MASTER!=='undefined' ? SKUS_MASTER : []).find(s=>String(s.code)===skuCode);
  if(master?.company) return _normalizeCompanyScope(master.company);
  if(master?.plant) return _normalizeCompanyScope(master.plant);
  return 'TSS';
}
function _rowSku(row={}){
  return row?.sku || row?.code || row?.prod_code || row?.product_code || row?.sku_code || row?.item_code || '';
}
function _rowCompany(row={}){
  if(row?.company) return _normalizeCompanyScope(row.company);
  if(row?.branch) return _normalizeCompanyScope(row.branch);
  if(row?.slm_id && String(row.slm_id).includes(':')) return _normalizeCompanyScope(String(row.slm_id).split(':')[0]);
  return _skuCompanyFromProduct(row, _rowSku(row));
}
function _allowedCompanies(opts={}){
  const companies = opts?.includeTgm ? ['TSS','TSSNV','TGM'] : ['TSS','TSSNV'];
  if(opts?.includeConsi) companies.push('CONSI');
  return new Set(companies);
}
function _isAllowedCompanyRecord(row={}, opts={}){
  return _allowedCompanies(opts).has(_rowCompany(row));
}
function _isTgmSkuRecord(row={}){
  return !_isAllowedCompanyRecord(row);
}
function _filterTgmRecords(rows=[], opts={}){
  return (rows||[]).filter(r=>_isAllowedCompanyRecord(r, opts));
}
function _filterTgmSkuRows(rows=[], opts={}){
  return (rows||[]).filter(r=>_isAllowedCompanyRecord(r, opts));
}
function _filterTgmStockMap(map={}, opts={}){
  return Object.fromEntries(Object.entries(map||{}).filter(([sku])=>_isAllowedCompanyRecord({code:sku}, opts)));
}
function _companyTotals(rows=[]){
  return (rows||[]).reduce((acc,r)=>{
    const company=_rowCompany(r);
    acc[company]=acc[company]||{qty:0,amount:0,count:0};
    acc[company].qty += Number(r.qty)||0;
    acc[company].amount += Number(r.amount)||0;
    acc[company].count += 1;
    return acc;
  },{});
}

    (s?.lots||[]).every(l=>String(l.lot||'').startsWith('LOT-A-')||String(l.lot||'').startsWith('LOT-B-'))
  );
  if(sampleStock) DB.set('stock',{});
}

function getRoleLabel(role, dept){
  const deptLabel = dept==='sales'?'Sales':dept==='planning'?'Planning':'';
  const map={
    superadmin:'Super Admin', admin:'Administrator',
    manager:`Manager${deptLabel?' ('+deptLabel+')':''}`,
    officer:`Officer${deptLabel?' ('+deptLabel+')':''}`,
    worker:`Worker${deptLabel?' ('+deptLabel+')':''}`,
    // new dept-specific keys
    sales_manager:'Sales Manager', sales_officer:'Sales Officer', sales_worker:'Sales Worker',
    planning_manager:'Planning Manager', planning_officer:'Planning Officer', planning_worker:'Planning Worker',
    // backward-compat
    sales:'Sales', planning:'Planning', warehouse:'Warehouse',
  };
  return map[role]||role;
}

function buildSB(){
  const customPerms=DB.get('nav_perms')||{};
  const deptPerms=DB.get('nav_perms_deptpos')||{};
  const me=(DB.get('users')||[]).find(u=>u.uid===UID)||CURRENT_USER||{};
  const dept=(me.department||CURRENT_USER?.department||'').toLowerCase();
  const dkey=`${me.department||''}|${me.position||''}`;

  // ── รวม lookup ไอคอนจากทุก RNAV ────────────────────────────────────────
  const lookup={};
  Object.values(RNAV).flat().forEach(([id,ico,lbl])=>{if(!lookup[id])lookup[id]=[id,ico,lbl];});

  let navItems=[];

  // 1. ถ้ามี dept+position override จาก IT → ใช้ก่อนเสมอ (ยกเว้น superadmin)
  if(ROLE!=='superadmin' && deptPerms[dkey]?.pages?.length){
    navItems=deptPerms[dkey].pages.map(id=>lookup[id]).filter(Boolean);
  }
  // 2. ถ้าไม่มี override → เลือก RNAV ตาม role × dept
  else if(ROLE==='superadmin'){
    navItems=RNAV.superadmin;
  } else if(ROLE==='admin'){
    navItems=RNAV.admin;
  } else if(['manager','officer','worker'].includes(ROLE)){
    // 5-level generic roles → combine กับ dept
    const navKey = dept ? `${dept}_${ROLE}` : ROLE;
    navItems=RNAV[navKey]||RNAV[ROLE]||[];
  } else {
    // dept-specific keys (sales_manager, planning_officer, ฯลฯ) หรือ roles เดิม
    navItems=RNAV[ROLE]||[];
  }

  // 3. ถ้ายังว่างอยู่ → fallback จาก role manager
  if(!navItems.length){
    const lookup2={};
    Object.values(RNAV).flat().forEach(([id,ico,lbl])=>{if(!lookup2[id])lookup2[id]=[id,ico,lbl];});
    const rolePages=(typeof _getRoles==='function'&&_getRoles()[ROLE]?.pages)||customPerms[ROLE]?.pages||[];
    if(rolePages.length) navItems=rolePages.map(id=>lookup2[id]).filter(Boolean);
  }

  document.getElementById('sb-nav').innerHTML=navItems.map(([id,ico,lbl])=>`<div class="ni" id="ni-${id}" onclick="nav('${id}')"><span class="ni-ico">${ico}</span><span>${lbl}</span></div>`).join('');
  document.getElementById('sb-av').textContent=(UID||'??').substring(0,2).toUpperCase();
  document.getElementById('sb-un').textContent=UNAME||UID;
  document.getElementById('sb-ur').textContent=getRoleLabel(ROLE, dept);
}

function productGroups(){

function salesMaster(){
  const rows={};
  const add=(code,name='',source='Express')=>{
    code=String(code||'').trim();if(!code)return;
    if(!rows[code])rows[code]={code,name:name||code,nickname:'',phone:'',email:'',active:true,source};
    else if(name&&(!rows[code].name||rows[code].name===rows[code].code))rows[code].name=name;
  };
  (SLM_IDS||[]).forEach(code=>add(code,code,'Express'));
  Object.keys(SLM_CUSTS||{}).forEach(code=>add(code,code,'Express customer map'));
  (SD_SALES||[]).forEach(s=>add(s.c,s.n,'Sales history'));
  (DB.get('users')||[]).forEach(u=>{if(u.slm_id||u.role==='sales')add(u.slm_id||u.uid,u.name,'User');});
  const overrides=salesMasterOverrides();
  Object.entries(overrides).forEach(([code,row])=>{
    code=String(row.code||code||'').trim();if(!code)return;
    rows[code]={...(rows[code]||{code,source:'Manual'}),...row,code};
    if(rows[code].active!==false)rows[code].active=true;
  });
  return Object.values(rows).sort((a,b)=>String(a.code).localeCompare(String(b.code),'th',{numeric:true}));
}

function customerGroupForCode(code,fallback='อื่นๆ'){

  if(prof.corporate||prof.corp) return prof.corporate||prof.corp;
  for(const [g,items] of Object.entries(CUST_GROUPS||{})){

function getCustomerProfile(c){

  return {
    ...c,
    corp:prof.corporate||prof.corp||customerGroupForCode(c.c,c.grp||'อื่นๆ'),
    category:prof.category||c.ty||'ไม่ระบุ',
    slm:prof.slm||c.slm||'',
    n:prof.name||c.n
  };
}
function salesCustomers(){return SD_CUSTS.map(getCustomerProfile);}
function allCustomerRows(){
  const rows=salesCustomers(),seen=new Set(rows.map(c=>c.c));
  (DB.get('remote_customers_cache')||[]).forEach(r=>{
    const code=String(r.code||'').trim();
    if(!code||seen.has(code))return;
    rows.push(getCustomerProfile({c:code,n:r.name||code,ty:r.cust_group||'ขายจริง',grp:r.cust_group||'อื่นๆ',slm:r.slm_id||'',w:[0,0,0,0],g:[]}));
    seen.add(code);
  });
  if(typeof CUST_NAMES==='object'){
    Object.entries(CUST_NAMES).forEach(([code,name])=>{
      if(!seen.has(code)){
        rows.push(getCustomerProfile({c:code,n:name,ty:'ไม่ระบุ',grp:'อื่นๆ',slm:'',w:[0,0,0,0],g:[]}));
        seen.add(code);
      }
    });
  }
  return rows.sort((a,b)=>String(a.c).localeCompare(String(b.c),'th'));
}

function _aiProvider(){ return DB.get('ai_provider') || 'groq'; }
function _aiKey(){ return DB.get('ai_key') || ''; }
function _aiModel(){
  const saved = DB.get('ai_model');
  const p = _AI_PROVIDERS[_aiProvider()];
  return (saved && p.models.includes(saved)) ? saved : p.defaultModel;
}

async function callAI(system, user){
  const key = _aiKey();
  const prov = _aiProvider();
  const cfg = _AI_PROVIDERS[prov];
  if(!key) throw new Error(`ยังไม่ได้ตั้งค่า API Key\nกด ⚙️ AI Settings เพื่อใส่ Key`);
  const model = _aiModel();

  let res;
  if(prov === 'claude'){
    res = await fetch(cfg.url, {
      method:'POST',
      headers:{ 'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json' },
      body: JSON.stringify({ model, max_tokens:1500, system, messages:[{role:'user',content:user}] })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Claude Error ${res.status}`); }
    const d = await res.json();
    return d.content?.[0]?.text || '';
  } else {
    // Groq / OpenAI-compatible
    res = await fetch(cfg.url, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${key}`,'content-type':'application/json' },
      body: JSON.stringify({ model, max_tokens:1500, messages:[{role:'system',content:system},{role:'user',content:user}] })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Groq Error ${res.status}`); }
    const d = await res.json();
    return d.choices?.[0]?.message?.content || '';
  }
}

function _histFromSalesRows(rows){
  const bySku={};
  for(const r of rows||[]){
    if(!bySku[r.prod_code]) bySku[r.prod_code]={name:r.prod_name||r.prod_code,monthly:{},avg3:0};
    bySku[r.prod_code].monthly[r.ym]=(bySku[r.prod_code].monthly[r.ym]||0)+(Number(r.qty)||0);
  }
  const months=[...new Set((rows||[]).map(r=>r.ym))].sort();
  const last3=months.slice(-3);
  Object.values(bySku).forEach(h=>{
    const vals=last3.map(m=>Number(h.monthly[m])||0).filter(v=>v>0);
    h.avg3=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  });
  return bySku;
}
async function loadDashboardSalesHist(includeTgm = false){
  const range=_twoYearWindow();

  if(!includeTgm){
    window._salesRows2Y=rows;

  const dashRows=rows.filter(r=>r.ym>=range.currentStart&&r.ym<=range.currentEnd);
  window._dashSalesRows=dashRows;
  if(includeTgm){
    window._dashSalesHistCache=_histFromSalesRows(dashRows);
  }
  return _histFromSalesRows(dashRows);
}

function dashSalesValue(m){

function _ymAdd(ym,delta){
  const [y,m]=ym.split('-').map(Number);

function _twoYearWindow(refDate=new Date()){
  const y=refDate.getFullYear();
  return {prevYear:y-1,currentYear:y,start:`${y-1}-01`,end:`${y}-12`,currentStart:`${y}-01`,currentEnd:`${y}-12`};
}
function _sdMonthRange(){

function _salesNameMap(){
  const out={};
  salesMaster().forEach(s=>{if(s.active!==false)out[s.code]=s.name||s.code;});
  (DB.get('users')||[]).forEach(u=>{const code=u.slm_id||u.uid;if((u.slm_id||u.role==='sales')&&!out[code])out[code]=u.name;});
  (SD_SALES||[]).forEach(s=>{if(!out[s.c])out[s.c]=s.n;});
  return out;
}
function _splitBranchSlm(raw){
  const s=String(raw||'').trim();
  if(s.includes(':')){
    const [branch,...rest]=s.split(':');
    return {branch,slm:rest.join(':')||'ALL',raw:s,prefixed:true};
  }
  return {branch:'LEGACY',slm:s||'ALL',raw:s,prefixed:false};
}
function _isConsiBranch(branch){return String(branch||'').toUpperCase()==='CONSI';}
function _companyFromExpressBranch(branch){return _normalizeCompanyScope(branch);}
function _companyFromExpressSlm(slm){return _companyFromExpressBranch(String(slm||'').split(':',1)[0]);}
function _isConsignmentRow(r){
  return _isConsiBranch(r.branch) || /ฝากขาย|CONSI/i.test(`${r.cust_group||''} ${r.category||''} ${r.cust_name||''}`);
}
function _salesRowsForMode(rows,{includeConsi=false}={}){
  const hasPrefixed=(rows||[]).some(r=>r.prefixed);
  // hasPrefixed dedup only applies to TSS rows; TSSNV/TGM/CONSI rows don't have legacy duplicates
  const scoped=hasPrefixed ? (rows||[]).filter(r=>r.prefixed||r.is_all||(r.company&&r.company!=='TSS')) : (rows||[]);
  return scoped.filter(r=>{
    if(includeConsi) return _isConsignmentRow(r);
    return !_isConsignmentRow(r);
  });
}
async function _sbSalesRows(startYm,endYm,slmId='',opts={}){
  // Paginate to bypass Supabase 1000-row default limit (sales_history has 30k+ rows)
  const PAGE=1000;
  const querySlmId=slmId && !opts.disableQuerySlm ? String(slmId).trim() : '';
  let allData=[];
  let from=0;
  const salesSource=opts.forceBaseSales ? 'sales_history' : 'v_sales_history_company';
  const salesSelect=salesSource==='v_sales_history_company'
    ? 'slm_id,sku,ym,qty,amount,company,product_name,group_name,plant'
    : 'slm_id,sku,ym,qty,amount';
  while(true){
    let q=getSupabaseClient()
      .from(salesSource)
      .select(salesSelect)
      .gte('ym',startYm).lte('ym',endYm)
      .order('ym')
      .range(from,from+PAGE-1);
    if(opts.summaryOnly && !slmId) q=q.eq('slm_id','ALL');
    else if(querySlmId) q=q.or('slm_id.eq.'+querySlmId+',slm_id.like.*:'+querySlmId);
    let {data,error}=await q;
    if(error && !opts.forceBaseSales && /(v_sales_history_company|relation|schema cache|does not exist|not found)/i.test(error.message||'')){
      console.warn('v_sales_history_company unavailable; retry sales_history', error.message || error);
      return _sbSalesRows(startYm,endYm,slmId,{...opts,forceBaseSales:true});
    }
    if(error && /amount/i.test(error.message||'')){
      let q2=getSupabaseClient()
        .from(salesSource)
        .select(salesSource==='v_sales_history_company' ? 'slm_id,sku,ym,qty,company,product_name,group_name,plant' : 'slm_id,sku,ym,qty')
        .gte('ym',startYm).lte('ym',endYm)
        .order('ym')
        .range(from,from+PAGE-1);
      if(opts.summaryOnly && !slmId) q2=q2.eq('slm_id','ALL');
      else if(querySlmId) q2=q2.or('slm_id.eq.'+querySlmId+',slm_id.like.*:'+querySlmId);
      ({data,error}=await q2);
    }
    if(error && querySlmId){
      console.warn('sales_history slm filter failed; retry unfiltered', error.message || error);
      return _sbSalesRows(startYm,endYm,slmId,{...opts,disableQuerySlm:true});
    }
    if(error) throw error;
    allData=allData.concat(data||[]);
    if(!data||data.length<PAGE) break;
    from+=PAGE;
  }
  const wantsAllOnly = opts.summaryOnly && !slmId;
  const allowAllRows = wantsAllOnly || opts.includeAllRows === true;
  if(opts.excludeAllRows || !allowAllRows) allData=allData.filter(r=>String(r.slm_id||'').trim().toUpperCase()!=='ALL');
  if(slmId && querySlmId && !allData.length){
    console.warn('sales_history slm filter returned no rows; retry unfiltered');
    return _sbSalesRows(startYm,endYm,slmId,{...opts,disableQuerySlm:true});
  }
  // Keep dashboard light: fetch only product names used by this sales-history window.
  let products;
  if(opts.fastProducts){
    const codes=[...new Set(allData.map(r=>r.sku).filter(Boolean))];
    const key='products_subset_'+codes.length+'_'+codes.slice(0,20).join('_');
    products=await CACHE.get(key+(opts.includeTgm?'_all':'_scope')+(opts.includeConsi?'_consi':''),()=>SB.getProductsByCodes(codes,{includeTgm:opts.includeTgm===true,includeConsi:opts.includeConsi===true}));
  }else{
    products=await CACHE.get((opts.includeTgm?'products_all':'products')+(opts.includeConsi?'_consi':''),()=>SB.getProducts({includeTgm:opts.includeTgm===true,includeConsi:opts.includeConsi===true}));
  }
  const prodMap=Object.fromEntries((products||[]).map(p=>[String(p.code||p.sku||''),p]));
  const names=_salesNameMap();
  const mapped=(allData)
    .filter(r=>r.slm_id)
    .flatMap(r=>{
      const sp=_splitBranchSlm(r.slm_id);
      const isAll=String(sp.slm||'').toUpperCase().startsWith('ALL');
      const name=names[sp.slm]||names[sp.raw]||(isAll?'ทั้งหมด':sp.slm);
      const qty=Number(r.qty ?? r.quantity ?? 0)||0;
      const amount=Number(r.amount ?? r.total ?? r.sales_amount ?? r.net_amount ?? r.value ?? 0)||0;
      const prod={...(prodMap[r.sku]||{}), code:r.sku, name:r.product_name || prodMap[r.sku]?.name, group_name:r.group_name || prodMap[r.sku]?.group_name, plant:r.plant || prodMap[r.sku]?.plant, company:r.company || prodMap[r.sku]?.company};
      const rowCompany=String(r.company||'').trim().toUpperCase();
      const base={
    branch:sp.branch,
    prefixed:sp.prefixed,
    is_all:isAll,
    slm_id:sp.slm,
    slm_key:sp.raw,
    slm_name:name,
    cust_code:`SLM-${sp.raw}`,
    cust_name:name||`Sales ${sp.slm}`,
    cust_group:_isConsiBranch(sp.branch)?'ฝากขาย':'ขายจริง',
    prod_group:productGroupForSku(r.sku,prod.group_name||'อื่นๆ'),
    prod_code:r.sku,
    prod_name:prod.name||r.sku,
    qty,
    amount,
    company:(['TSS','TSSNV','TGM','CONSI'].includes(rowCompany)) ? rowCompany : (sp.prefixed ? _companyFromExpressBranch(sp.branch) : _skuCompanyFromProduct(prod,r.sku)),
    ym:r.ym,
      };
      const custWeights=(PROD_CUST?.[r.sku]?.[sp.slm])||null;
      if(isAll || !custWeights || !Object.keys(custWeights).length) return [base];
      const totalW=Object.values(custWeights).reduce((a,b)=>a+(Number(b)||0),0)||1;
      return Object.entries(custWeights).map(([code,w])=>{
        const ratio=(Number(w)||0)/totalW;
        const grp=customerGroupForCode(code,_isConsiBranch(sp.branch)?'ฝากขาย':'อื่นๆ');
        const prof=getCustomerProfile({c:code,n:CUST_NAMES?.[code]||code,ty:_isConsiBranch(sp.branch)?'ฝากขาย':'ขายจริง',grp,slm:sp.slm});
        return {...base,cust_code:code,cust_name:prof.n||code,cust_group:prof.corp||grp,category:prof.category,qty:qty*ratio,amount:amount*ratio};
      });
    });
  const modeRows=_salesRowsForMode(mapped,opts);
  // ตาราง year-archive branch → canonical branch (ตรงกับ CANONICAL_BRANCH ใน express_sync.py)
  const _ARCHIVE={'TSS-67':'TSS','TSS-68':'TSS','TSSN-67':'TSS-NV','TSSN-68':'TSS-NV','CONSI-67':'CONSI'};
  // สร้าง key ของ primary branches (non-archive) เพื่อใช้ deduplicate archive
  const _primaryKeys=new Set(
    modeRows.filter(r=>!r.is_all&&!_ARCHIVE[r.branch])
            .map(r=>`${r.branch}|${r.slm_id}|${r.ym}|${r.prod_code}`));
  // กรอง archive-branch rows ออก ถ้ามี primary-branch row สำหรับ canonical+slm+ym+sku เดียวกัน
  const dedupedRows=modeRows.filter(r=>{
    if(r.is_all||!_ARCHIVE[r.branch]) return true;
    return !_primaryKeys.has(`${_ARCHIVE[r.branch]}|${r.slm_id}|${r.ym}|${r.prod_code}`);
  });
  const scopedRows=dedupedRows.filter(r=>_isAllowedCompanyRecord(r, opts));
  // ใช้ ym|prod_code เป็น key (ไม่รวม branch) เพราะ ALL rows มี branch='LEGACY'
  // ทำให้ ALL row ถูก exclude เมื่อมี detail row ของ ym+sku เดียวกัน ไม่ว่า branch จะเป็นอะไร
  const detailKeys=new Set(scopedRows.filter(r=>!r.is_all).map(r=>`${r.ym}|${r.prod_code}`));
  const hasDetailRows=scopedRows.some(r=>!r.is_all);
  const filteredByMode=scopedRows.filter(r=>{
    // __73_* rows: Express monthly summary — only show in summary-only mode (no per-SLM detail present)
    if(String(r.prod_code||'').startsWith('__73_')) return !hasDetailRows;
    return !r.is_all || !detailKeys.has(`${r.ym}|${r.prod_code}`);
  });
  if(!slmId) return filteredByMode;
  return filteredByMode.filter(r=>r.slm_id===slmId || r.slm_key===slmId || r.slm_key.endsWith(':'+slmId));
}
function _sdKpiFromRows(rows){
  const byMonth={};
  rows.forEach(r=>{if(!byMonth[r.ym])byMonth[r.ym]={ym:r.ym,total:0,qty:0,invoices:0};byMonth[r.ym].total+=r.amount;byMonth[r.ym].qty+=r.qty;byMonth[r.ym].invoices+=1;});
  return Object.values(byMonth).sort((a,b)=>a.ym.localeCompare(b.ym));
}
function _applySalesRowsToSd(rows,activeMonth,slmId=''){
  const sourceRows=slmId ? (rows||[]).filter(r=>r.slm_id===slmId || r.slm_key===slmId || r.slm_key?.endsWith(':'+slmId)) : (rows||[]);
  const monthly=_sdKpiFromRows(sourceRows);
  const monthRows=activeMonth?sourceRows.filter(r=>r.ym===activeMonth):sourceRows;
  const cur=activeMonth?monthly.find(m=>m.ym===activeMonth):null;
  _sdApi.valueMode='amount';
  _sdApi.loaded=true;
  _sdApi.histFallback=false;
  _sdApi.month=activeMonth||monthly.at(-1)?.ym||'';
  _sdApi.monthly=monthly;
  _sdApi.total=cur?cur.total:monthRows.reduce((a,r)=>a+r.amount,0);
  _sdApi.qty=cur?cur.qty:monthRows.reduce((a,r)=>a+r.qty,0);
  _sdApi.invoices=cur?cur.invoices:monthRows.length;
  _sdApi.ar=0;
  const prevYm=activeMonth?_ymAdd(activeMonth,-1):'';
  const prev=prevYm?monthly.find(m=>m.ym===prevYm):null;
  _sdApi.vs=prev&&prev.total?Math.round((_sdApi.total/prev.total-1)*100):0;
  const slmMap={};
  sourceRows.forEach(r=>{if(r.slm_id) slmMap[r.slm_id]=r.slm_name||r.slm_id;});
  Object.entries(_salesNameMap()).forEach(([code,name])=>{if(!slmMap[code])slmMap[code]=name;});
  _sdApi.slmList=Object.entries(slmMap).map(([code,name])=>({code,name})).sort((a,b)=>a.code.localeCompare(b.code,'th'));
  _sdApi.custs=_sdBuildCusts(monthRows);
  _sdApi.prods=_sdBuildProds(monthRows);
  _sdApi.slms=_sdBuildSlms(monthRows,_sdApi.slmList);
  _sdUpdateSlmDrop();
}

function _sdUseLatestMonthIfEmpty(monthly){
  const cur=_sdApiMonth();
  if(Array.isArray(monthly) && monthly.some(m=>m.ym===cur)) return cur;
  if(Array.isArray(monthly) && monthly.length) return monthly[monthly.length-1].ym;

// ── Fallback: สร้าง sales data จาก ALL_HIST (embedded) ──
function _loadSalesFromAllHist(targetYm, slmId=''){
  const hist = ALL_HIST || {};
  const monthly = {};
  const now = new Date();
  const cutYM = `${now.getFullYear()-2}-${String(now.getMonth()+1).padStart(2,'0')}`;
  Object.entries(hist).forEach(([sku, h]) => {
    Object.entries(h.monthly||{}).forEach(([ym, qty]) => {
      if(ym < cutYM) return;
      if(!monthly[ym]) monthly[ym]={ym,total:0,qty:0,invoices:1};
      monthly[ym].qty += Number(qty)||0;
      monthly[ym].total += Number(qty)||0;
    });
  });
  const monthlyArr = Object.values(monthly).sort((a,b)=>a.ym.localeCompare(b.ym));
  // ถ้าเดือนที่เลือกไม่มีข้อมูลใน ALL_HIST ให้ใช้เดือนล่าสุดที่มีข้อมูล
  const hasTarget = monthlyArr.some(m=>m.ym===targetYm && (m.qty||0)>0);
  const effectiveYm = hasTarget ? targetYm
    : (monthlyArr.length ? monthlyArr[monthlyArr.length-1].ym : targetYm);
  // อัพเดตตัวนำทางถ้าเดือนเปลี่ยน
  if(effectiveYm !== targetYm){
    const [ey,em] = effectiveYm.split('-').map(Number);
    _sd.cm = em-1; _sd.cy = ey+543;
  }
  _sdApi.loaded = true;
  _sdApi.valueMode = 'qty';
  _sdApi.monthly = monthlyArr;
  _sdApi.month = effectiveYm;
  _sdApi.histFallback = true;
  const cur = monthlyArr.find(m=>m.ym===effectiveYm)||{total:0,qty:0,invoices:0};
  _sdApi.total = cur.total; _sdApi.qty = cur.qty; _sdApi.invoices = cur.invoices; _sdApi.ar = 0;
  const prev = monthlyArr.find(m=>m.ym===_ymAdd(effectiveYm,-1));
  _sdApi.vs = prev?.total ? Math.round((_sdApi.total/prev.total-1)*100) : 0;
  const SKUS = typeof getSkusMerged==='function'?getSkusMerged():SKUS_MASTER;
  const monthRows = Object.entries(hist).map(([sku,h])=>({
    prod_code:sku, prod_name:SKUS.find(s=>s.code===sku)?.name||sku,
    prod_group:productGroupForSku(sku,'อื่นๆ'),
    qty:h.monthly?.[effectiveYm]||0, amount:h.monthly?.[effectiveYm]||0, ym:effectiveYm,
  })).filter(r=>r.qty>0);
  _sdApi.custs = []; _sdApi.prods = _sdBuildProds(monthRows); _sdApi.slms = []; _sdApi.slmList = [];
  _sdApi.error = null;
  // สลับไปแท็บสินค้าอัตโนมัติ (ข้อมูลลูกค้าไม่มีใน local)
  if(_sd.at !== 'prod') _sd.at = 'prod';
  _sdUpdateSlmDrop();
}

function _sdWeekFactor(){return _sd.pt==='week'?((SD_WM[_sd.cw-1]||1)/4):1;}
function _sdV(v){return Math.round((Number(v)||0)*_sdWeekFactor());}
function _sdPeriodLabel(){return _sd.pt==='year'?`year_${_sd.cy_y}`:_sd.pt==='week'?`week${_sd.cw}_${SD_MTH[_sd.cm]}_${_sd.cy}`:`${SD_MTH[_sd.cm]}_${_sd.cy}`;}

async function sdLoad(){
  const month=_sdApiMonth();
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=isSales()?(me?.slm_id||''):'';
  const badge=document.createElement('div');
  badge.id='sd-loading';badge.style.cssText='position:fixed;top:54px;right:16px;background:var(--N);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;z-index:200;opacity:.9';
  badge.textContent='⏳ โหลดข้อมูล...';document.body.appendChild(badge);
  try{
    const range=_sdMonthRange(24);
    await _loadSalesFromSupabase(range.start,range.end,month,slmId);
  }catch(e0){
    console.warn('Supabase sales_history detail unavailable, trying summary rows',e0.message);
    const range=_sdMonthRange(24);
    try{
      await _loadSalesSummaryFromSupabase(range.start,range.end,month);
    }catch(e1){
      console.warn('Supabase sales_history summary unavailable, trying local cache',e1.message);
      const cachedRows=window._salesRows2Y || DB.get('sales_rows_cache') || [];
      if(cachedRows.length){
        _applySalesRowsToSd(_salesRowsForMode(cachedRows,{includeConsi:false}),month,slmId);
        if(!_sdApi.custs?.length && _sd.at==='cust') _sd.at='prod';
        document.getElementById('sd-loading')?.remove();
        sdRender();return;
      }
      if(ALL_HIST && Object.keys(ALL_HIST).length>0){
        _loadSalesFromAllHist(month,slmId);
        document.getElementById('sd-loading')?.remove();
        sdRender();return;
      }
      _sdApi.loaded=false;
      _sdApi.error=e1.message || e0.message || 'Supabase sales_history unavailable';
      console.error('Sales data unavailable',e1);
    }
  }finally{
    document.getElementById('sd-loading')?.remove();
  }
  if(_sdApi.loaded && _sdApi.monthly?.length && _sd.pt!=='year'){
    const active=_sdUseLatestMonthIfEmpty(_sdApi.monthly);
    if(active!==_sdApi.month){sdLoad();return;}
  }
  if(_sd.showYoY && _sdApi.loaded && !_sdApi.yoy){
    _sdApi.yoyLoading=true;
    _sdLoadYoY().then(()=>{_sdApi.yoyLoading=false;sdRender();}).catch(e=>{console.warn('YoY:',e);_sdApi.yoyLoading=false;sdRender();});
  }
  sdRender();
}

function _sdBuildCusts(rows){
  const m={};
  for(const r of rows){
    const prof=getCustomerProfile({c:r.cust_code,n:r.cust_name,ty:r.cust_group||'ขายจริง',grp:r.cust_group||'อื่นๆ',slm:r.slm_id});
    const grp=prof.corp||r.cust_group||'อื่นๆ';
    const cat=prof.category||r.cust_group||'ขายจริง';
    if(!m[r.cust_code])m[r.cust_code]={n:prof.n||r.cust_name,c:r.cust_code,ty:cat,category:cat,corp:grp,grp,slm:r.slm_id,_tot:0,_qty:0,g:{}};
    const c=m[r.cust_code];c._tot+=r.amount;c._qty+=r.qty;
    const pg=productGroupForSku(r.prod_code,r.prod_group);
    if(!c.g[pg])c.g[pg]={n:pg||'อื่นๆ',_tot:0,it:{}};
    const g=c.g[pg];g._tot+=r.amount;
    if(!g.it[r.prod_code])g.it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0};
    g.it[r.prod_code]._tot+=r.amount;
  }
  return Object.values(m).map(c=>({...c,g:Object.values(c.g).map(g=>({...g,it:Object.values(g.it).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdBuildProds(rows){
  const m={};
  for(const r of rows){
    const prof=getCustomerProfile({c:r.cust_code,n:r.cust_name,ty:r.cust_group||'ขายจริง',grp:r.cust_group||'อื่นๆ',slm:r.slm_id});
    const gk=productGroupForSku(r.prod_code,r.prod_group);
    if(!m[gk])m[gk]={n:gk,_tot:0,it:{}};
    m[gk]._tot+=r.amount;
    if(!m[gk].it[r.prod_code])m[gk].it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0,custs:{}};
    const it=m[gk].it[r.prod_code];it._tot+=r.amount;
    const ty=prof.corp||r.cust_group||'อื่นๆ';
    if(!it.custs[ty])it.custs[ty]={n:ty,_tot:0,cs:{}};
    it.custs[ty]._tot+=r.amount;
    if(!it.custs[ty].cs[r.cust_code])it.custs[ty].cs[r.cust_code]={n:r.cust_name,c:r.cust_code,_tot:0};
    it.custs[ty].cs[r.cust_code]._tot+=r.amount;
  }
  return Object.values(m).map(g=>({...g,it:Object.values(g.it).map(i=>({...i,custs:Object.values(i.custs).map(t=>({...t,cs:Object.values(t.cs).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}

function _sdYoYMaps(){

function _dateToYm(d){return d?d.substring(0,7):'';}
function _dateToDisplayTh(d){
  if(!d||d.length<10) return d||'';
  const[y,m,dd]=d.split('-');
  return`${dd}/${m}/${parseInt(y)+543}`;
}
function sdSetDateRange(){
  const f=document.getElementById('sd-date-from');const t=document.getElementById('sd-date-to');
  if(f&&f.value)_sd.dateFrom=f.value;if(t&&t.value)_sd.dateTo=t.value;

function sdApplyCustomRange(){
  sdSetDateRange();

  if(_sd.dateFrom>_sd.dateTo){alert('วันที่เริ่มต้นต้องไม่เกินวันที่สิ้นสุด');return;}
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;sdLoadCustom();
}
function sdSetDatePreset(p){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today=fmt(now);
  let from,to=today;
  if(p==='month'){from=`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;}
  else if(p==='3m'){from=fmt(new Date(now.getFullYear(),now.getMonth()-2,1));}
  else if(p==='6m'){from=fmt(new Date(now.getFullYear(),now.getMonth()-5,1));}
  else if(p==='ytd'){from=`${now.getFullYear()}-01-01`;}
  else if(p==='lastyear'){from=`${now.getFullYear()-1}-01-01`;to=`${now.getFullYear()-1}-12-31`;}
  else return;
  _sd.dateFrom=from;_sd.dateTo=to;
  const f=document.getElementById('sd-date-from');const t=document.getElementById('sd-date-to');
  if(f)f.value=from;if(t)t.value=to;
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;
  sdLoadCustom();
}
async function sdLoadCustom(){
  const startYm=_dateToYm(_sd.dateFrom);const endYm=_dateToYm(_sd.dateTo);
  if(!startYm||!endYm){sdRender();return;}
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=isSales()?(me?.slm_id||''):'';
  const badge=document.createElement('div');
  badge.id='sd-loading';badge.style.cssText='position:fixed;top:54px;right:16px;background:var(--N);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;z-index:200;opacity:.9';
  badge.textContent='⏳ โหลดข้อมูล...';document.body.appendChild(badge);
  const el=document.getElementById('sd-ta');
  if(el) el.innerHTML=`<div class="al ali" style="margin:12px">⏳ กำลังโหลดข้อมูล ${_dateToDisplayTh(_sd.dateFrom)} – ${_dateToDisplayTh(_sd.dateTo)}…</div>`;
  try{
    const rows=await _sbSalesRows(startYm,endYm,slmId,{includeConsi:false,fastProducts:true});
    const monthly=_sdKpiFromRows(rows);
    _sdApi.valueMode='amount';_sdApi.loaded=true;_sdApi.histFallback=false;
    _sdApi.monthly=monthly;
    _sdApi.total=rows.reduce((a,r)=>a+(Number(r.amount)||0),0);
    _sdApi.qty=rows.reduce((a,r)=>a+(Number(r.qty)||0),0);
    _sdApi.invoices=rows.length;_sdApi.ar=0;_sdApi.vs=0;
    _sdApi.slmList=[...new Map(rows.map(r=>[r.slm_id,r.slm_name||r.slm_id]).filter(([c])=>c)).entries()].map(([code,name])=>({code,name}));
    _sdApi.custs=_sdBuildCusts(rows);_sdApi.prods=_sdBuildProds(rows);
    _sdApi.slms=_sdBuildSlms(rows,_sdApi.slmList);_sdApi.error=null;
    _sdUpdateSlmDrop();
    if(_sd.showYoY){
      _sdApi.yoyLoading=true;
      _sdLoadYoY().then(()=>{_sdApi.yoyLoading=false;sdRender();}).catch(e=>{console.warn('YoY:',e);_sdApi.yoyLoading=false;sdRender();});
    }
  }catch(e){_sdApi.loaded=false;_sdApi.error=e.message||'ไม่สามารถโหลดข้อมูลได้';console.error('Custom range load:',e);}
  finally{document.getElementById('sd-loading')?.remove();}
  sdRender();
}

function _custsByItemGrouped(itCode,T,wi){
  const byGrp={};
  salesCustomers().forEach(c=>{
    c.g.forEach(g=>{
      const it=g.it.find(i=>i.c===itCode);
      if(it){
        const v=Math.round(T*(c.w[wi]||c.w[0])*(g.w[wi]||g.w[0])*(it.w[wi]||it.w[0]));
        const grp=c.corp||'อื่นๆ';

}

    const _vc=(cur,prev)=>_sd.showYoY?(_sdApi.yoyLoading?'<span style="color:var(--TX3);font-size:11px">⏳</span>':_yoyPct(cur,prev||0)):'—';

    let sorted=[...custs];if(_sd.sort.col==='val') sorted.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));

function sdSetPT(t){
  _sd.pt=t;
  ['m','w','y','c'].forEach(x=>{const b=document.getElementById('sd-pt-'+x);if(b){b.style.background='';b.style.color='';b.style.borderColor='';b.style.fontWeight='';}});
  const idMap={month:'m',week:'w',year:'y',custom:'c'};
  const active=document.getElementById('sd-pt-'+(idMap[t]||'m'));
  if(active){active.style.background='var(--N)';active.style.color='#fff';active.style.borderColor='var(--N)';active.style.fontWeight='600';}
  if(t==='week') _sd.cw=1;
  const ng=document.getElementById('sd-nav-group');if(ng)ng.style.display=(t==='custom'?'none':'flex');
  const cr=document.getElementById('sd-custom-range');if(cr)cr.style.display=(t==='custom'?'block':'none');
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;
  if(t==='year') sdLoadYear();
  else if(t==='custom'){if(_sd.dateFrom&&_sd.dateTo) sdLoadCustom(); else sdRender();}
  else sdLoad();
}
function sdNav(d){
  if(_sd.pt==='year'){
    _sd.cy_y+=d;
  } else if(_sd.pt==='month'){
    _sd.cm+=d;
    if(_sd.cm<0){_sd.cm=11;_sd.cy--;}
    else if(_sd.cm>11){_sd.cm=0;_sd.cy++;}
  } else {
    _sd.cw+=d;
    if(_sd.cw<1){_sd.cm--;if(_sd.cm<0){_sd.cm=11;_sd.cy--;}_sd.cw=4;}
    else if(_sd.cw>4){_sd.cm++;if(_sd.cm>11){_sd.cm=0;_sd.cy++;}_sd.cw=1;}
  }
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;
  if(_sd.pt==='year') sdLoadYear(); else sdLoad();
}
function sdGoNow(){
  const now=new Date();
  _sd.cm=now.getMonth();_sd.cy=now.getFullYear()+543;_sd.cy_y=now.getFullYear()+543;_sd.cw=1;
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;
  if(_sd.pt==='year') sdLoadYear(); else sdLoad();
}

function sdExport(){
  const d=_sdD(),T=d.t,wi=_sdWI();
  const period=_sd.pt==='custom'?`${_sd.dateFrom}_${_sd.dateTo}`:(_sd.pt==='week'?'สัปดาห์'+_sd.cw+'_':'')+(_sd.pt==='year'?'ปี'+_sd.cy_y:SD_MTH[_sd.cm]+'_'+_sd.cy);
  let cols,rows=[],sheet;
  if(_sd.at==='cust'){
    if(_sdApi.loaded){
      cols=['ลูกค้า','รหัส','กลุ่มลูกค้า','Category','ยอดขาย/จำนวน','สัดส่วน%'];
      const T2=_sdApi.total||1;
      (_sdApi.custs||[]).forEach(c=>{
        rows.push([c.n,c.c,c.corp||c.grp||'อื่นๆ',c.category||c.ty,_sdV(c._tot),Math.round((c._tot||0)/T2*100)]);
        (c.g||[]).forEach(g=>{rows.push(['  '+g.n,'','','',_sdV(g._tot),Math.round((g._tot||0)/(c._tot||1)*100)]);(g.it||[]).forEach(it=>rows.push(['    '+it.c+' — '+it.n,'','','',_sdV(it._tot),Math.round((it._tot||0)/(g._tot||1)*100)]));});
      });
      return toXLSX([['รายลูกค้า', cols, rows]], `Sales_${period}_รายลูกค้า.xlsx`);
    }
    const isAll=isManager()&&_sd.mgrView;
    const q=(_sd.q||'').toLowerCase();
    const allCusts=salesCustomers();
    const me=(DB.get('users')||[]).find(x=>x.uid===UID);
    const slmId=isSales()?(me?.slm_id||''):'';
    const base=isAll?allCusts:allCusts.filter(c=>c.slm===slmId);
    const filtered=q?base.filter(c=>c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)):base;
    const custRows=filtered.map(c=>({...c,_cv:Math.round(T*(c.w[wi]||c.w[0]))}));
    if(_sd.sort.col==='val') custRows.sort((a,b)=>_sd.sort.dir*(b._cv-a._cv));
    cols=['ลูกค้า','รหัส','Corporate group','Category','ยอดขาย','สัดส่วน%'];
    custRows.forEach(c=>{
      rows.push([c.n,c.c,c.corp||'อื่นๆ',c.category||c.ty,c._cv,Math.round(c._cv/T*100)]);
      c.g.forEach(g=>{
        const gv=Math.round(c._cv*(g.w[wi]||g.w[0]));
        rows.push(['  '+g.n,'','','',gv,Math.round(gv/T*100)]);
        g.it.forEach(it=>{const iv=Math.round(gv*(it.w[wi]||it.w[0]));rows.push(['    '+it.c+' — '+it.n,'','','',iv,Math.round(iv/T*100)]);});
      });
    });
    sheet='รายลูกค้า';
  } else if(_sd.at==='prod'){
    const q=(_sd.q||'').toLowerCase();
    if(_sdApi.loaded){
      cols=['กลุ่มสินค้า / สินค้า','ยอดขาย/จำนวน','สัด่วน%','ลูกค้าที่ซื้อ'];
      const T2=_sdApi.total||1;
      let prods=[...(_sdApi.prods||[])];
      if(q) prods = prods.filter(p=>p.n.toLowerCase().includes(q)||p.it.some(i=>i.n.toLowerCase().includes(q)||i.c.toLowerCase().includes(q)));
      if(_sd.sort.col==='val') prods.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));
      else if(_sd.sort.col==='vs') prods.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
      prods.forEach(p=>{rows.push([p.n,_sdV(p._tot),Math.round((p._tot||0)/T2*100),'']);(p.it||[]).forEach(it=>rows.push(['  '+it.c+' — '+it.n,_sdV(it._tot),Math.round((it._tot||0)/(p._tot||1)*100),(it.custs||[]).flatMap(t=>(t.cs||[]).map(c=>c.n)).join(', ')]));});
      return toXLSX([['รายสินค้า', cols, rows]], `Sales_${period}_รายสินค้า.xlsx`);
    }
    const base=q?SD_PRODS.filter(p=>p.n.toLowerCase().includes(q)||p.it.some(i=>i.n.toLowerCase().includes(q))):SD_PRODS;
    const prods=base.map(p=>({...p,_pv:Math.round(T*p.w)}));
    if(_sd.sort.col==='val') prods.sort((a,b)=>_sd.sort.dir*(b._pv-a._pv));
    else if(_sd.sort.col==='vs') prods.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    const custByItem={};
    salesCustomers().forEach(c=>c.g.forEach(g=>g.it.forEach(it=>{if(!custByItem[it.c])custByItem[it.c]=[];if(!custByItem[it.c].includes(c.n))custByItem[it.c].push(c.n);})));
    cols=['กลุ่มสินค้า / สินค้า','ยอดขาย','สัดส่วน%','vs เดือนก่อน%','ลูกค้าที่ซื้อ'];
    prods.forEach(p=>{
      rows.push([p.n,p._pv,Math.round(p._pv/T*100),p.vs,'']);
      p.it.forEach(it=>{const iv=Math.round(p._pv*it.w);rows.push(['  '+it.n,iv,Math.round(iv/T*100),it.vs,(custByItem[it.c]||[]).join(', ')]);});
    });
    sheet='รายสินค้า';
  } else {
    const q=(_sd.q||'').toLowerCase();
    const sf=_sd.slmF||'';
    if(_sdApi.loaded){
      cols=['เซลส์','รหัส','ยอดขาย/จำนวน','ลูกค้า'];
      let slms=[...(_sdApi.slms||[])];
      if(q) slms = slms.filter(s=>s.name.toLowerCase().includes(q)||s.code.toLowerCase().includes(q));
      if(sf) slms = slms.filter(s=>s.code===sf);
      if(_sd.sort.col==='val') slms.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));
      else if(_sd.sort.col==='vs') slms.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
      slms.forEach(s=>rows.push([s.name,s.code,_sdV(s._tot),(s.custs||[]).length]));
      return toXLSX([['รายเซลส์', cols, rows]], `Sales_${period}_รายเซลส์.xlsx`);
    }
    const filtered=SD_SALES.filter(s=>(!q||(s.n.toLowerCase().includes(q)||s.c.toLowerCase().includes(q)))&&(!sf||s.c===sf));
    const sales=filtered.map(s=>({...s,_sv:Math.round(T*s.w)}));
    if(_sd.sort.col==='val') sales.sort((a,b)=>_sd.sort.dir*(b._sv-a._sv));
    else if(_sd.sort.col==='vs') sales.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    cols=['เซลส์','รหัส','ยอดขาย','เป้า','% บรรลุ','vs เดือนก่อน%'];
    const tgtMul=_sd.pt==='week'?4:1;
    sales.forEach(s=>{const tgt=Math.round(s.tgt/tgtMul);rows.push([s.n,s.c,s._sv,tgt,Math.round(s._sv/tgt*100),s.vs]);});
    sheet='รายเซลส์';
  }
  toXLSX([[sheet, cols, rows]], `Sales_${period}_${sheet}.xlsx`);
}

let _consiRows=[], _consiCustF='', _consiProdF='', _consiBranchF='', _consiStartF='', _consiEndF='', _consiLoaded=false, _consiErr='', _consiOp={};
function consiTogOp(k){_consiOp[k]=!_consiOp[k];consiRender();}
async function pgConsignment(){
  document.getElementById('tb-r').innerHTML=`<button class="btn btn-sm btn-g" onclick="expConsi()">⬇ Export Excel</button><button class="btn btn-sm" onclick="pgConsignment()" style="margin-left:6px">🔄 โหลดใหม่</button>`;
  document.getElementById('ct').innerHTML='<div class="al ali">กำลังโหลดข้อมูลฝากขาย CONSI...</div>';
  _consiRows=[];_consiLoaded=false;_consiCustF='';_consiProdF='';_consiBranchF='';_consiErr='';
  const range=_twoYearWindow();
  if(!_consiStartF) _consiStartF=range.start;
  if(!_consiEndF) _consiEndF=range.end;
  try{
    // โหลดเฉพาะ CONSI rows โดยใช้ summaryOnly:false แต่ filter slm_id ที่มี prefix CONSI
    const allRows=await _sbConsiRows(range.start,range.end);
    _consiRows=allRows;
    _consiLoaded=true;
  }catch(e){
    console.warn('CONSI load failed:',e);
    _consiRows=[];_consiLoaded=false;
    _consiErr=e.message||String(e);
  }
  consiRender();
}
async function _sbConsiRows(startYm,endYm){
  try{
    const rows=await _sbSalesRows(startYm,endYm,'',{
      includeConsi:true,
      fastProducts:true,
      includeAllRows:false,
      excludeAllRows:true
    });
    if(rows.length) return rows;
  }catch(e){
    console.warn('CONSI shared sales loader failed; trying direct fallback', e.message || e);
  }
  const PAGE=1000;
  async function _pg(table,select,filter){
    let data=[],from=0;
    while(true){
      let q=getSupabaseClient().from(table).select(select).gte('ym',startYm).lte('ym',endYm);
      if(filter) q=filter(q);
      q=q.order('ym').range(from,from+PAGE-1);
      const {data:d,error}=await q;
      if(error) throw error;
      data=data.concat(d||[]);
      if(!d||d.length<PAGE) break;
      from+=PAGE;
    }
    return data;
  }
  let allData=[];
  // 1. sales_history with CONSI: prefix
  try{allData=await _pg('sales_history','slm_id,sku,ym,qty,amount',q=>q.ilike('slm_id','CONSI:%'));}catch(_){}
  // 2. v_sales_history_company with company=CONSI
  if(!allData.length){
    try{allData=await _pg('v_sales_history_company','slm_id,sku,ym,qty,amount,company',q=>q.eq('company','CONSI'));}catch(_){}
  }
  // 3. broader CONSI pattern
  if(!allData.length){
    try{allData=await _pg('sales_history','slm_id,sku,ym,qty,amount',q=>q.ilike('slm_id','%CONSI%'));}catch(_){}
  }
  const products=await CACHE.get('products_consi',()=>SB.getProducts({includeConsi:true}));
  const prodMap=Object.fromEntries((products||[]).map(p=>[String(p.code||p.sku||''),p]));
  const names=_salesNameMap();
  const mapped=allData.filter(r=>r.slm_id).flatMap(r=>{
    const sp=_splitBranchSlm(r.slm_id);
    const name=names[sp.slm]||names[sp.raw]||sp.slm;
    const qty=Number(r.qty||0)||0;
    const amount=Number(r.amount||r.value||0)||0;
    const prod=prodMap[r.sku]||{};
    const rowCo=String(r.company||'').trim().toUpperCase();
    // detect CONSI from branch, company field, or raw slm_id pattern
    const isConsi=_isConsiBranch(sp.branch)||rowCo==='CONSI'||String(sp.raw||'').toUpperCase().includes('CONSI');
    return [{
      branch:sp.branch==='LEGACY'&&isConsi?'CONSI':sp.branch,
      prefixed:sp.prefixed,is_all:String(sp.slm).toUpperCase().startsWith('ALL'),
      slm_id:sp.slm,slm_key:sp.raw,slm_name:name,
      cust_code:`SLM-${sp.raw}`,cust_name:name,
      cust_group:isConsi?'ฝากขาย':'ขายจริง',
      prod_group:productGroupForSku(r.sku,prod.group_name||'อื่นๆ'),
      prod_code:r.sku,prod_name:prod.name||r.sku,
      qty,amount:amount||qty,ym:r.ym
    }];
  });
  return mapped.filter(r=>_isConsignmentRow(r));
}
function consiRender(){
  const rangeRows=_consiRows.filter(r=>(!_consiStartF||r.ym>=_consiStartF)&&(!_consiEndF||r.ym<=_consiEndF));
  const allBranches=[...new Set(_consiRows.map(r=>r.branch||'').filter(Boolean))].sort();
  let rows=[...rangeRows];
  if(_consiCustF) rows=rows.filter(r=>r.cust_code===_consiCustF);
  if(_consiProdF) rows=rows.filter(r=>r.prod_code===_consiProdF);
  if(_consiBranchF) rows=rows.filter(r=>(r.branch||'')===_consiBranchF);
  const totalQty=rows.reduce((a,r)=>a+(r.qty||0),0);
  const totalAmt=rows.reduce((a,r)=>a+(r.amount||0),0);
  // filter options from range rows (before cust/prod/branch filter)
  const custF2={};rangeRows.forEach(r=>{if(!custF2[r.cust_code])custF2[r.cust_code]=r.cust_name||r.cust_code;});
  const custs=Object.entries(custF2).sort((a,b)=>a[1].localeCompare(b[1],'th'));
  const prodF2={};rangeRows.forEach(r=>{if(!prodF2[r.prod_code])prodF2[r.prod_code]=r.prod_name||r.prod_code;});
  const prods=Object.entries(prodF2).sort((a,b)=>a[0].localeCompare(b[0]));
  // build grouped: cust → prod_group → prod
  const grouped={};
  rows.forEach(r=>{
    const cc=r.cust_code||'—';
    if(!grouped[cc])grouped[cc]={name:r.cust_name||cc,branch:r.branch||'',qty:0,amount:0,groups:{}};
    grouped[cc].qty+=(r.qty||0);grouped[cc].amount+=(r.amount||0);
    const gn=r.prod_group||'อื่นๆ';
    if(!grouped[cc].groups[gn])grouped[cc].groups[gn]={qty:0,amount:0,prods:{}};
    grouped[cc].groups[gn].qty+=(r.qty||0);grouped[cc].groups[gn].amount+=(r.amount||0);
    const pc=r.prod_code||'?';
    if(!grouped[cc].groups[gn].prods[pc])grouped[cc].groups[gn].prods[pc]={name:r.prod_name||pc,qty:0,amount:0};
    grouped[cc].groups[gn].prods[pc].qty+=(r.qty||0);grouped[cc].groups[gn].prods[pc].amount+=(r.amount||0);
  });
  const custEntries=Object.entries(grouped).sort((a,b)=>b[1].qty-a[1].qty);
  let tbl='';
  if(custEntries.length){
    tbl='<div class="card" style="margin-bottom:0"><div class="ch"><div class="ct2">รายฝากขาย CONSI ('+rows.length+' รายการ)</div><button class="btn btn-sm btn-g" onclick="expConsi()">⬇ Export Excel</button></div><div class="tw"><table><thead><tr><th>กลุ่มลูกค้า / กลุ่มสินค้า / สินค้า</th><th class="r">จำนวน (กก.)</th><th class="r">มูลค่า (฿)</th></tr></thead><tbody>';
    custEntries.forEach(([cc,cust],ci)=>{
      const oc=_consiOp['c'+ci];
      tbl+=`<tr onclick="consiTogOp('c${ci}')" style="cursor:pointer;background:var(--LN)"><td>${_xa(oc)}<strong>${esc(cust.name)}</strong>${cust.branch&&cust.branch!=='CONSI'?` <span class="badge bbp" style="font-size:10px">${esc(cust.branch)}</span>`:''}</td><td class="r"><strong>${fmt(cust.qty)}</strong></td><td class="r"><strong>${cust.amount?fmt(cust.amount):'—'}</strong></td></tr>`;
      if(oc) Object.entries(cust.groups).sort((a,b)=>b[1].qty-a[1].qty).forEach(([gn,grp],gi)=>{
        const gk='g'+ci+'_'+gi;const og=_consiOp[gk];
        tbl+=`<tr onclick="consiTogOp('${gk}')" style="cursor:pointer;background:var(--bg2)"><td style="padding-left:20px">${_xa(og)}<span style="font-size:12px">${esc(gn)}</span></td><td class="r" style="font-size:12px">${fmt(grp.qty)}</td><td class="r" style="font-size:12px">${grp.amount?fmt(grp.amount):'—'}</td></tr>`;
        if(og) Object.entries(grp.prods).sort((a,b)=>b[1].qty-a[1].qty).forEach(([pc,p])=>{
          tbl+=`<tr style="background:var(--bg);font-size:12px"><td style="padding-left:40px"><span class="mono">${esc(pc)}</span> — ${esc(p.name)}</td><td class="r">${fmt(p.qty)}</td><td class="r">${p.amount?fmt(p.amount):'—'}</td></tr>`;
        });
      });
    });
    tbl+='</tbody></table></div></div>';
  }
  document.getElementById('ct').innerHTML=`
  <div class="card" style="padding:12px 16px;margin-bottom:12px">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="margin:0;min-width:150px"><label style="font-size:11px;color:var(--TX2)">จากเดือน</label>
        <input type="month" class="inp" value="${esc(_consiStartF)}" onchange="_consiStartF=this.value;consiRender()" style="height:34px;padding:4px 8px"></div>
      <div class="field" style="margin:0;min-width:150px"><label style="font-size:11px;color:var(--TX2)">ถึงเดือน</label>
        <input type="month" class="inp" value="${esc(_consiEndF)}" onchange="_consiEndF=this.value;consiRender()" style="height:34px;padding:4px 8px"></div>
      <div class="field" style="margin:0;min-width:200px"><label style="font-size:11px;color:var(--TX2)">ลูกค้า</label>
        <select class="inp" onchange="_consiCustF=this.value;_consiOp={};consiRender()" style="height:34px;padding:4px 8px">
          <option value="">ทุกลูกค้า</option>
          ${custs.map(([code,name])=>`<option value="${esc(code)}" ${_consiCustF===code?'selected':''}>${esc(name)}</option>`).join('')}</select></div>
      <div class="field" style="margin:0;min-width:220px"><label style="font-size:11px;color:var(--TX2)">สินค้า</label>
        <select class="inp" onchange="_consiProdF=this.value;_consiOp={};consiRender()" style="height:34px;padding:4px 8px">
          <option value="">ทุกสินค้า</option>
          ${prods.map(([code,name])=>`<option value="${esc(code)}" ${_consiProdF===code?'selected':''}>${esc(code)} — ${esc(name)}</option>`).join('')}</select></div>
      ${allBranches.length>1?`<div class="field" style="margin:0;min-width:160px"><label style="font-size:11px;color:var(--TX2)">สาขา</label>
        <select class="inp" onchange="_consiBranchF=this.value;_consiOp={};consiRender()" style="height:34px;padding:4px 8px">
          <option value="">ทุกสาขา</option>
          ${allBranches.map(b=>`<option value="${esc(b)}" ${_consiBranchF===b?'selected':''}>${esc(b)}</option>`).join('')}</select></div>`:''}
      ${!_consiLoaded?`<span style="color:var(--R);font-size:12px">⚠ โหลดไม่สำเร็จ${_consiErr?' — '+_consiErr:''} <button class="btn btn-xs" onclick="pgConsignment()">ลองอีกครั้ง</button></span>`:''}
    </div>
  </div>
  <div class="krow" style="margin-bottom:12px">
    <div class="kpi p"><div class="kl">ยอดฝากขาย CONSI</div><div class="kv">${fmt(totalQty)}</div><div class="kh">กก.</div></div>
    <div class="kpi b"><div class="kl">มูลค่ารวม</div><div class="kv">${totalAmt?'฿'+fmt(totalAmt):'—'}</div><div class="kh">บาท</div></div>
    <div class="kpi g"><div class="kl">จำนวนสินค้า</div><div class="kv">${prods.length}</div><div class="kh">รายการ</div></div>
    <div class="kpi o"><div class="kl">จำนวนลูกค้า</div><div class="kv">${custs.length}</div><div class="kh">บัญชี</div></div>
  </div>
  ${!rows.length?`<div class="al alw">ไม่มีข้อมูล CONSI ในช่วงนี้${_consiLoaded?' — ตรวจสอบ filter ด้านบน':''}</div>`:tbl}`;
}
function expConsi(){
  if(!_consiRows.length){toast('ไม่มีข้อมูล CONSI');return;}
  let rows=_consiRows.filter(r=>(!_consiStartF||r.ym>=_consiStartF)&&(!_consiEndF||r.ym<=_consiEndF));
  if(_consiCustF) rows=rows.filter(r=>r.cust_code===_consiCustF);
  if(_consiProdF) rows=rows.filter(r=>r.prod_code===_consiProdF);
  if(_consiBranchF) rows=rows.filter(r=>(r.branch||'')===_consiBranchF);
  const cols=['เดือน','รหัสลูกค้า','ชื่อลูกค้า','สาขา/กลุ่ม','รหัสสินค้า','ชื่อสินค้า','จำนวน (กก.)'];
  const data=rows.map(r=>[r.ym,r.cust_code||'',r.cust_name||'',r.branch||r.cust_group||'',r.prod_code||'',r.prod_name||'',r.qty||0]);
  toXLSX([['CONSI',cols,data]],'CONSI_Export.xlsx');
}

async function saveFc(){
  const sku = document.getElementById('f-sku').value;
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;
  const delivDate = document.getElementById('f-date').value;
  const rawCust = (document.getElementById('f-cust').value || '').trim();
  if(!sku || !qty || !delivDate){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  const rawCustCode = rawCust.includes('—') ? rawCust.split('—')[0].trim() : rawCust;
  const custCode = rawCustCode && CUST_NAMES[rawCustCode] ? rawCustCode : null;
  const fcType = document.getElementById('f-type')?.value || 'PO';
  const fc = {id: genId('FC'), by: UID, custCode, sku, qty, delivDate, fcType, note: document.getElementById('f-note').value.trim(), approved: false, ts: Date.now(), edited_by: UID, edited_at: new Date().toISOString()};
  let ok = false;
  if (SB?.addForecast) {
    try {
      await SB.addForecast(fc);
      ok = true;
    } catch (e) {
      console.warn('saveFc Supabase:', e);
      ok = false;
    }
  }
  if (!ok) {
    const arr = DB.get('forecasts')||[];
    arr.push(fc);
    DB.set('forecasts',arr);
    ok = true;
  }
  if (ok) {
    await SB?.audit?.('ADD_FC', 'forecast', {sku,qty});
    closeM();
    toast('เพิ่ม Forecast แล้ว');
    pgForecast();
  } else {
    alert('เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่');
  }
}

async function updatePO(id){
  const newD=document.getElementById('ep-d').value,newS=document.getElementById('ep-s').value,reason=document.getElementById('ep-r').value;
  const po=DB.get('po_log')||[];const orig=po.find(p=>p.id===id);if(!orig)return;
  const updated={...orig,id:id+'-v'+(orig.ver+1),delivDate:newD,status:newS,note:reason,ver:orig.ver+1,ts:Date.now(),edited_by:UID,edited_at:new Date().toISOString()};
  po.unshift(updated);
  orig.status='replaced';
  DB.set('po_log',po);
  closeM();
  try { await SB.upsertPO(updated); } catch(e){ console.warn('updatePO Supabase:', e); }
  audit('EDIT_PO',id,{newD,reason});
  poT();
}
async function matchPO(id){
  const so=(prompt('ระบุเลข SO ที่ match กับ '+id)||'').trim();
  if(!so){toast('ยกเลิก Match PO','warn');return;}
  const po=DB.get('po_log')||[];const p=po.find(x=>x.id===id);
  if(p){p.status='matched';p.so=so;p.edited_by=UID;p.edited_at=new Date().toISOString();}
  DB.set('po_log',po);
  try { if(p) await SB.upsertPO(p); } catch(e){ console.warn('matchPO Supabase:', e); }
  audit('MATCH_PO',id,{so});
  poT();
  toast('Match สำเร็จ: '+id+' → '+so);
}
async function syncSO(){
  try{
    const remote=await SB.getPOPlans();
    const po=DB.get('po_log')||[];
    const byId=Object.fromEntries(po.map(p=>[p.id,p]));
    let cnt=0;
    (remote||[]).forEach(r=>{
      if(byId[r.id] && r.so && byId[r.id].so!==r.so){
        byId[r.id].so=r.so;
        byId[r.id].status=r.status||'matched';
        byId[r.id].edited_by=r.edited_by||'SERVER';
        byId[r.id].edited_at=new Date().toISOString();
        cnt++;
      }
    });
    DB.set('po_log',po);audit('SYNC_SO','po_log',{matched:cnt});poT();toast('Sync SO จาก server '+cnt+' รายการ');
  }catch(e){
    toast('Sync SO ไม่สำเร็จ: '+(e.message||e),'warn');
  }
}

}

async function saveSKUSetting(code,field,val,el){
  const ss=DB.get('sku_settings')||{};

  ss[code][field]=isNaN(parseFloat(val))?val:parseFloat(val);
  ss[code].edited_by=UID;ss[code].edited_at=new Date().toISOString();
  DB.set('sku_settings',ss);
  let synced=true;
  try{
    const res=await SB.updateSkuSetting(code,ss[code]);

  }catch(e){
    synced=false;
    console.warn('saveSKUSetting Supabase:',e);

  audit('EDIT_SKU_SETTING',code,{field,val,synced});

function _h(row,aliases){
  for(const a of aliases){if(row[a]!=null&&row[a]!=='')return row[a];}
  return '';
}
function _num(v){const n=parseFloat(v);return Number.isFinite(n)?n:null;}
function importSKUSettings(e){
  const file=e.target.files[0];if(!file)return;
  const mode=document.getElementById('sku-imp-mode')?.value||'skip';
  const reader=new FileReader();
  reader.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    const custom=DB.get('custom_skus')||[];
    const ss=DB.get('sku_settings')||{};
    const groups=DB.get('product_groups')||{};
    let added=0,updated=0,skipped=0,settingOnly=0;
    rows.forEach(r=>{
      const code=String(_h(r,['รหัสสินค้า','SKU','sku','code','Code','รหัส','Item Code'])).trim();
      if(!code)return;
      const name=String(_h(r,['ชื่อสินค้า','Name','name','สินค้า','Product Name'])).trim();
      const plant=String(_h(r,['โรง','Plant','plant'])).trim();
      const grp=String(_h(r,['กลุ่มสินค้า','Group','group','Product Group'])).trim();
      const exists=getSkusMerged().find(s=>s.code===code);
      if(mode==='skip'&&exists){skipped++;return;}
      if(!exists&&name){
        custom.push({code,name,plant,lt:_num(_h(r,['Lead Time','lead_time','LT','lt']))||7,moq:_num(_h(r,['MOQ','moq']))||0,custom:true});
        added++;
      } else if(exists) updated++;
      else settingOnly++;
      const cur=ss[code]||{min_stock:50,shelf_life:30,lt:7,moq:0,note:''};
      const min=_num(_h(r,['Stock ขั้นต่ำ','ขั้นต่ำ','min_stock','Min Stock']));
      const shelf=_num(_h(r,['Shelf Life (วัน)','Shelf Life','shelf_life']));
      const lt=_num(_h(r,['Lead Time','lead_time','LT','lt']));
      const moq=_num(_h(r,['MOQ','moq']));
      const note=String(_h(r,['หมายเหตุ','Note','note'])).trim();
      if(min!=null)cur.min_stock=min;
      if(shelf!=null)cur.shelf_life=shelf;
      if(lt!=null)cur.lt=lt;
      if(moq!=null)cur.moq=moq;
      if(note)cur.note=note;
      cur.edited_by=UID;cur.edited_at=new Date().toISOString();
      ss[code]=cur;
      if(grp){
        if(!groups[grp])groups[grp]=[];
        if(!groups[grp].includes(code))groups[grp].push(code);
      }
    });
    DB.set('custom_skus',custom);
    DB.set('sku_settings',ss);
    saveProductGroups(groups);
    audit('IMPORT_SKU_SETTINGS','sku_settings',{file:file.name,mode,added,updated,skipped,settingOnly});
    document.getElementById('sku-imp-res').innerHTML=`<div class="al als">Import สำเร็จ: เพิ่มใหม่ ${added}, update ${updated}, setting only ${settingOnly}, ข้ามซ้ำ ${skipped}</div>`;
    toast('Import SKU Settings สำเร็จ');
    skuAdmT();
  };
  reader.readAsBinaryString(file);
}

function pgExpiry(){
  const stk=_filterTgmStockMap(DB.get('stock')||{}),ss=DB.get('sku_settings')||{};
  const lots=[];

    });
  });
  lots.sort((a,b)=>(a.daysLeft??999)-(b.daysLeft??999));
  const urgent=lots.filter(l=>l.daysLeft!=null&&l.daysLeft<=7).length;
  const warn=lots.filter(l=>l.daysLeft!=null&&l.daysLeft>7&&l.daysLeft<=30).length;
  document.getElementById('ct').innerHTML=`

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const resultEl=document.getElementById('csv-res');
  resultEl.innerHTML='<div class="al ali">กำลังอ่านไฟล์...</div>';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
      if(!json||json.length<2){resultEl.innerHTML='<div class="al alw">ไฟล์ว่างเปล่า</div>';return;}
      const fmt=_detectCsvFormat(json,file.name);
      if(fmt==='express73') _renderExpress73Import(json,file.name,resultEl);
      else resultEl.innerHTML=`<div class="al als">อ่านไฟล์สำเร็จ — พบ ${json.length-1} แถว<br>Header: ${(json[0]||[]).slice(0,8).join(' | ')}</div><div class="al alw" style="margin-top:8px">ยังไม่รองรับรูปแบบนี้ (รองรับ: รายงาน 73, 04_Sales_Summary)</div>`;
    }catch(err){resultEl.innerHTML=`<div class="al alr">เกิดข้อผิดพลาด: ${esc(err.message)}</div>`;}
  };
  reader.readAsBinaryString(file);
}

function _detectCsvFormat(json,filename){
  const header=(json[0]||[]).map(v=>String(v||'').trim());
  const headerStr=header.join(' ').toLowerCase();
  // Detect Express report 73 (ยอดขายประจำงวด): has ขายสด/ขายเชื่อ/ยอดสุทธิ in header
  // OR: filename contains 73/04/sales_summary AND ≥7 columns with numeric data at cols 3-7
  const hasKeywords=headerStr.includes('ขายสด')||headerStr.includes('ขายเชื่อ')||headerStr.includes('ยอดสุทธิ')||headerStr.includes('เพิ่มหนี้');
  const hasCols=header.length>=7;
  const numericDataOk=(json.slice(1,6)).filter(r=>{
    const v3=parseFloat(String(r[3]||'').replace(/,/g,''));
    return !isNaN(v3)&&v3!==0;
  }).length>=1;
  const nameMatch=/(73|04|sales.?summary)/i.test(filename);
  if(hasCols&&(hasKeywords||(nameMatch&&numericDataOk))) return 'express73';
  return 'unknown';
}

function _renderExpress73Import(json,filename,resultEl){
  // Find header row
  let hdrIdx=0;
  for(let i=0;i<Math.min(5,json.length);i++){
    const str=(json[i]||[]).join(' ').toLowerCase();
    if(str.includes('ขายสด')||str.includes('ขายเชื่อ')||str.includes('ยอดสุทธิ')){hdrIdx=i;break;}
  }
  // Parse data rows: col0=name, col1=code, col2=blank, col3=cash, col4=credit, col5=debtInc, col6=returns, col7=net
  const pf=s=>parseFloat(String(s||'0').replace(/,/g,''))||0;
  let gCash=0,gCredit=0,gDebt=0,gRet=0,gNet=0,rowCount=0,totalRow=null;
  for(let i=hdrIdx+1;i<json.length;i++){
    const r=json[i];
    const name=String(r[0]||'').trim();
    const code=String(r[1]||'').trim();
    const cash=pf(r[3]),credit=pf(r[4]),debtInc=pf(r[5]),returns=pf(r[6]),net=pf(r[7]);
    if(!name&&!code&&!cash&&!credit&&!debtInc&&!returns&&!net) continue;
    // Detect total row (no code, name contains รวม/ทั้งสิ้น, or first cell blank with big numbers)
    const isTotal=!code&&(name.includes('รวม')||name.includes('ทั้งสิ้น')||name.includes('Grand')||(!name&&(cash>0||credit>0)));
    if(isTotal){totalRow={cash,credit,debtInc,returns,net};continue;}
    if(!name&&!code) continue;
    gCash+=cash;gCredit+=credit;gDebt+=debtInc;gRet+=returns;gNet+=(net||(cash+credit+debtInc-returns));rowCount++;
  }
  if(totalRow){gCash=totalRow.cash;gCredit=totalRow.credit;gDebt=totalRow.debtInc;gRet=totalRow.returns;gNet=totalRow.net||((totalRow.cash+totalRow.credit+totalRow.debtInc)-totalRow.returns);}
  const computed=(gCash+gCredit+gDebt)-gRet;
  const formulaOk=Math.abs(computed-gNet)<1;
  // Suggest ym from filename
  const ymMatch=filename.match(/(\d{4})[-_]?(\d{2})/);
  const suggestYm=ymMatch?`${ymMatch[1]}-${ymMatch[2]}`:((new Date()).toISOString().slice(0,7));
  window._express73Data={gCash,gCredit,gDebt,gRet,gNet,rowCount};
  resultEl.innerHTML=`
  <div class="al als" style="margin-top:8px"><strong>รายงาน 73 (ยอดขายประจำงวด)</strong> — พบ ${rowCount} ลูกค้า</div>
  <div class="tw" style="margin-top:10px"><table>
    <thead><tr><th>รายการ</th><th class="r">จำนวน (บาท)</th></tr></thead>
    <tbody>
      <tr><td>ขายสด + มัดจำ</td><td class="r">${_sdF(gCash)}</td></tr>
      <tr><td>ขายเชื่อ + มัดจำ</td><td class="r">${_sdF(gCredit)}</td></tr>
      <tr><td>เพิ่มหนี้</td><td class="r">${_sdF(gDebt)}</td></tr>
      <tr><td>ลดหนี้ / รับคืน</td><td class="r" style="color:var(--R)">(${_sdF(gRet)})</td></tr>
      <tr style="font-weight:700;border-top:2px solid var(--BD)"><td>ยอดสุทธิ (Express)</td><td class="r" style="color:var(--N)">${_sdF(gNet)}</td></tr>
      <tr style="font-size:12px;color:var(--TX3)"><td>ตรวจสอบสูตร (ขายสด+ขายเชื่อ+เพิ่มหนี้)−ลดหนี้</td><td class="r">${_sdF(computed)} ${formulaOk?'✓':'⚠ ไม่ตรง!'}</td></tr>
    </tbody>
  </table></div>
  <div style="display:flex;align-items:flex-end;gap:10px;margin-top:12px;flex-wrap:wrap">
    <div class="field" style="margin:0">
      <label style="font-size:12px;font-weight:600;color:var(--TX2)">เดือน (YYYY-MM)</label>
      <input type="month" id="imp-ym" value="${suggestYm}" style="padding:6px 10px;border:1px solid var(--BD);border-radius:6px;font-size:13px;font-family:var(--font)">
    </div>
    <div class="field" style="margin:0">
      <label style="font-size:12px;font-weight:600;color:var(--TX2)">บริษัท</label>
      <select id="imp-co" style="padding:6px 10px;border:1px solid var(--BD);border-radius:6px;font-size:13px;font-family:var(--font)">
        <option value="TSS">TSS</option><option value="TSSNV">TSSNV</option><option value="TGM">TGM</option>
      </select>
    </div>
    <button class="btn btn-p" onclick="_doImportExpress73()">📥 นำเข้า Supabase</button>
  </div>
  <div id="imp-status" style="margin-top:8px"></div>`;
}

async function _doImportExpress73(){
  const ym=(document.getElementById('imp-ym')||{}).value||'';
  const co=(document.getElementById('imp-co')||{}).value||'TSS';
  const statusEl=document.getElementById('imp-status');
  if(!ym){statusEl.innerHTML='<div class="al alw">กรุณาระบุเดือน (YYYY-MM)</div>';return;}
  const data=window._express73Data;
  if(!data){statusEl.innerHTML='<div class="al alw">ไม่มีข้อมูล กรุณาเลือกไฟล์ใหม่</div>';return;}
  statusEl.innerHTML='<div class="al ali">กำลังนำเข้า Supabase...</div>';
  try{
    const sb=getSupabaseClient();
    // Clear old __73_ rows for this month
    await sb.from('sales_history').delete().eq('ym',ym).eq('slm_id','ALL').like('sku','__73_%');
    // Insert 4 component rows so net = sum of amounts (returns stored as negative)
    // slm_id='ALL' → company defaults to co via SKU lookup or product prefix
    const rows=[
      {slm_id:'ALL',sku:`__73_CASH__`,ym,qty:0,amount:data.gCash},
      {slm_id:'ALL',sku:`__73_CREDIT__`,ym,qty:0,amount:data.gCredit},
      {slm_id:'ALL',sku:`__73_DEBTINC__`,ym,qty:0,amount:data.gDebt},
      {slm_id:'ALL',sku:`__73_RETURNS__`,ym,qty:0,amount:-data.gRet},
    ].filter(r=>r.amount!==0);
    const {error}=await sb.from('sales_history').insert(rows);
    if(error) throw error;
    const net=data.gCash+data.gCredit+data.gDebt-data.gRet;
    statusEl.innerHTML=`<div class="al als">✓ นำเข้าสำเร็จ — ยอดสุทธิ ${co} ${ym}: ${_sdF(net)}<br><small style="color:var(--TX3)">กด 🔄 ซิงค์ เพื่ออัปเดต Dashboard</small></div>`;
    CACHE.clearPrefix('dash_');CACHE.clearPrefix('sales_hist_');
    window._dashSalesRows=null;window._salesRows2Y=null;window._dashSalesHistCache=null;
  }catch(err){statusEl.innerHTML=`<div class="al alr">เกิดข้อผิดพลาด: ${esc(err.message)}</div>`;}
}

function saveUser(idx){
  const uid=document.getElementById('u-uid').value.trim();

  const department=document.getElementById('u-dept').value.trim();
  const position=document.getElementById('u-pos')?.value.trim()||'';
  const role=document.getElementById('u-role').value;
  const slm=document.getElementById('u-slm').value.trim();
  const pwd=document.getElementById('u-pwd').value;

  if(!uid||!name){alert('กรุณากรอก UID และ ชื่อ');return;}
  const users=DB.get('users')||[];
  if(idx===-1){
    if(users.find(u=>u.uid===uid)){alert('UID นี้มีอยู่แล้ว');return;}
    users.push({uid,name,department:department||undefined,position:position||undefined,role,slm_id:slm||undefined,pwd:pwd||'1234',email,active:true,created:today(),by:UID});
    audit('ADD_USER',uid,{role,department});

  }
  DB.set('users',users);closeM();pgUsers();toast('บันทึกผู้ใช้ '+uid+' สำเร็จ');
}
function toggleUser(i){

function crTab(v){_crSave();_cr.view=v;pgCustReg();}
function crGoStep(n){if(n>_cr.step)return;_crSave();_cr.step=n;crRender();}
function crNext(){_crSave();_cr.step++;crRender();}
function crBack(){_crSave();_cr.step--;crRender();}
function crToSummary(){_crSave();_cr.step=5;crRender();}

function crRender(){
  if(_cr.view==='approve'){crRenderApprove();return;}
  if(_cr.view==='settings'){pgCrWorkflowSettings();return;}
  if(_cr.view==='summary'){crRenderSummary();return;}
  const el=document.getElementById('cr-body');if(!el)return;
  const steps=[['📋','ทั่วไป'],['🏪','ร้านค้า'],['🚚','ส่งสินค้า'],['💳','การเงิน'],['📁','เอกสาร'],['✅','สรุป']];
  // อัปเดต sidebar steps
  const sb=document.getElementById('cr-sidebar');
  if(sb){
    const items=sb.querySelectorAll('.cr-step-item');
    items.forEach((el2,i)=>{el2.className='cr-step-item'+(i===_cr.step?' act':i<_cr.step?' done':'');});
  }
  // อัปเดต progress bar (รองรับทั้ง layout เดิม #cr-prog-fill และ fullpage .cr-fullpage-prog-fill)
  const pct=_cr.step>=5?100:Math.round((_cr.step/5)*100);
  document.querySelectorAll('#cr-prog-fill,.cr-fullpage-prog-fill').forEach(p=>p.style.width=pct+'%');
  if(_cr.step===6){el.innerHTML=crSec6();return;}
  const secs=[crSec0,crSec1,crSec2,crSec3,crSec4,crSec5];
  // ถ้าอยู่ใน fullpage mode ไม่แสดง pills ซ้ำ (มี sidebar แล้ว)
  const isFullpage=!!document.getElementById('cr-sidebar');
  el.innerHTML=isFullpage?(secs[_cr.step]||crSec0)():`<div class="cr-steps">${steps.map(([ico,lbl],i)=>`<div class="cr-pill${i===_cr.step?' act':i<_cr.step?' done':''}" onclick="crGoStep(${i})">${ico} ${lbl}</div>`).join('')}</div>${(secs[_cr.step]||crSec0)()}`;
  if(_cr.step===4)crRenderDocSlots();
}

function crReadFileDataUrl(f){return new Promise((ok,rej)=>{const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=rej;r.readAsDataURL(f);});}
async function crHandleFiles(e){
  const files=Array.from(e.target.files);
  const slot=CR_DOC_SLOTS.find(s=>s.id===_cr.currentSlot);if(!slot)return;
  const rem=slot.maxFiles-(_cr.slotFiles[_cr.currentSlot]||[]).length;
  for(const f of files.slice(0,rem)){
    let dataUrl='';
    try{dataUrl=await crReadFileDataUrl(f);}catch(err){console.warn('read file failed',err);}
    _cr.slotFiles[_cr.currentSlot].push({name:f.name,size:f.size,type:f.type,dataUrl});

}
