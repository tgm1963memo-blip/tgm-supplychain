<title>TGM Supply Chain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --N:#1E3A5F;--N2:#D4AF37;--T:#0D5068;--G:#0A5940;--O:#C44B0A;--R:#A32D2D;
  --A:#7A4500;--P:#412B8A;--GR:#3D4A5C;
  --bg:#F4F6F9;--bg2:#ECEEF2;--W:#fff;--BD:#CDD5E0;
  --BL:#1553A0;--LBL:#E7EFFC;--LG:#E5F3EE;--LR:#FBEBEB;
  --LY:#FDF2E2;--LP:#EDEAFB;--LN:#E7EDF7;
  --TX:#0D1117;--TX2:#4A5568;--TX3:#8896A5;
  --font:'Noto Sans Thai','IBM Plex Sans Thai',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--TX);font-size:13.5px;line-height:1.5}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:224px;background:var(--N);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-logo-sub{font-size:10.5px;opacity:.4;margin-top:1px;font-family:var(--mono)}
.sb-sec{padding:12px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.3}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;border-radius:7px;margin:1px 6px;font-size:13px;color:rgba(255,255,255,.6);transition:.12s}
.ni:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
.ni.act{background:rgba(212,175,55,.18);color:#D4AF37;font-weight:600;border-left:3px solid #D4AF37;padding-left:9px}
.ni-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-u{display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-un{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ur{font-size:11px;opacity:.42}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:50px;background:var(--N);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tb-t{font-size:15px;font-weight:700;flex:1;color:#fff}
th.r{text-align:right}
td.r{text-align:right;font-variant-numeric:tabular-nums}
#ct{flex:1;overflow-y:auto;padding:18px 22px}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--BD);background:var(--W);color:var(--TX);font-family:var(--font);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.12s;line-height:1}
.btn:hover{background:var(--bg2)} .btn:active{transform:scale(.98)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11.5px;border-radius:5px}
.btn-p{background:#D4AF37;color:#000;border-color:#D4AF37;font-weight:700}.btn-p:hover{opacity:.88}
.btn-g{background:var(--G);color:#fff;border-color:var(--G)}.btn-g:hover{opacity:.88}
.btn-r{background:var(--R);color:#fff;border-color:var(--R)}
.btn-o{background:var(--O);color:#fff;border-color:var(--O)}
.btn-t{background:var(--T);color:#fff;border-color:var(--T)}
.card{background:var(--W);border:1px solid var(--BD);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.ct2{font-size:14px;font-weight:700;color:var(--N)}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--W);border:1px solid var(--BD);border-radius:10px;padding:13px 15px}
.kl{font-size:11.5px;color:var(--TX2);margin-bottom:5px;font-weight:500}
.kv{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kh{font-size:11px;color:var(--TX3);margin-top:3px}
.kpi.b{border-left:3px solid var(--BL)}.kpi.b .kv{color:var(--BL)}
.kpi.g{border-left:3px solid var(--G)}.kpi.g .kv{color:var(--G)}
.kpi.r{border-left:3px solid var(--R)}.kpi.r .kv{color:var(--R)}
.kpi.a{border-left:3px solid var(--A)}.kpi.a .kv{color:var(--A)}
.kpi.p{border-left:3px solid var(--P)}.kpi.p .kv{color:var(--P)}
.kpi.t{border-left:3px solid var(--T)}.kpi.t .kv{color:var(--T)}
.tw{overflow-x:auto;border:1px solid var(--BD);border-radius:8px}
.tw.tw-scroll{max-height:calc(100vh - 330px);min-height:220px;overflow:auto;-webkit-overflow-scrolling:touch}
.tw.tw-scroll table{min-width:860px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
th{background:var(--bg2);padding:8px 12px;text-align:left;font-weight:600;font-size:11.5px;color:var(--TX2);border-bottom:1px solid var(--BD);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid var(--bg2);vertical-align:middle}
tr:last-child td{border-bottom:none} tr:hover td{background:#FAFBFD}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bbl{background:var(--LBL);color:var(--BL)}.bbg{background:var(--LG);color:var(--G)}
.bbr{background:var(--LR);color:var(--R)}.bba{background:var(--LY);color:var(--A)}
.bbgr{background:var(--bg2);color:var(--TX2)}.bbp{background:var(--LP);color:var(--P)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--TX2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--BD);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--TX)}
.field input:focus,.field select:focus{outline:none;border-color:var(--BL);box-shadow:0 0 0 3px rgba(21,83,160,.1)}
.al{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:11px;display:flex;align-items:flex-start;gap:8px}
.ali{background:var(--LBL);color:var(--BL);border:1px solid rgba(21,83,160,.2)}
.als{background:var(--LG);color:var(--G);border:1px solid rgba(10,89,64,.2)}
.alw{background:var(--LY);color:var(--A);border:1px solid rgba(122,69,0,.2)}
.tw table thead th{position:sticky;top:0;z-index:5}
@media (max-width:1024px){
  #app{grid-template-columns:220px 1fr}
  .card{padding:12px}
  .krow{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .frow{overflow-x:auto}
  .tw{max-height:70vh;overflow:auto;-webkit-overflow-scrolling:touch}
}
@media (max-width:720px){
  #app{grid-template-columns:1fr}
  #sb{position:relative;width:100%;height:auto;max-height:38vh;overflow:auto}
  #main{margin-left:0}
  .krow{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .btn{min-height:38px}
  .tw table{min-width:720px}
}
/* аё«аёҷа№үаёІ custreg вҖ” а№Җаё•а№ҮаёЎаё«аёҷа№үаёІаёҲаёӯ аёӢа№Ҳаёӯаёҷ sidebar */
#app.custreg-mode #sb{display:none}
#app.custreg-mode #ct{padding:0}
.cr-fullpage{max-width:100%;min-height:100vh;display:flex;flex-direction:column}
.cr-fullpage-header{background:var(--N);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cr-fullpage-body{flex:1;display:flex;gap:0;overflow:hidden}
.cr-fullpage-sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--BD);padding:20px 14px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex-shrink:0}
.cr-fullpage-content{flex:1;overflow-y:auto;padding:24px 32px}
.cr-step-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--TX2);transition:.12s;border:1px solid transparent}
.cr-step-item:hover{background:var(--W)}
.cr-step-item.act{background:var(--LBL);border-color:var(--BL);color:var(--BL);font-weight:600}
.cr-step-item.done{background:var(--LG);border-color:var(--G);color:var(--G)}
.cr-step-num{width:22px;height:22px;border-radius:50%;background:currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;opacity:.18}
.cr-step-item.act .cr-step-num,.cr-step-item.done .cr-step-num{opacity:1;background:currentColor}
.cr-step-item.act .cr-step-num span,.cr-step-item.done .cr-step-num span{color:#fff}
.cr-fullpage-prog{height:4px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:12px;max-width:220px}
.cr-fullpage-prog-fill{height:100%;background:#D4AF37;border-radius:99px;transition:width .4s}
#btn-sync:hover{background:rgba(255,255,255,.22)}
#btn-sync.syncing{opacity:.7;pointer-events:none}
#btn-sync.syncing::before{content:'вҸі ';animation:none}
.ald{background:var(--LR);color:var(--R);border:1px solid rgba(163,45,45,.2)}
.pz{border:2px dashed var(--BD);border-radius:8px;padding:18px;text-align:center;color:var(--TX3);cursor:pointer;transition:.15s;margin-bottom:10px;position:relative}
.pz:hover,.pz.drag{border-color:var(--BL);background:var(--LBL);color:var(--BL)}
.pz b{display:block;font-size:13px;margin-bottom:3px;color:var(--TX2)}
.tabs{display:flex;gap:1px;border-bottom:2px solid var(--bg2);margin-bottom:14px}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--TX2);font-weight:500;transition:.12s}
.tab.act{color:var(--N);border-bottom-color:var(--N)}.tab:hover:not(.act){color:var(--TX)}
.cbox{position:relative;height:280px} .cbox2{position:relative;height:200px}
.cgrid{display:grid;gap:14px;margin-bottom:14px}
.c2{grid-template-columns:1fr 1fr} .c3{grid-template-columns:1fr 1fr 1fr}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.44);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.mbox{background:var(--W);border-radius:12px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt2{font-size:16px;font-weight:700;color:var(--N)}
.mx{cursor:pointer;font-size:20px;color:var(--TX3);line-height:1}
#ls{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:300}
.lb{background:var(--W);border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:14px}
.lt{font-size:20px;font-weight:700;color:#111;margin:0;text-align:center}
.ls{font-size:13px;color:var(--TX2);margin:0;text-align:center}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.rc{border:2px solid var(--BD);border-radius:10px;padding:13px;cursor:pointer;text-align:center;transition:.15s}
.rc:hover{border-color:var(--BL);background:var(--LBL)}.rc.sel{border-color:var(--N);background:var(--LN)}
.ri{font-size:24px;margin-bottom:5px}
.rn{font-size:13px;font-weight:700;color:var(--N)}.rd{font-size:11px;color:var(--TX2);margin-top:2px}
.sep{height:1px;background:var(--BD);margin:12px 0}
.frow{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:8px;margin-bottom:13px}
.frow label{font-size:12px;font-weight:600;color:var(--TX2)}
.frow select,.frow input[type=text]{padding:5px 9px;border:1px solid var(--BD);border-radius:6px;font-size:12.5px;font-family:var(--font);background:var(--W)}
.edby{font-size:10px;color:var(--TX3);font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:3px;display:inline-block}
.bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:3px}
.bf{height:100%;border-radius:3px;transition:.4s}
.hidden{display:none!important}
.exp-hot td{background:#FEF3F2!important}.exp-warm td{background:#FDF2E2!important}
.crit-row td{background:#FEF3F2!important}
.inp-cell{width:100%;border:none;background:transparent;font-size:13px;font-family:var(--font);color:var(--TX)}
.inp-cell:focus{outline:2px solid var(--BL);border-radius:3px;background:var(--LBL)}
/* в”Җв”Җ Customer Registration в”Җв”Җ */
.cr-prog{height:3px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:8px}
.cr-prog-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s}
.cr-steps{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.cr-steps::-webkit-scrollbar{display:none}
.cr-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;border:1px solid var(--BD);background:var(--W);font-size:11px;color:var(--TX2);cursor:pointer;white-space:nowrap;transition:.15s}
.cr-pill.act{background:var(--LBL);border-color:var(--BL);color:var(--BL);font-weight:600}
.cr-pill.done{background:var(--LG);border-color:var(--G);color:var(--G)}
.cr-sec{display:none}.cr-sec.act{display:block}
.cr-cb{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.cr-cbi{display:flex;align-items:center;gap:6px;padding:7px 9px;border:1px solid var(--BD);border-radius:7px;font-size:12px;color:var(--TX2);cursor:pointer;transition:.15s;background:var(--W)}
.cr-cbi:has(input:checked){background:var(--LBL);border-color:var(--BL);color:var(--BL)}
.cr-cbi input{width:auto;accent-color:var(--BL);margin:0}
.cr-r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cr-ri{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cr-ri label{font-size:12px;color:var(--TX2);white-space:nowrap}
.cr-ri input{flex:1;background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:7px 10px;font-size:13px;font-family:var(--font);outline:none;color:var(--TX);transition:.15s}
.cr-ri input:focus,.field input:focus,.field select:focus{border-color:var(--BL)}
.cr-ro{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--bg2)}
.cr-ro:last-child{border-bottom:none}
.cr-rl{color:var(--TX2)}.cr-rv{font-weight:600;color:var(--TX)}
.cr-dsb{background:var(--bg2);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cr-dsb-n{font-size:20px;font-weight:700;color:var(--BL)}
.cr-dsb-prog{flex:1;height:4px;background:var(--BD);border-radius:99px;overflow:hidden;margin-left:auto;max-width:80px}
.cr-dsb-fill{height:100%;background:var(--BL);border-radius:99px;transition:width .3s}
.cr-slot{border:1px solid var(--BD);border-radius:8px;overflow:hidden;margin-bottom:7px}
.cr-slot-h{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg2);cursor:pointer;user-select:none}
.cr-slot-lbl{flex:1;font-size:12px;font-weight:600;color:var(--TX)}
.cr-slot-req{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--LY);color:var(--A);margin-left:4px}
.cr-slot-opt{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--W);border:1px solid var(--BD);color:var(--TX3);margin-left:4px}
.cr-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.cr-dot-e{background:var(--W);border:1px solid var(--BD);color:var(--TX3)}
.cr-dot-d{background:var(--LG);color:var(--G)}
.cr-chev{font-size:13px;color:var(--TX3);transition:transform .2s}
.cr-chev.open{transform:rotate(180deg)}
.cr-slot-b{display:none;padding:10px 11px;border-top:1px solid var(--BD)}
.cr-slot-b.open{display:block}
.cr-uz{border:1.5px dashed var(--BD);border-radius:7px;padding:12px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:7px}
.cr-uz:hover{background:var(--LBL);border-color:var(--BL)}
.cr-fi{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg2);border-radius:7px;margin-bottom:5px}
.cr-ft{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.cr-sign{background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:9px 11px;margin-bottom:7px}
.cr-sign-lbl{font-size:10px;color:var(--TX3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.cr-sign-inp{width:100%;border:none;border-bottom:1px solid var(--BD);background:transparent;font-size:13px;color:var(--TX);padding:3px 0;outline:none;font-family:var(--font)}
.cr-apvb{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;margin-bottom:10px}
.cr-tl{display:flex;flex-direction:column}
.cr-tl-item{display:flex;gap:10px;position:relative}
.cr-tl-item:not(:last-child)::after{content:'';position:absolute;left:14px;top:30px;bottom:0;width:1px;background:var(--BD)}
.cr-tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.cr-tl-body{padding-bottom:13px;flex:1}
.cr-sr{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bg2)}
.cr-sr:last-child{border-bottom:none}
.cr-apv-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bg2);cursor:pointer}
.cr-apv-item:last-child{border-bottom:none}
.cr-apv-item:hover td,.cr-apv-item:hover{background:var(--bg2)}
.cr-apsel{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--BD);border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:5px}
.cr-apsel:hover{background:var(--bg2)}
.cr-apsel.sel{background:var(--LP);border-color:var(--P)}
/* в”Җв”Җ Planning Booking в”Җв”Җ */
.bk-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--BD);border-radius:8px;margin-bottom:6px;background:var(--W)}
.bk-row:hover{background:var(--bg2)}
/* в”Җв”Җ Multi-select SKU Filter в”Җв”Җ */
.ms-drop{position:relative;display:inline-block}
.ms-panel{position:absolute;top:100%;left:0;z-index:50;background:var(--W);border:1px solid var(--BD);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:260px;max-height:300px;overflow-y:auto;padding:6px;margin-top:2px}
.ms-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--TX)}
.ms-item:hover{background:var(--bg2)}.ms-item.sel{background:var(--LBL);color:var(--BL)}
.ms-item input{width:auto;margin:0;accent-color:var(--BL)}

function loadAsset(name, url, ready) {
  if (ready()) return Promise.resolve();
  if (_assetLoads[name]) return _assetLoads[name];

    const s = document.createElement('script');
    s.src = url;

  const res = await request;

    throw new Error(`${label}: ${msg}`);

function bookingSoNo(b = {}) {
  const direct = b.soNo || b.so_no || b.salesOrderNo || b.sales_order_no || '';
  if (direct) return String(direct).trim();
  const noteMatch = String(b.note || '').match(/\bSO\s+([^\s|,]+)/i);
  if (noteMatch) return noteMatch[1].trim();
  if (String(b.type || '').toUpperCase() === 'SO') return String(b.refNo || b.ref_no || '').trim();
  return '';
}
function bookingDocNo(b = {}) {
  const type = String(b.type || '').toUpperCase();
  if (type === 'SO') return bookingSoNo(b) || b.refNo || b.ref_no || '';
  return b.poNo || b.po_no || b.refNo || b.ref_no || '';
}
function normalizeBookingRow(b = {}) {
  const soNo = bookingSoNo(b);
  const refNo = b.refNo || b.ref_no || (String(b.type || '').toUpperCase() === 'SO' ? soNo : (b.poNo || b.po_no || ''));
  const soDate = b.soDate || b.so_date || b.orderDate || b.order_date || b.docDate || b.doc_date || '';
  const receiveDate = b.receiveDate || b.receive_date || b.needDate || b.need_date || '';
  return {
    ...b,

    refNo,
    poNo: b.poNo || b.po_no || (String(b.type || '').toUpperCase() === 'PO' ? refNo : ''),

    ts: b.ts || (b.created_at ? new Date(b.created_at).getTime() : 0),
  };
}
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SB вҖ” Supabase API Wrapper
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const SB = {

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // AUTH
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async login(uid, pwd) {
    // 1. Try Supabase sc_users first (source of truth)
    try {
      const { data } = await getSupabaseClient()
        .from('sc_users')
        .select('uid, name, role, slm_id, email, is_active')
        .or(`uid.eq.${uid},email.eq.${uid}`)
        .eq('pwd_hash', pwd)
        .eq('is_active', true)
        .maybeSingle();
      if (data) return { ...data, active: data.is_active !== false };
    } catch (e) {
      console.warn('[login] Supabase unreachable, falling back to local:', e.message);
    }
    // 2. Fallback: localStorage (а№ғаёҠа№үа№ҖаёЎаё·а№Ҳаёӯ offline аё«аёЈаё·аёӯ Supabase а№„аёЎа№Ҳаё•аёӯаёҡ)
    try {
      const users = DB.get('users') || [];
      const user = users.find(u =>
        (u.uid === uid || u.email === uid) &&
        (u.pwd_hash === pwd || u.pwd === pwd) &&
        (u.active || u.is_active)
      );
      return user || null;
    } catch (e) {
      console.error('[login] Local auth error:', e.message);
      return null;
    }
  },

  async getUsers() {

      .from('v_sc_users_safe')

      .order('uid');

  },

  async upsertUser(u) {
    const row = { ...u, is_active: u.is_active ?? u.active ?? true };
    if (row.pwd && !row.pwd_hash) row.pwd_hash = row.pwd;
    delete row.active;
    delete row.pwd;
    return sbThrow(getSupabaseClient().from('sc_users').upsert(row), 'upsertUser');
  },

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // PRODUCTS / SKU
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async getProducts(opts = {}) {
    const pageSize = 1000;
    let from = 0;
    let rows = [];
    while (true) {
      const { data, error } = await getSupabaseClient()
        .from('products')
        .select('*')
        .eq('is_active', true)
        .order('code')
        .range(from, from + pageSize - 1);
      if (error) throw error;
      rows = rows.concat(data || []);
      if (!data || data.length < pageSize) break;
      from += pageSize;
    }
    return _filterTgmRecords(rows, opts);
  },

  async getProductsByCodes(codes = [], opts = {}) {
    const unique = [...new Set((codes || []).map(c => String(c || '').trim()).filter(Boolean))];
    if (!unique.length) return [];
    const rows = [];
    for (let i = 0; i < unique.length; i += 200) {
      const chunk = unique.slice(i, i + 200);
      const { data, error } = await getSupabaseClient()
        .from('products')
        .select('code,name,group_name,plant,company')
        .in('code', chunk);
      if (error) throw error;
      rows.push(...(data || []).map(p => ({ unit: 'аёҒаёҒ.', ...p })));
    }
    return _filterTgmRecords(rows, opts);
  },

  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // SALES HISTORY
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async getSalesHistory(slmId = 'ALL') {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - 4);
    const startYm = cutoff.toISOString().slice(0, 7);
    try {
      const { data, error } = await getSupabaseClient()
        .from('v_sc_dashboard_sales_monthly')
        .select('prod_code,prod_name,ym,qty,amount')
        .gte('ym', startYm)
        .order('prod_code').order('ym');
      if (error) throw error;
      const result = {};
      for (const row of (data || [])) {
        const sku = row.prod_code;
        if (!result[sku]) result[sku] = { name: row.prod_name || sku, monthly: {}, amountMonthly: {}, avg3: 0 };
        result[sku].monthly[row.ym] = (result[sku].monthly[row.ym] || 0) + (Number(row.qty) || 0);
        result[sku].amountMonthly[row.ym] = (result[sku].amountMonthly[row.ym] || 0) + (Number(row.amount) || 0);
      }
      for (const sku in result) {
        const months3 = [];
        for (let i = 1; i <= 3; i++) {
          const d = new Date();
          d.setMonth(d.getMonth() - i);
          months3.push(d.toISOString().slice(0, 7));
        }
        const vals = months3.map(m => result[sku].monthly[m] || 0).filter(v => v > 0);
        result[sku].avg3 = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
      }
      if (Object.keys(result).length) return result;
    } catch (e) {
      console.warn('v_sc_dashboard_sales_monthly unavailable; fallback sales_history:', e.message || e);
    }
    const PAGE = 1000;
    let from = 0;
    let rows = [];

    while (true) {
      let q = getSupabaseClient()
        .from('sales_history')
        .select('slm_id,sku,ym,qty,amount')
        .gte('ym', startYm)
        .order('sku').order('ym')
        .range(from, from + PAGE - 1);
      if (!slmId || slmId === 'ALL') q = q.eq('slm_id', 'ALL');
      else q = q.or('slm_id.eq.' + slmId + ',slm_id.like.*:' + slmId);
      const { data, error } = await q;
      if (error) throw error;
      rows = rows.concat(data || []);
      if (!data || data.length < PAGE) break;
      from += PAGE;
    }

    const result = {};
    for (const row of rows) {
      if (!result[row.sku]) result[row.sku] = { name: '', monthly: {}, amountMonthly: {}, avg3: 0 };
      result[row.sku].monthly[row.ym] = (result[row.sku].monthly[row.ym] || 0) + (Number(row.qty) || 0);
      result[row.sku].amountMonthly[row.ym] = (result[row.sku].amountMonthly[row.ym] || 0) + (Number(row.amount) || 0);
    }

    for (const sku in result) {
      const months3 = [];
      for (let i = 1; i <= 3; i++) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        months3.push(d.toISOString().slice(0, 7));
      }
      const vals = months3.map(m => result[sku].monthly[m] || 0).filter(v => v > 0);
      result[sku].avg3 = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    }
    return result;
  },

  async getDataConfidence() {
    const sb = getSupabaseClient();
    try {
      const { data, error } = await sb
        .from('v_sc_data_confidence')
        .select('so_count,line_count,active_booking_count,orders_without_line,synced_at')
        .maybeSingle();
      if (error) throw error;
      if (data) {
        const warnings = [];
        const ordersWithoutLine = Number(data.orders_without_line || 0);
        const soCount = Number(data.so_count || 0);
        const lineCount = Number(data.line_count || 0);
        if (ordersWithoutLine) warnings.push(`аёһаёҡ SO а№„аёЎа№ҲаёЎаёө line ${ordersWithoutLine.toLocaleString()} аёЈаёІаёўаёҒаёІаёЈ`);
        else if (soCount > lineCount) warnings.push('аёҲаёіаёҷаё§аёҷ SO аёЎаёІаёҒаёҒаё§а№ҲаёІ line аё•аёЈаё§аёҲаёӘаёӯаёҡаё„аё§аёІаёЎаё„аёЈаёҡаё–а№үаё§аёҷаёӮаёӯаёҮ outbound_lines');
        return {
          syncedAt: data.synced_at || null,
          soCount,
          lineCount,
          activeBookingCount: Number(data.active_booking_count || 0),
          ordersWithoutLine,
          warnings,
        };
      }
    } catch (e) {
      console.warn('v_sc_data_confidence unavailable; using scan fallback:', e.message || e);
    }
    const countRows = async (table, applyFilter = null) => {
      let q = sb.from(table).select('id', { count: 'exact', head: true });
      if (applyFilter) q = applyFilter(q);
      const { count, error } = await q;
      if (error) throw error;
      return count || 0;
    };
    const [
      soCount,
      lineCount,
      activeBookingCount,
      latestBooking,
      latestStock,
    ] = await Promise.all([
      countRows('outbound_orders'),
      countRows('outbound_lines'),
      countRows('bookings', q => q.neq('status', 'cancelled')),
      sb.from('bookings').select('created_at').order('created_at', { ascending: false }).limit(1),
      sb.from('stock').select('last_updated').order('last_updated', { ascending: false }).limit(1),
    ]);
    const orderScan = await sb.from('outbound_orders').select('id,order_no').order('created_at', { ascending: false }).limit(5000);
    if (orderScan.error) throw orderScan.error;
    const orderRows = orderScan.data || [];
    const orderIds = orderRows.map(o => o.id).filter(Boolean);
    const lineOrderIds = new Set();
    for (let i = 0; i < orderIds.length; i += 200) {
      const chunk = orderIds.slice(i, i + 200);
      const { data, error } = await sb.from('outbound_lines').select('order_id').in('order_id', chunk);
      if (error) throw error;
      (data || []).forEach(r => { if (r.order_id) lineOrderIds.add(r.order_id); });
    }
    const ordersWithoutLine = orderRows.filter(o => !lineOrderIds.has(o.id));
    const warnings = [];
    if (ordersWithoutLine.length) {
      const scope = soCount > orderRows.length ? `аёҲаёІаёҒаё•аёұаё§аёӯаёўа№ҲаёІаёҮаёҘа№ҲаёІаёӘаёёаё” ${orderRows.length.toLocaleString()} SO` : 'аё—аёұа№үаёҮаё«аёЎаё”';
      warnings.push(`аёһаёҡ SO а№„аёЎа№ҲаёЎаёө line ${ordersWithoutLine.length.toLocaleString()} аёЈаёІаёўаёҒаёІаёЈ (${scope})`);
    } else if (soCount > lineCount) {
      warnings.push('аёҲаёіаёҷаё§аёҷ SO аёЎаёІаёҒаёҒаё§а№ҲаёІ line аё•аёЈаё§аёҲаёӘаёӯаёҡаё„аё§аёІаёЎаё„аёЈаёҡаё–а№үаё§аёҷаёӮаёӯаёҮ outbound_lines');
    }
    return {
      syncedAt: latestBooking.data?.[0]?.created_at || latestStock.data?.[0]?.last_updated || null,
      soCount,
      lineCount,
      activeBookingCount,
      ordersWithoutLine: ordersWithoutLine.length,
      warnings,
    };
  },

  // REALTIME SUBSCRIPTIONS

  subscribeReservations(cb) {

      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reservations' }, cb)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'reservations' }, cb)
      .subscribe();

  subscribeForecasts(cb) {

  // аё”аё¶аёҮ distinct cust_code аёҲаёІаёҒ sales_transactions (аёҘаё№аёҒаё„а№үаёІаё—аёөа№Ҳа№Җаё„аёўаёӢаё·а№үаёӯаёҲаёЈаёҙаёҮ)
  async getSalesCustCodes() {
    const codes = new Set();
    try {
      const PAGE = 2000;
      let from = 0;
      while (true) {
        const { data, error } = await getSupabaseClient()
          .from('v_sc_sales_customer_codes')
          .select('cust_code')
          .range(from, from + PAGE - 1);
        if (error) throw error;
        (data || []).forEach(r => { if (r.cust_code) codes.add(String(r.cust_code).trim()); });
        if (!data || data.length < PAGE) return codes;
        from += PAGE;
      }
    } catch (e) {
      console.warn('v_sc_sales_customer_codes unavailable; fallback sales_transactions:', e.message || e);
    }
    const PAGE = 2000;
    let from = 0;
    try {
      while (true) {
        const { data, error } = await getSupabaseClient()
          .from('sales_transactions')
          .select('cust_code')
          .not('cust_code', 'is', null)
          .neq('cust_code', '')
          .range(from, from + PAGE - 1);
        if (error) break;
        (data || []).forEach(r => { if (r.cust_code) codes.add(String(r.cust_code).trim()); });
        if (!data || data.length < PAGE) break;
        from += PAGE;
      }
    } catch (e) { console.warn('getSalesCustCodes:', e); }
    return codes;
  },
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CACHE вҖ” аёҘаё” API calls аё—аёөа№Ҳа№„аёЎа№ҲаёҲаёіа№Җаёӣа№Үаёҷ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const CACHE = {
  _store: {},
  _time:  {},
  _pending: {},
  TTL: 180000, // 3 minutes: fresh enough for live work, fast enough for page switching.
  PREFIX: 'tgm_sc_cache_v3_scope_',
  PERSIST_KEYS: new Set(['products', 'stock', 'stock_lots', 'bookings', 'po_plans', 'group_products']),

  _now() { return Date.now(); },
  _lsKey(key) { return this.PREFIX + key; },
  _isFresh(key, ttl = this.TTL) {
    return this._store[key] !== undefined && this._now() - (this._time[key] || 0) < ttl;
  },
  _readPersisted(key, ttl = this.TTL) {
    if (!this.PERSIST_KEYS.has(key)) return null;
    try {
      const cached = JSON.parse(localStorage.getItem(this._lsKey(key)) || 'null');
      if (!cached || this._now() - cached.time >= ttl) return null;
      this._store[key] = cached.data;
      this._time[key] = cached.time;
      return cached.data;
    } catch (_) { return null; }
  },
  _persist(key, data) {
    if (!this.PERSIST_KEYS.has(key)) return;
    try { localStorage.setItem(this._lsKey(key), JSON.stringify({ time: this._time[key], data })); }
    catch (_) { /* storage full: memory cache still works */ }
  },

  async get(key, fetcher, opts = {}) {
    const ttl = opts.ttl ?? this.TTL;
    if (!opts.force && this._isFresh(key, ttl)) return this._store[key];
    if (!opts.force) {
      const persisted = this._readPersisted(key, ttl);
      if (persisted !== null) return persisted;
    }
    if (!opts.force && this._pending[key]) return this._pending[key];

    this._pending[key] = Promise.resolve()
      .then(fetcher)
      .then(data => {
        this._store[key] = data;
        this._time[key]  = this._now();
        this._persist(key, data);
        return data;
      })
      .finally(() => { delete this._pending[key]; });
    return this._pending[key];
  },

  peek(key) {
    return this._store[key] ?? this._readPersisted(key, 24 * 60 * 60 * 1000);
  },
  prefetch(key, fetcher, opts = {}) {
    return this.get(key, fetcher, opts).catch(e => console.warn('[cache prefetch]', key, e?.message || e));
  },
  warmCommon() {
    return Promise.allSettled([
      this.prefetch('products', () => SB.getProducts()),
      this.prefetch('stock', () => SB.getStock()),
      this.prefetch('bookings', () => SB.getBookings()),
      this.prefetch('po_plans', () => SB.getPOPlans()),
    ]);
  },

  clear(key) {
    delete this._store[key]; delete this._time[key]; delete this._pending[key];
    try { localStorage.removeItem(this._lsKey(key)); } catch (_) {}
  },
  clearPrefix(prefix) {
    Object.keys(this._store).filter(k => k.startsWith(prefix)).forEach(k => this.clear(k));
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith(this.PREFIX + prefix))
        .forEach(k => localStorage.removeItem(k));
    } catch (_) {}
  },
  clearPage(page) {
    const prefixes = {
      dash: ['dash_', 'sales_hist_', 'products_subset_', 'stock', 'bookings', 'po_plans'],
      mysales: ['sales_', 'sales_hist_', 'products_subset_'],
      forecast: ['fc_', 'sales_hist_', 'products', 'bookings', 'po_plans'],
      planstock: ['stock', 'stock_lots', 'fc_', 'po_plans', 'bookings'],
      groups: ['group_', 'products'],
      planbook: ['bookings']
    }[page] || [];
    prefixes.forEach(p => this.clearPrefix(p));
  },
  clearAll()  {
    this._store = {}; this._time = {}; this._pending = {};
    try { Object.keys(localStorage).filter(k => k.startsWith(this.PREFIX)).forEach(k => localStorage.removeItem(k)); } catch (_) {}
  },
};

function mergeById(remote=[], local=[], idKey='id') {
  const ids = new Set((remote||[]).map(item => item?.[idKey]));
  return [...(remote||[]), ...(local||[]).filter(item => item && !ids.has(item[idKey]))];
}
function mergeForecasts(remote, local, opts = {}) { return _filterTgmSkuRows(mergeById(remote, local, 'id'), opts); }
function mergePOPlans(remote, local, opts = {}) { return _filterTgmSkuRows(mergeById(remote, local, 'id'), opts); }
function mergeProdOrders(remote, local, opts = {}) { return _filterTgmSkuRows(mergeById(remote, local, 'id'), opts); }
function mergeBookings(remote, local, opts = {}) { return _filterTgmSkuRows(mergeById(remote, local, 'id'), opts); }

function useForecastRows() { return mergeForecasts(window._sbForecasts||[], DB.get('forecasts')||[]); }
function usePORows() { return mergePOPlans(window._poMerged||[], DB.get('po_log')||[]); }
function useProdOrders() { return mergeProdOrders(window._prodOrders||[], DB.get('prod_orders')||[]); }
function useBookings() { return mergeBookings(window._sbBookings||[], DB.get('bookings')||[]).map(normalizeBookingRow); }
function uidToName(uid){ const u=(DB.get('users')||[]).find(x=>x.uid===uid||x.id===uid); return u?.name||uid||''; }

// MIGRATION вҖ” аёўа№үаёІаёў localStorage вҶ’ Supabase аё„аёЈаёұа№үаёҮа№ҒаёЈаёҒ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function migrateFromLocalStorage() {
  const migrated = localStorage.getItem('tgm_sb_migrated');
  if (migrated) return; // аёўа№үаёІаёўа№ҒаёҘа№үаё§

  console.log('[Migration] аё•аёЈаё§аёҲаёӘаёӯаёҡ localStorage...');

  // аёўа№үаёІаёў forecasts
  const fcRaw = localStorage.getItem('tgm3_forecasts');
  if (fcRaw) {
    try {
      const fc = JSON.parse(fcRaw);
      if (fc.length > 0) {
        await SB.addForecasts(fc);
        console.log(`[Migration] вң“ аёўа№үаёІаёў ${fc.length} forecasts`);
      }
    } catch (e) { console.error('[Migration] forecast error:', e); }
  }

  // аёўа№үаёІаёў po_log
  const poRaw = localStorage.getItem('tgm3_po_log');
  if (poRaw) {
    try {
      const pos = JSON.parse(poRaw);
      for (const po of pos) await SB.upsertPO(po);
      console.log(`[Migration] вң“ аёўа№үаёІаёў ${pos.length} PO plans`);
    } catch (e) { console.error('[Migration] PO error:', e); }
  }

  localStorage.setItem('tgm_sb_migrated', '1');
  console.log('[Migration] вң“ а№ҖаёӘаёЈа№ҮаёҲаёӘаёЎаёҡаё№аёЈаё“а№Ң');
}

// doLogin() вҖ” а№Ғаё—аёҷаё—аёөа№ҲаёӮаёӯаёҮа№Җаё”аёҙаёЎ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function doLogin() {
  const uid = document.getElementById('l-uid').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const err = document.getElementById('l-err');
  err.textContent = ''; err.style.display = 'none';

  // а№ҒаёӘаё”аёҮ loading
  const btn = document.querySelector('#ls .btn-p');
  const origText = btn.textContent;
  btn.textContent = 'аёҒаёіаёҘаёұаёҮа№ҖаёӮа№үаёІаёӘаё№а№ҲаёЈаё°аёҡаёҡ...';
  btn.disabled = true;

  try {
    const user = await SB.login(uid, pwd);
    if (!user) {
      err.textContent = 'аёЈаё«аёұаёӘаёһаёҷаёұаёҒаёҮаёІаёҷаё«аёЈаё·аёӯаёЈаё«аёұаёӘаёңа№ҲаёІаёҷа№„аёЎа№Ҳаё–аё№аёҒаё•а№үаёӯаёҮ';
      err.style.display = '';
      return;
    }

    // а№ҖаёӢа№Үаё• global vars (а№ғаё«а№үаё•аёЈаёҮаёҒаёұаёҡ HTML а№Җаё”аёҙаёЎ)
    CURRENT_USER = user;
    ROLE   = user.role;
    UID    = user.uid;
    UNAME  = user.name;

    // аёҡаёұаёҷаё—аё¶аёҒ session аёӘаёіаё«аёЈаёұаёҡ SSO (WMS а№ғаёҠа№үаёЈа№Ҳаё§аёЎ)
    localStorage.setItem('tgm_session', JSON.stringify({uid:user.uid,name:user.name,role:user.role,slm_id:user.slm_id||'',pwd:user.pwd,ts:Date.now()}));

    // а№ҒаёӘаё”аёҮ app аё—аёұаёҷаё—аёөаё«аёҘаёұаёҮ auth аёӘаёіа№ҖаёЈа№ҮаёҲ
    document.getElementById('ls').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    buildSB();
    nav('dash');

    // Supabase background tasks (а№„аёЎа№ҲаёҡаёҘа№ҮаёӯаёҒ login)
    migrateFromLocalStorage().catch(console.warn);
    CACHE.warmCommon().catch(console.warn);
    SB.audit('LOGIN', 'system', { role: ROLE }).catch(console.warn);
    // а№Ӯаё«аёҘаё” sku_settings аёҲаёІаёҒ Supabase а№ҒаёҘа№үаё§ sync аёҘаёҮ localStorage
    SB.getSkuSettings().then(ss => {
      if (ss && Object.keys(ss).length > 0) DB.set('sku_settings', ss);
    }).catch(console.warn);
    SB.getCustomers().then(rows => {
      if (rows?.length) DB.set('remote_customers_cache', rows);
    }).catch(console.warn);
    // Bookings are large; load them lazily only on booking pages.
    try {
      SB.subscribeStock(() => {
        CACHE.clear('stock');
        CACHE.clear('stock_lots');
        CACHE.clear('stock_planning');
        if (document.getElementById('ps-tbl')) planStkT();
      });
      SB.subscribeBookings(() => {
        CACHE.clear('bookings');
        CACHE.clear('fc_booking_links');
        CACHE.clear('data_confidence');
        if (sessionStorage.getItem('_pg') === 'planbook') pgPlanBooking();
        if (sessionStorage.getItem('_pg') === 'booksummary') pgBookingSummary();
      });
      SB.subscribeReservations(payload => {
        if (payload.eventType === 'INSERT') {
          const r = payload.new;
          toast(`рҹ“Ұ аёҲаёӯаёҮаёӘаёҙаёҷаё„а№үаёІа№ғаё«аёЎа№Ҳ: ${r.sku} ${r.qty_requested} аёҒаёҒ.`);
        }
      });
      // а№ҒаёҲа№үаёҮа№Җаё•аё·аёӯаёҷ planner а№ҖаёЎаё·а№ҲаёӯаёЎаёө forecast а№ғаё«аёЎа№Ҳ
      const PLANNING_ROLES=['planning','planning_manager','planning_officer','planning_worker','manager','admin','superadmin'];
      if (PLANNING_ROLES.includes(CURRENT_USER?.role)) {
        SB.subscribeForecasts(payload => {
          if (payload.eventType === 'INSERT') {
            const f = payload.new;
            toast(`рҹ“қ Forecast а№ғаё«аёЎа№Ҳ: ${f.sku} ${Math.round(f.qty||0)} аёҒаёҒ. (by ${f.by||f.sales_id||'?'})`);
            // а№Җаёһаёҙа№ҲаёЎ dot а№ҒаёҲа№үаёҮа№Җаё•аё·аёӯаёҷаё—аёөа№Ҳа№ҖаёЎаёҷаё№ forecast
            setTimeout(() => {
              const ni = document.getElementById('ni-forecast');
              if (ni && !ni.querySelector('.notif-dot')) {
                const dot = document.createElement('span');
                dot.className = 'notif-dot';
                dot.style.cssText = 'position:absolute;top:3px;right:3px;width:7px;height:7px;background:var(--R);border-radius:50%';
                ni.style.position = 'relative';
                ni.appendChild(dot);
              }
            }, 100);
          }
        });
      }
      // Express sync tables вҖ” debounce 8s а№ҖаёһаёЈаёІаё° upsert аё«аёҘаёІаёў batch
      let _expressTimer = null;
      SB.subscribeExpressData(() => {
        CACHE.clearPrefix('sales_hist_');
        CACHE.clear('products');
        CACHE.clear('stock');
        CACHE.clear('data_confidence');
        DB.set('remote_customers_cache', []);
        window._salesRows2Y = null;
        window._salesHistCache = null;
        window._dashSalesRows = null;
        window._dashSalesHistCache = null;
        const btn = document.getElementById('btn-sync');
        if (btn) btn.classList.add('syncing');
        clearTimeout(_expressTimer);
        _expressTimer = setTimeout(() => {
          nav(sessionStorage.getItem('_pg') || 'dash');
          if (btn) btn.classList.remove('syncing');
        }, 8000);
      });
    } catch (e) { console.warn('Realtime subscribe:', e); }

  } catch (e) {
    err.textContent = 'а№ҖаёҒаёҙаё”аёӮа№үаёӯаёңаёҙаё”аёһаёҘаёІаё”: ' + e.message;
    err.style.display = '';
    console.error('Login error:', e);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// в”Җв”Җ Copy Forecast аёҲаёІаёҒа№Җаё”аё·аёӯаёҷаё—аёөа№Ҳа№ҒаёҘа№үаё§ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function fcCopyLastMonth(){
  const curYm = window._fcMonth || new Date().toISOString().slice(0,7);
  const [y,m] = curYm.split('-').map(Number);
  const prevY = m===1?y-1:y;
  const prevM = m===1?12:m-1;
  const prevYm = `${prevY}-${String(prevM).padStart(2,'0')}`;

  if(!confirm(`аё„аёұаё”аёҘаёӯаёҒ Forecast аёҲаёІаёҒа№Җаё”аё·аёӯаёҷ ${prevYm} аёЎаёІаёўаёұаёҮ ${curYm}?\n(аёҲаё°аёӮа№үаёІаёЎаёЈаёІаёўаёҒаёІаёЈаё—аёөа№ҲаёЎаёөаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§а№ғаёҷа№Җаё”аё·аёӯаёҷаёҷаёөа№ү)`)) return;

  const allFc = window._fcListCache || DB.get('forecasts') || [];
  const prevFc = allFc.filter(f => (f.ym||f.delivDate||'').startsWith(prevYm));
  const thisFc = allFc.filter(f => (f.ym||f.delivDate||'').startsWith(curYm));
  const existKeys = new Set(thisFc.map(f => `${f.sku}|${f.custCode||''}`));

  if(!prevFc.length){ toast('а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ Forecast а№ғаёҷа№Җаё”аё·аёӯаёҷ ' + prevYm); return; }

  const copies = prevFc
    .filter(f => !existKeys.has(`${f.sku}|${f.custCode||''}`))
    .map(f => ({
      ...f,
      id: undefined, // а№ғаё«а№үаёЈаё°аёҡаёҡаёӘаёЈа№үаёІаёҮ ID а№ғаё«аёЎа№Ҳ
      ym: curYm,
      delivDate: f.delivDate ? f.delivDate.replace(prevYm, curYm) : null,
      approved: false,
      by: UID,
      ts: Date.now(),
      note: `[Copy аёҲаёІаёҒ ${prevYm}] ${f.note||''}`.trim(),
    }));

  if(!copies.length){ toast(`аё—аёёаёҒ SKU аёЎаёөаёӮа№үаёӯаёЎаё№аёҘа№Җаё”аё·аёӯаёҷ ${curYm} а№ҒаёҘа№үаё§ вҖ” а№„аёЎа№ҲаёЎаёөаёӯаё°а№„аёЈаё•а№үаёӯаёҮ copy`); return; }

  // аёҡаёұаёҷаё—аё¶аёҒ local аёҒа№Ҳаёӯаёҷ а№ҒаёҘа№үаё§аёҘаёӯаёҮ sync Supabase
  const saved = [...(DB.get('forecasts')||[]), ...copies];
  DB.set('forecasts', saved);
  CACHE.clear('forecasts');

  let synced = 0;
  try {
    for(const fc of copies){
      await SB.saveForecast(fc);
      synced++;
    }
  } catch(e){ console.warn('Copy forecast sync error:', e.message); }

  toast(`рҹ“Ӣ Copy аёӘаёіа№ҖаёЈа№ҮаёҲ ${copies.length} аёЈаёІаёўаёҒаёІаёЈ${synced<copies.length?' (аёҡаёІаёҮаёЈаёІаёўаёҒаёІаёЈаёҡаёұаёҷаё—аё¶аёҒ offline)':''}`);
  pgForecast();
}

function _fcNormBooking(b={}){
  const type=String(b.type||b.doc_type||'SO').toUpperCase();
  const ref=b.refNo||b.ref_no||b.poNo||b.po_no||b.soNo||b.so_no||'';
  return {id:b.id,type,refNo:ref,sku:b.sku||'',skuName:b.skuName||b.sku_name||'',qty:Number(b.qty||b.qty_requested||0)||0,custName:b.custName||b.cust_name||b.customer||'',custCode:b.custCode||b.cust_code||'',receiveDate:b.receiveDate||b.receive_date||b.need_date||b.delivery_date||'',status:b.status||'pending',stockStatus:b.stockStatus||b.stock_status||'stock'};
}
function _fcTextMatch(a,b){
  const aa=String(a||'').toLowerCase().trim(),bb=String(b||'').toLowerCase().trim();
  if(!aa||!bb)return false;
  return aa.includes(bb)||bb.includes(aa);
}
function _fcFulfillmentForForecast(f){
  const links=window._fcLinkCache||{};
  const po=(links.po||window._poMerged||DB.get('po_log')||[]).filter(p=>p.sku===f.sku&&p.status!=='replaced');
  const bks=(links.bookings||DB.get('bookings')||[]).map(_fcNormBooking).filter(b=>b.sku===f.sku&&b.status!=='cancelled');
  const prod=(links.prod||window._prodOrders||DB.get('prod_orders')||[]).filter(o=>o.sku===f.sku);
  const custKey=f.custCode||f.custName||'';
  const custPo=po.filter(p=>!custKey||_fcTextMatch(p.customer,custKey)||_fcTextMatch(p.branch,custKey)||_fcTextMatch(p.so,custKey));
  const custBk=bks.filter(b=>!custKey||_fcTextMatch(b.custCode,custKey)||_fcTextMatch(b.custName,custKey)||_fcTextMatch(b.refNo,custKey));
  const poolPo=custPo.length?custPo:po;
  const poolBk=custBk.length?custBk:bks;
  const target=f.delivDate||'';
  const near=(arr,dateField)=>arr.filter(x=>x[dateField]).sort((a,b)=>Math.abs(new Date(a[dateField])-new Date(target||a[dateField]))-Math.abs(new Date(b[dateField])-new Date(target||b[dateField])))[0];
  const bk=near(poolBk,'receiveDate');
  const p=near(poolPo,'delivDate');
  const pr=near(prod,'receiveDate')||near(prod,'planDate');
  const candidates=[];
  if(bk)candidates.push({src:bk.type||'SO',ref:bk.refNo||bk.id,qty:bk.qty,date:bk.receiveDate,status:bk.status,level:bk.status==='received'?3:2,note:bk.stockStatus==='produce'?'аё•а№үаёӯаёҮаёңаёҘаёҙаё•':'аёҲаёӯаёҮа№ҒаёҘа№үаё§'});
  if(p)candidates.push({src:'PO',ref:p.so||p.id,qty:p.qty,date:p.delivDate,status:p.status,level:p.status==='matched'?3:2,note:p.customer||p.branch||''});
  if(pr)candidates.push({src:'аёңаёҘаёҙаё•',ref:pr.id,qty:pr.qty,date:pr.receiveDate||pr.planDate,status:pr.status,level:pr.status==='done'?3:pr.status==='inprog'?2:1,note:pr.line||pr.note||''});
  if(!candidates.length)return {status:'аёЈаёӯ Planner',badge:'bba',receiveDate:'',source:'-',qty:0,detail:'аёўаёұаёҮа№„аёЎа№Ҳаёһаёҡ PO/SO/аёӘаёұа№ҲаёҮаёңаёҘаёҙаё•аё—аёөа№Ҳ link аёҒаёұаёҡ Forecast аёҷаёөа№ү'};
  candidates.sort((a,b)=>(b.level-a.level)||String(a.date||'9999').localeCompare(String(b.date||'9999')));
  const best=candidates[0];
  const status=best.level>=3?'аёһаёЈа№үаёӯаёЎ/а№„аё”а№үаёЈаёұаёҡа№ҒаёҘа№үаё§':best.level===2?'аёЎаёөа№ҒаёңаёҷаёЈаёұаёҡаёӮаёӯаёҮ':'аёЈаёӯаёңаёҘаёҙаё•';

  return {status,badge,receiveDate:best.date||'',source:best.src,ref:best.ref||'',qty:best.qty||0,detail:[best.src,best.ref,best.note].filter(Boolean).join(' В· '),items:candidates};

function _fcGridKey(month,cust,tpl){return `${month||''}|${cust||'ALL'}|${tpl||'week'}`;}
function _fcTplLabel(tpl){return tpl==='day'?'аёЈаёІаёўаё§аёұаёҷ':tpl==='month'?'аёЈаёІаёўа№Җаё”аё·аёӯаёҷ':tpl==='cust'?'аёЈаёІаёўаёҘаё№аёҒаё„а№үаёІ':'аёЈаёІаёўаёӘаёұаёӣаё”аёІаё«а№Ң';}
function _fcTemplateCols(selMonth,tpl){
  const [yr,mo]=selMonth?selMonth.split('-').map(Number):[new Date().getFullYear(),new Date().getMonth()+1];
  const mm=String(mo).padStart(2,'0');
  const lastDay=new Date(yr,mo,0).getDate();
  if(tpl==='day') return Array.from({length:lastDay},(_,i)=>{
    const d=String(i+1).padStart(2,'0');
    return {lbl:d,sub:'',date:`${yr}-${mm}-${d}`,start:`${yr}-${mm}-${d}`,end:`${yr}-${mm}-${d}`};
  });
  if(tpl==='month') return [{lbl:'а№Җаё”аё·аёӯаёҷаёҷаёөа№ү',sub:`01-${String(lastDay).padStart(2,'0')}`,date:`${yr}-${mm}-01`,start:`${yr}-${mm}-01`,end:`${yr}-${mm}-${String(lastDay).padStart(2,'0')}`}];
  return [1,8,15,22].map((d,i)=>{
    const e=[7,14,21,lastDay][i];
    const dd=String(d).padStart(2,'0'),ee=String(Math.min(e,lastDay)).padStart(2,'0');
    return {lbl:`аёӘаёұаёӣаё”аёІаё«а№Ң ${i+1}`,sub:`${dd}-${ee}`,date:`${yr}-${mm}-${dd}`,start:`${yr}-${mm}-${dd}`,end:`${yr}-${mm}-${ee}`};
  });
}
function _fcColIndexForDate(date,cols){
  const d=String(date||'').slice(0,10);
  return cols.findIndex(c=>d>=c.start&&d<=c.end);
}
function fcgRow(sku){

}
function fcgFooter(){
  let all=0;const maxCol=Math.max(-1,...[...document.querySelectorAll('.fcg-inp')].map(el=>Number(el.dataset.col)||0));
  for(let i=0;i<=maxCol;i++){let s=0;document.querySelectorAll(`.fcg-inp[data-col="${i}"]`).forEach(el=>s+=parseFloat(el.value||0));const el=document.getElementById(`fcg-ftot-${i}`);if(el)el.textContent=s>0?Math.round(s).toLocaleString():'';all+=s;}

}

    const stateKey = _fcGridKey(selMonth, window._fcCust||'', window._fcTpl||'week');
    const showSkuCodes = window._fcGridSkus?.[stateKey] || [];
    const lines = showSkuCodes.slice(0,25).map(code=>{
      const h = hist[code]?.monthly||{};
      const vals = Object.entries(h).filter(([ym])=>ym<=curYm).sort(([a],[b])=>b.localeCompare(a)).slice(0,6);
      const monthly = vals.map(([ym,qty])=>`${ym.slice(5)}:${Math.round(qty)}`).reverse().join(' ');
      const fc = fcAll.filter(f=>f.sku===code).slice(0,2).map(f=>(f.delivDate||f.month||'').slice(0,7)+':'+f.qty).join(',');
      return `${code}[${monthly}]${fc?'FC('+fc+')':''}`; 
    }).join('\n');
    const reply = await callClaude(
      'аё„аёёаё“а№Җаёӣа№Үаёҷ AI Forecast аё•аёӯаёҡ JSON а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ аё«а№үаёІаёЎаёЎаёөаёӮа№үаёӯаё„аё§аёІаёЎаёӯаё·а№Ҳаёҷ аёЈаё№аёӣа№Ғаёҡаёҡ: {"SKU": аё•аёұаё§а№ҖаёҘаёӮаёҒаёҒ.аё•а№Ҳаёӯа№Җаё”аё·аёӯаёҷ} аёӣаёұаё”а№Җаёӣа№ҮаёҷаёЈа№үаёӯаёў',
      'аёўаёӯаё”аёӮаёІаёў 6 а№Җаё”аё·аёӯаёҷ (аёҒаёҒ./а№Җаё”аё·аёӯаёҷ):\n'+lines+'\n\nа№Җаё”аё·аёӯаёҷ '+selMonth+': а№Ғаёҷаё°аёҷаёі Forecast аёҒаёҒ./а№Җаё”аё·аёӯаёҷ а№Ғаё•а№ҲаёҘаё° SKU аё•аёӯаёҡ JSON а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ'
    );
    const match = reply.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('а№„аёЎа№Ҳа№„аё”а№үаёЈаёұаёҡ JSON аёҲаёІаёҒ AI');
    const suggest = JSON.parse(match[0]);
    window._fcAISuggest = suggest;
    document.querySelectorAll('.fc-ai-cell').forEach(el=>{
      const sku = el.dataset.sku;
      const qty = suggest[sku] || 0;
      if(qty > 0){
        el.innerHTML = '<span style="color:var(--BL);font-weight:700;font-size:12px">'+Math.round(qty).toLocaleString()+'</span><br><button class="btn btn-xs btn-ai" onclick="fcFillAISuggest(\''+sku+'\')" style="padding:1px 6px;font-size:10px;margin-top:2px">аёҒаёЈаёӯаёҒ</button>';
      } else {
        el.innerHTML = '<span style="color:var(--TX3);font-size:11px">вҖ”</span>';
      }
    });
    toast('AI Suggest а№Ӯаё«аёҘаё”а№ҖаёӘаёЈа№ҮаёҲ');
  }catch(e){
    document.querySelectorAll('.fc-ai-cell').forEach(el=>{
      el.innerHTML='<span style="color:var(--R);font-size:10px">x</span>';
    });
    toast('AI: ' + e.message);
  }finally{
    if(loadBtn){ loadBtn.textContent='а№Ӯаё«аёҘаё”'; loadBtn.disabled=false; }
  }
}
function fcFillAISuggest(sku){
  const qty = Math.round((window._fcAISuggest||{})[sku] || 0);
  if(!qty) return;
  const cols = [...document.querySelectorAll('.fcg-inp[data-sku="'+sku+'"]')];
  const n = cols.length;
  if(!n) return;
  const perCol = Math.round(qty / n / 100) * 100;
  cols.forEach(function(el, i){
    const v = i < n-1 ? perCol : Math.max(0, qty - perCol*(n-1));
    el.value = v || '';
    el.style.background = v > 0 ? '#eff6ff' : '';
  });
  fcgRow(sku);
}
function fcFillAllAISuggest(){
  const suggest = window._fcAISuggest || {};
  if(!Object.keys(suggest).length){ toast('аёҒаё” "а№Ӯаё«аёҘаё”" аё—аёөа№Ҳаё«аёұаё§аё„аёӯаёҘаёұаёЎаёҷа№Ң AI аёҒа№Ҳаёӯаёҷ'); return; }
  Object.keys(suggest).forEach(function(sku){ fcFillAISuggest(sku); });

}

function fcImportExcel(input){
  const file=input.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=async e=>{
    try{
      await ensureXLSX();
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const rows=data.slice(1).filter(r=>r.some(v=>String(v||'').trim()!==''));
      const txt=rows.map(r=>r.join('\t')).join('\n');
      const ta=document.getElementById('fc-entry-paste');
      if(ta)ta.value=txt;
      toast(`а№Ӯаё«аёҘаё” ${rows.length} а№Ғаё–аё§аёҲаёІаёҒ Excel вҖ” аёҒаё” "рҹ’ҫ аёҡаёұаёҷаё—аё¶аёҒаёҲаёІаёҒаё•аёІаёЈаёІаёҮ" а№Җаёһаё·а№Ҳаёӯаёҡаёұаёҷаё—аё¶аёҒ`);
    }catch(ex){toast('аёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ңа№„аёЎа№Ҳа№„аё”а№ү: '+ex.message,'warn');}
    input.value='';
  };
  rd.readAsBinaryString(file);
}

function planStkT() {
  const rows = window._planRows || [];
  const grp  = document.getElementById('gf')?.value || '';
  const q    = (document.getElementById('ss')?.value || '').toLowerCase();
  const crits = (_psCrits && _psCrits.length) ? _psCrits : ['avg3'];
  _psInitPeriod();
  const selYm = window._psPeriodYm || '';
  const nowD = new Date();
  const curYm = `${nowD.getFullYear()}-${String(nowD.getMonth()+1).padStart(2,'0')}`;
  let periodDays = 0;
  if(selYm && selYm > curYm){
    const [sy,sm] = selYm.split('-').map(Number);
    const selDate = new Date(sy, sm-1, 28);
    periodDays = Math.max(0, Math.round((selDate - nowD)/(864e5)));
  }
  const periodLbl = {[curYm]:''};
  const critLabels = {avg3:'avg3m',avg4:'avg4m',last1:'last1m',prevyear:'prevYear',weekly:'weekly'};
  const titleEl = document.getElementById('ps-title');
  const periodSuffix = (selYm && selYm !== curYm) ? ` (аё–аё¶аёҮ ${mL(selYm)})` : '';
  if (titleEl) titleEl.textContent = `Stock Planning вҖ” ${crits.map(c=>PS_CRITS_ALL.find(x=>x.key===c)?.lbl||c).join(', ')}${periodSuffix}`;

  // SKU filter
  const skuActive = _skuFilter?.active || [];

  let filtered = [...rows];
  if (grp && productGroups()[grp]) {
    const set = new Set(productGroups()[grp]);
    filtered = filtered.filter(r => set.has(r.code));
  }
  if (q) filtered = filtered.filter(r =>
    (r.code || '').toLowerCase().includes(q) ||
    (r.name || '').toLowerCase().includes(q)
  );
  if (skuActive.length > 0) filtered = filtered.filter(r => skuActive.includes(r.code));

  // а№Ӯаё«аёҘаё”аёӮа№үаёӯаёЎаё№аёҘ forecast + PO + bookings
  const fcLS = DB.get('forecasts') || [];
  const poLS = DB.get('po_log')    || [];
  const fcSB = window._sbForecasts || [];
  const poSB = window._sbPOPlans   || [];
  const bkAll = DB.get('bookings') || [];
  const fc   = [...fcLS, ...fcSB.map(f => ({sku: f.sku, qty: f.qty, fcType: f.fcType||f.fc_type||'PO'}))];
  const po   = [...poLS, ...poSB.map(p => ({sku: p.sku, qty: p.qty, status: p.status}))];

  filtered = filtered.map(r => {
    const hist = (window._salesHistCache?.[r.code]?.monthly) || ALL_HIST[r.code]?.monthly || {};
    const vals = Object.entries(hist).sort(([a],[b]) => a.localeCompare(b)).map(([,v]) => Number(v)||0).filter(v => v > 0);
    const avg  = arr => arr.length ? arr.reduce((s,v) => s+v, 0)/arr.length : 0;
    const a3   = r.avg3_monthly || avg(vals.slice(-3)) || 0;

    // аё„аёіаёҷаё§аё“ benchmark аё•аёІаёЎа№Ғаё•а№ҲаёҘаё°а№ҖаёҒаё“аё‘а№Ң
    const benchMap = {};
    crits.forEach(c => {
      let b = a3;
      if      (c === 'avg4')     b = (r.avg4_monthly  ?? avg(vals.slice(-4))) || a3;
      else if (c === 'last1')    b = (r.last_month    ?? vals.slice(-1)[0])   || a3;
      else if (c === 'prevyear') {
        const [py,pm]=(selYm||curYm).split('-').map(Number);
        b = hist[`${py-1}-${String(pm).padStart(2,'0')}`] || r.prevyear_monthly || a3;
      }
      else if (c === 'weekly')   b = a3 / 4;
      benchMap[c] = b;
    });
    const bench = benchMap[crits[0]] || a3; // primary benchmark for sort

    const fcTotal = fc.filter(f => f.sku === r.code).reduce((s,f) => s + (f.qty||0), 0);
    const fcPO   = fc.filter(f => f.sku === r.code && (f.fcType||'PO')==='PO').reduce((s,f)=>s+(f.qty||0),0);
    const fcProd = fc.filter(f => f.sku === r.code && (f.fcType||'PO')==='production').reduce((s,f)=>s+(f.qty||0),0);
    const poTotal = po.filter(p => p.sku === r.code && p.status !== 'completed').reduce((s,p) => s + (p.qty||0), 0);
    const bkProduce = bkAll.filter(b => b.sku === r.code && b.stockStatus === 'produce' && b.status !== 'cancelled').reduce((s,b) => s + (b.qty||0), 0);

    // а№ғаёҠа№ү available_qty (аё«аёұаёҒ reservation) аё–а№үаёІаёЎаёөаёҲаёІаёҒ v_stock_planning, fallback а№„аёӣ stock_qty
    const baseStock = r.available_qty ?? r.stock_qty ?? 0;
    const reservedQty = r.reserved_qty ?? 0;

    // Period projection (а№ғаёҠа№ү primary bench)
    const consumed  = bench > 0 ? bench * (periodDays / 30) : 0;
    const poArrived = periodDays >= 14 ? poTotal : 0;
    const effStock  = periodDays > 0 ? Math.max(0, baseStock - consumed + poArrived) : baseStock;

    // Days remaining per criterion
    const daysMap = {};
    crits.forEach(c => {
      const b = benchMap[c];
      const unit = c === 'weekly' ? 7 : 30;
      daysMap[c] = b > 0 ? Math.round(effStock / b * unit) : 9999;
    });
    const daysComp = daysMap[crits[0]] || 9999;

    const prodOrd=(window._prodOrders||[]).filter(o=>o.sku===r.code&&o.status!=='done').reduce((s,o)=>s+(Number(o.qty)||0),0);
    const recQty=Math.max(0,Math.ceil(Math.max((r.min_stock||0)-effStock,0)+bench));
    return {...r, _bench: bench, _days: daysComp, _effStock: effStock, _fcTotal: fcTotal, _fcPO: fcPO, _fcProd: fcProd, _poTotal: poTotal, _benchMap: benchMap, _daysMap: daysMap, _bkProduce: bkProduce, _reserved: reservedQty, _prodOrdered: prodOrd, _recQty: recQty};
  });

  const sc = _psSort.col, sd = _psSort.dir;
  if      (sc === 'code')  filtered.sort((a,b) => sd*(a.code||'').localeCompare(b.code||''));
  else if (sc === 'stock') filtered.sort((a,b) => sd*(b._effStock - a._effStock));
  else if (sc === 'bench') filtered.sort((a,b) => sd*(b._bench - a._bench));
  else if (sc === 'min')   filtered.sort((a,b) => sd*(b.min_stock - a.min_stock));
  else                     filtered.sort((a,b) => sd*(a._days - b._days));

  const tbl = document.getElementById('ps-tbl');
  if (!tbl) return;
  const sA    = col => sc === col ? (sd > 0 ? 'в–І' : 'в–ј') : '';
  const thS   = col => `style="text-align:right;cursor:pointer;user-select:none" onclick="psSortBy('${col}')"`;
  const stockH = periodDays > 0 ? `Stock(proj${periodSuffix})` : 'Stock';

  // Multiple criteria columns
  const critCols = crits.map(c => {
    const info = PS_CRITS_ALL.find(x=>x.key===c)||{lbl:c};
    const hdr = c==='weekly'?'аё§аёұаёҷ/wk':'аё§аёұаёҷ/а№Җаё”аё·аёӯаёҷ';
    return `<th style="text-align:right;white-space:nowrap;color:var(--P)">${info.lbl}<br><span style="font-weight:400;font-size:10px">${hdr}</span></th>`;

  tbl.innerHTML = `<div class="tw"><table>

    <th style="cursor:pointer;user-select:none" onclick="psSortBy('code')">аёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ ${sA('code')}</th>
    <th>аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ</th>
    <th ${thS('stock')}>${stockH} ${sA('stock')}</th>

    <th ${thS('min')}>аёӮаёұа№үаёҷаё•а№Ҳаёі ${sA('min')}</th>
    ${critCols}
    <th style="text-align:right;color:var(--P)">FC-PO</th>

    <th>Action</th>
  </tr></thead>
  <tbody>${filtered.slice(0, 150).map(r => {
    const primaryDays = r._daysMap?.[crits[0]] ?? r._days;

}

function quickOrder(sku){

function ppGanttCols(ref, pt) {
  const cols = [];
  const months = ['аёЎ.аё„.','аёҒ.аёһ.','аёЎаёө.аё„.','а№ҖаёЎ.аёў.','аёһ.аё„.','аёЎаёҙ.аёў.','аёҒ.аё„.','аёӘ.аё„.','аёҒ.аёў.','аё•.аё„.','аёһ.аёў.','аёҳ.аё„.'];
  const dayNames = ['аёӯаёІ','аёҲ','аёӯ','аёһ','аёһаёӨ','аёЁ','аёӘ'];
  if (pt === 'day') {
    const start = new Date(ref); start.setDate(start.getDate() - 2);
    for (let i = 0; i < 14; i++) {
      const d = new Date(start); d.setDate(d.getDate() + i);
      cols.push({ key: d.toISOString().slice(0,10), lbl: String(d.getDate()).padStart(2,'0'), sub: dayNames[d.getDay()] });
    }
  } else if (pt === 'week') {
    const s = new Date(ref); s.setDate(s.getDate() - s.getDay() + 1);
    for (let i = 0; i < 8; i++) {
      const ws = new Date(s); ws.setDate(ws.getDate() + i*7);
      const we = new Date(ws); we.setDate(we.getDate() + 6);
      cols.push({ key: ws.toISOString().slice(0,10), end: we.toISOString().slice(0,10),
        lbl: `${ws.getDate()}/${ws.getMonth()+1}`, sub: `wk${i+1}` });
    }
  } else if (pt === 'month') {
    const year = ref.getFullYear(), mon = ref.getMonth();
    const days = new Date(year, mon+1, 0).getDate();
    for (let i = 1; i <= days; i++) {
      const d = new Date(year, mon, i);
      cols.push({ key: d.toISOString().slice(0,10), lbl: String(i), sub: dayNames[d.getDay()] });
    }
  } else {
    for (let m = 0; m < 12; m++) {
      const d = new Date(ref.getFullYear(), m, 1);
      cols.push({ key: d.toISOString().slice(0,7), lbl: months[m], sub: '' });
    }
  }
  return cols;
}

  const headerHTML = `

    const prodTot  = info.orders.reduce((s,o) => s+(o.qty||0), 0);
    const fcTotal  = fcAll.filter(f => f.sku===sku).reduce((s,f) => s+(f.qty||0), 0);
    const poTotal  = poAll.filter(p => p.sku===sku && p.status!=='completed' && p.status!=='replaced').reduce((s,p) => s+(p.qty||0), 0);
    const salesAvg = ALL_HIST[sku]?.avg3 || 0;

    const stockColor = stock === 0 ? 'var(--R)' : stock < minStk ? '#C44B0A' : '#0A5940';
    const fmtV = v => !v ? 'вҖ”' : v >= 10000 ? (v/1000).toFixed(0)+'k' : v >= 1000 ? (v/1000).toFixed(1)+'k' : Math.round(v);
    const compLine=(label,val,color)=>`<div style="display:flex;justify-content:space-between;gap:4px;line-height:1.25"><span style="color:${color};font-size:8px">${label}</span><b style="color:${val?color:'var(--TX3)'};font-size:9px">${fmtV(val)}</b></div>`;

    // Date cells вҖ” production + FC/PO comparison per column
    const dateCells = cols.map(col => {
      const os = info.orders.filter(o => inCol(o, col));
      const colFc = fcAll.filter(f => f.sku===sku && inCol({planDate:f.delivDate||''},col));
      const colPo = poAll.filter(p => p.sku===sku && p.status!=='completed' && p.status!=='replaced' && inCol({planDate:p.delivDate||''},col));
      const colActual = actualAll.filter(r => r.sku===sku && inCol({planDate:r.date||''},col));
      const fcQty = colFc.reduce((s,f)=>s+(f.qty||0),0);
      const poQty = colPo.reduce((s,p)=>s+(p.qty||0),0);
      const actQty = colActual.reduce((s,r)=>s+(r.qty||0),0);
      const stockCol = stock;
      const outQty = salesAvg;
      const isTd = pt !== 'year' ? col.key === today : false;
      const bg = isTd ? 'background:#e8f0fe;' : '';
      const fmtT = v => v>=10000?(v/1000).toFixed(0)+'k':v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);
      const prodTotal = os.reduce((s,o) => s+(o.qty||0), 0);
      const color = statusColor[os[0]?.status] || '#6366f1';
      const tip = [`Stock:${stockCol}`,`аёңаёҘаёҙаё•:${prodTotal}`,`аёЈаёұаёҡаёҲаёЈаёҙаёҮ:${actQty}`,`FC:${fcQty}`,`PO:${poQty}`,`аёўаёӯаё”аёӯаёӯаёҒ:${outQty}`].join(' ');
      return `<td style="${bg}border:1px solid var(--BD);padding:3px;min-width:${colW}px;max-width:${colW}px;vertical-align:top" title="${tip.replace(/"/g,'&quot;')}">
        <div style="min-height:54px">
          ${compLine('Stock',stockCol,stockColor)}
          ${prodTotal>0?`<div onclick="ppEditModal('${os[0].id}')" style="background:${color};color:#fff;border-radius:2px;font-size:9px;font-weight:600;padding:1px 3px;text-align:center;cursor:pointer;line-height:1.35;margin:1px 0">аёңаёҘаёҙаё• ${fmtT(prodTotal)}</div>`:compLine('аёңаёҘаёҙаё•',0,'#6366f1')}
          ${actQty>0?compLine('аёЈаёұаёҡаёҲаёЈаёҙаёҮ',actQty,'#0A5940'):''}
          ${compLine('FC',fcQty,'#7C3AED')}
          ${compLine('PO',poQty,'#0A5940')}
          ${compLine('аёўаёӯаё”аёӯаёӯаёҒ',outQty,'#C44B0A')}
        </div>
      </td>`;
    }).join('');

    return `<tr style="height:32px">
      <td style="${tdBase(L.sku,'border-right:2px solid var(--BD);')}padding:3px 8px;min-width:${W.sku}px;max-width:${W.sku}px">
        <div class="mono" style="font-size:9px;color:var(--TX3)">${esc(sku)}</div>
        <div style="font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:${W.sku-16}px" title="${esc(info.name)}">${esc(info.name.substring(0,22))}</div>
      </td>
      ${dateCells}
    </tr>`;
  }).join('');

  return `<div style="overflow-x:auto">
    <table style="border-collapse:collapse;table-layout:fixed;width:max-content">
      <thead>${headerHTML}</thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>
  <div style="display:flex;gap:14px;padding:7px 10px;font-size:11px;color:var(--TX3);flex-wrap:wrap;border-top:1px solid var(--bg2)">
    <b style="color:var(--TX2)">аёӘаё–аёІаёҷаё°аёңаёҘаёҙаё•:</b>
    <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:2px"></span>аёЈаёӯаёңаёҘаёҙаё•</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#3b82f6;border-radius:2px"></span>аёҒаёіаёҘаёұаёҮаёңаёҘаёҙаё•</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:10px;background:#22c55e;border-radius:2px"></span>аёңаёҘаёҙаё•а№ҒаёҘа№үаё§</span>
    <span style="margin-left:8px;color:var(--TX3)">|</span>
    <b style="color:var(--TX2)">а№ғаёҷа№Ғаё•а№ҲаёҘаё°аёҠа№ҲаёӯаёҮа№Җаё§аёҘаёІ:</b>
    <span style="color:#0A5940">Stock</span> В·
    <span style="color:#6366f1">аёңаёҘаёҙаё•</span> В·
    <span style="color:#7C3AED">FC</span> В·
    <span style="color:#0A5940">PO</span> В·
    <span style="color:#C44B0A">аёўаёӯаё”аёӯаёӯаёҒ</span>
  </div>`;
}

function ppSaveOrder(){
  const sku=document.getElementById('pp-sku')?.value||'';
  const qty=parseFloat(document.getElementById('pp-qty')?.value)||0;
  const planDate=document.getElementById('pp-date')?.value||'';
  const line=(document.getElementById('pp-line')?.value||'').trim();
  const receiveDate=document.getElementById('pp-recv')?.value||planDate;
  const note=(document.getElementById('pp-note')?.value||'').trim();
  if(!sku||qty<=0||!planDate){alert('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒаёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ аёҲаёіаёҷаё§аёҷ а№ҒаёҘаё°аё§аёұаёҷаё—аёөа№ҲаёңаёҘаёҙаё•');return;}
  const SKUS=typeof getSkusMerged==='function'?getSkusMerged():SKUS_MASTER;
  const sk=SKUS.find(s=>s.code===sku)||{name:sku};
  const orders=window._prodOrders||DB.get('prod_orders')||[];
  const order={id:genUUID(),sku,skuName:sk.name||sku,qty,planDate,receiveDate,line,note,status:'pending',by:UID,ts:Date.now(),edited_by:UID,edited_at:new Date().toISOString()};
  orders.unshift(order);
  window._prodOrders=orders;
  DB.set('prod_orders',orders);
  audit('ADD_PROD_ORDER',order.id,{sku,qty,planDate,line});
  closeM();
  toast('аёҡаёұаёҷаё—аё¶аёҒаёЈаёІаёўаёҒаёІаёЈаёӘаёұа№ҲаёҮаёңаёҘаёҙаё•а№ҒаёҘа№үаё§');
  SB.upsertProdOrder(order).then(ok=>{
    if(ok){CACHE.clear('fc_prod_links');toast('Sync а№ҒаёңаёҷаёңаёҘаёҙаё•а№ҒаёҘа№үаё§');}
    else toast('аёҡаёұаёҷаё—аё¶аёҒ offline вҖ” Supabase sync аёҘа№үаёЎа№Җаё«аёҘаё§','warn');
  }).catch(e=>{console.warn('upsertProdOrder:',e);toast('аёҡаёұаёҷаё—аё¶аёҒ offline а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ: '+e.message,'warn');});
  ppRender();
}
function ppEditOrder(id, field, value){
  const orders = window._prodOrders || DB.get('prod_orders') || [];
  const order = orders.find(o => o.id === id);
  if(!order) return;

  const oldValue = order[field];
  if(field === 'qty') value = parseFloat(value) || 0;
  if(field === 'planDate' && !value) return; // Don't allow empty date

  order[field] = value;
  order.edited_by = UID;
  order.edited_at = new Date().toISOString();

  window._prodOrders=orders;
  DB.set('prod_orders', orders);
  SB.upsertProdOrder(order).then(ok=>{if(ok)CACHE.clear('fc_prod_links');}).catch(console.warn);
  audit('EDIT_PROD_ORDER', id, {field, oldValue, newValue: value});

  // Link to WMS if status changed to done
  if(field === 'status' && value === 'done') {
    ppLinkToWMS(order);
  }

  ppRender();
}

function ppDeleteOrder(id){
  if(!confirm('аёҘаёҡаёЈаёІаёўаёҒаёІаёЈаёӘаёұа№ҲаёҮаёңаёҘаёҙаё•аёҷаёөа№ү?')) return;
  const orders = window._prodOrders || DB.get('prod_orders') || [];
  const index = orders.findIndex(o => o.id === id);
  if(index === -1) return;

  const deleted = orders.splice(index, 1)[0];
  window._prodOrders=orders;
  DB.set('prod_orders', orders);
  SB.deleteProdOrder(id).then(ok=>{if(ok)CACHE.clear('fc_prod_links');}).catch(console.warn);
  audit('DELETE_PROD_ORDER', id, deleted);
  ppRender();
}

function ppLinkToWMS(order){
  // Link production completion to WMS stock entry
  const stockEntry = {
    sku: order.sku,
    qty: order.qty,
    lot_no: `PROD-${order.id}`,
    exp_date: null, // Production doesn't have expiration
    location: 'PRODUCTION',
    type: 'production_in',
    ref_id: order.id,
    ref_type: 'prod_order',
    created_by: UID,
    created_at: new Date().toISOString(),
    notes: `Production completed: ${order.line || ''} ${order.note || ''}`
  };

  // This would normally call WMS API, but for now we'll store locally
  // In real implementation, this should call WMS API to add stock
  console.log('Linking to WMS:', stockEntry);
  toast(`аёӘа№ҲаёҮаёӮа№үаёӯаёЎаё№аёҘаёҒаёІаёЈаёңаёҘаёҙаё•а№„аёӣ WMS аёӘаёіаё«аёЈаёұаёҡ ${order.sku} (${order.qty} аёҒаёҒ.)`);
}
function ppExport(){
  const orders=window._prodOrders||DB.get('prod_orders')||[];
  const {s,e,lbl}=ppGetRange();
  const rows=orders.filter(o=>{const d=new Date(o.planDate);return d>=s&&d<e;})
    .map(o=>[o.planDate,o.sku,o.skuName||'',o.qty,o.line||'',o.status,o.note||'',o.by||'']);
  toXLSX([['ProdOrders',['аё§аёұаёҷаёңаёҘаёҙаё•','аёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ','аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ','аёҲаёіаёҷаё§аёҷ(аёҒаёҒ.)','аёӘаёІаёўаёңаёҘаёҙаё•','аёӘаё–аёІаёҷаё°','аё«аёЎаёІаёўа№Җаё«аё•аёё','аёӘаёЈа№үаёІаёҮа№Ӯаё”аёў'],rows]],`ProdPlan_${lbl.replace(/\//g,'-')}.xlsx`);

// Default app scope shows TSS + TSSNV only. Dashboard can opt in to add TGM.
function _normalizeCompanyScope(v){
  const s=String(v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(s.startsWith('TGM')) return 'TGM';
  if(s.startsWith('CONSI')) return 'CONSI';
  if(s==='TSSNV' || s.startsWith('TSSN') || s.includes('NV')) return 'TSSNV';
  if(s.startsWith('TSS')) return 'TSS';
  return 'TSS';
}
function _plantCompany(plant){ return _normalizeCompanyScope(plant); }
function _skuCompanyFromProduct(prod={}, code=''){
  if(prod?.company) return _normalizeCompanyScope(prod.company);
  if(prod?.plant) return _normalizeCompanyScope(prod.plant);
  if(prod?.branch) return _normalizeCompanyScope(prod.branch);
  const skuCode=String(code || prod?.code || prod?.sku || prod?.sku_code || '').trim();
  const master=(typeof SKUS_MASTER!=='undefined' ? SKUS_MASTER : []).find(s=>String(s.code)===skuCode);
  if(master?.company) return _normalizeCompanyScope(master.company);
  if(master?.plant) return _normalizeCompanyScope(master.plant);
  return 'TSS';
}
function _rowSku(row={}){
  return row?.sku || row?.code || row?.prod_code || row?.product_code || row?.sku_code || row?.item_code || '';
}
function _rowCompany(row={}){
  if(row?.company) return _normalizeCompanyScope(row.company);
  if(row?.branch) return _normalizeCompanyScope(row.branch);
  if(row?.slm_id && String(row.slm_id).includes(':')) return _normalizeCompanyScope(String(row.slm_id).split(':')[0]);
  return _skuCompanyFromProduct(row, _rowSku(row));
}
function _allowedCompanies(opts={}){
  const companies = opts?.includeTgm ? ['TSS','TSSNV','TGM'] : ['TSS','TSSNV'];
  if(opts?.includeConsi) companies.push('CONSI');
  return new Set(companies);
}
function _isAllowedCompanyRecord(row={}, opts={}){
  return _allowedCompanies(opts).has(_rowCompany(row));
}
function _isTgmSkuRecord(row={}){
  return !_isAllowedCompanyRecord(row);
}
function _filterTgmRecords(rows=[], opts={}){
  return (rows||[]).filter(r=>_isAllowedCompanyRecord(r, opts));
}
function _filterTgmSkuRows(rows=[], opts={}){
  return (rows||[]).filter(r=>_isAllowedCompanyRecord(r, opts));
}
function _filterTgmStockMap(map={}, opts={}){
  return Object.fromEntries(Object.entries(map||{}).filter(([sku])=>_isAllowedCompanyRecord({code:sku}, opts)));
}
function _companyTotals(rows=[]){
  return (rows||[]).reduce((acc,r)=>{
    const company=_rowCompany(r);
    acc[company]=acc[company]||{qty:0,amount:0,count:0};
    acc[company].qty += Number(r.qty)||0;
    acc[company].amount += Number(r.amount)||0;
    acc[company].count += 1;
    return acc;
  },{});
}

  try{

function getRoleLabel(role, dept){
  const deptLabel = dept==='sales'?'Sales':dept==='planning'?'Planning':'';
  const map={
    superadmin:'Super Admin', admin:'Administrator',
    manager:`Manager${deptLabel?' ('+deptLabel+')':''}`,
    officer:`Officer${deptLabel?' ('+deptLabel+')':''}`,
    worker:`Worker${deptLabel?' ('+deptLabel+')':''}`,
    // new dept-specific keys
    sales_manager:'Sales Manager', sales_officer:'Sales Officer', sales_worker:'Sales Worker',
    planning_manager:'Planning Manager', planning_officer:'Planning Officer', planning_worker:'Planning Worker',
    // backward-compat
    sales:'Sales', planning:'Planning', warehouse:'Warehouse',
  };
  return map[role]||role;
}

// в”Җв”Җ helper: аё•аёЈаё§аёҲ department аёӮаёӯаёҮ user аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function userDept(){return(CURRENT_USER?.department||'').toLowerCase();}
function isSales(){return userDept()==='sales'||ROLE==='sales'||ROLE==='sales_manager'||ROLE==='sales_officer'||ROLE==='sales_worker';}
function isPlanning(){return userDept()==='planning'||ROLE==='planning'||ROLE==='planning_manager'||ROLE==='planning_officer'||ROLE==='planning_worker';}
function isManager(){return['superadmin','admin','manager','sales_manager','planning_manager'].includes(ROLE)||ROLE==='manager';}

function buildSB(){
  const customPerms=DB.get('nav_perms')||{};
  const deptPerms=DB.get('nav_perms_deptpos')||{};
  const me=(DB.get('users')||[]).find(u=>u.uid===UID)||CURRENT_USER||{};
  const dept=(me.department||CURRENT_USER?.department||'').toLowerCase();
  const dkey=`${me.department||''}|${me.position||''}`;

  // в”Җв”Җ аёЈаё§аёЎ lookup а№„аёӯаё„аёӯаёҷаёҲаёІаёҒаё—аёёаёҒ RNAV в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const lookup={};
  Object.values(RNAV).flat().forEach(([id,ico,lbl])=>{if(!lookup[id])lookup[id]=[id,ico,lbl];});

  let navItems=[];

  // 1. аё–а№үаёІаёЎаёө dept+position override аёҲаёІаёҒ IT вҶ’ а№ғаёҠа№үаёҒа№Ҳаёӯаёҷа№ҖаёӘаёЎаёӯ (аёўаёҒа№Җаё§а№үаёҷ superadmin)
  if(ROLE!=='superadmin' && deptPerms[dkey]?.pages?.length){
    navItems=deptPerms[dkey].pages.map(id=>lookup[id]).filter(Boolean);
  }
  // 2. аё–а№үаёІа№„аёЎа№ҲаёЎаёө override вҶ’ а№ҖаёҘаё·аёӯаёҒ RNAV аё•аёІаёЎ role Г— dept
  else if(ROLE==='superadmin'){
    navItems=RNAV.superadmin;
  } else if(ROLE==='admin'){
    navItems=RNAV.admin;
  } else if(['manager','officer','worker'].includes(ROLE)){
    // 5-level generic roles вҶ’ combine аёҒаёұаёҡ dept
    const navKey = dept ? `${dept}_${ROLE}` : ROLE;
    navItems=RNAV[navKey]||RNAV[ROLE]||[];
  } else {
    // dept-specific keys (sales_manager, planning_officer, аёҜаёҘаёҜ) аё«аёЈаё·аёӯ roles а№Җаё”аёҙаёЎ
    navItems=RNAV[ROLE]||[];
  }

  // 3. аё–а№үаёІаёўаёұаёҮаё§а№ҲаёІаёҮаёӯаёўаё№а№Ҳ вҶ’ fallback аёҲаёІаёҒ role manager
  if(!navItems.length){
    const lookup2={};
    Object.values(RNAV).flat().forEach(([id,ico,lbl])=>{if(!lookup2[id])lookup2[id]=[id,ico,lbl];});
    const rolePages=(typeof _getRoles==='function'&&_getRoles()[ROLE]?.pages)||customPerms[ROLE]?.pages||[];
    if(rolePages.length) navItems=rolePages.map(id=>lookup2[id]).filter(Boolean);
  }

  document.getElementById('sb-nav').innerHTML=navItems.map(([id,ico,lbl])=>`<div class="ni" id="ni-${id}" onclick="nav('${id}')"><span class="ni-ico">${ico}</span><span>${lbl}</span></div>`).join('');
  document.getElementById('sb-av').textContent=(UID||'??').substring(0,2).toUpperCase();
  document.getElementById('sb-un').textContent=UNAME||UID;
  document.getElementById('sb-ur').textContent=getRoleLabel(ROLE, dept);
}

function salesMaster(){
  const rows={};
  const add=(code,name='',source='Express')=>{
    code=String(code||'').trim();if(!code)return;
    if(!rows[code])rows[code]={code,name:name||code,nickname:'',phone:'',email:'',active:true,source};
    else if(name&&(!rows[code].name||rows[code].name===rows[code].code))rows[code].name=name;
  };
  (SLM_IDS||[]).forEach(code=>add(code,code,'Express'));
  Object.keys(SLM_CUSTS||{}).forEach(code=>add(code,code,'Express customer map'));
  (SD_SALES||[]).forEach(s=>add(s.c,s.n,'Sales history'));
  (DB.get('users')||[]).forEach(u=>{if(u.slm_id||u.role==='sales')add(u.slm_id||u.uid,u.name,'User');});
  const overrides=salesMasterOverrides();
  Object.entries(overrides).forEach(([code,row])=>{
    code=String(row.code||code||'').trim();if(!code)return;
    rows[code]={...(rows[code]||{code,source:'Manual'}),...row,code};
    if(rows[code].active!==false)rows[code].active=true;
  });
  return Object.values(rows).sort((a,b)=>String(a.code).localeCompare(String(b.code),'th',{numeric:true}));
}

function customerGroupForCode(code,fallback='аёӯаё·а№Ҳаёҷа№Ҷ'){
