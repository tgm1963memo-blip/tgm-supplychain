function getCustomerProfile(c){
  const prof=customerProfiles()[c.c]||{};
  return {
    ...c,
    corp:prof.corporate||prof.corp||customerGroupForCode(c.c,c.grp||'аёӯаё·а№Ҳаёҷа№Ҷ'),
    category:prof.category||c.ty||'а№„аёЎа№ҲаёЈаё°аёҡаёё',
    slm:prof.slm||c.slm||'',
    n:prof.name||c.n
  };
}
function salesCustomers(){return allCustomerRows();}
function allCustomerRows(extraCodes=null){
  const remCache=DB.get('remote_customers_cache')||[];
  const remMap=Object.fromEntries(remCache.map(x=>[String(x.code||''),x]));
  const rows=SD_CUSTS.map(getCustomerProfile);
  const seen=new Set(rows.map(c=>c.c));

  // Layer 1: customers table аёҲаёІаёҒ Express (remote_customers_cache)
  remCache.forEach(r=>{
    const code=String(r.code||'').trim();
    if(!code||seen.has(code))return;
    rows.push(getCustomerProfile({c:code,n:r.name||code,ty:r.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp:r.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ',slm:r.slm_id||'',w:[0,0,0,0],g:[]}));
    seen.add(code);
  });

  // Layer 2: CUST_NAMES static
  if(typeof CUST_NAMES==='object'){
    Object.entries(CUST_NAMES).forEach(([code,name])=>{
      if(!seen.has(code)){
        rows.push(getCustomerProfile({c:code,n:name,ty:'а№„аёЎа№ҲаёЈаё°аёҡаёё',grp:'аёӯаё·а№Ҳаёҷа№Ҷ',slm:'',w:[0,0,0,0],g:[]}));
        seen.add(code);
      }
    });
  }

  // Layer 3: PROD_CUST вҖ” customer codes аё—аёөа№Ҳа№Җаё„аёўаёЎаёөаёўаёӯаё”аёӮаёІаёў (historical weights)
  if(typeof PROD_CUST==='object'){
    Object.values(PROD_CUST).forEach(slmObj=>
      Object.values(slmObj||{}).forEach(custObj=>
        Object.keys(custObj||{}).forEach(code=>{
          if(!code||seen.has(code))return;
          const r=remMap[code];
          rows.push(getCustomerProfile({c:code,n:CUST_NAMES?.[code]||r?.name||code,ty:r?.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp:r?.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ',slm:r?.slm_id||'',w:[0,0,0,0],g:[]}));
          seen.add(code);
        })
      )
    );
  }

  // Layer 4: extraCodes аёҲаёІаёҒ sales_transactions (async, passed in by caller)
  if(extraCodes instanceof Set){
    extraCodes.forEach(code=>{
      if(!code||seen.has(code))return;
      const r=remMap[code];
      rows.push(getCustomerProfile({c:code,n:CUST_NAMES?.[code]||r?.name||code,ty:r?.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp:r?.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ',slm:r?.slm_id||'',w:[0,0,0,0],g:[]}));
      seen.add(code);
    });
  }

  return rows.sort((a,b)=>String(a.c).localeCompare(String(b.c),'th'));
}

async function toXLSX(sheets,fname){
  await ensureXLSX();
  const wb=XLSX.utils.book_new();
  sheets.forEach(([name,cols,rows])=>{
    const ws=XLSX.utils.aoa_to_sheet([cols,...rows]);
    ws['!cols']=cols.map(c=>({wch:Math.max(c.length+2,12)}));
    XLSX.utils.book_append_sheet(wb,ws,name.substring(0,31));
  });
  XLSX.writeFile(wb,fname);
  toast('Export: '+fname);
}

    models: ['claude-haiku-4-5-20251001','claude-sonnet-4-6'],
    defaultModel: 'claude-haiku-4-5-20251001',
    keyPlaceholder: 'sk-ant-api03-...',
    keyHint: 'console.anthropic.com',
    keyHintUrl: 'https://console.anthropic.com',
  },
};

function _aiProvider(){ return DB.get('ai_provider') || 'groq'; }
function _aiKey(){ return DB.get('ai_key') || ''; }
function _aiModel(){
  const saved = DB.get('ai_model');
  const p = _AI_PROVIDERS[_aiProvider()];
  return (saved && p.models.includes(saved)) ? saved : p.defaultModel;
}

async function callAI(system, user){
  const key = _aiKey();
  const prov = _aiProvider();
  const cfg = _AI_PROVIDERS[prov];
  if(!key) throw new Error(`аёўаёұаёҮа№„аёЎа№Ҳа№„аё”а№үаё•аёұа№үаёҮаё„а№ҲаёІ API Key\nаёҒаё” вҡҷпёҸ AI Settings а№Җаёһаё·а№Ҳаёӯа№ғаёӘа№Ҳ Key`);
  const model = _aiModel();

  let res;
  if(prov === 'claude'){
    res = await fetch(cfg.url, {
      method:'POST',
      headers:{ 'x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json' },
      body: JSON.stringify({ model, max_tokens:1500, system, messages:[{role:'user',content:user}] })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Claude Error ${res.status}`); }
    const d = await res.json();
    return d.content?.[0]?.text || '';
  } else {
    // Groq / OpenAI-compatible
    res = await fetch(cfg.url, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${key}`,'content-type':'application/json' },
      body: JSON.stringify({ model, max_tokens:1500, messages:[{role:'system',content:system},{role:'user',content:user}] })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||`Groq Error ${res.status}`); }
    const d = await res.json();
    return d.choices?.[0]?.message?.content || '';
  }
}

    );
    const match = reply.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('AI а№„аёЎа№Ҳа№„аё”а№үаё•аёӯаёҡа№Җаёӣа№Үаёҷ JSON');
    const suggest = JSON.parse(match[0]);
    let filled = 0;
    Object.entries(suggest).forEach(function([sku,qty]){
      const inp = document.querySelector('.ps-rec-inp[data-sku="'+sku+'"]');
      if(inp && qty >= 0){ inp.value = Math.round(qty); inp.style.background = qty > 0 ? '#eff6ff' : ''; filled++; }

    toast('AI Error: ' + e.message);

    if(btn){ btn.disabled=false; btn.textContent='рҹӨ– AI аёҒаёЈаёӯаёҒа№Ғаёҷаё°аёҷаёіаёңаёҘаёҙаё•'; }
  }
}

// в”Җв”Җ DASHBOARD в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function _histFromSalesRows(rows){
  const bySku={};
  for(const r of rows||[]){
    if(!bySku[r.prod_code]) bySku[r.prod_code]={name:r.prod_name||r.prod_code,monthly:{},avg3:0};
    bySku[r.prod_code].monthly[r.ym]=(bySku[r.prod_code].monthly[r.ym]||0)+(Number(r.qty)||0);
  }
  const months=[...new Set((rows||[]).map(r=>r.ym))].sort();
  const last3=months.slice(-3);
  Object.values(bySku).forEach(h=>{
    const vals=last3.map(m=>Number(h.monthly[m])||0).filter(v=>v>0);
    h.avg3=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  });
  return bySku;
}
async function _sbDashboardSalesAggRows(startYm,endYm,includeTgm=false){
  const PAGE=1000;
  let rows=[],from=0;
  while(true){
    let q=getSupabaseClient()
      .from('v_sc_dashboard_sales_monthly')
      .select('ym,company,prod_code,prod_name,prod_group,qty,amount,invoice_count')
      .gte('ym',startYm).lte('ym',endYm)
      .order('ym')
      .range(from,from+PAGE-1);
    const {data,error}=await q;
    if(error) throw error;
    rows=rows.concat(data||[]);
    if(!data||data.length<PAGE)break;
    from+=PAGE;
  }
  return rows.filter(r=>includeTgm || _isAllowedCompanyRecord({company:r.company,prod_code:r.prod_code},{})).map(r=>({
    branch:r.company||'',
    prefixed:true,
    is_all:false,
    slm_id:'',
    slm_key:'',
    slm_name:'',
    cust_code:'',
    cust_name:'',
    cust_group:'',
    prod_group:r.prod_group||'аёӯаё·а№Ҳаёҷа№Ҷ',
    prod_code:r.prod_code,
    prod_name:r.prod_name||r.prod_code,
    qty:Number(r.qty)||0,
    amount:Number(r.amount)||0,
    invoices:Number(r.invoice_count)||0,
    ym:r.ym,
    company:r.company||''
  }));
}
async function loadDashboardSalesHist(includeTgm = false){
  const range=_twoYearWindow();
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=isSales()?(me?.slm_id||''):'';
  let rows=[];
  if(!slmId){
    try{rows=await _sbDashboardSalesAggRows(range.start,range.end,includeTgm===true);}catch(e){console.warn('dashboard aggregate unavailable; using sales rows',e.message||e);}
  }
  if(!rows.length) rows=await _sbSalesRows(range.start,range.end,slmId,{includeConsi:false,summaryOnly:!slmId && includeTgm!==true,fastProducts:true,includeTgm:includeTgm===true,excludeAllRows:includeTgm===true});
  if(includeTgm===true && !slmId && !rows.length){
    rows=await _sbSalesRows(range.start,range.end,'',{includeConsi:false,summaryOnly:true,fastProducts:true,includeTgm:true,includeAllRows:true});
  }
  if(!includeTgm){
    window._salesRows2Y=rows;
    window._salesHistCache=_histFromSalesRows(rows);
  }
  const dashRows=rows.filter(r=>r.ym>=range.currentStart&&r.ym<=range.currentEnd);
  window._dashSalesRows=dashRows;
  if(includeTgm){
    window._dashSalesHistCache=_histFromSalesRows(dashRows);
  }
  return _histFromSalesRows(dashRows);
}

function dashCharts(){
  const allowed=allowedSKUs();
  const period=parseInt(document.getElementById('pf')?.value||'4');
  const custGroup=document.getElementById('cgf')?.value||'';
  const dashData=window._dashData||{};
  const hist = (dashData.hist && Object.keys(dashData.hist).length ? dashData.hist : null)
             || (window._dashSalesHistCache && Object.keys(window._dashSalesHistCache).length ? window._dashSalesHistCache : null)
             || (window._salesHistCache && Object.keys(window._salesHistCache).length ? window._salesHistCache : null)
             || myHist();
  const fc=dashData.fc||DB.get('forecasts')||[];
  const po=dashData.po||DB.get('po_log')||[];
  const stk=dashData.stk||DB.get('stock')||{};
  const ss=dashData.ss||DB.get('sku_settings')||{};
  const now=new Date();
  const baseYear=now.getFullYear();
  const curYm=`${baseYear}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const cutYm=_ymAdd(curYm,-23);
  const yearMths=Array.from({length:12},(_,i)=>`${baseYear}-${String(i+1).padStart(2,'0')}`);
  const twoYrMths=Array.from({length:24},(_,i)=>`${baseYear-1+Math.floor(i/12)}-${String((i%12)+1).padStart(2,'0')}`);
  const dataMths=[...new Set([
    ...Object.values(hist).flatMap(h=>Object.keys(h.monthly||{})),
    ...(window._dashSalesRows||[]).map(r=>r.ym),
  ])].filter(m=>m>=cutYm).sort();
  let srcMths;
  if(period===12) srcMths=yearMths;
  else if(period===24) srcMths=twoYrMths;
  else srcMths=dataMths.length?dataMths:yearMths;
  const mths=srcMths.slice(-period);
  const mls=mths.map(mL);
  const custSKUs = custGroup ? new Set(salesCustomers()
    .filter(c=>((c.corp||'аёӯаё·а№Ҳаёҷа№Ҷ')===custGroup))
    .flatMap(c=>c.g.flatMap(g=>g.it.map(i=>i.c)))) : null;

function _ymAdd(ym,delta){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

function _ymLastDate(ym){

}
function _twoYearWindow(refDate=new Date()){
  const y=refDate.getFullYear();
  return {prevYear:y-1,currentYear:y,start:`${y-1}-01`,end:`${y}-12`,currentStart:`${y}-01`,currentEnd:`${y}-12`};
}

function _splitBranchSlm(raw){
  const s=String(raw||'').trim();
  if(s.includes(':')){
    const [branch,...rest]=s.split(':');
    return {branch,slm:rest.join(':')||'ALL',raw:s,prefixed:true};
  }
  return {branch:'LEGACY',slm:s||'ALL',raw:s,prefixed:false};
}
function _isConsiBranch(branch){return String(branch||'').toUpperCase()==='CONSI';}

function _isConsignmentRow(r){

}
function _salesRowsForMode(rows,{includeConsi=false}={}){
  const hasPrefixed=(rows||[]).some(r=>r.prefixed);
  // hasPrefixed dedup only applies to TSS rows; TSSNV/TGM/CONSI rows don't have legacy duplicates
  const scoped=hasPrefixed ? (rows||[]).filter(r=>r.prefixed||r.is_all||(r.company&&r.company!=='TSS')) : (rows||[]);
  return scoped.filter(r=>{
    if(includeConsi) return _isConsignmentRow(r);
    return !_isConsignmentRow(r);
  });
}
async function _sbSalesRows(startYm,endYm,slmId='',opts={}){
  // Paginate to bypass Supabase 1000-row default limit (sales_history has 30k+ rows)
  const PAGE=1000;
  const querySlmId=slmId && !opts.disableQuerySlm ? String(slmId).trim() : '';
  let allData=[];
  let from=0;
  const useDaily=!!(opts.dateFrom&&opts.dateTo&&!opts.forceMonthly);
  const salesSource=useDaily ? 'sales_transactions' : (opts.forceBaseSales ? 'sales_history' : 'v_sales_history_company');
  const salesSelect=useDaily
    ? 'slm_id,sku,doc_date,ym,qty,amount,company,cust_code'
    : (salesSource==='v_sales_history_company'
      ? 'slm_id,sku,ym,qty,amount,company,product_name,group_name,plant'
      : 'slm_id,sku,ym,qty,amount');
  const rangeCol=useDaily?'doc_date':'ym';
  const rangeStart=useDaily?opts.dateFrom:startYm;
  const rangeEnd=useDaily?opts.dateTo:endYm;
  while(true){
    let q=getSupabaseClient()
      .from(salesSource)
      .select(salesSelect)
      .gte(rangeCol,rangeStart).lte(rangeCol,rangeEnd)
      .order(rangeCol)
      .range(from,from+PAGE-1);
    if(opts.summaryOnly && !slmId) q=q.eq('slm_id','ALL');
    else if(querySlmId) q=q.or('slm_id.eq.'+querySlmId+',slm_id.like.*:'+querySlmId);
    let {data,error}=await q;
    if(error && useDaily && /(sales_transactions|relation|schema cache|does not exist|not found)/i.test(error.message||'')){
      if(opts.noMonthlyFallback) return [];
      console.warn('sales_transactions unavailable; fallback to monthly sales_history', error.message || error);
      return _sbSalesRows(startYm,endYm,slmId,{...opts,forceMonthly:true});
    }
    if(error && !opts.forceBaseSales && /(v_sales_history_company|relation|schema cache|does not exist|not found)/i.test(error.message||'')){
      console.warn('v_sales_history_company unavailable; retry sales_history', error.message || error);
      return _sbSalesRows(startYm,endYm,slmId,{...opts,forceBaseSales:true});
    }
    if(error && /amount/i.test(error.message||'')){
      let q2=getSupabaseClient()
        .from(salesSource)
        .select(useDaily ? 'slm_id,sku,doc_date,ym,qty,company' : (salesSource==='v_sales_history_company' ? 'slm_id,sku,ym,qty,company,product_name,group_name,plant' : 'slm_id,sku,ym,qty'))
        .gte(rangeCol,rangeStart).lte(rangeCol,rangeEnd)
        .order(rangeCol)
        .range(from,from+PAGE-1);
      if(opts.summaryOnly && !slmId) q2=q2.eq('slm_id','ALL');
      else if(querySlmId) q2=q2.or('slm_id.eq.'+querySlmId+',slm_id.like.*:'+querySlmId);
      ({data,error}=await q2);
    }
    if(error && querySlmId){
      console.warn('sales_history slm filter failed; retry unfiltered', error.message || error);
      return _sbSalesRows(startYm,endYm,slmId,{...opts,disableQuerySlm:true});
    }
    if(error) throw error;
    allData=allData.concat(data||[]);
    if(!data||data.length<PAGE) break;
    from+=PAGE;
  }
  if(useDaily && allData.length===0 && !opts.forceMonthly){
    if(opts.noMonthlyFallback) return [];
    console.warn('sales_transactions has no rows for selected date range; fallback to monthly sales_history');
    return _sbSalesRows(startYm,endYm,slmId,{...opts,forceMonthly:true});
  }
  const wantsAllOnly = opts.summaryOnly && !slmId;
  const allowAllRows = wantsAllOnly || opts.includeAllRows === true;
  if(opts.excludeAllRows || !allowAllRows) allData=allData.filter(r=>String(r.slm_id||'').trim().toUpperCase()!=='ALL');
  if(slmId && querySlmId && !allData.length){
    console.warn('sales_history slm filter returned no rows; retry unfiltered');
    return _sbSalesRows(startYm,endYm,slmId,{...opts,disableQuerySlm:true});
  }
  // Keep dashboard light: fetch only product names used by this sales-history window.
  let products;
  if(opts.fastProducts){
    const codes=[...new Set(allData.map(r=>r.sku).filter(Boolean))];
    const key='products_subset_'+codes.length+'_'+codes.slice(0,20).join('_');
    products=await CACHE.get(key+(opts.includeTgm?'_all':'_scope')+(opts.includeConsi?'_consi':''),()=>SB.getProductsByCodes(codes,{includeTgm:opts.includeTgm===true,includeConsi:opts.includeConsi===true}));
  }else{
    products=await CACHE.get((opts.includeTgm?'products_all':'products')+(opts.includeConsi?'_consi':''),()=>SB.getProducts({includeTgm:opts.includeTgm===true,includeConsi:opts.includeConsi===true}));
  }
  const prodMap=Object.fromEntries((products||[]).map(p=>[String(p.code||p.sku||''),p]));
  if(useDaily){
    const codes=[...new Set(allData.map(r=>String(r.cust_code||'').trim()).filter(Boolean))];
    const cached=DB.get('remote_customers_cache')||[];
    const cachedCodes=new Set(cached.map(x=>String(x.code||'')));
    if(codes.some(code=>!cachedCodes.has(code))){
      try{await CACHE.get('remote_customers_cache_live',()=>SB.getCustomers(),10*60*1000);}catch(e){console.warn('customers cache:',e.message||e);}
    }
  }
  const names=_salesNameMap();
  const custCache=Object.fromEntries((DB.get('remote_customers_cache')||[]).map(x=>[String(x.code||''),x]));
  const mapped=(allData)
    .filter(r=>r.slm_id)
    .flatMap(r=>{
      const sp=_splitBranchSlm(r.slm_id);
      const isAll=String(sp.slm||'').toUpperCase().startsWith('ALL');
      const name=names[sp.slm]||names[sp.raw]||(isAll?'аё—аёұа№үаёҮаё«аёЎаё”':sp.slm);
      const qty=Number(r.qty ?? r.quantity ?? 0)||0;
      const amount=Number(r.amount ?? r.total ?? r.sales_amount ?? r.net_amount ?? r.value ?? 0)||0;
      const prod={...(prodMap[r.sku]||{}), code:r.sku, name:r.product_name || prodMap[r.sku]?.name, group_name:r.group_name || prodMap[r.sku]?.group_name, plant:r.plant || prodMap[r.sku]?.plant, company:r.company || prodMap[r.sku]?.company};
      const rowCompany=String(r.company||'').trim().toUpperCase();
      const base={
    branch:sp.branch,
    prefixed:sp.prefixed,
    is_all:isAll,
    slm_id:sp.slm,
    slm_key:sp.raw,
    slm_name:name,
    cust_code:`SLM-${sp.raw}`,
    cust_name:name||`Sales ${sp.slm}`,
    cust_group:_isConsiBranch(sp.branch)?'аёқаёІаёҒаёӮаёІаёў':'аёӮаёІаёўаёҲаёЈаёҙаёҮ',
    prod_group:productGroupForSku(r.sku,prod.group_name||'аёӯаё·а№Ҳаёҷа№Ҷ'),
    prod_code:r.sku,
    prod_name:prod.name||r.sku,
    qty,
    amount,
    company:(['TSS','TSSNV','TGM','CONSI'].includes(rowCompany)) ? rowCompany : (sp.prefixed ? _companyFromExpressBranch(sp.branch) : _skuCompanyFromProduct(prod,r.sku)),
    ym:r.ym||String(r.doc_date||'').slice(0,7),
    doc_date:r.doc_date||null,
      };
      // аё–а№үаёІаёЎаёө cust_code аёҲаёІаёҒ sales_transactions (daily mode) вҶ’ а№ғаёҠа№үаёӮа№үаёӯаёЎаё№аёҘаёҘаё№аёҒаё„а№үаёІаёҲаёЈаёҙаёҮаёҲаёІаёҒ Express + customer_profiles
      if(!isAll && r.cust_code){
        const code=String(r.cust_code).trim();
        const remCust=custCache[code];
        const grp=customerGroupForCode(code,_isConsiBranch(sp.branch)?'аёқаёІаёҒаёӮаёІаёў':'аёӯаё·а№Ҳаёҷа№Ҷ');
        const prof=getCustomerProfile({c:code,n:CUST_NAMES?.[code]||remCust?.name||code,ty:remCust?.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp,slm:sp.slm});
        return [{...base,cust_code:code,cust_name:prof.n||code,cust_group:prof.corp||grp,category:prof.category}];
      }
      // monthly mode: аёҒаёЈаё°аёҲаёІаёўаё•аёІаёЎ PROD_CUST weights (аёӮа№үаёӯаёЎаё№аёҘаё•аёұа№үаёҮаё•а№үаёҷ)
      const custWeights=(PROD_CUST?.[r.sku]?.[sp.slm])||null;
      if(isAll || !custWeights || !Object.keys(custWeights).length) return [base];
      const totalW=Object.values(custWeights).reduce((a,b)=>a+(Number(b)||0),0)||1;
      return Object.entries(custWeights).map(([code,w])=>{
        const ratio=(Number(w)||0)/totalW;
        const grp=customerGroupForCode(code,_isConsiBranch(sp.branch)?'аёқаёІаёҒаёӮаёІаёў':'аёӯаё·а№Ҳаёҷа№Ҷ');
        const prof=getCustomerProfile({c:code,n:CUST_NAMES?.[code]||custCache[code]?.name||code,ty:custCache[code]?.cust_group||(_isConsiBranch(sp.branch)?'аёқаёІаёҒаёӮаёІаёў':'аёӮаёІаёўаёҲаёЈаёҙаёҮ'),grp,slm:sp.slm});
        return {...base,cust_code:code,cust_name:prof.n||code,cust_group:prof.corp||grp,category:prof.category,qty:qty*ratio,amount:amount*ratio};
      });
    });
  const modeRows=_salesRowsForMode(mapped,opts);
  // аё•аёІаёЈаёІаёҮ year-archive branch вҶ’ canonical branch (аё•аёЈаёҮаёҒаёұаёҡ CANONICAL_BRANCH а№ғаёҷ express_sync.py)
  const _ARCHIVE={'TSS-67':'TSS','TSS-68':'TSS','TSSN-67':'TSS-NV','TSSN-68':'TSS-NV','CONSI-67':'CONSI'};
  // аёӘаёЈа№үаёІаёҮ key аёӮаёӯаёҮ primary branches (non-archive) а№Җаёһаё·а№Ҳаёӯа№ғаёҠа№ү deduplicate archive
  const _primaryKeys=new Set(
    modeRows.filter(r=>!r.is_all&&!_ARCHIVE[r.branch])
            .map(r=>`${r.branch}|${r.slm_id}|${r.ym}|${r.prod_code}`));
  // аёҒаёЈаёӯаёҮ archive-branch rows аёӯаёӯаёҒ аё–а№үаёІаёЎаёө primary-branch row аёӘаёіаё«аёЈаёұаёҡ canonical+slm+ym+sku а№Җаё”аёөаёўаё§аёҒаёұаёҷ
  const dedupedRows=modeRows.filter(r=>{
    if(r.is_all||!_ARCHIVE[r.branch]) return true;
    return !_primaryKeys.has(`${_ARCHIVE[r.branch]}|${r.slm_id}|${r.ym}|${r.prod_code}`);
  });
  const scopedRows=dedupedRows.filter(r=>_isAllowedCompanyRecord(r, opts));
  // а№ғаёҠа№ү ym|prod_code а№Җаёӣа№Үаёҷ key (а№„аёЎа№ҲаёЈаё§аёЎ branch) а№ҖаёһаёЈаёІаё° ALL rows аёЎаёө branch='LEGACY'
  // аё—аёіа№ғаё«а№ү ALL row аё–аё№аёҒ exclude а№ҖаёЎаё·а№ҲаёӯаёЎаёө detail row аёӮаёӯаёҮ ym+sku а№Җаё”аёөаёўаё§аёҒаёұаёҷ а№„аёЎа№Ҳаё§а№ҲаёІ branch аёҲаё°а№Җаёӣа№Үаёҷаёӯаё°а№„аёЈ
  const detailKeys=new Set(scopedRows.filter(r=>!r.is_all).map(r=>`${r.ym}|${r.prod_code}`));
  const hasDetailRows=scopedRows.some(r=>!r.is_all);
  const filteredByMode=scopedRows.filter(r=>{
    // __73_* rows: Express monthly summary вҖ” only show in summary-only mode (no per-SLM detail present)
    if(String(r.prod_code||'').startsWith('__73_')) return !hasDetailRows;
    return !r.is_all || !detailKeys.has(`${r.ym}|${r.prod_code}`);
  });
  if(!slmId) return filteredByMode;
  return filteredByMode.filter(r=>r.slm_id===slmId || r.slm_key===slmId || r.slm_key.endsWith(':'+slmId));
}
async function _sbSalesOverviewAggRows(startYm,endYm,slmId=''){
  const PAGE=1000;
  let rows=[],from=0;
  while(true){
    let q=getSupabaseClient()
      .from('v_sales_overview_sales_monthly')
      .select('ym,company,slm_owner,category,corporate,cust_code,cust_name,prod_group,prod_code,prod_name,qty,amount,invoice_count')
      .gte('ym',startYm).lte('ym',endYm)
      .order('ym')
      .range(from,from+PAGE-1);
    if(slmId) q=q.eq('slm_owner',slmId);
    const {data,error}=await q;
    if(error) throw error;
    rows=rows.concat(data||[]);
    if(!data||data.length<PAGE)break;
    from+=PAGE;
  }
  return rows.map(r=>({
    branch:r.company||'',
    prefixed:true,
    is_all:false,
    slm_id:r.slm_owner||'',
    slm_key:r.slm_owner||'',
    slm_name:salesNameFor(r.slm_owner)||r.slm_owner||'а№„аёЎа№ҲаёЈаё°аёҡаёё',
    cust_code:r.cust_code,
    cust_name:r.cust_name||r.cust_code,
    cust_group:r.corporate||r.category||'аёӯаё·а№Ҳаёҷа№Ҷ',
    category:r.category||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',
    prod_group:r.prod_group||'аёӯаё·а№Ҳаёҷа№Ҷ',
    prod_code:r.prod_code,
    prod_name:r.prod_name||r.prod_code,
    qty:Number(r.qty)||0,
    amount:Number(r.amount)||0,
    invoices:Number(r.invoice_count)||0,
    ym:r.ym,
    company:r.company||''
  }));
}
function _sdKpiFromRows(rows){
  const byMonth={};
  rows.forEach(r=>{if(!byMonth[r.ym])byMonth[r.ym]={ym:r.ym,total:0,qty:0,invoices:0};byMonth[r.ym].total+=r.amount;byMonth[r.ym].qty+=r.qty;byMonth[r.ym].invoices+=1;});
  return Object.values(byMonth).sort((a,b)=>a.ym.localeCompare(b.ym));
}
function _sdSalesListFromRows(rows){
  const m=new Map();
  (rows||[]).forEach(r=>{
    const code=String(r.slm_id||r.slm_key||'').trim();
    if(!code || code.toUpperCase()==='ALL' || m.has(code)) return;
    m.set(code,salesNameFor(code)||r.slm_name||code);
  });
  return [...m.entries()].map(([code,name])=>({code,name}));
}
function _sdBuildKey(rows,month,slmId){
  return [month||'',slmId||'',rows?.length||0,rows?.[0]?.ym||'',rows?.at?.(-1)?.ym||''].join('|');
}
function _sdEnsureBuilt(kind){
  if(!_sdApi.loaded || !_sdApi._rows) return;
  const rows=_sdApi._rows||[];
  const key=_sdBuildKey(rows,_sdApi.month,_sdApi._slmId||'');
  if(_sdApi._buildCacheKey!==key){
    _sdApi._buildCacheKey=key;
    _sdApi._buildCache={};
  }
  if(kind==='cust'){
    if(!_sdApi._buildCache.custs) _sdApi._buildCache.custs=_sdBuildCusts(rows);
    _sdApi.custs=_sdApi._buildCache.custs;
  }else if(kind==='prod'){
    if(!_sdApi._buildCache.prods) _sdApi._buildCache.prods=_sdBuildProds(rows);
    _sdApi.prods=_sdApi._buildCache.prods;
  }else if(kind==='slm'){
    if(!_sdApi._buildCache.slms) _sdApi._buildCache.slms=_sdBuildSlms(rows,_sdApi.slmList);
    _sdApi.slms=_sdApi._buildCache.slms;
  }
}
function _applySalesRowsToSd(rows,activeMonth,slmId=''){
  const sourceRows=slmId ? (rows||[]).filter(r=>r.slm_id===slmId || r.slm_key===slmId || r.slm_key?.endsWith(':'+slmId)) : (rows||[]);
  const monthly=_sdKpiFromRows(sourceRows);
  const monthRows=activeMonth?sourceRows.filter(r=>r.ym===activeMonth):sourceRows;
  const cur=activeMonth?monthly.find(m=>m.ym===activeMonth):null;
  _sdApi.valueMode='amount';
  _sdApi.loaded=true;
  _sdApi.histFallback=false;
  _sdApi.month=activeMonth||monthly.at(-1)?.ym||'';
  _sdApi.monthly=monthly;
  _sdApi.total=cur?cur.total:monthRows.reduce((a,r)=>a+r.amount,0);
  _sdApi.qty=cur?cur.qty:monthRows.reduce((a,r)=>a+r.qty,0);
  _sdApi.invoices=cur?cur.invoices:monthRows.length;
  _sdApi.ar=0;
  const prevYm=activeMonth?_ymAdd(activeMonth,-1):'';
  const prev=prevYm?monthly.find(m=>m.ym===prevYm):null;
  _sdApi.vs=prev&&prev.total?Math.round((_sdApi.total/prev.total-1)*100):0;
  _sdApi._rows=monthRows;
  _sdApi._slmId=slmId||'';
  _sdApi._buildCache={};
  _sdApi._buildCacheKey='';
  _sdApi.custs=[];
  _sdApi.prods=[];
  _sdApi.slms=[];
  _sdApi.slmList=_sdSalesListFromRows(monthRows);
  _sdEnsureBuilt(_sd.at==='prod'?'prod':(_sd.at==='slm'?'slm':'cust'));
  _sdUpdateSlmDrop();
}
async function _loadSalesFromSupabase(startYm,endYm,activeMonth,slmId='',opts={}){
  const fetchStart=(opts.daily&&opts.activeMonthOnly&&activeMonth)?activeMonth:startYm;
  const fetchEnd=(opts.daily&&opts.activeMonthOnly&&activeMonth)?activeMonth:endYm;
  const key=`sales_rows_v7_${fetchStart}_${fetchEnd}_${slmId||'ALL'}_${opts.summaryOnly?'summary':'detail'}_${opts.daily?'agg':'monthly'}`;
  let rows=await CACHE.get(key,async()=>{
    if(opts.daily){
      try{
        const agg=await _sbSalesOverviewAggRows(fetchStart,fetchEnd,slmId);
        if(agg.length)return agg;
      }catch(e){console.warn('sales overview aggregate unavailable; using transactions',e.message||e);}
    }
    return _sbSalesRows(fetchStart,fetchEnd,slmId,{
      includeConsi:false,
      fastProducts:true,
      summaryOnly:!!opts.summaryOnly,
      noMonthlyFallback:!!opts.daily,
      dateFrom:opts.daily?`${fetchStart}-01`:null,
      dateTo:opts.daily?_ymLastDate(fetchEnd):null
    });
  });
  if(!rows.length && !slmId && !opts.summaryOnly && !opts.daily){
    rows=await CACHE.get(`sales_rows_v6_${startYm}_${endYm}_ALL_summary_monthly`,()=>_sbSalesRows(startYm,endYm,'',{includeConsi:false,fastProducts:true,summaryOnly:true}));
    if(!_sd.at || _sd.at==='cust') _sd.at='prod';
  }
  window._salesRows2Y=rows;
  if(!opts.daily){
    try{DB.set('sales_rows_cache',rows);}catch(_){}
  }else{
    try{localStorage.removeItem('tgm3_sales_rows_cache');}catch(_){}
  }
  _applySalesRowsToSd(rows,activeMonth,slmId);
  _sdApi.rangeMode=opts.daily?'aggregate':'monthly';
}

function _sdUseLatestMonthIfEmpty(monthly){
  const cur=_sdApiMonth();
  if(Array.isArray(monthly) && monthly.some(m=>m.ym===cur)) return cur;
  if(Array.isArray(monthly) && monthly.length) return monthly[monthly.length-1].ym;

// в”Җв”Җ Fallback: аёӘаёЈа№үаёІаёҮ sales data аёҲаёІаёҒ ALL_HIST (embedded) в”Җв”Җ
function _loadSalesFromAllHist(targetYm, slmId=''){
  const hist = ALL_HIST || {};
  const monthly = {};
  const now = new Date();
  const cutYM = `${now.getFullYear()-2}-${String(now.getMonth()+1).padStart(2,'0')}`;
  Object.entries(hist).forEach(([sku, h]) => {
    Object.entries(h.monthly||{}).forEach(([ym, qty]) => {
      if(ym < cutYM) return;
      if(!monthly[ym]) monthly[ym]={ym,total:0,qty:0,invoices:1};
      monthly[ym].qty += Number(qty)||0;
      monthly[ym].total += Number(qty)||0;
    });
  });
  const monthlyArr = Object.values(monthly).sort((a,b)=>a.ym.localeCompare(b.ym));
  // аё–а№үаёІа№Җаё”аё·аёӯаёҷаё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒа№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘа№ғаёҷ ALL_HIST а№ғаё«а№үа№ғаёҠа№үа№Җаё”аё·аёӯаёҷаёҘа№ҲаёІаёӘаёёаё”аё—аёөа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ
  const hasTarget = monthlyArr.some(m=>m.ym===targetYm && (m.qty||0)>0);
  const effectiveYm = hasTarget ? targetYm
    : (monthlyArr.length ? monthlyArr[monthlyArr.length-1].ym : targetYm);
  // аёӯаёұаёһа№Җаё”аё•аё•аёұаё§аёҷаёіаё—аёІаёҮаё–а№үаёІа№Җаё”аё·аёӯаёҷа№ҖаёӣаёҘаёөа№Ҳаёўаёҷ
  if(effectiveYm !== targetYm){
    const [ey,em] = effectiveYm.split('-').map(Number);
    _sd.cm = em-1; _sd.cy = ey+543;
  }
  _sdApi.loaded = true;
  _sdApi.valueMode = 'qty';
  _sdApi.monthly = monthlyArr;
  _sdApi.month = effectiveYm;
  _sdApi.histFallback = true;
  const cur = monthlyArr.find(m=>m.ym===effectiveYm)||{total:0,qty:0,invoices:0};
  _sdApi.total = cur.total; _sdApi.qty = cur.qty; _sdApi.invoices = cur.invoices; _sdApi.ar = 0;
  const prev = monthlyArr.find(m=>m.ym===_ymAdd(effectiveYm,-1));
  _sdApi.vs = prev?.total ? Math.round((_sdApi.total/prev.total-1)*100) : 0;
  const SKUS = typeof getSkusMerged==='function'?getSkusMerged():SKUS_MASTER;
  const monthRows = Object.entries(hist).map(([sku,h])=>({
    prod_code:sku, prod_name:SKUS.find(s=>s.code===sku)?.name||sku,
    prod_group:productGroupForSku(sku,'аёӯаё·а№Ҳаёҷа№Ҷ'),
    qty:h.monthly?.[effectiveYm]||0, amount:h.monthly?.[effectiveYm]||0, ym:effectiveYm,
  })).filter(r=>r.qty>0);
  _sdApi.custs = []; _sdApi.prods = _sdBuildProds(monthRows); _sdApi.slms = []; _sdApi.slmList = [];
  _sdApi.error = null;
  // аёӘаёҘаёұаёҡа№„аёӣа№Ғаё—а№ҮаёҡаёӘаёҙаёҷаё„а№үаёІаёӯаёұаё•а№ӮаёҷаёЎаёұаё•аёҙ (аёӮа№үаёӯаёЎаё№аёҘаёҘаё№аёҒаё„а№үаёІа№„аёЎа№ҲаёЎаёөа№ғаёҷ local)
  if(_sd.at !== 'prod') _sd.at = 'prod';
  _sdUpdateSlmDrop();
}
function _sdApiYear(){return _sd.cy_y-543;}
function _sdWeekFactor(){return _sd.pt==='week'?((SD_WM[_sd.cw-1]||1)/4):1;}
function _sdV(v){return Math.round((Number(v)||0)*_sdWeekFactor());}
function _sdPeriodLabel(){return _sd.pt==='year'?`year_${_sd.cy_y}`:_sd.pt==='week'?`week${_sd.cw}_${SD_MTH[_sd.cm]}_${_sd.cy}`:`${SD_MTH[_sd.cm]}_${_sd.cy}`;}

async function sdLoad(){

  const badge=document.createElement('div');

  try{
    const range=_sdMonthRange(24);

    await _loadSalesFromSupabase(range.start,range.end,month,slmId,{
      daily:useCustomerDetail,
      activeMonthOnly:useCustomerDetail
    });
  }catch(e0){
    console.warn('Supabase sales_history detail unavailable, trying summary rows',e0.message);
    const range=_sdMonthRange(24);

      await _loadSalesSummaryFromSupabase(range.start,range.end,month);
    }catch(e1){
      console.warn('Supabase sales_history summary unavailable, trying local cache',e1.message);
      const cachedRows=window._salesRows2Y || DB.get('sales_rows_cache') || [];
      if(cachedRows.length){
        _applySalesRowsToSd(_salesRowsForMode(cachedRows,{includeConsi:false}),month,slmId);

        document.getElementById('sd-loading')?.remove();
        sdRender();return;
      }
      _sdApi.loaded=false;
      _sdApi.error=e1.message || e0.message || 'Supabase sales_history unavailable';
      console.error('Sales data unavailable',e1);
    }
  }finally{
    document.getElementById('sd-loading')?.remove();
  }
  if(_sdApi.loaded && _sdApi.monthly?.length && _sd.pt!=='year'){
    const active=_sdUseLatestMonthIfEmpty(_sdApi.monthly);
    if(active!==_sdApi.month){sdLoad();return;}

  }
  sdRender();
}

function _sdBuildCusts(rows){
  const m={};
  for(const r of rows){
    const prof=getCustomerProfile({c:r.cust_code,n:r.cust_name,ty:r.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp:r.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ',slm:r.slm_id});
    const grp=prof.corp||r.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ';
    const cat=prof.category||r.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ';
    if(!m[r.cust_code])m[r.cust_code]={n:prof.n||r.cust_name,c:r.cust_code,ty:cat,category:cat,corp:grp,grp,slm:r.slm_id,_tot:0,_qty:0,g:{}};
    const c=m[r.cust_code];c._tot+=r.amount;c._qty+=r.qty;
    const pg=productGroupForSku(r.prod_code,r.prod_group);
    if(!c.g[pg])c.g[pg]={n:pg||'аёӯаё·а№Ҳаёҷа№Ҷ',_tot:0,it:{}};
    const g=c.g[pg];g._tot+=r.amount;
    if(!g.it[r.prod_code])g.it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0};
    g.it[r.prod_code]._tot+=r.amount;
  }

  return Object.values(m).map(c=>({...c,g:Object.values(c.g).map(g=>({...g,it:Object.values(g.it).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdBuildProds(rows){
  const m={};
  for(const r of rows){
    const prof=getCustomerProfile({c:r.cust_code,n:r.cust_name,ty:r.cust_group||'аёӮаёІаёўаёҲаёЈаёҙаёҮ',grp:r.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ',slm:r.slm_id});
    const gk=productGroupForSku(r.prod_code,r.prod_group);
    if(!m[gk])m[gk]={n:gk,_tot:0,it:{}};
    m[gk]._tot+=r.amount;
    if(!m[gk].it[r.prod_code])m[gk].it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0,custs:{}};
    const it=m[gk].it[r.prod_code];it._tot+=r.amount;
    const ty=prof.corp||r.cust_group||'аёӯаё·а№Ҳаёҷа№Ҷ';
    if(!it.custs[ty])it.custs[ty]={n:ty,_tot:0,cs:{}};
    it.custs[ty]._tot+=r.amount;
    if(!it.custs[ty].cs[r.cust_code])it.custs[ty].cs[r.cust_code]={n:r.cust_name,c:r.cust_code,_tot:0};
    it.custs[ty].cs[r.cust_code]._tot+=r.amount;
  }
  return Object.values(m).map(g=>({...g,it:Object.values(g.it).map(i=>({...i,custs:Object.values(i.custs).map(t=>({...t,cs:Object.values(t.cs).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdBuildSlms(rows,slmList){
  const m={};
  for(const r of rows){

function sdSetDatePreset(p){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today=fmt(now);
  let from,to=today;
  if(p==='month'){from=`${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;}
  else if(p==='3m'){from=fmt(new Date(now.getFullYear(),now.getMonth()-2,1));}
  else if(p==='6m'){from=fmt(new Date(now.getFullYear(),now.getMonth()-5,1));}
  else if(p==='ytd'){from=`${now.getFullYear()}-01-01`;}
  else if(p==='lastyear'){from=`${now.getFullYear()-1}-01-01`;to=`${now.getFullYear()-1}-12-31`;}
  else return;
  _sd.dateFrom=from;_sd.dateTo=to;
  const f=document.getElementById('sd-date-from');const t=document.getElementById('sd-date-to');
  if(f)f.value=from;if(t)t.value=to;
  _sdApi.loaded=false;_sdApi.yoy=null;_sdApi.yoyLoading=false;
  sdLoadCustom();
}

    const customFrom=_sd.pt==='custom'?_dateToYm(_sd.dateFrom):'';
    const customTo=_sd.pt==='custom'?_dateToYm(_sd.dateTo):'';

  const vsC=vs>=0?'var(--G)':'var(--R)';

  const isCustom=_sd.pt==='custom';

    : '';
  const _yoyLine=(cur,prev,lbl)=>_sd.showYoY?`<div style="margin-top:5px;padding-top:5px;border-top:1px solid var(--BD);font-size:11px;color:var(--TX3)">${yoy?`${lbl}: ${_sdFmtTotal(prev)} ${_yoyPct(cur,prev)}`:(_sdApi.yoyLoading?'вҸі аёҒаёіаёҘаёұаёҮа№Ӯаё«аёҘаё”аёӮа№үаёӯаёЎаё№аёҘаёӣаёөаё—аёөа№Ҳа№ҒаёҘа№үаё§вҖҰ':'')}</div>`:'';
  const _yoyLineNum=(cur,prev,lbl)=>_sd.showYoY?`<div style="margin-top:5px;padding-top:5px;border-top:1px solid var(--BD);font-size:11px;color:var(--TX3)">${yoy?`${lbl}: ${Math.round(prev).toLocaleString()} ${_yoyPct(cur,prev)}`:(_sdApi.yoyLoading?'вҸі':'')}</div>`:'';
  kr.innerHTML=`
    <div class="kpi b"><div class="kl">аёўаёӯаё”аёӮаёІаёўаёЈаё§аёЎ (аёЎаё№аёҘаё„а№ҲаёІ)</div><div class="kv">${_sdFmtTotal(total)}</div>

    <div class="kpi g"><div class="kl">аёӣаёЈаёҙаёЎаёІаё“аёӮаёІаёў (аёҒаёҒ./аё–аёёаёҮ)</div><div class="kv">${Math.round(qty).toLocaleString()}</div>
      <div class="kh">Invoice ${inv} а№ғаёҡ</div>${_yoyLineNum(qty,yoy?.qty||0,'аёӣаёөаё—аёөа№Ҳа№ҒаёҘа№үаё§')}</div>

      <div class="kh">${lbl2}</div>${_yoyLineNum(inv,yoy?.invoices||0,'Invoice аёӣаёөаё—аёөа№Ҳа№ҒаёҘа№үаё§')}</div>
    <div class="kpi r"><div class="kl">аёўаёӯаё”аё„а№үаёІаёҮаёҠаёіаёЈаё°</div><div class="kv" style="font-size:20px">${_sdF(ar)}</div>
      <div class="kh">аёЈаёӯаё”аёіа№ҖаёҷаёҙаёҷаёҒаёІаёЈ</div></div>`;

function _xa(o){return`<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;border:1px solid var(--BD);margin-right:5px;font-size:9px;color:var(--TX3);flex-shrink:0;transition:.15s;transform:rotate(${o?90:0}deg)">в–¶</span>`;}
function _custsByItemGrouped(itCode,T,wi){
  const byGrp={};
  salesCustomers().forEach(c=>{
    c.g.forEach(g=>{
      const it=g.it.find(i=>i.c===itCode);
      if(it){
        const v=Math.round(T*(c.w[wi]||c.w[0])*(g.w[wi]||g.w[0])*(it.w[wi]||it.w[0]));
        const grp=c.corp||'аёӯаё·а№Ҳаёҷа№Ҷ';
        if(!byGrp[grp])byGrp[grp]={v:0,cs:[]};
        byGrp[grp].v+=v;byGrp[grp].cs.push({n:c.n,c:c.c,v});
      }
    });
  });
  return byGrp;
}

function sdCust(){
  const isAll=isManager()&&_sd.mgrView;

  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=me?.slm_id||'';
  const sDn=_sd.sort.col==='val'?(_sd.sort.dir>0?'в–ј':'в–І'):'';

  const hHdr=`<div class="tw" style="margin-top:8px"><table>
    <thead><tr>
      <th style="width:42%">аёӣаёЈаё°а№Җаё аё— / аёҒаёҘаёёа№ҲаёЎаёҘаё№аёҒаё„а№үаёІ / аёҘаё№аёҒаё„а№үаёІ / аёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІ / аёӘаёҙаёҷаё„а№үаёІ</th>
      <th class="r" style="cursor:pointer;user-select:none" onclick="sdSort('val')">аёўаёӯаё”аёӮаёІаёў ${sDn}</th>
      <th class="r" style="width:110px">аёӘаёұаё”аёӘа№Ҳаё§аёҷ</th>${_sdYoYHead()}<th class="r">${vsHdr}</th>
    </tr></thead><tbody>`;

  if(_sdApi.loaded && _sdApi.histFallback && !_sdApi.custs?.length){
    const el=document.getElementById('sd-ta');
    if(el) el.innerHTML=`<div class="al alw" style="margin:16px">аёӮа№үаёӯаёЎаё№аёҘаёҘаё№аёҒаё„а№үаёІаё•а№үаёӯаёҮаёҒаёІаёЈаёҒаёІаёЈа№ҖаёҠаё·а№ҲаёӯаёЎаё•а№Ҳаёӯ Supabase вҖ” аёҒаёЈаёёаё“аёІаё”аё№аёӮа№үаёӯаёЎаё№аёҘаё—аёөа№Ҳа№Ғаё—а№Үаёҡ <strong>аёЈаёІаёўаёӘаёҙаёҷаё„а№үаёІ</strong> а№Ғаё—аёҷ</div>`;
    return;
  }
  if(_sdApi.loaded){
    _sdEnsureBuilt('cust');
    // в”Җв”Җв”Җ API data: Category(ty) вҶ’ Customer вҶ’ ProdGroup вҶ’ Product в”Җв”Җв”Җ
    const T=_sdApi.total||1;
    const yoyM=_sdYoYMaps();
    const _vc=(cur,prev)=>_sd.showYoY?(_sdApi.yoyLoading?'<span style="color:var(--TX3);font-size:11px">вҸі</span>':_yoyPct(cur,prev||0)):'вҖ”';
    let custs=isAll?_sdApi.custs:_sdApi.custs.filter(c=>c.slm===slmId);
    if(_sd.slmF) custs=custs.filter(c=>c.slm===_sd.slmF);
    if(q) custs=custs.filter(c=>c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)||c.g.some(g=>g.n.toLowerCase().includes(q)||g.it.some(i=>i.n.toLowerCase().includes(q)||i.c.toLowerCase().includes(q))));
    let sorted=[...custs];if(_sd.sort.col==='val') sorted.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));
    // group by ty (category)
    const tyMap={};
    sorted.forEach(c=>{const ty=c.ty||'аёӯаё·а№Ҳаёҷа№Ҷ';if(!tyMap[ty])tyMap[ty]=[];tyMap[ty].push(c);});
    let h=hHdr;
    Object.entries(tyMap).forEach(([ty,custs2])=>{
      const tyTot=custs2.reduce((s,c)=>s+c._tot,0);
      const tyYoY=custs2.reduce((s,c)=>s+(yoyM.cust[c.c]||0),0);
      const otk='ty_'+ty;const oty=_sd.op[otk];
      h+=`<tr onclick="sdTogOp('${otk}')" style="cursor:pointer;background:var(--LN)">
        <td style="font-weight:700">${_xa(oty)}<span class="badge bbl">${ty}</span> <span style="font-size:11px;color:var(--TX3)">${custs2.length} аёЈаёІаёў</span></td>
        <td class="r"><strong>${_sdFmtTotal(_sdV(tyTot))}</strong></td><td class="r">${_sdBar(tyTot,T)}</td>${_sdYoYCell(tyYoY)}<td class="r">${_vc(tyTot,tyYoY)}</td></tr>`;
      if(oty) custs2.forEach(c=>{
        const cv=c._tot;const oc=_sd.op['c'+c.c];
        const cvYoY=yoyM.cust[c.c]||0;
        h+=`<tr onclick="sdTogOp('c${c.c}')" style="cursor:pointer;background:var(--bg2)">

        if(oc) c.g.forEach((g,gi)=>{

  const filtered=q?base.filter(c=>c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)):base;
  const rows=filtered.map(c=>({...c,_cv:Math.round(T*(c.w[wi]||c.w[0]))}));
  if(_sd.sort.col==='val') rows.sort((a,b)=>_sd.sort.dir*(b._cv-a._cv));
  let h=hHdr;
  rows.forEach((c,ri)=>{

    h+=`<tr onclick="sdTogOp('c${c.c}')" style="cursor:pointer">
      <td>${_xa(oc)}<strong>${c.n}</strong> <span class="badge bbgr" style="font-size:10px">${c.c}</span> <span class="badge bbg" style="font-size:10px">${c.ty||''}</span></td>
      <td class="r"><strong>${_sdFmtTotal(_sdV(cv))}</strong></td><td class="r">${_sdBar(cv,T)}</td>${_sdYoYCell(0)}<td class="r">${_sdVs(SD_VS[ri%8])}</td></tr>`;
    if(oc) c.g.forEach((g,gi)=>{
      const gv=Math.round(cv*(g.w[wi]||g.w[0]));const gk='g'+c.c+'_'+gi;const og=_sd.op[gk];
      h+=`<tr onclick="sdTogOp('${gk}')" style="cursor:pointer;background:var(--bg2)">
        <td style="padding-left:22px">${_xa(og)}${g.n}</td>

      if(og) g.it.forEach((it,ii)=>{
        const iv=Math.round(gv*(it.w[wi]||it.w[0]));

      prods.forEach(p=>{rows.push([p.n,_sdV(p._tot),Math.round((p._tot||0)/T2*100),'']);(p.it||[]).forEach(it=>rows.push(['  '+it.c+' вҖ” '+it.n,_sdV(it._tot),Math.round((it._tot||0)/(p._tot||1)*100),(it.custs||[]).flatMap(t=>(t.cs||[]).map(c=>c.n)).join(', ')]));});
      return toXLSX([['аёЈаёІаёўаёӘаёҙаёҷаё„а№үаёІ', cols, rows]], `Sales_${period}_аёЈаёІаёўаёӘаёҙаёҷаё„а№үаёІ.xlsx`);
    }

    const prods=base.map(p=>({...p,_pv:Math.round(T*p.w)}));
    if(_sd.sort.col==='val') prods.sort((a,b)=>_sd.sort.dir*(b._pv-a._pv));
    else if(_sd.sort.col==='vs') prods.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    const custByItem={};
    salesCustomers().forEach(c=>c.g.forEach(g=>g.it.forEach(it=>{if(!custByItem[it.c])custByItem[it.c]=[];if(!custByItem[it.c].includes(c.n))custByItem[it.c].push(c.n);})));
    cols=['аёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІ / аёӘаёҙаёҷаё„а№үаёІ','аёўаёӯаё”аёӮаёІаёў','аёӘаёұаё”аёӘа№Ҳаё§аёҷ%','vs а№Җаё”аё·аёӯаёҷаёҒа№Ҳаёӯаёҷ%','аёҘаё№аёҒаё„а№үаёІаё—аёөа№ҲаёӢаё·а№үаёӯ'];
    prods.forEach(p=>{
      rows.push([p.n,p._pv,Math.round(p._pv/T*100),p.vs,'']);
      p.it.forEach(it=>{const iv=Math.round(p._pv*it.w);rows.push(['  '+it.n,iv,Math.round(iv/T*100),it.vs,(custByItem[it.c]||[]).join(', ')]);});

  } else {

    if(_sdApi.loaded){

      let slms=[...(_sdApi.slms||[])];
      if(q) slms = slms.filter(s=>s.name.toLowerCase().includes(q)||s.code.toLowerCase().includes(q));
      if(sf) slms = slms.filter(s=>s.code===sf);
      if(_sd.sort.col==='val') slms.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));
      else if(_sd.sort.col==='vs') slms.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
      slms.forEach(s=>rows.push([s.name,s.code,_sdV(s._tot),(s.custs||[]).length]));
      return toXLSX([['аёЈаёІаёўа№ҖаёӢаёҘаёӘа№Ң', cols, rows]], `Sales_${period}_аёЈаёІаёўа№ҖаёӢаёҘаёӘа№Ң.xlsx`);
    }
    const filtered=SD_SALES.filter(s=>(!q||(s.n.toLowerCase().includes(q)||s.c.toLowerCase().includes(q)))&&(!sf||s.c===sf));
    const sales=filtered.map(s=>({...s,_sv:Math.round(T*s.w)}));
    if(_sd.sort.col==='val') sales.sort((a,b)=>_sd.sort.dir*(b._sv-a._sv));
    else if(_sd.sort.col==='vs') sales.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    cols=['а№ҖаёӢаёҘаёӘа№Ң','аёЈаё«аёұаёӘ','аёўаёӯаё”аёӮаёІаёў','а№Җаёӣа№үаёІ','% аёҡаёЈаёЈаёҘаёё','vs а№Җаё”аё·аёӯаёҷаёҒа№Ҳаёӯаёҷ%'];
    const tgtMul=_sd.pt==='week'?4:1;
    sales.forEach(s=>{const tgt=Math.round(s.tgt/tgtMul);rows.push([s.n,s.c,s._sv,tgt,Math.round(s._sv/tgt*100),s.vs]);});
    sheet='аёЈаёІаёўа№ҖаёӢаёҘаёӘа№Ң';
  }
  toXLSX([[sheet, cols, rows]], `Sales_${period}_${sheet}.xlsx`);
}

let _consiRows=[], _consiCustF='', _consiProdF='', _consiBranchF='', _consiStartF='', _consiEndF='', _consiLoaded=false, _consiErr='', _consiOp={};

async function _sbConsiRows(startYm,endYm){
  try{
    const PAGE=1000;
    let rows=[],from=0;
    while(true){
      const {data,error}=await getSupabaseClient()
        .from('v_sc_consi_monthly')
        .select('ym,company,slm_owner,cust_code,cust_name,corporate,category,prod_group,prod_code,prod_name,qty,amount,invoice_count')
        .gte('ym',startYm).lte('ym',endYm)
        .order('ym')
        .range(from,from+PAGE-1);
      if(error) throw error;
      rows=rows.concat(data||[]);
      if(!data||data.length<PAGE)break;
      from+=PAGE;
    }
    if(rows.length) return rows.map(r=>({
      branch:r.company||'CONSI',
      prefixed:true,
      is_all:false,
      slm_id:r.slm_owner||'',
      slm_key:r.slm_owner||'',
      slm_name:salesNameFor(r.slm_owner)||r.slm_owner||'CONSI',
      cust_code:r.cust_code,
      cust_name:r.cust_name||r.cust_code,
      cust_group:r.corporate||r.category||'аёқаёІаёҒаёӮаёІаёў',
      category:r.category||'аёқаёІаёҒаёӮаёІаёў',
      prod_group:r.prod_group||'аёӯаё·а№Ҳаёҷа№Ҷ',
      prod_code:r.prod_code,
      prod_name:r.prod_name||r.prod_code,
      qty:Number(r.qty)||0,
      amount:Number(r.amount)||0,
      invoices:Number(r.invoice_count)||0,
      ym:r.ym,
      company:r.company||'CONSI'
    })).filter(r=>_isConsignmentRow(r));
  }catch(e){
    console.warn('CONSI aggregate unavailable; using legacy loader', e.message || e);
  }
  const startDate=`${startYm}-01`;
  const endDate=_ymLastDate(endYm);
  try{
    const rows=await _sbSalesRows(startYm,endYm,'',{
      includeConsi:true,
      fastProducts:true,
      includeAllRows:false,
      excludeAllRows:true,
      noMonthlyFallback:true,
      dateFrom:startDate,
      dateTo:endDate
    });
    if(rows.length) return rows;
  }catch(e){
    console.warn('CONSI daily sales loader failed; trying monthly fallback', e.message || e);
  }
  try{
    const rows=await _sbSalesRows(startYm,endYm,'',{
      includeConsi:true,
      fastProducts:true,
      includeAllRows:false,
      excludeAllRows:true
    });
    if(rows.length) return rows;
  }catch(e){
    console.warn('CONSI monthly shared loader failed; trying direct fallback', e.message || e);
  }
  const PAGE=1000;
  async function _pg(table,select,filter){
    let data=[],from=0;
    while(true){
      let q=getSupabaseClient().from(table).select(select).gte('ym',startYm).lte('ym',endYm);
      if(filter) q=filter(q);
      q=q.order('ym').range(from,from+PAGE-1);
      const {data:d,error}=await q;
      if(error) throw error;
      data=data.concat(d||[]);
      if(!d||d.length<PAGE) break;
      from+=PAGE;
    }
    return data;
  }
  let allData=[];
  // 1. sales_history with CONSI: prefix
  try{allData=await _pg('sales_history','slm_id,sku,ym,qty,amount',q=>q.ilike('slm_id','CONSI:%'));}catch(_){}
  // 2. v_sales_history_company with company=CONSI
  if(!allData.length){
    try{allData=await _pg('v_sales_history_company','slm_id,sku,ym,qty,amount,company',q=>q.eq('company','CONSI'));}catch(_){}
  }
  // 3. broader CONSI pattern
  if(!allData.length){
    try{allData=await _pg('sales_history','slm_id,sku,ym,qty,amount',q=>q.ilike('slm_id','%CONSI%'));}catch(_){}
  }
  const products=await CACHE.get('products_consi',()=>SB.getProducts({includeConsi:true}));
  const prodMap=Object.fromEntries((products||[]).map(p=>[String(p.code||p.sku||''),p]));
  const names=_salesNameMap();
  const mapped=allData.filter(r=>r.slm_id).flatMap(r=>{
    const sp=_splitBranchSlm(r.slm_id);
    const name=names[sp.slm]||names[sp.raw]||sp.slm;
    const qty=Number(r.qty||0)||0;
    const amount=Number(r.amount||r.value||0)||0;
    const prod=prodMap[r.sku]||{};
    const rowCo=String(r.company||'').trim().toUpperCase();
    // detect CONSI from branch, company field, or raw slm_id pattern
    const isConsi=_isConsiBranch(sp.branch)||rowCo==='CONSI'||String(sp.raw||'').toUpperCase().includes('CONSI');
    return [{
      branch:sp.branch==='LEGACY'&&isConsi?'CONSI':sp.branch,
      prefixed:sp.prefixed,is_all:String(sp.slm).toUpperCase().startsWith('ALL'),
      slm_id:sp.slm,slm_key:sp.raw,slm_name:name,
      cust_code:`SLM-${sp.raw}`,cust_name:name,
      cust_group:isConsi?'аёқаёІаёҒаёӮаёІаёў':'аёӮаёІаёўаёҲаёЈаёҙаёҮ',
      prod_group:productGroupForSku(r.sku,prod.group_name||'аёӯаё·а№Ҳаёҷа№Ҷ'),
      prod_code:r.sku,prod_name:prod.name||r.sku,
      qty,amount:amount||qty,ym:r.ym
    }];
  });
  return mapped.filter(r=>_isConsignmentRow(r));
}

async function saveFc(){

  const rawCustCode = rawCust.includes('вҖ”') ? rawCust.split('вҖ”')[0].trim() : rawCust;
  const custCode = rawCustCode && CUST_NAMES[rawCustCode] ? rawCustCode : null;
  const fcType = document.getElementById('f-type')?.value || 'PO';
  const fc = {id: genId('FC'), by: UID, custCode, sku, qty, delivDate, fcType, note: document.getElementById('f-note').value.trim(), approved: false, ts: Date.now(), edited_by: UID, edited_at: new Date().toISOString()};

      console.warn('saveFc Supabase:', e);
      ok = false;

  if (!ok) {
    const arr = DB.get('forecasts')||[];
    arr.push(fc);
    DB.set('forecasts',arr);

  if (ok) {
    await SB?.audit?.('ADD_FC', 'forecast', {sku,qty});

async function updatePO(id){
  const newD=document.getElementById('ep-d').value,newS=document.getElementById('ep-s').value,reason=document.getElementById('ep-r').value;
  const po=DB.get('po_log')||[];const orig=po.find(p=>p.id===id);if(!orig)return;
  const updated={...orig,id:id+'-v'+(orig.ver+1),delivDate:newD,status:newS,note:reason,ver:orig.ver+1,ts:Date.now(),edited_by:UID,edited_at:new Date().toISOString()};
  po.unshift(updated);
  orig.status='replaced';
  DB.set('po_log',po);
  closeM();
  try { await SB.upsertPO(updated); } catch(e){ console.warn('updatePO Supabase:', e); }
  audit('EDIT_PO',id,{newD,reason});
  poT();
}
async function matchPO(id){
  const so=(prompt('аёЈаё°аёҡаёёа№ҖаёҘаёӮ SO аё—аёөа№Ҳ match аёҒаёұаёҡ '+id)||'').trim();
  if(!so){toast('аёўаёҒа№ҖаёҘаёҙаёҒ Match PO','warn');return;}
  const po=DB.get('po_log')||[];const p=po.find(x=>x.id===id);
  if(p){p.status='matched';p.so=so;p.edited_by=UID;p.edited_at=new Date().toISOString();}
  DB.set('po_log',po);
  try { if(p) await SB.upsertPO(p); } catch(e){ console.warn('matchPO Supabase:', e); }
  audit('MATCH_PO',id,{so});
  poT();
  toast('Match аёӘаёіа№ҖаёЈа№ҮаёҲ: '+id+' вҶ’ '+so);
}
async function syncSO(){
  try{
    const remote=await SB.getPOPlans();
    const po=DB.get('po_log')||[];
    const byId=Object.fromEntries(po.map(p=>[p.id,p]));
    let cnt=0;
    (remote||[]).forEach(r=>{
      if(byId[r.id] && r.so && byId[r.id].so!==r.so){
        byId[r.id].so=r.so;
        byId[r.id].status=r.status||'matched';
        byId[r.id].edited_by=r.edited_by||'SERVER';
        byId[r.id].edited_at=new Date().toISOString();
        cnt++;
      }
    });
    DB.set('po_log',po);audit('SYNC_SO','po_log',{matched:cnt});poT();toast('Sync SO аёҲаёІаёҒ server '+cnt+' аёЈаёІаёўаёҒаёІаёЈ');
  }catch(e){
    toast('Sync SO а№„аёЎа№ҲаёӘаёіа№ҖаёЈа№ҮаёҲ: '+(e.message||e),'warn');
  }
}

function _h(row,aliases){
  for(const a of aliases){if(row[a]!=null&&row[a]!=='')return row[a];}
  return '';
}
function _num(v){const n=parseFloat(v);return Number.isFinite(n)?n:null;}
function importSKUSettings(e){
  const file=e.target.files[0];if(!file)return;
  const mode=document.getElementById('sku-imp-mode')?.value||'skip';
  const reader=new FileReader();
  reader.onload=async ev=>{
    await ensureXLSX();
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    const custom=DB.get('custom_skus')||[];
    const ss=DB.get('sku_settings')||{};
    const groups=DB.get('product_groups')||{};
    let added=0,updated=0,skipped=0,settingOnly=0;
    rows.forEach(r=>{
      const code=String(_h(r,['аёЈаё«аёұаёӘаёӘаёҙаёҷаё„а№үаёІ','SKU','sku','code','Code','аёЈаё«аёұаёӘ','Item Code'])).trim();
      if(!code)return;
      const name=String(_h(r,['аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ','Name','name','аёӘаёҙаёҷаё„а№үаёІ','Product Name'])).trim();
      const plant=String(_h(r,['а№ӮаёЈаёҮ','Plant','plant'])).trim();
      const grp=String(_h(r,['аёҒаёҘаёёа№ҲаёЎаёӘаёҙаёҷаё„а№үаёІ','Group','group','Product Group'])).trim();
      const exists=getSkusMerged().find(s=>s.code===code);
      if(mode==='skip'&&exists){skipped++;return;}
      if(!exists&&name){
        custom.push({code,name,plant,lt:_num(_h(r,['Lead Time','lead_time','LT','lt']))||7,moq:_num(_h(r,['MOQ','moq']))||0,custom:true});
        added++;
      } else if(exists) updated++;
      else settingOnly++;
      const cur=ss[code]||{min_stock:50,shelf_life:30,lt:7,moq:0,note:''};
      const min=_num(_h(r,['Stock аёӮаёұа№үаёҷаё•а№Ҳаёі','аёӮаёұа№үаёҷаё•а№Ҳаёі','min_stock','Min Stock']));
      const shelf=_num(_h(r,['Shelf Life (аё§аёұаёҷ)','Shelf Life','shelf_life']));
      const lt=_num(_h(r,['Lead Time','lead_time','LT','lt']));
      const moq=_num(_h(r,['MOQ','moq']));
      const note=String(_h(r,['аё«аёЎаёІаёўа№Җаё«аё•аёё','Note','note'])).trim();
      if(min!=null)cur.min_stock=min;
      if(shelf!=null)cur.shelf_life=shelf;
      if(lt!=null)cur.lt=lt;
      if(moq!=null)cur.moq=moq;
      if(note)cur.note=note;
      cur.edited_by=UID;cur.edited_at=new Date().toISOString();
      ss[code]=cur;
      if(grp){
        if(!groups[grp])groups[grp]=[];
        if(!groups[grp].includes(code))groups[grp].push(code);
      }
    });
    DB.set('custom_skus',custom);
    DB.set('sku_settings',ss);
    saveProductGroups(groups);
    audit('IMPORT_SKU_SETTINGS','sku_settings',{file:file.name,mode,added,updated,skipped,settingOnly});
    document.getElementById('sku-imp-res').innerHTML=`<div class="al als">Import аёӘаёіа№ҖаёЈа№ҮаёҲ: а№Җаёһаёҙа№ҲаёЎа№ғаё«аёЎа№Ҳ ${added}, update ${updated}, setting only ${settingOnly}, аёӮа№үаёІаёЎаёӢа№үаёі ${skipped}</div>`;
    toast('Import SKU Settings аёӘаёіа№ҖаёЈа№ҮаёҲ');
    skuAdmT();
  };
  reader.readAsBinaryString(file);
}

function submitScan(){

function clearScan(){['sc-code','sc-lot','sc-exp','sc-qty'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('sc-name').value='';document.getElementById('sc-code').focus();}
function handleStkPaste(e){
  e.preventDefault();
  const rows=e.clipboardData.getData('text').trim().split('\n').map(r=>r.split('\t'));
  const imp=[];
  rows.forEach(r=>{
    if(r.length<2)return;
    const[code,lot,expDate,qty]=r;
    if(!code||!qty)return;
    imp.push({code:code.trim(),lot:lot?.trim()||'',exp:expDate?.trim()||'',qty:parseFloat(qty)||0});
  });
  const pv=document.getElementById('stk-pv');
  if(!imp.length){pv.innerHTML='<div class="al alw">а№„аёЎа№ҲаёһаёҡаёӮа№үаёӯаёЎаё№аёҘ</div>';return;}

  window._sp=imp;
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const resultEl=document.getElementById('csv-res');
  resultEl.innerHTML='<div class="al ali">аёҒаёіаёҘаёұаёҮаёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ң...</div>';
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      await ensureXLSX();
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
      if(!json||json.length<2){resultEl.innerHTML='<div class="al alw">а№„аёҹаёҘа№Ңаё§а№ҲаёІаёҮа№ҖаёӣаёҘа№ҲаёІ</div>';return;}
      const fmt=_detectCsvFormat(json,file.name);
      if(fmt==='express73') _renderExpress73Import(json,file.name,resultEl);
      else resultEl.innerHTML=`<div class="al als">аёӯа№ҲаёІаёҷа№„аёҹаёҘа№ҢаёӘаёіа№ҖаёЈа№ҮаёҲ вҖ” аёһаёҡ ${json.length-1} а№Ғаё–аё§<br>Header: ${(json[0]||[]).slice(0,8).join(' | ')}</div><div class="al alw" style="margin-top:8px">аёўаёұаёҮа№„аёЎа№ҲаёЈаёӯаёҮаёЈаёұаёҡаёЈаё№аёӣа№Ғаёҡаёҡаёҷаёөа№ү (аёЈаёӯаёҮаёЈаёұаёҡ: аёЈаёІаёўаёҮаёІаёҷ 73, 04_Sales_Summary)</div>`;
    }catch(err){resultEl.innerHTML=`<div class="al alr">а№ҖаёҒаёҙаё”аёӮа№үаёӯаёңаёҙаё”аёһаёҘаёІаё”: ${esc(err.message)}</div>`;}
  };
  reader.readAsBinaryString(file);
}

function _detectCsvFormat(json,filename){
  const header=(json[0]||[]).map(v=>String(v||'').trim());
  const headerStr=header.join(' ').toLowerCase();
  // Detect Express report 73 (аёўаёӯаё”аёӮаёІаёўаёӣаёЈаё°аёҲаёіаёҮаё§аё”): has аёӮаёІаёўаёӘаё”/аёӮаёІаёўа№ҖаёҠаё·а№Ҳаёӯ/аёўаёӯаё”аёӘаёёаё—аёҳаёҙ in header
  // OR: filename contains 73/04/sales_summary AND вүҘ7 columns with numeric data at cols 3-7
  const hasKeywords=headerStr.includes('аёӮаёІаёўаёӘаё”')||headerStr.includes('аёӮаёІаёўа№ҖаёҠаё·а№Ҳаёӯ')||headerStr.includes('аёўаёӯаё”аёӘаёёаё—аёҳаёҙ')||headerStr.includes('а№Җаёһаёҙа№ҲаёЎаё«аёҷаёөа№ү');
  const hasCols=header.length>=7;
  const numericDataOk=(json.slice(1,6)).filter(r=>{
    const v3=parseFloat(String(r[3]||'').replace(/,/g,''));
    return !isNaN(v3)&&v3!==0;
  }).length>=1;
  const nameMatch=/(73|04|sales.?summary)/i.test(filename);
  if(hasCols&&(hasKeywords||(nameMatch&&numericDataOk))) return 'express73';
  return 'unknown';
}

function _renderExpress73Import(json,filename,resultEl){
  // Find header row
  let hdrIdx=0;
  for(let i=0;i<Math.min(5,json.length);i++){
    const str=(json[i]||[]).join(' ').toLowerCase();
    if(str.includes('аёӮаёІаёўаёӘаё”')||str.includes('аёӮаёІаёўа№ҖаёҠаё·а№Ҳаёӯ')||str.includes('аёўаёӯаё”аёӘаёёаё—аёҳаёҙ')){hdrIdx=i;break;}
  }
  // Parse data rows: col0=name, col1=code, col2=blank, col3=cash, col4=credit, col5=debtInc, col6=returns, col7=net
  const pf=s=>parseFloat(String(s||'0').replace(/,/g,''))||0;
  let gCash=0,gCredit=0,gDebt=0,gRet=0,gNet=0,rowCount=0,totalRow=null;
  for(let i=hdrIdx+1;i<json.length;i++){
    const r=json[i];
    const name=String(r[0]||'').trim();
    const code=String(r[1]||'').trim();
    const cash=pf(r[3]),credit=pf(r[4]),debtInc=pf(r[5]),returns=pf(r[6]),net=pf(r[7]);
    if(!name&&!code&&!cash&&!credit&&!debtInc&&!returns&&!net) continue;
    // Detect total row (no code, name contains аёЈаё§аёЎ/аё—аёұа№үаёҮаёӘаёҙа№үаёҷ, or first cell blank with big numbers)
    const isTotal=!code&&(name.includes('аёЈаё§аёЎ')||name.includes('аё—аёұа№үаёҮаёӘаёҙа№үаёҷ')||name.includes('Grand')||(!name&&(cash>0||credit>0)));
    if(isTotal){totalRow={cash,credit,debtInc,returns,net};continue;}
    if(!name&&!code) continue;
    gCash+=cash;gCredit+=credit;gDebt+=debtInc;gRet+=returns;gNet+=(net||(cash+credit+debtInc-returns));rowCount++;
  }
  if(totalRow){gCash=totalRow.cash;gCredit=totalRow.credit;gDebt=totalRow.debtInc;gRet=totalRow.returns;gNet=totalRow.net||((totalRow.cash+totalRow.credit+totalRow.debtInc)-totalRow.returns);}
  const computed=(gCash+gCredit+gDebt)-gRet;
  const formulaOk=Math.abs(computed-gNet)<1;
  // Suggest ym from filename
  const ymMatch=filename.match(/(\d{4})[-_]?(\d{2})/);
  const suggestYm=ymMatch?`${ymMatch[1]}-${ymMatch[2]}`:((new Date()).toISOString().slice(0,7));
  window._express73Data={gCash,gCredit,gDebt,gRet,gNet,rowCount};
  resultEl.innerHTML=`
  <div class="al als" style="margin-top:8px"><strong>аёЈаёІаёўаёҮаёІаёҷ 73 (аёўаёӯаё”аёӮаёІаёўаёӣаёЈаё°аёҲаёіаёҮаё§аё”)</strong> вҖ” аёһаёҡ ${rowCount} аёҘаё№аёҒаё„а№үаёІ</div>
  <div class="tw" style="margin-top:10px"><table>
    <thead><tr><th>аёЈаёІаёўаёҒаёІаёЈ</th><th class="r">аёҲаёіаёҷаё§аёҷ (аёҡаёІаё—)</th></tr></thead>
    <tbody>
      <tr><td>аёӮаёІаёўаёӘаё” + аёЎаёұаё”аёҲаёі</td><td class="r">${_sdF(gCash)}</td></tr>
      <tr><td>аёӮаёІаёўа№ҖаёҠаё·а№Ҳаёӯ + аёЎаёұаё”аёҲаёі</td><td class="r">${_sdF(gCredit)}</td></tr>
      <tr><td>а№Җаёһаёҙа№ҲаёЎаё«аёҷаёөа№ү</td><td class="r">${_sdF(gDebt)}</td></tr>
      <tr><td>аёҘаё”аё«аёҷаёөа№ү / аёЈаёұаёҡаё„аё·аёҷ</td><td class="r" style="color:var(--R)">(${_sdF(gRet)})</td></tr>
      <tr style="font-weight:700;border-top:2px solid var(--BD)"><td>аёўаёӯаё”аёӘаёёаё—аёҳаёҙ (Express)</td><td class="r" style="color:var(--N)">${_sdF(gNet)}</td></tr>
      <tr style="font-size:12px;color:var(--TX3)"><td>аё•аёЈаё§аёҲаёӘаёӯаёҡаёӘаё№аё•аёЈ (аёӮаёІаёўаёӘаё”+аёӮаёІаёўа№ҖаёҠаё·а№Ҳаёӯ+а№Җаёһаёҙа№ҲаёЎаё«аёҷаёөа№ү)вҲ’аёҘаё”аё«аёҷаёөа№ү</td><td class="r">${_sdF(computed)} ${formulaOk?'вң“':'вҡ  а№„аёЎа№Ҳаё•аёЈаёҮ!'}</td></tr>
    </tbody>
  </table></div>
  <div style="display:flex;align-items:flex-end;gap:10px;margin-top:12px;flex-wrap:wrap">
    <div class="field" style="margin:0">
      <label style="font-size:12px;font-weight:600;color:var(--TX2)">а№Җаё”аё·аёӯаёҷ (YYYY-MM)</label>
      <input type="month" id="imp-ym" value="${suggestYm}" style="padding:6px 10px;border:1px solid var(--BD);border-radius:6px;font-size:13px;font-family:var(--font)">
    </div>
    <div class="field" style="margin:0">
      <label style="font-size:12px;font-weight:600;color:var(--TX2)">аёҡаёЈаёҙаё©аёұаё—</label>
      <select id="imp-co" style="padding:6px 10px;border:1px solid var(--BD);border-radius:6px;font-size:13px;font-family:var(--font)">
        <option value="TSS">TSS</option><option value="TSSNV">TSSNV</option><option value="TGM">TGM</option>
      </select>
    </div>
    <button class="btn btn-p" onclick="_doImportExpress73()">рҹ“Ҙ аёҷаёіа№ҖаёӮа№үаёІ Supabase</button>
  </div>
  <div id="imp-status" style="margin-top:8px"></div>`;
}

  const data=window._express73Data;

  try{
    const sb=getSupabaseClient();
    // Clear old __73_ rows for this month
    await sb.from('sales_history').delete().eq('ym',ym).eq('slm_id','ALL').like('sku','__73_%');
    // Insert 4 component rows so net = sum of amounts (returns stored as negative)
    // slm_id='ALL' вҶ’ company defaults to co via SKU lookup or product prefix
    const rows=[
      {slm_id:'ALL',sku:`__73_CASH__`,ym,qty:0,amount:data.gCash},
      {slm_id:'ALL',sku:`__73_CREDIT__`,ym,qty:0,amount:data.gCredit},
      {slm_id:'ALL',sku:`__73_DEBTINC__`,ym,qty:0,amount:data.gDebt},
      {slm_id:'ALL',sku:`__73_RETURNS__`,ym,qty:0,amount:-data.gRet},
    ].filter(r=>r.amount!==0);
    const {error}=await sb.from('sales_history').insert(rows);
    if(error) throw error;
    const net=data.gCash+data.gCredit+data.gDebt-data.gRet;
    statusEl.innerHTML=`<div class="al als">вң“ аёҷаёіа№ҖаёӮа№үаёІаёӘаёіа№ҖаёЈа№ҮаёҲ вҖ” аёўаёӯаё”аёӘаёёаё—аёҳаёҙ ${co} ${ym}: ${_sdF(net)}<br><small style="color:var(--TX3)">аёҒаё” рҹ”„ аёӢаёҙаёҮаё„а№Ң а№Җаёһаё·а№Ҳаёӯаёӯаёұаёӣа№Җаё”аё• Dashboard</small></div>`;
    CACHE.clearPrefix('dash_');CACHE.clearPrefix('sales_hist_');
    window._dashSalesRows=null;window._salesRows2Y=null;window._dashSalesHistCache=null;
  }catch(err){statusEl.innerHTML=`<div class="al alr">а№ҖаёҒаёҙаё”аёӮа№үаёӯаёңаёҙаё”аёһаёҘаёІаё”: ${esc(err.message)}</div>`;}
}

function saveUser(idx){
  const uid=document.getElementById('u-uid').value.trim();
  const name=document.getElementById('u-name').value.trim();
  const department=document.getElementById('u-dept').value.trim();
  const position=document.getElementById('u-pos')?.value.trim()||'';
  const role=document.getElementById('u-role').value;
  const slm=document.getElementById('u-slm').value.trim();
  const pwd=document.getElementById('u-pwd').value;
  const email=document.getElementById('u-email').value.trim();
  if(!uid||!name){alert('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒ UID а№ҒаёҘаё° аёҠаё·а№Ҳаёӯ');return;}
  const users=DB.get('users')||[];
  if(idx===-1){
    if(users.find(u=>u.uid===uid)){alert('UID аёҷаёөа№үаёЎаёөаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§');return;}
    users.push({uid,name,department:department||undefined,position:position||undefined,role,slm_id:slm||undefined,pwd:pwd||'1234',email,active:true,created:today(),by:UID});
    audit('ADD_USER',uid,{role,department});
  } else {
    const u=users[idx];if(!u)return;
    u.uid=uid;u.name=name;u.department=department||undefined;u.position=position||undefined;u.role=role;u.slm_id=slm||undefined;u.email=email;
    if(pwd) u.pwd=pwd;
    u.edited_by=UID;u.edited_at=new Date().toISOString();
    audit('EDIT_USER',uid,{role,department});
  }
  DB.set('users',users);closeM();pgUsers();toast('аёҡаёұаёҷаё—аё¶аёҒаёңаё№а№үа№ғаёҠа№ү '+uid+' аёӘаёіа№ҖаёЈа№ҮаёҲ');
}
function toggleUser(i){
  const users=DB.get('users')||[];const u=users[i];if(!u)return;
  u.active=!u.active;u.edited_by=UID;u.edited_at=new Date().toISOString();
  DB.set('users',users);audit('TOGGLE_USER',u.uid,{active:u.active});pgUsers();
}

  const tabsHtml=`<div style="display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    ${backBtn}
    ${tabViews.length>1?tabViews.map(v=>`<div onclick="crTab('${v}')" style="padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;background:${_cr.view===v?'var(--LBL)':'var(--bg2)'};border:1px solid ${_cr.view===v?'var(--BL)':'var(--BD)'};color:${_cr.view===v?'var(--BL)':'var(--TX2)'}">${tabLabels[v]}</div>`).join(''):''}
  </div>`;
  document.getElementById('ct').innerHTML=`<div class="cr-fullpage-body" style="min-height:calc(100vh - 120px)">
    <div class="cr-fullpage-sidebar" id="cr-sidebar">
      <button onclick="_cr.view='customers';pgCustReg()" style="display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--W);border:1px solid var(--BD);color:var(--TX2);margin-bottom:10px;text-align:left" title="аёҒаёҘаёұаёҡаё«аёҷа№үаёІаёҘаё№аёҒаё„а№үаёІ">вҶҗ аёҒаёҘаёұаёҡаё«аёҷа№үаёІаёҘаё№аёҒаё„а№үаёІ</button>
      <div style="font-size:11px;font-weight:700;color:var(--TX3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;padding:0 4px">аёӮаёұа№үаёҷаё•аёӯаёҷ</div>

      <div style="margin-top:12px;padding:0 4px">
        <div style="font-size:10px;color:var(--TX3);margin-bottom:4px">аё„аё§аёІаёЎаё„аё·аёҡаё«аёҷа№үаёІ</div>
        <div style="height:4px;background:var(--BD);border-radius:99px;overflow:hidden">

function crTab(v){_crSave();_cr.view=v;pgCustReg();}
function crGoStep(n){if(n>_cr.step)return;_crSave();_cr.step=n;crRender();}
function crNext(){_crSave();_cr.step++;crRender();}
function crBack(){_crSave();_cr.step--;crRender();}
function crToSummary(){_crSave();_cr.step=5;crRender();}

function crRender(){
  if(_cr.view==='approve'){crRenderApprove();return;}
  if(_cr.view==='settings'){pgCrWorkflowSettings();return;}
  if(_cr.view==='summary'){crRenderSummary();return;}
  const el=document.getElementById('cr-body');if(!el)return;
  const steps=[['рҹ“Ӣ','аё—аёұа№Ҳаё§а№„аёӣ'],['рҹҸӘ','аёЈа№үаёІаёҷаё„а№үаёІ'],['рҹҡҡ','аёӘа№ҲаёҮаёӘаёҙаёҷаё„а№үаёІ'],['рҹ’і','аёҒаёІаёЈа№ҖаёҮаёҙаёҷ'],['рҹ“Ғ','а№ҖаёӯаёҒаёӘаёІаёЈ'],['вң…','аёӘаёЈаёёаёӣ']];
  // аёӯаёұаёӣа№Җаё”аё• sidebar steps
  const sb=document.getElementById('cr-sidebar');
  if(sb){
    const items=sb.querySelectorAll('.cr-step-item');
    items.forEach((el2,i)=>{el2.className='cr-step-item'+(i===_cr.step?' act':i<_cr.step?' done':'');});
  }
  // аёӯаёұаёӣа№Җаё”аё• progress bar (аёЈаёӯаёҮаёЈаёұаёҡаё—аёұа№үаёҮ layout а№Җаё”аёҙаёЎ #cr-prog-fill а№ҒаёҘаё° fullpage .cr-fullpage-prog-fill)
  const pct=_cr.step>=5?100:Math.round((_cr.step/5)*100);
  document.querySelectorAll('#cr-prog-fill,.cr-fullpage-prog-fill').forEach(p=>p.style.width=pct+'%');
  if(_cr.step===6){el.innerHTML=crSec6();return;}
  const secs=[crSec0,crSec1,crSec2,crSec3,crSec4,crSec5];
  // аё–а№үаёІаёӯаёўаё№а№Ҳа№ғаёҷ fullpage mode а№„аёЎа№Ҳа№ҒаёӘаё”аёҮ pills аёӢа№үаёі (аёЎаёө sidebar а№ҒаёҘа№үаё§)
  const isFullpage=!!document.getElementById('cr-sidebar');
  el.innerHTML=isFullpage?(secs[_cr.step]||crSec0)():`<div class="cr-steps">${steps.map(([ico,lbl],i)=>`<div class="cr-pill${i===_cr.step?' act':i<_cr.step?' done':''}" onclick="crGoStep(${i})">${ico} ${lbl}</div>`).join('')}</div>${(secs[_cr.step]||crSec0)()}`;
  if(_cr.step===4)crRenderDocSlots();
}

function crRenderDocSlots(){
  ['main','billing','other'].forEach(g=>{
    const el=document.getElementById('cr-slots-'+g);if(!el)return;
    el.innerHTML=CR_DOC_SLOTS.filter(s=>s.group===g).map(s=>crRenderSlot(s)).join('');
  });
}
function crRenderSlot(s){
  const files=_cr.slotFiles[s.id]||[];
  const note=_cr.slotNotes[s.id]||'';
  const isOpen=!!_cr.openSlots[s.id];
  const hasFiled=files.length>0;
  const filesHtml=files.map((f,i)=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const isPdf=ext==='pdf';const isImg=['jpg','jpeg','png','gif','webp','heic'].includes(ext);
    const bg=isPdf?'var(--LY)':isImg?'var(--LG)':'var(--LBL)';
    const sz=f.size>1048576?(f.size/1048576).toFixed(1)+'MB':(f.size/1024).toFixed(0)+'KB';
    return`<div class="cr-fi"><div class="cr-ft" style="background:${bg}">${isPdf?'рҹ“„':isImg?'рҹ–јпёҸ':'рҹ“Һ'}</div><span style="flex:1;font-size:12px;color:var(--TX2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><span style="font-size:11px;color:var(--TX3);flex-shrink:0">${sz}</span><span style="font-size:11px;flex-shrink:0">${crDocFileLink(f)}</span><span onclick="crDelFile('${s.id}',${i})" style="cursor:pointer;color:var(--TX3);padding:2px 4px" title="аёҘаёҡ">вң•</span></div>`;
  }).join('');
  return`<div class="cr-slot" id="crslot-${s.id}">
  <div class="cr-slot-h" onclick="crToggleSlot('${s.id}')">
    <span style="font-size:14px;color:var(--BL)">рҹ“„</span>
    <span class="cr-slot-lbl">${s.label}${s.req?`<span class="cr-slot-req">аёҲаёіа№Җаёӣа№Үаёҷ</span>`:`<span class="cr-slot-opt">а№„аёЎа№ҲаёҡаёұаёҮаё„аёұаёҡ</span>`}</span>
    <span style="font-size:11px;color:var(--TX3)">${files.length>0?files.length+' а№„аёҹаёҘа№Ң':''}</span>
    <div class="cr-dot ${hasFiled?'cr-dot-d':'cr-dot-e'}">${hasFiled?'вң“':'вҖ”'}</div>
    <span class="cr-chev${isOpen?' open':''}">в–ј</span>
  </div>
  <div class="cr-slot-b${isOpen?' open':''}">
    <div style="font-size:11px;color:var(--TX3);margin-bottom:8px">${s.hint} вҖ” аёӘаё№аёҮаёӘаёёаё” ${s.maxFiles} а№„аёҹаёҘа№Ң</div>
    ${filesHtml}
    ${files.length<s.maxFiles?`<div class="cr-uz" onclick="crTrigUpload('${s.id}')"><div style="font-size:20px;margin-bottom:4px">в¬ҶпёҸ</div><div style="font-size:12px;color:var(--TX2)">аёҒаё”а№Җаёһаё·а№Ҳаёӯаёӯаёұаёӣа№Ӯаё«аёҘаё”</div><div style="font-size:11px;color:var(--TX3);margin-top:2px">JPG, PNG, PDF</div></div>`:`<div style="font-size:11px;color:var(--TX3);text-align:center;padding:6px 0">аё„аёЈаёҡаёҲаёіаёҷаё§аёҷаёӘаё№аёҮаёӘаёёаё”а№ҒаёҘа№үаё§</div>`}
    <div style="font-size:11px;color:var(--TX2);margin:7px 0 4px">аё«аёЎаёІаёўа№Җаё«аё•аёё</div>
    <textarea style="width:100%;background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--TX);font-family:var(--font);outline:none;resize:none;height:42px" id="cr-snote-${s.id}" placeholder="аёЈаё°аёҡаёёаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”..." oninput="_cr.slotNotes['${s.id}']=this.value">${note}</textarea>
  </div>
</div>`;}
function crToggleSlot(id){_cr.openSlots[id]=!_cr.openSlots[id];crRenderDocSlots();}
function crTrigUpload(slotId){
  _cr.currentSlot=slotId;
  const fi=document.getElementById('cr-file-inp');fi.value='';fi.onchange=crHandleFiles;fi.click();
}
function crReadFileDataUrl(f){return new Promise((ok,rej)=>{const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=rej;r.readAsDataURL(f);});}
async function crHandleFiles(e){
  const files=Array.from(e.target.files);
  const slot=CR_DOC_SLOTS.find(s=>s.id===_cr.currentSlot);if(!slot)return;
  const rem=slot.maxFiles-(_cr.slotFiles[_cr.currentSlot]||[]).length;
  for(const f of files.slice(0,rem)){
    let dataUrl='';
    try{dataUrl=await crReadFileDataUrl(f);}catch(err){console.warn('read file failed',err);}
    _cr.slotFiles[_cr.currentSlot].push({name:f.name,size:f.size,type:f.type,dataUrl});
    _cr.fileRefs[_cr.currentSlot].push(f);
  }
  _cr.openSlots[_cr.currentSlot]=true;e.target.value='';crRenderDocSlots();
}
function crDelFile(slotId,idx){_cr.slotFiles[slotId].splice(idx,1);_cr.fileRefs[slotId].splice(idx,1);_cr.openSlots[slotId]=true;crRenderDocSlots();}

// в”Җв”Җ OCR: аёӯа№ҲаёІаёҷаё«аёҷаёұаёҮаёӘаё·аёӯаёЈаёұаёҡаёЈаёӯаёҮаёҡаёЈаёҙаё©аёұаё—аёӯаёұаё•а№ӮаёҷаёЎаёұаё•аёҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _crOcrParsed=null;

async function _crOcrSend(file){
  const b64=await new Promise((ok,rej)=>{const r=new FileReader();r.onload=e=>ok(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  if(file.type==='application/pdf'){
    const body={requests:[{inputConfig:{content:b64,mimeType:'application/pdf'},features:[{type:'DOCUMENT_TEXT_DETECTION'}],pages:[1]}]};
    const r=await fetch(`https://vision.googleapis.com/v1/files:annotate?key=${VISION_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Vision API error');}
    const d=await r.json();
    return(d.responses?.[0]?.responses||[]).map(x=>x.fullTextAnnotation?.text||'').join('\n');
  }
  const body={requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION'}],imageContext:{languageHints:['th','en']}}]};
  const r=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Vision API error');}
  const d=await r.json();
  return d.responses?.[0]?.fullTextAnnotation?.text||'';
}

function _crParseCert(text){
  const out={};
  // в”Җв”Җ normalize: аёҘаёҡ / аё—а№үаёІаёўаёҡаёЈаёЈаё—аёұаё” (DBD а№ғаёӘа№Ҳ / а№Җаёӣа№Үаёҷ line delimiter)
  const t=text.replace(/\/\s*\n/g,'\n').replace(/\r/g,'');

  // в”Җв”Җ 1. аёҠаё·а№ҲаёӯаёҡаёЈаёҙаё©аёұаё— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // DBD: "1. аёҠаё·а№ҲаёӯаёҡаёЈаёҙаё©аёұаё— аёҡаёЈаёҙаё©аёұаё— XXX аёҲаёіаёҒаёұаё”" аё«аёЈаё·аёӯ "аёҠаё·а№ҲаёӯаёҡаёЈаёҙаё©аёұаё— аёҡаёЈаёҙаё©аёұаё— XXX аёҲаёіаёҒаёұаё”"
  const nameAnchors=[
    /аёҠаё·а№ҲаёӯаёҡаёЈаёҙаё©аёұаё—\s+(?:аёҡаёЈаёҙаё©аёұаё—\s+)?(.+?)\s+аёҲаёіаёҒаёұаё”/s,
    /аёҡаёЈаёҙаё©аёұаё—\s+(.+?)\s+аёҲаёіаёҒаёұаё”/s,
    /аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷаёҲаёіаёҒаёұаё”\s+(.+?)(?:\n|аёҲаёіаёҒаёұаё”|$)/,
    /аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷ(?:аёӘаёІаёЎаёұаёҚаёҷаёҙаё•аёҙаёҡаёёаё„аё„аёҘ)?\s+(.+?)(?:\n|$)/,
    /аёЈа№үаёІаёҷ\s+(.+?)(?:\n|$)/,
  ];
  for(const pat of nameAnchors){
    const m=t.match(pat);
    if(!m) continue;
    const raw=m[1].replace(/\s+/g,' ').trim();
    if(raw.length<2) continue;
    if(pat.source.includes('аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷаёҲаёіаёҒаёұаё”')) out.shopname='аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷаёҲаёіаёҒаёұаё” '+raw;
    else if(pat.source.includes('аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷ')) out.shopname='аё«а№үаёІаёҮаё«аёёа№үаёҷаёӘа№Ҳаё§аёҷ '+raw;
    else if(pat.source.startsWith('аёЈа№үаёІаёҷ')) out.shopname='аёЈа№үаёІаёҷ '+raw;
    else out.shopname='аёҡаёЈаёҙаё©аёұаё— '+raw.replace(/^аёҡаёЈаёҙаё©аёұаё—\s+/,'')+' аёҲаёіаёҒаёұаё”';
    break;
  }

  // в”Җв”Җ 2. а№ҖаёҘаёӮаё—аё°а№Җаёҡаёөаёўаёҷаёҷаёҙаё•аёҙаёҡаёёаё„аё„аёҘ 13 аё«аёҘаёұаёҒ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // DBD: "аё—аё°а№Җаёҡаёөаёўаёҷаёҷаёҙаё•аёҙаёҡаёёаё„аё„аёҘа№ҖаёҘаёӮаё—аёөа№Ҳ 0105563043141"
  const taxPatterns=[
    /аё—аё°а№Җаёҡаёөаёўаёҷаёҷаёҙаё•аёҙаёҡаёёаё„аё„аёҘа№ҖаёҘаёӮаё—аёөа№Ҳ\s*([\d\s]{13,16})/,
    /(?:а№ҖаёҘаёӮаё—аё°а№Җаёҡаёөаёўаёҷ(?:аёҷаёҙаё•аёҙаёҡаёёаё„аё„аёҘ)?|а№ҖаёҘаёӮаёӣаёЈаё°аёҲаёіаё•аёұаё§аёңаё№а№үа№ҖаёӘаёөаёўаё аёІаё©аёөаёӯаёІаёҒаёЈ|а№ҖаёҘаёӮаёӣаёЈаё°аёҲаёіаё•аёұаё§аёңаё№а№үа№ҖаёӘаёөаёўаё аёІаё©аёө)[^\d]*([\d\s\-]{13,17})/,
    /(?:а№ҖаёҘаёӮаё—аёөа№Ҳ|а№ҖаёҘаёӮаё—аё°а№Җаёҡаёөаёўаёҷ)[^\d]*([\d\s\-]{13,17})/,
  ];
  for(const pat of taxPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const clean=m[1].replace(/[\s\-]/g,'').slice(0,13);
    if(clean.length===13){out.taxid=clean;break;}
  }
  if(!out.taxid){
    // fallback: аё«аёІ 13 аё«аёҘаёұаёҒа№ғаё”аёҒа№Үа№„аё”а№ү аё—аёөа№Ҳа№„аёЎа№Ҳа№ғаёҠа№Ҳ reference/date
    const all=[...t.matchAll(/\b(\d{13})\b/g)].map(m=>m[1]);
    if(all.length) out.taxid=all[0];
  }

  // в”Җв”Җ 3. аё—аёөа№Ҳаёӯаёўаё№а№ҲаёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№Ғаё«а№ҲаёҮа№ғаё«аёҚа№Ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // DBD: "5. аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№Ғаё«а№ҲаёҮа№ғаё«аёҚа№Ҳ аё•аёұа№үаёҮаёӯаёўаё№а№Ҳа№ҖаёҘаёӮаё—аёөа№Ҳ XXX..."
  const addrPatterns=[
    /аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№Ғаё«а№ҲаёҮа№ғаё«аёҚа№Ҳ\s+аё•аёұа№үаёҮаёӯаёўаё№а№Ҳ(?:а№ҖаёҘаёӮаё—аёөа№Ҳ)?\s*([\s\S]+?)(?=\n\d+\.|аё§аёұаё•аё–аёёаё—аёөа№Ҳ|$)/m,
    /аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№Ғаё«а№ҲаёҮа№ғаё«аёҚа№Ҳ[^\n]*\n\s*([\s\S]+?)(?=\n\d+\.|аё§аёұаё•аё–аёёаё—аёөа№Ҳ|$)/m,
    /аё—аёөа№Ҳаё•аёұа№үаёҮ(?:аёӘаёіаёҷаёұаёҒаёҮаёІаёҷа№ғаё«аёҚа№Ҳ)?\s*[:\n]?\s*([\s\S]+?)(?=\n(?:\d+\.|а№ҖаёҘаёӮ|аё—аё°а№Җаёҡаёөаёўаёҷ|аё§аёұаёҷ)|$)/m,
    /аё—аёөа№Ҳаёӯаёўаё№а№Ҳ(?:аёӘаёіаёҷаёұаёҒаёҮаёІаёҷ)?\s*[:\n]?\s*([\s\S]+?)(?=\n\n|$)/m,
  ];
  for(const pat of addrPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const addr=m[1].replace(/\n/g,' ').replace(/\s+/g,' ').trim();
    if(addr.length>10){out.addr=addr.slice(0,300);break;}
  }

  // в”Җв”Җ 4. аёЈаё«аёұаёӘа№„аёӣаёЈаё©аё“аёөаёўа№Ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // аё”аё¶аёҮаёҲаёІаёҒаёҡаёЈаёҙа№Җаё§аё“аё—аёөа№Ҳаёӯаёўаё№а№ҲаёҒа№Ҳаёӯаёҷ а№ҒаёҘа№үаё§аё„а№Ҳаёӯаёў fallback аё—аёұа№үаёҮ document
  const addrBlock=out.addr||'';
  const zipInAddr=[...addrBlock.matchAll(/\b(\d{5})\b/g)].map(m=>m[1]).filter(z=>!/^0+$/.test(z));
  if(zipInAddr.length){
    out.zip=zipInAddr[zipInAddr.length-1];
  } else {
    // fallback: аё«аёІа№ғаёҷ document а№Ғаё•а№ҲаёҒаёЈаёӯаёҮ ref numbers аёӯаёӯаёҒ
    const allZips=[...t.matchAll(/\b([1-9]\d{4})\b/g)].map(m=>m[1]).filter(z=>{
      const n=Number(z);return n>=10000&&n<=99999;
    });
    if(allZips.length) out.zip=allZips[allZips.length-1];
  }

  // в”Җв”Җ 5. аёҠаё·а№ҲаёӯаёҒаёЈаёЈаёЎаёҒаёІаёЈаё„аёҷа№ҒаёЈаёҒ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // DBD: "1. аёҷаёІаёҮаё аёІаё§аёҙаё“аёө аёӘаёёаёҲаёЈаёҙаё•аёһаёёаё—аёҳаёұаёҮаёҒаё№аёЈ  2. аёҷаёІаёўаёӘаёёаёЈаёұаёҒаё©а№Ң..."
  const titlePfx='(?:аёҷаёІаёҮ(?:аёӘаёІаё§)?|аёҷаёІаёў|аё”аёЈ\\.?|Mr\\.|Ms\\.|Mrs\\.)';
  const dirPatterns=[
    new RegExp(`аёҒаёЈаёЈаёЎаёҒаёІаёЈ[\\s\\S]*?1\\.\\s+(${titlePfx}\\s+[аёҒ-а№ҷa-zA-Z]+\\s+[аёҒ-а№ҷa-zA-Z]+)`,'m'),
    new RegExp(`1\\.\\s+(${titlePfx}\\s+[аёҒ-а№ҷa-zA-Z]+\\s+[аёҒ-а№ҷa-zA-Z]+)`,'m'),
    new RegExp(`(${titlePfx}\\s+[аёҒ-а№ҷa-zA-Z]+\\s+[аёҒ-а№ҷa-zA-Z]+)`,'m'),
  ];
  for(const pat of dirPatterns){
    const m=t.match(pat);
    if(!m) continue;
    const n=m[1].replace(/\s+/g,' ').trim();
    if(n.length>4&&n.length<60){out.contact=n;break;}
  }

  return out;
}

function _crCleanVatText(text){
  return String(text||'').replace(/\r/g,'').replace(/[|]/g,' ').replace(/\s+\n/g,'\n').replace(/\n\s+/g,'\n');
}
function _crVatAfter(t,label,nextLabels){
  const start=t.search(label);if(start<0)return '';
  let s=t.slice(start).replace(label,'');
  const next=nextLabels.map(p=>s.search(p)).filter(i=>i>0).sort((a,b)=>a-b)[0];
  if(next) s=s.slice(0,next);
  return s.replace(/\n/g,' ').replace(/[.В·вҖў]{2,}/g,' ').replace(/\s+/g,' ').trim();
}
function _crParseVat20(text){
  const out={docType:'аё .аёһ.20'};

  if(!/аё \.?\s*аёһ\.?\s*20|аё—аё°а№Җаёҡаёөаёўаёҷаё аёІаё©аёөаёЎаё№аёҘаё„а№ҲаёІа№Җаёһаёҙа№ҲаёЎ|а№ҖаёҘаёӮаёӣаёЈаё°аёҲаёіаё•аёұаё§аёңаё№а№үа№ҖаёӘаёөаёўаё аёІаё©аёөаёӯаёІаёҒаёЈ/.test(t)) return null;
  const top=t.slice(0,900);
  const topDigits=(top.match(/\d/g)||[]).join('');
  if(topDigits.length>=13) out.taxid=topDigits.slice(0,13);
  if(!out.taxid){
    const m=t.match(/(?:а№ҖаёҘаёӮаёӣаёЈаё°аёҲаёіаё•аёұаё§аёңаё№а№үа№ҖаёӘаёөаёўаё аёІаё©аёөаёӯаёІаёҒаёЈ|а№ҖаёҘаёӮаёӣаёЈаё°аёҲаёіаё•аёұаё§аёңаё№а№үа№ҖаёӘаёөаёўаё аёІаё©аёө|а№ҖаёҘаёӮаё—аё°а№Җаёҡаёөаёўаёҷ)[^\d]*([\d\s\-]{13,25})/);
    if(m){const clean=(m[1].match(/\d/g)||[]).join('').slice(0,13);if(clean.length===13)out.taxid=clean;}
