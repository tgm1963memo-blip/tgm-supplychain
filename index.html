<!DOCTYPE html>
<html lang="th">

<title>TGM Supply Chain v3</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --N:#1E3A5F;--N2:#D4AF37;--T:#0D5068;--G:#0A5940;--O:#C44B0A;--R:#A32D2D;
  --A:#7A4500;--P:#412B8A;--GR:#3D4A5C;
  --bg:#F4F6F9;--bg2:#ECEEF2;--W:#fff;--BD:#CDD5E0;
  --BL:#1553A0;--LBL:#E7EFFC;--LG:#E5F3EE;--LR:#FBEBEB;
  --LY:#FDF2E2;--LP:#EDEAFB;--LN:#E7EDF7;
  --TX:#0D1117;--TX2:#4A5568;--TX3:#8896A5;
  --font:'Noto Sans Thai','IBM Plex Sans Thai',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--TX);font-size:13.5px;line-height:1.5}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:224px;background:var(--N);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-logo-sub{font-size:10.5px;opacity:.4;margin-top:1px;font-family:var(--mono)}
.sb-sec{padding:12px 14px 3px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.3}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;border-radius:7px;margin:1px 6px;font-size:13px;color:rgba(255,255,255,.6);transition:.12s}
.ni:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
.ni.act{background:rgba(212,175,55,.18);color:#D4AF37;font-weight:600;border-left:3px solid #D4AF37;padding-left:9px}
.ni-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-u{display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-un{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ur{font-size:11px;opacity:.42}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:50px;background:var(--N);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tb-t{font-size:15px;font-weight:700;flex:1;color:#fff}
th.r{text-align:right}
td.r{text-align:right;font-variant-numeric:tabular-nums}
#ct{flex:1;overflow-y:auto;padding:18px 22px}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--BD);background:var(--W);color:var(--TX);font-family:var(--font);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.12s;line-height:1}
.btn:hover{background:var(--bg2)} .btn:active{transform:scale(.98)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11.5px;border-radius:5px}
.btn-p{background:#D4AF37;color:#000;border-color:#D4AF37;font-weight:700}.btn-p:hover{opacity:.88}
.btn-g{background:var(--G);color:#fff;border-color:var(--G)}.btn-g:hover{opacity:.88}
.btn-r{background:var(--R);color:#fff;border-color:var(--R)}
.btn-o{background:var(--O);color:#fff;border-color:var(--O)}
.btn-t{background:var(--T);color:#fff;border-color:var(--T)}
.card{background:var(--W);border:1px solid var(--BD);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.ct2{font-size:14px;font-weight:700;color:var(--N)}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--W);border:1px solid var(--BD);border-radius:10px;padding:13px 15px}
.kl{font-size:11.5px;color:var(--TX2);margin-bottom:5px;font-weight:500}
.kv{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kh{font-size:11px;color:var(--TX3);margin-top:3px}
.kpi.b{border-left:3px solid var(--BL)}.kpi.b .kv{color:var(--BL)}
.kpi.g{border-left:3px solid var(--G)}.kpi.g .kv{color:var(--G)}
.kpi.r{border-left:3px solid var(--R)}.kpi.r .kv{color:var(--R)}
.kpi.a{border-left:3px solid var(--A)}.kpi.a .kv{color:var(--A)}
.kpi.p{border-left:3px solid var(--P)}.kpi.p .kv{color:var(--P)}
.kpi.t{border-left:3px solid var(--T)}.kpi.t .kv{color:var(--T)}
.tw{overflow-x:auto;border:1px solid var(--BD);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
th{background:var(--bg2);padding:8px 12px;text-align:left;font-weight:600;font-size:11.5px;color:var(--TX2);border-bottom:1px solid var(--BD);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid var(--bg2);vertical-align:middle}
tr:last-child td{border-bottom:none} tr:hover td{background:#FAFBFD}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bbl{background:var(--LBL);color:var(--BL)}.bbg{background:var(--LG);color:var(--G)}
.bbr{background:var(--LR);color:var(--R)}.bba{background:var(--LY);color:var(--A)}
.bbgr{background:var(--bg2);color:var(--TX2)}.bbp{background:var(--LP);color:var(--P)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--TX2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--BD);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--TX)}
.field input:focus,.field select:focus{outline:none;border-color:var(--BL);box-shadow:0 0 0 3px rgba(21,83,160,.1)}
.al{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:11px;display:flex;align-items:flex-start;gap:8px}
.ali{background:var(--LBL);color:var(--BL);border:1px solid rgba(21,83,160,.2)}
.als{background:var(--LG);color:var(--G);border:1px solid rgba(10,89,64,.2)}
.alw{background:var(--LY);color:var(--A);border:1px solid rgba(122,69,0,.2)}
.ald{background:var(--LR);color:var(--R);border:1px solid rgba(163,45,45,.2)}
.pz{border:2px dashed var(--BD);border-radius:8px;padding:18px;text-align:center;color:var(--TX3);cursor:pointer;transition:.15s;margin-bottom:10px;position:relative}
.pz:hover,.pz.drag{border-color:var(--BL);background:var(--LBL);color:var(--BL)}
.pz b{display:block;font-size:13px;margin-bottom:3px;color:var(--TX2)}
.tabs{display:flex;gap:1px;border-bottom:2px solid var(--bg2);margin-bottom:14px}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--TX2);font-weight:500;transition:.12s}
.tab.act{color:var(--N);border-bottom-color:var(--N)}.tab:hover:not(.act){color:var(--TX)}
.cbox{position:relative;height:280px} .cbox2{position:relative;height:200px}
.cgrid{display:grid;gap:14px;margin-bottom:14px}
.c2{grid-template-columns:1fr 1fr} .c3{grid-template-columns:1fr 1fr 1fr}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.44);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.mbox{background:var(--W);border-radius:12px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt2{font-size:16px;font-weight:700;color:var(--N)}
.mx{cursor:pointer;font-size:20px;color:var(--TX3);line-height:1}
#ls{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:300}
.lb{background:var(--W);border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:14px}
.lt{font-size:20px;font-weight:700;color:#111;margin:0;text-align:center}
.ls{font-size:13px;color:var(--TX2);margin:0;text-align:center}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.rc{border:2px solid var(--BD);border-radius:10px;padding:13px;cursor:pointer;text-align:center;transition:.15s}
.rc:hover{border-color:var(--BL);background:var(--LBL)}.rc.sel{border-color:var(--N);background:var(--LN)}
.ri{font-size:24px;margin-bottom:5px}
.rn{font-size:13px;font-weight:700;color:var(--N)}.rd{font-size:11px;color:var(--TX2);margin-top:2px}
.sep{height:1px;background:var(--BD);margin:12px 0}
.frow{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:8px;margin-bottom:13px}
.frow label{font-size:12px;font-weight:600;color:var(--TX2)}
.frow select,.frow input[type=text]{padding:5px 9px;border:1px solid var(--BD);border-radius:6px;font-size:12.5px;font-family:var(--font);background:var(--W)}
.edby{font-size:10px;color:var(--TX3);font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:3px;display:inline-block}
.bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:3px}
.bf{height:100%;border-radius:3px;transition:.4s}
.hidden{display:none!important}
.exp-hot td{background:#FEF3F2!important}.exp-warm td{background:#FDF2E2!important}
.crit-row td{background:#FEF3F2!important}
.inp-cell{width:100%;border:none;background:transparent;font-size:13px;font-family:var(--font);color:var(--TX)}
.inp-cell:focus{outline:2px solid var(--BL);border-radius:3px;background:var(--LBL)}
/* ── Customer Registration ── */
.cr-prog{height:3px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:8px}
.cr-prog-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s}
.cr-steps{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.cr-steps::-webkit-scrollbar{display:none}
.cr-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;border:1px solid var(--BD);background:var(--W);font-size:11px;color:var(--TX2);cursor:pointer;white-space:nowrap;transition:.15s}
.cr-pill.act{background:var(--LBL);border-color:var(--BL);color:var(--BL);font-weight:600}
.cr-pill.done{background:var(--LG);border-color:var(--G);color:var(--G)}
.cr-sec{display:none}.cr-sec.act{display:block}
.cr-cb{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.cr-cbi{display:flex;align-items:center;gap:6px;padding:7px 9px;border:1px solid var(--BD);border-radius:7px;font-size:12px;color:var(--TX2);cursor:pointer;transition:.15s;background:var(--W)}
.cr-cbi:has(input:checked){background:var(--LBL);border-color:var(--BL);color:var(--BL)}
.cr-cbi input{width:auto;accent-color:var(--BL);margin:0}
.cr-r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cr-ri{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cr-ri label{font-size:12px;color:var(--TX2);white-space:nowrap}
.cr-ri input{flex:1;background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:7px 10px;font-size:13px;font-family:var(--font);outline:none;color:var(--TX);transition:.15s}
.cr-ri input:focus,.field input:focus,.field select:focus{border-color:var(--BL)}
.cr-ro{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--bg2)}
.cr-ro:last-child{border-bottom:none}
.cr-rl{color:var(--TX2)}.cr-rv{font-weight:600;color:var(--TX)}
.cr-dsb{background:var(--bg2);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cr-dsb-n{font-size:20px;font-weight:700;color:var(--BL)}
.cr-dsb-prog{flex:1;height:4px;background:var(--BD);border-radius:99px;overflow:hidden;margin-left:auto;max-width:80px}
.cr-dsb-fill{height:100%;background:var(--BL);border-radius:99px;transition:width .3s}
.cr-slot{border:1px solid var(--BD);border-radius:8px;overflow:hidden;margin-bottom:7px}
.cr-slot-h{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg2);cursor:pointer;user-select:none}
.cr-slot-lbl{flex:1;font-size:12px;font-weight:600;color:var(--TX)}
.cr-slot-req{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--LY);color:var(--A);margin-left:4px}
.cr-slot-opt{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--W);border:1px solid var(--BD);color:var(--TX3);margin-left:4px}
.cr-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.cr-dot-e{background:var(--W);border:1px solid var(--BD);color:var(--TX3)}
.cr-dot-d{background:var(--LG);color:var(--G)}
.cr-chev{font-size:13px;color:var(--TX3);transition:transform .2s}
.cr-chev.open{transform:rotate(180deg)}
.cr-slot-b{display:none;padding:10px 11px;border-top:1px solid var(--BD)}
.cr-slot-b.open{display:block}
.cr-uz{border:1.5px dashed var(--BD);border-radius:7px;padding:12px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:7px}
.cr-uz:hover{background:var(--LBL);border-color:var(--BL)}
.cr-fi{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg2);border-radius:7px;margin-bottom:5px}
.cr-ft{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.cr-sign{background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:9px 11px;margin-bottom:7px}
.cr-sign-lbl{font-size:10px;color:var(--TX3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.cr-sign-inp{width:100%;border:none;border-bottom:1px solid var(--BD);background:transparent;font-size:13px;color:var(--TX);padding:3px 0;outline:none;font-family:var(--font)}
.cr-apvb{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;margin-bottom:10px}
.cr-tl{display:flex;flex-direction:column}
.cr-tl-item{display:flex;gap:10px;position:relative}
.cr-tl-item:not(:last-child)::after{content:'';position:absolute;left:14px;top:30px;bottom:0;width:1px;background:var(--BD)}
.cr-tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.cr-tl-body{padding-bottom:13px;flex:1}
.cr-sr{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bg2)}
.cr-sr:last-child{border-bottom:none}
.cr-apv-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bg2);cursor:pointer}
.cr-apv-item:last-child{border-bottom:none}
.cr-apv-item:hover td,.cr-apv-item:hover{background:var(--bg2)}
.cr-apsel{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--BD);border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:5px}
.cr-apsel:hover{background:var(--bg2)}
.cr-apsel.sel{background:var(--LP);border-color:var(--P)}
</style>
</head>

<script>

const SUPABASE_URL      = 'https://wjhqvjlcshwnrukbdlgr.supabase.co';   // ← Project URL

  async getSalesHistory(slmId = 'ALL') {
    // ดึง 4 เดือนล่าสุด
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - 4);
    const startYm = cutoff.toISOString().slice(0, 7);

    const { data } = await getSupabaseClient()
      .from('sales_history')
      .select('sku, ym, qty')
      .eq('slm_id', slmId)
      .gte('ym', startYm)
      .order('sku').order('ym');

    // แปลงเป็น format เดิม {skuCode: {name:'', monthly:{}, avg3:0}}
    const result = {};
    for (const row of (data || [])) {
      if (!result[row.sku]) result[row.sku] = { name: '', monthly: {}, avg3: 0 };
      result[row.sku].monthly[row.ym] = row.qty;
    }

    // คำนวณ avg3
    for (const sku in result) {
      const months3 = [];
      for (let i = 1; i <= 3; i++) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        months3.push(d.toISOString().slice(0, 7));
      }
      const vals = months3.map(m => result[sku].monthly[m] || 0).filter(v => v > 0);
      result[sku].avg3 = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
    }
    return result;
  },

// CACHE — ลด API calls ที่ไม่จำเป็น
// ════════════════════════════════════════════════
const CACHE = {
  _store: {},
  _time:  {},
  TTL: 60000, // 60 วินาที

  async get(key, fetcher) {
    if (this._store[key] && Date.now() - (this._time[key] || 0) < this.TTL)
      return this._store[key];
    const data = await fetcher();
    this._store[key] = data;
    this._time[key]  = Date.now();
    return data;
  },

  clear(key) { delete this._store[key]; delete this._time[key]; },
  clearAll()  { this._store = {}; this._time = {}; },
};

// MIGRATION — ย้าย localStorage → Supabase ครั้งแรก
// ════════════════════════════════════════════════
async function migrateFromLocalStorage() {
  const migrated = localStorage.getItem('tgm_sb_migrated');
  if (migrated) return; // ย้ายแล้ว

  console.log('[Migration] ตรวจสอบ localStorage...');

  // ย้าย forecasts
  const fcRaw = localStorage.getItem('tgm3_forecasts');
  if (fcRaw) {
    try {
      const fc = JSON.parse(fcRaw);
      if (fc.length > 0) {
        await SB.addForecasts(fc);
        console.log(`[Migration] ✓ ย้าย ${fc.length} forecasts`);
      }
    } catch (e) { console.error('[Migration] forecast error:', e); }
  }

  // ย้าย po_log
  const poRaw = localStorage.getItem('tgm3_po_log');
  if (poRaw) {
    try {
      const pos = JSON.parse(poRaw);
      for (const po of pos) await SB.upsertPO(po);
      console.log(`[Migration] ✓ ย้าย ${pos.length} PO plans`);
    } catch (e) { console.error('[Migration] PO error:', e); }
  }

  localStorage.setItem('tgm_sb_migrated', '1');
  console.log('[Migration] ✓ เสร็จสมบูรณ์');
}

// doLogin() — แทนที่ของเดิม
// ════════════════════════════════════════════════
async function doLogin() {
  const uid = document.getElementById('l-uid').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const err = document.getElementById('l-err');
  err.textContent = ''; err.style.display = 'none';

  // แสดง loading
  const btn = document.querySelector('#ls .btn-p');
  const origText = btn.textContent;
  btn.textContent = 'กำลังเข้าสู่ระบบ...';
  btn.disabled = true;

  try {
    const user = await SB.login(uid, pwd);
    if (!user) {
      err.textContent = 'รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง';
      err.style.display = '';
      return;
    }

    // เซ็ต global vars (ให้ตรงกับ HTML เดิม)
    CURRENT_USER = user;
    ROLE   = user.role;
    UID    = user.uid;
    UNAME  = user.name;

    // บันทึก session สำหรับ SSO (WMS ใช้ร่วม)
    localStorage.setItem('tgm_session', JSON.stringify({uid:user.uid,name:user.name,role:user.role,slm_id:user.slm_id||'',pwd:user.pwd,ts:Date.now()}));

    // แสดง app ทันทีหลัง auth สำเร็จ
    document.getElementById('ls').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    buildSB();
    nav('dash');

    // Supabase background tasks (ไม่บล็อก login)
    migrateFromLocalStorage().catch(console.warn);
    SB.audit('LOGIN', 'system', { role: ROLE }).catch(console.warn);
    try {
      SB.subscribeStock(() => {
        CACHE.clear('stock');
        CACHE.clear('stock_lots');
        CACHE.clear('stock_planning');
        if (document.getElementById('ps-tbl')) planStkT();
      });
      SB.subscribeReservations(payload => {
        if (payload.eventType === 'INSERT') {
          const r = payload.new;
          toast(`📦 จองสินค้าใหม่: ${r.sku} ${r.qty_requested} กก.`);
        }
      });
    } catch (e) { console.warn('Realtime subscribe:', e); }

  } catch (e) {
    err.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
    err.style.display = '';
    console.error('Login error:', e);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

      <option value="">ทั้งหมด</option>
      ${skuGroupNames().map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('')}
    </select>
    <input id="ss" type="text" placeholder="ค้นหา รหัส/ชื่อ..." style="width:160px;padding:6px 10px;border:1px solid var(--BD);border-radius:7px;font-size:13px;font-family:var(--font)" oninput="planStkT()">
    <label style="align-self:center">เกณฑ์เปรียบเทียบ:</label>
    <select id="ps-crit" onchange="_psCrit=this.value;planStkT()">
      <option value="avg3">เฉลี่ย 3 เดือน</option>
      <option value="avg4">เฉลี่ย 4 เดือนล่าสุด</option>
      <option value="last1">ยอดเดือนล่าสุด</option>
      <option value="prevyear">เทียบกับปีที่แล้ว (เดือนนี้)</option>
      <option value="weekly">รายสัปดาห์ (avg3÷4)</option>
    </select>
    <span style="margin-left:auto;font-size:12px;color:var(--TX3)">🔴 Live จาก WMS</span>
  </div>
  <div class="card">
    <div class="ch">
      <div class="ct2" id="ps-title">Stock vs เฉลี่ย 3 เดือน</div>
      <button class="btn btn-sm btn-g" onclick="expPlanStk()">Export Excel</button>
    </div>
    <div id="ps-tbl"><div style="padding:30px;text-align:center;color:var(--TX3)">กำลังโหลด...</div></div>
  </div>`;

  // โหลดจาก Supabase view
  const rows = await CACHE.get('stock_planning', () => SB.getStockPlanning());
  window._planRows = rows;
  planStkT();
}

function planStkT() {
  const rows = window._planRows || [];
  const grp  = document.getElementById('gf')?.value || '';
  const q    = (document.getElementById('ss')?.value || '').toLowerCase();
  const crit = _psCrit || 'avg3';

  // update title
  const titles={avg3:'Stock vs เฉลี่ย 3 เดือน',avg4:'Stock vs เฉลี่ย 4 เดือนล่าสุด',last1:'Stock vs ยอดเดือนล่าสุด',prevyear:'Stock vs ปีที่แล้ว (เดือนนี้)',weekly:'Stock vs ยอดรายสัปดาห์'};
  const titleEl=document.getElementById('ps-title');if(titleEl)titleEl.textContent=titles[crit]||'Stock Planning';

  let filtered = [...rows];
  if (grp && productGroups()[grp]) {
    const set = new Set(productGroups()[grp]);
    filtered = filtered.filter(r => set.has(r.code));
  }
  if (q) filtered = filtered.filter(r =>
    (r.code || '').toLowerCase().includes(q) ||
    (r.name || '').toLowerCase().includes(q)
  );

  // compute benchmark per criterion
  filtered = filtered.map(r => {
    const a3 = r.avg3_monthly || 0;
    let bench = a3;
    if (crit === 'avg4')     bench = r.avg4_monthly ?? a3;
    else if(crit === 'last1') bench = r.last_month ?? a3;
    else if(crit === 'prevyear') bench = r.prevyear_monthly ?? a3;
    else if(crit === 'weekly') bench = a3 / 4;
    const daysComp = bench > 0 ? Math.round((r.stock_qty || 0) / bench * (crit==='weekly'?7:30)) : 9999;
    return {...r, _bench: bench, _days: daysComp};
  });

  // sort
  const sc=_psSort.col,sd=_psSort.dir;
  if(sc==='code')  filtered.sort((a,b)=>sd*(a.code||'').localeCompare(b.code||''));
  else if(sc==='stock') filtered.sort((a,b)=>sd*(b.stock_qty-a.stock_qty));
  else if(sc==='bench') filtered.sort((a,b)=>sd*(b._bench-a._bench));
  else if(sc==='min')   filtered.sort((a,b)=>sd*(b.min_stock-a.min_stock));
  else filtered.sort((a,b)=>sd*(a._days-b._days));

  const tbl = document.getElementById('ps-tbl');
  if (!tbl) return;
  const sArrow=col=>sc===col?(sd>0?'▲':'▼'):'';
  const thS=col=>`style="text-align:right;cursor:pointer;user-select:none" onclick="psSortBy('${col}')"`;
  const benchLbl=crit==='weekly'?'เฉลี่ย/สัปดาห์':crit==='prevyear'?'ปีก่อน/เดือน':'เฉลี่ย/เดือน';
  const daysLbl=crit==='weekly'?'วันคงเหลือ (wk)':'วันคงเหลือ';

  tbl.innerHTML = `<div class="tw"><table>
  <thead><tr>
    <th style="cursor:pointer;user-select:none" onclick="psSortBy('code')">รหัสสินค้า ${sArrow('code')}</th>
    <th>ชื่อสินค้า</th>
    <th ${thS('stock')}>Stock ${sArrow('stock')}</th>
    <th ${thS('bench')}>${benchLbl} ${sArrow('bench')}</th>
    <th ${thS('min')}>ขั้นต่ำ ${sArrow('min')}</th>
    <th ${thS('days')}>${daysLbl} ${sArrow('days')}</th>
    <th>แนะนำ</th>
  </tr></thead>
  <tbody>${filtered.slice(0, 120).map(r => {
    const days  = r._days >= 9999 ? '∞' : r._days;
    const lc    = r.stock_qty < r.min_stock ? 'var(--R)' : r.stock_qty < r.min_stock * 2 ? 'var(--A)' : 'var(--G)';
    const cls   = r._days < 14 ? 'crit-row' : r._days < 30 ? 'exp-warm' : '';
    const rec   = r.stock_qty < r.min_stock
      ? `<span class="badge bbr">สั่งด่วน</span>`
      : r._days < 30 ? `<span class="badge bba">เฝ้าระวัง</span>`
      : `<span class="badge bbg">ปกติ</span>`;
    return `<tr class="${cls}">
      <td class="mono">${r.code}</td>
      <td>${(r.name || '').substring(0, 32)}</td>
      <td style="text-align:right;color:${lc};font-weight:700">${Math.round(r.stock_qty || 0).toLocaleString()}</td>
      <td style="text-align:right">${r._bench.toFixed(1)}</td>
      <td style="text-align:right">${r.min_stock}</td>
      <td style="text-align:right;font-weight:700;color:${r._days < 14 ? 'var(--R)' : r._days < 30 ? 'var(--A)' : 'inherit'}">${days}</td>
      <td>${rec}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}
function psSortBy(col){if(_psSort.col===col)_psSort.dir*=-1;else{_psSort.col=col;_psSort.dir=col==='days'?1:-1;}planStkT();}

function expPlanStk() {
  const rows = window._planRows || [];
  toXLSX([['StockPlanning',
    ['รหัสสินค้า','ชื่อสินค้า','Stock','เฉลี่ย3เดือน','ขั้นต่ำ','วันคงเหลือ'],
    rows.map(r => [r.code, r.name, r.stock_qty, r.avg3_monthly, r.min_stock, r.days_remaining]),
  ]], 'StockPlanning_' + todayStr() + '.xlsx');
}

function ppSetPT(t){
  _pp.pt=t;
  ['d','w','m','y'].forEach(x=>{const b=document.getElementById('pp-pt-'+x);if(b){b.style.background='';b.style.color='';b.style.borderColor='';b.style.fontWeight='';}});
  const idMap={day:'d',week:'w',month:'m',year:'y'};
  const a=document.getElementById('pp-pt-'+(idMap[t]||'d'));
  if(a){a.style.background='var(--N)';a.style.color='#fff';a.style.borderColor='var(--N)';a.style.fontWeight='600';}
  ppRender();
}
function ppGetRange(){
  const ref=new Date(_pp.ref);const t=_pp.pt;
  if(t==='day'){const s=new Date(ref);const e=new Date(ref);e.setDate(e.getDate()+1);return{s,e,lbl:ref.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'})};}
  if(t==='week'){const s=new Date(ref);s.setDate(s.getDate()-s.getDay()+1);const e=new Date(s);e.setDate(e.getDate()+7);return{s,e,lbl:'สัปดาห์ '+s.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+' – '+new Date(e-864e5).toLocaleDateString('th-TH',{day:'2-digit',month:'short'})};}
  if(t==='month'){const s=new Date(ref.getFullYear(),ref.getMonth(),1);const e=new Date(ref.getFullYear(),ref.getMonth()+1,1);return{s,e,lbl:['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][ref.getMonth()]+' '+(ref.getFullYear()+543)};}
  const s=new Date(ref.getFullYear(),0,1);const e=new Date(ref.getFullYear()+1,0,1);return{s,e,lbl:'พ.ศ. '+(ref.getFullYear()+543)};
}
function ppRender(){
  const orders=DB.get('prod_orders')||[];

  const inRange=orders.filter(o=>{const d=new Date(o.planDate);return d>=s&&d<e;});

    <div class="kpi b"><div class="kl">ช่วงเวลา</div><div class="kv" style="font-size:16px">${lbl}</div></div>
    <div class="kpi g"><div class="kl">ยอดรวม (กก.)</div><div class="kv">${fmt(totalQty)}</div><div class="kh">${totalItems} SKU</div></div>
    <div class="kpi a"><div class="kl">รอผลิต</div><div class="kv">${pending}</div><div class="kh">รายการ</div></div>

  const bysku={};inRange.forEach(o=>{if(!bysku[o.sku])bysku[o.sku]={name:o.skuName||o.sku,qty:0,cnt:0};bysku[o.sku].qty+=o.qty;bysku[o.sku].cnt++;});
  const sm=document.getElementById('pp-summary');
  if(sm){
    const entries=Object.entries(bysku).sort((a,b)=>b[1].qty-a[1].qty).slice(0,8);
    sm.innerHTML=entries.length?`<div class="ct2" style="margin-bottom:10px">Top SKU ในช่วงนี้</div>`+
      entries.map(([sku,d])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span class="mono" style="width:90px;font-size:11px;color:var(--TX3)">${sku}</span>

        <div style="width:80px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="width:${Math.round(d.qty/(bysku[entries[0][0]]?.qty||1)*100)}%;height:100%;background:var(--G);border-radius:3px"></div></div>
      </div>`).join('')
      :'<div style="color:var(--TX3);font-size:13px">ไม่มีรายการในช่วงนี้</div>';
  }
  // Orders table
  const tbl=document.getElementById('pp-tbl');
  if(tbl) tbl.innerHTML=inRange.length?`<div class="tw"><table>
    <thead><tr><th>วันผลิต</th><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th class="r">จำนวน(กก.)</th><th>สายผลิต</th><th>สถานะ</th><th>หมายเหตุ</th><th>แก้ไขโดย</th></tr></thead>
    <tbody>${inRange.sort((a,b)=>a.planDate<b.planDate?-1:1).map(o=>`<tr>
      <td>${fmtD(o.planDate)}</td>
      <td class="mono">${o.sku}</td><td>${(o.skuName||'').substring(0,28)}</td>
      <td class="r" style="font-weight:700">${fmt(o.qty)}</td>
      <td>${o.line||'—'}</td>
      <td>${o.status==='done'?'<span class="badge bbg">ผลิตแล้ว</span>':o.status==='inprog'?'<span class="badge bba">กำลังผลิต</span>':'<span class="badge bbl">รอผลิต</span>'}</td>
      <td style="font-size:12px;color:var(--TX2)">${o.note||''}</td>

    </tbody></table></div>`
    :'<div style="padding:20px;color:var(--TX3);text-align:center">ไม่มีรายการในช่วงเวลานี้</div>';

function ppSaveOrder(){

function buildSB(){
  // Merge RNAV defaults with stored role-permission overrides
  const customPerms=DB.get('nav_perms')||{};
  let navItems=RNAV[ROLE]||[];
  if(ROLE!=='superadmin' && customPerms[ROLE]?.pages?.length){
    // Build all-pages lookup from every role's RNAV
    const lookup={};
    Object.values(RNAV).flat().forEach(([id,ico,lbl])=>{if(!lookup[id])lookup[id]=[id,ico,lbl];});
    navItems=customPerms[ROLE].pages.map(id=>lookup[id]).filter(Boolean);
  }
  document.getElementById('sb-nav').innerHTML=navItems.map(([id,ico,lbl])=>`<div class="ni" id="ni-${id}" onclick="nav('${id}')"><span class="ni-ico">${ico}</span><span>${lbl}</span></div>`).join('');
  document.getElementById('sb-av').textContent=UID.substring(0,2).toUpperCase();
  document.getElementById('sb-un').textContent=UNAME||UID;

    ...c,

    category:prof.category||c.ty||'ไม่ระบุ',
    slm:prof.slm||c.slm||'',
    n:prof.name||c.n
  };
}
function salesCustomers(){return SD_CUSTS.map(getCustomerProfile);}
function allCustomerRows(){
  const rows=salesCustomers(),seen=new Set(rows.map(c=>c.c));
  if(typeof CUST_NAMES==='object'){
    Object.entries(CUST_NAMES).forEach(([code,name])=>{
      if(!seen.has(code)){
        rows.push(getCustomerProfile({c:code,n:name,ty:'ไม่ระบุ',grp:'อื่นๆ',slm:'',w:[0,0,0,0],g:[]}));
      }
    });
  }
  return rows.sort((a,b)=>String(a.c).localeCompare(String(b.c),'th'));
}

function toXLSX(sheets,fname){
  const wb=XLSX.utils.book_new();
  sheets.forEach(([name,cols,rows])=>{
    const ws=XLSX.utils.aoa_to_sheet([cols,...rows]);
    ws['!cols']=cols.map(c=>({wch:Math.max(c.length+2,12)}));
    XLSX.utils.book_append_sheet(wb,ws,name.substring(0,31));
  });
  XLSX.writeFile(wb,fname);
  toast('Export: '+fname);
}
function toast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;right:20px;background:var(--N);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:400;transition:opacity .3s';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500);
}

function dashCharts(){
  const allowed=allowedSKUs();
  const period=parseInt(document.getElementById('pf')?.value||'4');
  const custGroup=document.getElementById('cgf')?.value||'';
  const hist=myHist();
  const fc=DB.get('forecasts')||[];
  const po=DB.get('po_log')||[];
  const stk=DB.get('stock')||{};
  const ss=DB.get('sku_settings')||{};
  const mths=MONTHS.slice(-period);
  const mls=mths.map(mL);
  const custSKUs = custGroup ? new Set(salesCustomers()
    .filter(c=>((c.corp||'อื่นๆ')===custGroup))
    .flatMap(c=>c.g.flatMap(g=>g.it.map(i=>i.c)))) : null;
  const skuAllowed = key => (!allowed||allowed.has(key)) && (!custSKUs||custSKUs.has(key));
  const actual=mths.map(m=>Object.entries(hist).filter(([k])=>skuAllowed(k)).reduce((a,[,h])=>a+(h.monthly[m]||0),0));
  const fcData=mths.map(m=>fc.filter(f=>skuAllowed(f.sku)&&f.delivDate?.substring(0,7)===m.substring(0,7)).reduce((a,f)=>a+f.qty,0));
  const poData=mths.map(m=>po.filter(p=>skuAllowed(p.sku)&&p.delivDate?.substring(0,7)===m.substring(0,7)).reduce((a,p)=>a+p.qty,0));
  mkChart('c-main','bar',mls,[
    {label:'ยอดขายจริง',data:actual,backgroundColor:'rgba(21,83,160,.72)',borderRadius:4},
    {label:'Forecast (Sales)',data:fcData,backgroundColor:'rgba(10,89,64,.65)',borderRadius:4},
    {label:'PO Plan',data:poData,backgroundColor:'rgba(196,75,10,.65)',borderRadius:4},
  ],{scales:{y:{beginAtZero:true,title:{display:true,text:'กก.'}}}});
  const topSKU=Object.entries(hist).filter(([k])=>skuAllowed(k)).map(([k,h])=>({k,n:h.name.substring(0,18),v:h.avg3})).sort((a,b)=>b.v-a.v).slice(0,8);
  mkChart('c-top','bar',topSKU.map(s=>s.n),[{label:'เฉลี่ย/เดือน',data:topSKU.map(s=>s.v),backgroundColor:'rgba(65,43,138,.72)',borderRadius:4}],{indexAxis:'y',scales:{x:{beginAtZero:true}}});
  const stkE=Object.entries(stk).filter(([k])=>skuAllowed(k)).map(([k,s])=>({k,qty:s.qty,min:(ss[k]?.min_stock||50),name:(skuI(k).name||k).substring(0,16)})).sort((a,b)=>a.qty/a.min-b.qty/b.min).slice(0,8);
  mkChart('c-stk','bar',stkE.map(s=>s.name),[
    {label:'Stock ปัจจุบัน',data:stkE.map(s=>s.qty),backgroundColor:stkE.map(s=>s.qty<s.min?'rgba(163,45,45,.75)':'rgba(10,89,64,.72)'),borderRadius:3},
    {label:'ขั้นต่ำ',data:stkE.map(s=>s.min),type:'line',borderColor:'#C44B0A',borderWidth:2,borderDash:[5,3],pointRadius:3,fill:false,backgroundColor:'transparent'},
  ],{indexAxis:'y',scales:{x:{beginAtZero:true}}});
  const cnt={
    pending:po.filter(p=>skuAllowed(p.sku)&&p.status==='pending').length,
    overdue:po.filter(p=>skuAllowed(p.sku)&&p.status==='overdue').length,
    matched:po.filter(p=>skuAllowed(p.sku)&&p.status==='matched').length,
  };
  mkChart('c-po','doughnut',['รอส่ง','เลยกำหนด','Matched'],[{data:[cnt.pending,cnt.overdue,cnt.matched],backgroundColor:['#1553A0','#A32D2D','#0A5940'],borderWidth:0}],{plugins:{legend:{position:'right'}}});
}

function _sdApiMonth(){const gy=_sd.cy-543;const mm=String(_sd.cm+1).padStart(2,'0');return `${gy}-${mm}`;}
function _sdApiYear(){return _sd.cy_y-543;}

async function sdLoad(){
  const month=_sdApiMonth();
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=(ROLE==='sales')?(me?.slm_id||''):'';
  const badge=document.createElement('div');
  badge.id='sd-loading';badge.style.cssText='position:fixed;top:54px;right:16px;background:var(--N);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;z-index:200;opacity:.9';
  badge.textContent='⏳ โหลดข้อมูล...';document.body.appendChild(badge);
  try{
    const qs=slmId?`&slm_id=${encodeURIComponent(slmId)}`:'';
    const [sumJ,kpiJ,slmJ,arJ]=await Promise.all([
      fetch(`${API_BASE}/api/sales/summary?month=${month}${qs}`).then(r=>r.json()),
      fetch(`${API_BASE}/api/sales/monthly-kpi?months=24${qs}`).then(r=>r.json()),
      fetch(`${API_BASE}/api/sales/slm-list`).then(r=>r.json()),
      fetch(`${API_BASE}/api/ar${slmId?`?slm_id=${encodeURIComponent(slmId)}`:''}`).then(r=>r.json()),
    ]);
    _sdApi.loaded=true;
    _sdApi.month=month;
    _sdApi.monthly=kpiJ.rows||[];
    _sdApi.slmList=slmJ.rows||[];
    const curKpi=_sdApi.monthly.find(m=>m.ym===month)||{total:0,qty:0,invoices:0};
    _sdApi.total=curKpi.total||0;_sdApi.qty=curKpi.qty||0;_sdApi.invoices=curKpi.invoices||0;
    const arRows=arJ.rows||[];
    _sdApi.ar=arRows.reduce((s,r)=>s+parseFloat(r['ยอดค้างชำระ']||r['balance']||0),0);
    const ms=[..._sdApi.monthly].sort((a,b)=>a.ym.localeCompare(b.ym));
    const ci=ms.findIndex(m=>m.ym===month);
    const prev=ci>0?ms[ci-1]:null;
    _sdApi.vs=prev&&prev.total?Math.round((_sdApi.total/prev.total-1)*100):0;
    const rows=sumJ.rows||[];
    _sdApi.custs=_sdBuildCusts(rows);
    _sdApi.prods=_sdBuildProds(rows);
    _sdApi.slms=_sdBuildSlms(rows,_sdApi.slmList);
    _sdUpdateSlmDrop();
  }catch(e){
    _sdApi.loaded=false;
    console.warn('API offline — using mock data',e.message);
  }finally{
    document.getElementById('sd-loading')?.remove();
  }
  sdRender();
}

async function sdLoadYear(){
  const gy=_sdApiYear();
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=(ROLE==='sales')?(me?.slm_id||''):'';
  const badge=document.createElement('div');
  badge.id='sd-loading';badge.style.cssText='position:fixed;top:54px;right:16px;background:var(--N);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;z-index:200;opacity:.9';
  badge.textContent='⏳ โหลดข้อมูล...';document.body.appendChild(badge);
  try{
    const qs=slmId?`&slm_id=${encodeURIComponent(slmId)}`:'';
    const [kpiJ,slmJ]=await Promise.all([
      fetch(`${API_BASE}/api/sales/monthly-kpi?months=36${qs}`).then(r=>r.json()),
      fetch(`${API_BASE}/api/sales/slm-list`).then(r=>r.json()),
    ]);
    _sdApi.monthly=kpiJ.rows||[];
    _sdApi.slmList=slmJ.rows||[];
    const yearRows=_sdApi.monthly.filter(m=>m.ym.startsWith(String(gy)+'-'));
    _sdApi.total=yearRows.reduce((s,m)=>s+m.total,0);
    _sdApi.qty=yearRows.reduce((s,m)=>s+m.qty,0);
    _sdApi.invoices=yearRows.reduce((s,m)=>s+m.invoices,0);
    const prevYear=_sdApi.monthly.filter(m=>m.ym.startsWith(String(gy-1)+'-'));
    const prevTotal=prevYear.reduce((s,m)=>s+m.total,0);
    _sdApi.vs=prevTotal?Math.round((_sdApi.total/prevTotal-1)*100):0;

  }catch(e){_sdApi.loaded=false;console.warn('API offline',e.message);}
  finally{document.getElementById('sd-loading')?.remove();}
  sdRender();
}

function _sdBuildCusts(rows){
  const m={};
  for(const r of rows){
    if(!m[r.cust_code])m[r.cust_code]={n:r.cust_name,c:r.cust_code,ty:r.cust_group||'ขายขาด',grp:r.cust_group||'อื่นๆ',slm:r.slm_id,_tot:0,_qty:0,g:{}};
    const c=m[r.cust_code];c._tot+=r.amount;c._qty+=r.qty;
    if(!c.g[r.prod_group])c.g[r.prod_group]={n:r.prod_group||'อื่นๆ',_tot:0,it:{}};
    const g=c.g[r.prod_group];g._tot+=r.amount;
    if(!g.it[r.prod_code])g.it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0};
    g.it[r.prod_code]._tot+=r.amount;
  }
  return Object.values(m).map(c=>({...c,g:Object.values(c.g).map(g=>({...g,it:Object.values(g.it).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdBuildProds(rows){
  const m={};
  for(const r of rows){
    const gk=r.prod_group||'อื่นๆ';
    if(!m[gk])m[gk]={n:gk,_tot:0,it:{}};
    m[gk]._tot+=r.amount;
    if(!m[gk].it[r.prod_code])m[gk].it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0,custs:{}};
    const it=m[gk].it[r.prod_code];it._tot+=r.amount;
    const ty=r.cust_group||'อื่นๆ';
    if(!it.custs[ty])it.custs[ty]={n:ty,_tot:0,cs:{}};
    it.custs[ty]._tot+=r.amount;
    if(!it.custs[ty].cs[r.cust_code])it.custs[ty].cs[r.cust_code]={n:r.cust_name,c:r.cust_code,_tot:0};
    it.custs[ty].cs[r.cust_code]._tot+=r.amount;
  }
  return Object.values(m).map(g=>({...g,it:Object.values(g.it).map(i=>({...i,custs:Object.values(i.custs).map(t=>({...t,cs:Object.values(t.cs).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdBuildSlms(rows,slmList){
  const m={};
  for(const s of slmList)m[s.code]={code:s.code,name:s.name,_tot:0,custs:{}};
  for(const r of rows){
    if(!m[r.slm_id])m[r.slm_id]={code:r.slm_id,name:r.slm_name,_tot:0,custs:{}};
    m[r.slm_id]._tot+=r.amount;
    const sid=r.slm_id;
    if(!m[sid].custs[r.cust_code])m[sid].custs[r.cust_code]={n:r.cust_name,c:r.cust_code,grp:r.cust_group||'อื่นๆ',_tot:0,g:{}};
    const c=m[sid].custs[r.cust_code];c._tot+=r.amount;
    if(!c.g[r.prod_group])c.g[r.prod_group]={n:r.prod_group||'อื่นๆ',_tot:0,it:{}};
    c.g[r.prod_group]._tot+=r.amount;
    if(!c.g[r.prod_group].it[r.prod_code])c.g[r.prod_group].it[r.prod_code]={n:r.prod_name,c:r.prod_code,_tot:0};
    c.g[r.prod_group].it[r.prod_code]._tot+=r.amount;
  }
  return Object.values(m).map(s=>({...s,custs:Object.values(s.custs).map(c=>({...c,g:Object.values(c.g).map(g=>({...g,it:Object.values(g.it).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot)})).sort((a,b)=>b._tot-a._tot);
}
function _sdUpdateSlmDrop(){
  const sel=document.getElementById('sd-slm-f');if(!sel)return;
  const list=_sdApi.slmList.length?_sdApi.slmList:SD_SALES.map(s=>({code:s.c,name:s.n}));

  if(_sd.slmF)sel.value=_sd.slmF;
}

function _sdD(){
  const b=SD_MD[_sd.cm];
  if(_sd.pt==='month') return b;
  const mul=SD_WM[_sd.cw-1]||1;
  return {t:Math.round(b.t/4*mul),q:Math.round(b.q/4*mul),i:Math.round(b.i/4*mul),ar:Math.round(b.ar/2),vs:Math.round((mul-1)*80+b.vs*.3)};
}
function _sdWI(){return (_sd.pt==='month'?_sd.cm:_sd.cw-1)%4;}
function _sdF(n){return '฿'+Math.round(n).toLocaleString();}
function _sdVs(v){
  if(v==null) return '';
  const col=v>0?'var(--G)':v<0?'var(--R)':'var(--TX3)';
  const bg=v>0?'var(--LG)':v<0?'var(--LR)':'var(--bg2)';
  return `<span style="font-size:11px;padding:2px 6px;border-radius:3px;background:${bg};color:${col}">${v>0?'+':''}${Math.round(v)}%</span>`;
}
function _sdBar(v,mx){
  const p=Math.min(100,Math.round(v/(mx||1)*100));
  return `<div style="display:inline-flex;align-items:center;gap:5px"><div style="width:60px;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:var(--G);border-radius:3px"></div></div><span style="font-size:11px;color:var(--TX3)">${p}%</span></div>`;
}

  else lbl.textContent=SD_MTH[_sd.cm]+' '+_sd.cy;

    wb.style.display='flex';

function sdKPI(){
  const kr=document.getElementById('sd-krow'); if(!kr) return;

  if(_sdApi.loaded){
    total=_sdApi.total;qty=_sdApi.qty;inv=_sdApi.invoices;ar=_sdApi.ar;vs=_sdApi.vs;
    const ms=_sdApi.monthly;
    const maxT=Math.max(...ms.map(m=>m.total),1);
    const curM=_sd.pt==='year'?String(_sdApiYear()):_sdApiMonth();

    }).join('');

  }else{
    const d=_sdD();total=d.t;qty=d.q;inv=d.i;ar=d.ar;vs=d.vs;

function _custsByItemGrouped(itCode,T,wi){
  const byGrp={};
  salesCustomers().forEach(c=>{
    c.g.forEach(g=>{
      const it=g.it.find(i=>i.c===itCode);
      if(it){
        const v=Math.round(T*(c.w[wi]||c.w[0])*(g.w[wi]||g.w[0])*(it.w[wi]||it.w[0]));
        const grp=c.corp||'อื่นๆ';
        if(!byGrp[grp])byGrp[grp]={v:0,cs:[]};
        byGrp[grp].v+=v;byGrp[grp].cs.push({n:c.n,c:c.c,v});
      }
    });
  });
  return byGrp;
}

function sdCust(){
  const isAll=(ROLE==='manager'||ROLE==='superadmin')&&_sd.mgrView;
  const q=(_sd.q||'').toLowerCase();
  const me=(DB.get('users')||[]).find(x=>x.uid===UID);
  const slmId=me?.slm_id||'';
  const sDn=_sd.sort.col==='val'?(_sd.sort.dir>0?'▼':'▲'):'';
  const hHdr=`<div class="tw" style="margin-top:8px"><table>
    <thead><tr>
      <th style="width:42%">ประเภท / กลุ่มลูกค้า / ลูกค้า / กลุ่มสินค้า / สินค้า</th>
      <th class="r" style="cursor:pointer;user-select:none" onclick="sdSort('val')">ยอดขาย ${sDn}</th>
      <th class="r" style="width:110px">สัดส่วน</th><th class="r">vs</th>
    </tr></thead><tbody>`;

  if(_sdApi.loaded){
    // ─── API data: Category(ty) → Customer → ProdGroup → Product ───
    const T=_sdApi.total||1;
    let custs=isAll?_sdApi.custs:_sdApi.custs.filter(c=>c.slm===slmId);
    if(_sd.slmF) custs=custs.filter(c=>c.slm===_sd.slmF);
    if(q) custs=custs.filter(c=>c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)||c.g.some(g=>g.n.toLowerCase().includes(q)||g.it.some(i=>i.n.toLowerCase().includes(q)||i.c.toLowerCase().includes(q))));
    let sorted=[...custs];if(_sd.sort.col==='val') sorted.sort((a,b)=>_sd.sort.dir*(b._tot-a._tot));
    // group by ty (category)
    const tyMap={};
    sorted.forEach(c=>{const ty=c.ty||'อื่นๆ';if(!tyMap[ty])tyMap[ty]=[];tyMap[ty].push(c);});
    let h=hHdr;

function sdSetPT(t){
  _sd.pt=t;
  ['m','w','y'].forEach(x=>{const b=document.getElementById('sd-pt-'+x);if(b){b.style.background='';b.style.color='';b.style.borderColor='';b.style.fontWeight='';}});
  const idMap={month:'m',week:'w',year:'y'};
  const active=document.getElementById('sd-pt-'+(idMap[t]||'m'));
  if(active){active.style.background='var(--N)';active.style.color='#fff';active.style.borderColor='var(--N)';active.style.fontWeight='600';}
  if(t==='week') _sd.cw=1;
  _sdApi.loaded=false;
  if(t==='year') sdLoadYear(); else sdLoad();
}
function sdNav(d){
  if(_sd.pt==='year'){
    _sd.cy_y+=d;
  } else if(_sd.pt==='month'){
    _sd.cm+=d;
    if(_sd.cm<0){_sd.cm=11;_sd.cy--;}
    else if(_sd.cm>11){_sd.cm=0;_sd.cy++;}
  } else {
    _sd.cw+=d;
    if(_sd.cw<1){_sd.cm--;if(_sd.cm<0){_sd.cm=11;_sd.cy--;}_sd.cw=4;}
    else if(_sd.cw>4){_sd.cm++;if(_sd.cm>11){_sd.cm=0;_sd.cy++;}_sd.cw=1;}
  }
  _sdApi.loaded=false;
  if(_sd.pt==='year') sdLoadYear(); else sdLoad();
}
function sdGoNow(){
  const now=new Date();
  _sd.cm=now.getMonth();_sd.cy=now.getFullYear()+543;_sd.cy_y=now.getFullYear()+543;_sd.cw=1;
  _sdApi.loaded=false;
  if(_sd.pt==='year') sdLoadYear(); else sdLoad();
}

function sdExport(){
  const d=_sdD(),T=d.t,wi=_sdWI();
  const period=(_sd.pt==='week'?'สัปดาห์'+_sd.cw+'_':'')+SD_MTH[_sd.cm]+'_'+_sd.cy;
  let cols,rows=[],sheet;
  if(_sd.at==='cust'){
    const isAll=(ROLE==='manager'||ROLE==='superadmin')&&_sd.mgrView;
    const q=(_sd.q||'').toLowerCase();
    const allCusts=salesCustomers();
    const base=isAll?allCusts:allCusts.slice(0,1);
    const filtered=q?base.filter(c=>c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q)):base;
    const custRows=filtered.map(c=>({...c,_cv:Math.round(T*(c.w[wi]||c.w[0]))}));
    if(_sd.sort.col==='val') custRows.sort((a,b)=>_sd.sort.dir*(b._cv-a._cv));
    cols=['ลูกค้า','รหัส','Corporate group','Category','ยอดขาย','สัดส่วน%'];
    custRows.forEach(c=>{
      rows.push([c.n,c.c,c.corp||'อื่นๆ',c.category||c.ty,c._cv,Math.round(c._cv/T*100)]);
      c.g.forEach(g=>{
        const gv=Math.round(c._cv*(g.w[wi]||g.w[0]));
        rows.push(['  '+g.n,'','','',gv,Math.round(gv/T*100)]);
        g.it.forEach(it=>{const iv=Math.round(gv*(it.w[wi]||it.w[0]));rows.push(['    '+it.c+' — '+it.n,'','','',iv,Math.round(iv/T*100)]);});
      });
    });
    sheet='รายลูกค้า';
  } else if(_sd.at==='prod'){
    const q=(_sd.q||'').toLowerCase();
    const base=q?SD_PRODS.filter(p=>p.n.toLowerCase().includes(q)||p.it.some(i=>i.n.toLowerCase().includes(q))):SD_PRODS;
    const prods=base.map(p=>({...p,_pv:Math.round(T*p.w)}));
    if(_sd.sort.col==='val') prods.sort((a,b)=>_sd.sort.dir*(b._pv-a._pv));
    else if(_sd.sort.col==='vs') prods.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    const custByItem={};
    salesCustomers().forEach(c=>c.g.forEach(g=>g.it.forEach(it=>{if(!custByItem[it.c])custByItem[it.c]=[];if(!custByItem[it.c].includes(c.n))custByItem[it.c].push(c.n);})));
    cols=['กลุ่มสินค้า / สินค้า','ยอดขาย','สัดส่วน%','vs เดือนก่อน%','ลูกค้าที่ซื้อ'];
    prods.forEach(p=>{
      rows.push([p.n,p._pv,Math.round(p._pv/T*100),p.vs,'']);
      p.it.forEach(it=>{const iv=Math.round(p._pv*it.w);rows.push(['  '+it.n,iv,Math.round(iv/T*100),it.vs,(custByItem[it.c]||[]).join(', ')]);});
    });
    sheet='รายสินค้า';
  } else {
    const q=(_sd.q||'').toLowerCase();
    const sf=_sd.slmF||'';
    const filtered=SD_SALES.filter(s=>(!q||(s.n.toLowerCase().includes(q)||s.c.toLowerCase().includes(q)))&&(!sf||s.c===sf));
    const sales=filtered.map(s=>({...s,_sv:Math.round(T*s.w)}));
    if(_sd.sort.col==='val') sales.sort((a,b)=>_sd.sort.dir*(b._sv-a._sv));
    else if(_sd.sort.col==='vs') sales.sort((a,b)=>_sd.sort.dir*(b.vs-a.vs));
    cols=['เซลส์','รหัส','ยอดขาย','เป้า','% บรรลุ','vs เดือนก่อน%'];
    const tgtMul=_sd.pt==='week'?4:1;
    sales.forEach(s=>{const tgt=Math.round(s.tgt/tgtMul);rows.push([s.n,s.c,s._sv,tgt,Math.round(s._sv/tgt*100),s.vs]);});
    sheet='รายเซลส์';
  }
  toXLSX([[sheet, cols, rows]], `Sales_${period}_${sheet}.xlsx`);
}

function planStkT(){

    const minS=ss[code]?.min_stock||50;const dLeft=avgD>0?Math.round(qty/avgD):9999;
    const estOut=avgD>0?new Date(Date.now()+dLeft*864e5).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}):'ไม่ทราบ';
    const cov=avgD>0?(qty/avgD/30).toFixed(1):'∞';
    const fcQ=fc.filter(f=>f.sku===code).reduce((a,f)=>a+f.qty,0);
    const sk=skuI(code);
    return {code,name:sk.name,qty,avg3,avgD,minS,dLeft,estOut,cov,fcQ};
  });

      <td style="text-align:right">${r.avg3.toFixed(1)}</td><td style="text-align:right">${fmt(r.minS)}</td>
      <td style="text-align:right;font-weight:700;color:${cc}">${r.cov}</td>
      <td style="font-size:12px">${r.estOut}</td>

    </div>

  </div>`);

function _h(row,aliases){
  for(const a of aliases){if(row[a]!=null&&row[a]!=='')return row[a];}
  return '';
}
function _num(v){const n=parseFloat(v);return Number.isFinite(n)?n:null;}
function importSKUSettings(e){
  const file=e.target.files[0];if(!file)return;
  const mode=document.getElementById('sku-imp-mode')?.value||'skip';
  const reader=new FileReader();
  reader.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    const custom=DB.get('custom_skus')||[];
    const ss=DB.get('sku_settings')||{};
    const groups=DB.get('product_groups')||{};
    let added=0,updated=0,skipped=0,settingOnly=0;
    rows.forEach(r=>{
      const code=String(_h(r,['รหัสสินค้า','SKU','sku','code','Code','รหัส','Item Code'])).trim();
      if(!code)return;
      const name=String(_h(r,['ชื่อสินค้า','Name','name','สินค้า','Product Name'])).trim();
      const plant=String(_h(r,['โรง','Plant','plant'])).trim();
      const grp=String(_h(r,['กลุ่มสินค้า','Group','group','Product Group'])).trim();
      const exists=getSkusMerged().find(s=>s.code===code);
      if(mode==='skip'&&exists){skipped++;return;}
      if(!exists&&name){
        custom.push({code,name,plant,lt:_num(_h(r,['Lead Time','lead_time','LT','lt']))||7,moq:_num(_h(r,['MOQ','moq']))||0,custom:true});
        added++;
      } else if(exists) updated++;
      else settingOnly++;
      const cur=ss[code]||{min_stock:50,shelf_life:30,lt:7,moq:0,note:''};
      const min=_num(_h(r,['Stock ขั้นต่ำ','ขั้นต่ำ','min_stock','Min Stock']));
      const shelf=_num(_h(r,['Shelf Life (วัน)','Shelf Life','shelf_life']));
      const lt=_num(_h(r,['Lead Time','lead_time','LT','lt']));
      const moq=_num(_h(r,['MOQ','moq']));
      const note=String(_h(r,['หมายเหตุ','Note','note'])).trim();
      if(min!=null)cur.min_stock=min;
      if(shelf!=null)cur.shelf_life=shelf;
      if(lt!=null)cur.lt=lt;
      if(moq!=null)cur.moq=moq;
      if(note)cur.note=note;
      cur.edited_by=UID;cur.edited_at=new Date().toISOString();
      ss[code]=cur;
      if(grp){
        if(!groups[grp])groups[grp]=[];
        if(!groups[grp].includes(code))groups[grp].push(code);
      }
    });
    DB.set('custom_skus',custom);
    DB.set('sku_settings',ss);
    saveProductGroups(groups);
    audit('IMPORT_SKU_SETTINGS','sku_settings',{file:file.name,mode,added,updated,skipped,settingOnly});
    document.getElementById('sku-imp-res').innerHTML=`<div class="al als">Import สำเร็จ: เพิ่มใหม่ ${added}, update ${updated}, setting only ${settingOnly}, ข้ามซ้ำ ${skipped}</div>`;
    toast('Import SKU Settings สำเร็จ');
    skuAdmT();
  };
  reader.readAsBinaryString(file);
}

function clearScan(){['sc-code','sc-lot','sc-exp','sc-qty'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('sc-name').value='';document.getElementById('sc-code').focus();}
function handleStkPaste(e){
  e.preventDefault();
  const rows=e.clipboardData.getData('text').trim().split('\n').map(r=>r.split('\t'));
  const imp=[];
  rows.forEach(r=>{
    if(r.length<2)return;
    const[code,lot,expDate,qty]=r;
    if(!code||!qty)return;
    imp.push({code:code.trim(),lot:lot?.trim()||'',exp:expDate?.trim()||'',qty:parseFloat(qty)||0});
  });
  const pv=document.getElementById('stk-pv');
  if(!imp.length){pv.innerHTML='<div class="al alw">ไม่พบข้อมูล</div>';return;}
  pv.innerHTML=`<div class="al als">พบ ${imp.length} รายการ <button class="btn btn-sm btn-p" onclick="cfmStkPaste()">นำเข้า</button></div>`;
  window._sp=imp;
}
function cfmStkPaste(){
  const arr=window._sp||[];const stk=DB.get('stock')||{};const log=DB.get('stock_log')||[];
  arr.forEach(item=>{
    const sk=skuI(item.code);
    if(!stk[item.code]) stk[item.code]={qty:0,unit:'กก.',lots:[]};
    stk[item.code].qty+=item.qty;
    stk[item.code].lots.push({lot:item.lot||'LOT-'+Date.now(),qty:item.qty,exp:item.exp,in_date:today()});
    log.unshift({ts:new Date().toLocaleTimeString('th-TH'),code:item.code,name:sk.name,lot:item.lot,exp:item.exp,qty:item.qty,by:UID+' (paste)'});
  });
  DB.set('stock',stk);DB.set('stock_log',log.slice(0,200));audit('PASTE_STOCK','stock',{count:arr.length});
  document.getElementById('stk-pv').innerHTML=`<div class="al als">นำเข้าสำเร็จ ${arr.length} รายการ</div>`;
  stkT();renderStkLog();
}
function stkT(){
  const stk=DB.get('stock')||{},ss=DB.get('sku_settings')||{};

function pgExpiry(){
  const stk=DB.get('stock')||{},ss=DB.get('sku_settings')||{};
  const lots=[];
  Object.entries(stk).forEach(([code,s])=>{
    const sk=skuI(code);const shelfLife=ss[code]?.shelf_life||30;
    (s.lots||[]).forEach(l=>{
      if(!l.exp)return;
      const d=dUntil(l.exp);
      lots.push({code,name:sk.name,lot:l.lot||'—',exp:l.exp,qty:l.qty,daysLeft:d,shelfLife,pct:d!=null?Math.max(0,Math.min(100,(d/shelfLife*100))).toFixed(0):'—'});
    });
  });
  lots.sort((a,b)=>(a.daysLeft??999)-(b.daysLeft??999));
  const urgent=lots.filter(l=>l.daysLeft!=null&&l.daysLeft<=7).length;
  const warn=lots.filter(l=>l.daysLeft!=null&&l.daysLeft>7&&l.daysLeft<=30).length;
  document.getElementById('ct').innerHTML=`
  <div class="krow">
    <div class="kpi r"><div class="kl">หมดอายุใน 7 วัน</div><div class="kv">${urgent}</div><div class="kh">Lot</div></div>
    <div class="kpi a"><div class="kl">หมดอายุใน 7-30 วัน</div><div class="kv">${warn}</div><div class="kh">Lot</div></div>
    <div class="kpi g"><div class="kl">ปลอดภัย >30 วัน</div><div class="kv">${lots.filter(l=>l.daysLeft==null||l.daysLeft>30).length}</div><div class="kh">Lot</div></div>
  </div>
  ${urgent?`<div class="al ald">⚠️ มี ${urgent} Lot ที่จะหมดอายุใน 7 วัน — ต้องดำเนินการด่วน</div>`:''}
  <div class="card"><div class="ch"><div class="ct2">รายการ Lot ตามวันหมดอายุ</div><button class="btn btn-sm btn-g" onclick="expExpiry()">Export Excel</button></div>
  <div class="tw"><table><thead><tr><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th>Lot Number</th><th>วันหมดอายุ</th><th style="text-align:right">วันคงเหลือ</th><th style="text-align:right">จำนวน (กก.)</th><th>Shelf Life</th><th>สถานะ</th></tr></thead>
  <tbody>${lots.map(l=>{
    const hot=l.daysLeft!=null&&l.daysLeft<=7,warm=l.daysLeft!=null&&l.daysLeft<=30&&l.daysLeft>7;
    return `<tr class="${hot?'exp-hot':warm?'exp-warm':''}">
      <td class="mono">${l.code}</td><td>${l.name.substring(0,30)}</td>
      <td class="mono" style="font-size:12px">${l.lot}</td>
      <td style="${hot?'font-weight:700;color:var(--R)':warm?'color:var(--A)':''}">${fmtD(l.exp)}</td>
      <td style="text-align:right;font-weight:700;color:${hot?'var(--R)':warm?'var(--A)':'inherit'}">${l.daysLeft!=null?l.daysLeft:'—'}</td>
      <td style="text-align:right">${fmt(l.qty)}</td>
      <td style="font-size:12px">${l.shelfLife} วัน</td>
      <td>${hot?'<span class="badge bbr">หมดอายุเร็ว</span>':warm?'<span class="badge bba">เฝ้าระวัง</span>':'<span class="badge bbg">ปกติ</span>'}</td>
    </tr>`;
  }).join('')}</tbody></table></div></div>`;
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{header:1});
    document.getElementById('csv-res').innerHTML=`<div class="al als">อ่านไฟล์ ${file.name} สำเร็จ — พบ ${json.length-1} แถว (Header: ${json[0]?.join(', ')})</div>`;
  };
  reader.readAsBinaryString(file);
}

function saveUser(idx){
  const uid=document.getElementById('u-uid').value.trim();
  const name=document.getElementById('u-name').value.trim();
  const department=document.getElementById('u-dept').value.trim();
  const role=document.getElementById('u-role').value;
  const slm=document.getElementById('u-slm').value.trim();
  const pwd=document.getElementById('u-pwd').value;
  const email=document.getElementById('u-email').value.trim();
  if(!uid||!name){alert('กรุณากรอก UID และ ชื่อ');return;}
  const users=DB.get('users')||[];
  if(idx===-1){
    if(users.find(u=>u.uid===uid)){alert('UID นี้มีอยู่แล้ว');return;}
    users.push({uid,name,department:department||undefined,role,slm_id:slm||undefined,pwd:pwd||'1234',email,active:true,created:today(),by:UID});
    audit('ADD_USER',uid,{role,department});

}
function toggleUser(i){

function crTab(v){_crSave();_cr.view=v;pgCustReg();}
function crGoStep(n){if(n>_cr.step)return;_crSave();_cr.step=n;crRender();}
function crNext(){_crSave();_cr.step++;crRender();}
function crBack(){_crSave();_cr.step--;crRender();}
function crToSummary(){_crSave();_cr.step=5;crRender();}

function crRender(){
  if(_cr.view==='approve'){crRenderApprove();return;}
  if(_cr.view==='settings'){pgCrWorkflowSettings();return;}
  const el=document.getElementById('cr-body');if(!el)return;
  const steps=[['📋','ทั่วไป'],['🏪','ร้านค้า'],['🚚','ส่งสินค้า'],['💳','การเงิน'],['📁','เอกสาร'],['✅','สรุป']];
  const pills=steps.map(([ico,lbl],i)=>`<div class="cr-pill${i===_cr.step?' act':i<_cr.step?' done':''}" onclick="crGoStep(${i})">${ico} ${lbl}</div>`).join('');
  if(_cr.step===6){el.innerHTML=crSec6();return;}
  const secs=[crSec0,crSec1,crSec2,crSec3,crSec4,crSec5];
  el.innerHTML=`<div class="cr-steps">${pills}</div>${(secs[_cr.step]||crSec0)()}`;
  if(_cr.step===4)crRenderDocSlots();
  const pf=document.getElementById('cr-prog-fill');
  if(pf)pf.style.width=(_cr.step>=5?'100':Math.round((_cr.step/5)*100))+'%';
}

function crRenderDocSlots(){
  ['main','billing','other'].forEach(g=>{
    const el=document.getElementById('cr-slots-'+g);if(!el)return;
    el.innerHTML=CR_DOC_SLOTS.filter(s=>s.group===g).map(s=>crRenderSlot(s)).join('');
  });
}
function crRenderSlot(s){
  const files=_cr.slotFiles[s.id]||[];
  const note=_cr.slotNotes[s.id]||'';
  const isOpen=!!_cr.openSlots[s.id];
  const hasFiled=files.length>0;
  const filesHtml=files.map((f,i)=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const isPdf=ext==='pdf';const isImg=['jpg','jpeg','png','gif','webp','heic'].includes(ext);
    const bg=isPdf?'var(--LY)':isImg?'var(--LG)':'var(--LBL)';
    const sz=f.size>1048576?(f.size/1048576).toFixed(1)+'MB':(f.size/1024).toFixed(0)+'KB';
    return`<div class="cr-fi"><div class="cr-ft" style="background:${bg}">${isPdf?'📄':isImg?'🖼️':'📎'}</div><span style="flex:1;font-size:12px;color:var(--TX2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><span style="font-size:11px;color:var(--TX3);flex-shrink:0">${sz}</span><span onclick="crDelFile('${s.id}',${i})" style="cursor:pointer;color:var(--TX3);padding:2px 4px" title="ลบ">✕</span></div>`;
  }).join('');
  return`<div class="cr-slot" id="crslot-${s.id}">
  <div class="cr-slot-h" onclick="crToggleSlot('${s.id}')">
    <span style="font-size:14px;color:var(--BL)">📄</span>
    <span class="cr-slot-lbl">${s.label}${s.req?`<span class="cr-slot-req">จำเป็น</span>`:`<span class="cr-slot-opt">ไม่บังคับ</span>`}</span>
    <span style="font-size:11px;color:var(--TX3)">${files.length>0?files.length+' ไฟล์':''}</span>
    <div class="cr-dot ${hasFiled?'cr-dot-d':'cr-dot-e'}">${hasFiled?'✓':'—'}</div>
    <span class="cr-chev${isOpen?' open':''}">▼</span>
  </div>
  <div class="cr-slot-b${isOpen?' open':''}">
    <div style="font-size:11px;color:var(--TX3);margin-bottom:8px">${s.hint} — สูงสุด ${s.maxFiles} ไฟล์</div>
    ${filesHtml}
    ${files.length<s.maxFiles?`<div class="cr-uz" onclick="crTrigUpload('${s.id}')"><div style="font-size:20px;margin-bottom:4px">⬆️</div><div style="font-size:12px;color:var(--TX2)">กดเพื่ออัปโหลด</div><div style="font-size:11px;color:var(--TX3);margin-top:2px">JPG, PNG, PDF</div></div>`:`<div style="font-size:11px;color:var(--TX3);text-align:center;padding:6px 0">ครบจำนวนสูงสุดแล้ว</div>`}
    <div style="font-size:11px;color:var(--TX2);margin:7px 0 4px">หมายเหตุ</div>
    <textarea style="width:100%;background:var(--bg2);border:1px solid var(--BD);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--TX);font-family:var(--font);outline:none;resize:none;height:42px" id="cr-snote-${s.id}" placeholder="ระบุรายละเอียด..." oninput="_cr.slotNotes['${s.id}']=this.value">${note}</textarea>
  </div>
</div>`;}
function crToggleSlot(id){_cr.openSlots[id]=!_cr.openSlots[id];crRenderDocSlots();}
function crTrigUpload(slotId){
  _cr.currentSlot=slotId;
  const fi=document.getElementById('cr-file-inp');fi.value='';fi.onchange=crHandleFiles;fi.click();
}
function crHandleFiles(e){
  const files=Array.from(e.target.files);
  const slot=CR_DOC_SLOTS.find(s=>s.id===_cr.currentSlot);if(!slot)return;
  const rem=slot.maxFiles-(_cr.slotFiles[_cr.currentSlot]||[]).length;
  files.slice(0,rem).forEach(f=>{_cr.slotFiles[_cr.currentSlot].push({name:f.name,size:f.size,type:f.type});_cr.fileRefs[_cr.currentSlot].push(f);});
  _cr.openSlots[_cr.currentSlot]=true;e.target.value='';crRenderDocSlots();
}
function crDelFile(slotId,idx){_cr.slotFiles[slotId].splice(idx,1);_cr.fileRefs[slotId].splice(idx,1);_cr.openSlots[slotId]=true;crRenderDocSlots();}

function crRenderApprove(){
  const el=document.getElementById('cr-body');if(!el)return;
  const subs=DB.get('custreg_subs')||[];
  if(_cr.viewSubId){
    const sub=subs.find(s=>s.id===_cr.viewSubId);
    if(sub){crRenderApproveDetail(sub,el);return;}
    _cr.viewSubId=null;
  }
  // For multi-level: user is in current level approvers
  const isMyTurn=s=>{
    if(s.levels?.length){
      const lv=s.levels[s.currentLevel||0];
      return s.status==='pending'&&lv?.approvers.some(a=>a.uid===UID&&a.status==='pending');
    }
    return s.approvers?.some(a=>a.uid===UID&&a.status==='pending');
  };
  const list=ROLE==='superadmin'?subs:subs.filter(isMyTurn);
  if(!list.length){el.innerHTML=`<div style="background:var(--bg2);border-radius:8px;padding:24px;text-align:center;color:var(--TX3);font-size:13px">ไม่มีรายการรออนุมัติ</div>`;return;}
  const stBg={pending:'var(--LBL)',approved:'var(--LG)',rejected:'var(--LR)'};
  const stTc={pending:'var(--BL)',approved:'var(--G)',rejected:'var(--R)'};
  const stLbl={pending:'🔵 รออนุมัติ',approved:'✅ อนุมัติแล้ว',rejected:'❌ ไม่อนุมัติ'};
  el.innerHTML=`<div class="card">
  <div style="font-size:13px;font-weight:700;color:var(--TX);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--BD)">📋 รายการ${ROLE==='superadmin'?'ทั้งหมด':'รออนุมัติ'}</div>
  ${list.map(s=>{
    const lvInfo=s.levels?.length?` — ขั้น ${(s.currentLevel||0)+1}/${s.levels.length}`:'';
    return `<div class="cr-apv-item" onclick="crShowDetail('${s.id}')">
      <div><div style="font-size:13px;font-weight:600;color:var(--TX)">${s.shop}</div><div style="font-size:11px;color:var(--TX2)">${s.docNo} — ${s.sales}${lvInfo}</div></div>
      <span style="font-size:11px;padding:3px 10px;border-radius:99px;background:${stBg[s.status]||'var(--bg2)'};color:${stTc[s.status]||'var(--TX3)'}">${stLbl[s.status]||s.status}</span>
    </div>`;
  }).join('')}
</div>`;}
function crShowDetail(id){_cr.viewSubId=id;crRenderApprove();}
function crRenderApproveDetail(sub,el){
  const docsHtml=sub.docs&&sub.docs.length?sub.docs.map(d=>`<div class="cr-sr"><span style="color:var(--TX2)">📄 ${d.label}</span><span style="font-weight:600">${d.files.length} ไฟล์${d.note?' — '+d.note:''}</span></div>`).join(''):`<div style="font-size:12px;color:var(--TX3)">ไม่มีเอกสาร</div>`;

  // Multi-level workflow UI
  let workflowHtml='';
  let canAct=false;
  if(sub.levels?.length){
    const curLvIdx=sub.currentLevel||0;
    workflowHtml=`<div class="card"><div style="font-size:13px;font-weight:700;color:var(--TX);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--BD)">🔀 ขั้นตอนการอนุมัติ</div>
    <div class="cr-tl">
    ${sub.levels.map((lv,i)=>{
      const isActive=i===curLvIdx&&sub.status==='pending';
      const isDone=i<curLvIdx||(i===curLvIdx&&sub.status==='approved');
      const stColor=isDone?'var(--G)':isActive?'var(--BL)':'var(--TX3)';
      const stBgC=isDone?'var(--LG)':isActive?'var(--LBL)':'var(--bg2)';
      return `<div class="cr-tl-item">
        <div class="cr-tl-dot" style="background:${stBgC};color:${stColor}">${isDone?'✓':i+1}</div>
        <div class="cr-tl-body">
          <div style="font-size:12px;font-weight:600;color:${stColor}">${lv.label||`ขั้น ${i+1}`} <span style="font-weight:400;color:var(--TX3);font-size:11px">(${lv.mode==='any'?'คนใดคนหนึ่ง':'ทุกคน'})</span></div>
          ${lv.approvers.map(a=>{
            const astColor={approved:'var(--G)',rejected:'var(--R)',pending:'var(--TX3)'}[a.status]||'var(--TX3)';
            const astIcon={approved:'✅',rejected:'❌',pending:'⏳'}[a.status]||'⏳';
            return `<div style="font-size:11px;color:${astColor};margin-top:2px">${astIcon} ${a.name}${a.comment?' — "'+a.comment+'"':''}${a.ts?' ('+new Date(a.ts).toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+')':''}</div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    </div></div>`;
    // canAct: user is in current level AND status is pending
    if(sub.status==='pending'){
      const curLv=sub.levels[curLvIdx];
      const myEntry=curLv?.approvers.find(a=>a.uid===UID);
      canAct=!!myEntry&&myEntry.status==='pending';
    }
  } else {
    // Legacy flat approvers
    const myApv=sub.approvers?.find(a=>a.uid===UID);
    canAct=!!(myApv&&myApv.status==='pending');
  }

  el.innerHTML=`<div class="card">
  <div style="font-size:13px;font-weight:700;color:var(--TX);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--BD)">📋 รายละเอียด ${sub.docNo}</div>
  <div class="cr-sr"><span style="color:var(--TX2)">🏪 ร้านค้า</span><span style="font-weight:600">${sub.shop}</span></div>
  <div class="cr-sr"><span style="color:var(--TX2)">👤 Sales</span><span style="font-weight:600">${sub.sales}</span></div>
  <div class="cr-sr"><span style="color:var(--TX2)">📞 เบอร์โทร</span><span style="font-weight:600">${sub.phone||'—'}</span></div>
  <div class="cr-sr"><span style="color:var(--TX2)">🏷️ ราคา</span><span style="font-weight:600">${sub.price}</span></div>
  <div class="cr-sr"><span style="color:var(--TX2)">📅 วันที่ส่ง</span><span style="font-weight:600">${sub.date}</span></div>

function crConfirmWithWorkflow(wfLevels){
  const d=_cr.data;
  const priceType=[['cr-pr-c','C'],['cr-pr-d','D'],['cr-pr-e','E'],['cr-pr-f','F'],['cr-pr-g','G'],['cr-pr-z','Z'],['cr-pr-special','พิเศษ']].filter(([id])=>d[id]).map(([,lbl])=>lbl).join(', ')||'—';
  const docSnap=CR_DOC_SLOTS.filter(s=>(_cr.slotFiles[s.id]||[]).length>0).map(s=>({id:s.id,label:s.label,files:(_cr.slotFiles[s.id]||[]).map(f=>({name:f.name,size:f.size})),note:_cr.slotNotes[s.id]||''}));
  const ts=new Date().toLocaleString('th-TH',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  // Clone levels with pending status
  const levels=wfLevels.map((lv,i)=>({
    id:lv.id,label:lv.label||`ขั้น ${i+1}`,mode:lv.mode||'any',
    approvers:(lv.approvers||[]).map(a=>({uid:a.uid,name:a.name,role:a.role,status:'pending',comment:'',ts:null}))
  }));
  const sub={
    id:'CR-'+Date.now(),docNo:_cr.docNo,shop:d['cr-shopname']||'(ไม่ระบุ)',
    sales:UNAME,salesUid:UID,phone:d['cr-phone']||'',taxid:d['cr-taxid']||'',
    crdays:d['cr-crdays']||'',price:priceType,date:ts,note:'',finalNote:d['cr-final-note']||'',
    levels,currentLevel:0,
    // backward compat: flat approvers list = all approvers from all levels
    approvers:levels.flatMap(lv=>lv.approvers),
    status:'pending',custcode:'',docs:docSnap,ts:Date.now()
  };
  const subs=DB.get('custreg_subs')||[];subs.push(sub);DB.set('custreg_subs',subs);
  audit('CUSTREG_SUBMIT',sub.docNo,{shop:sub.shop,levels:levels.length});
  toast('ส่งอนุมัติสำเร็จ '+sub.docNo+' ('+levels.length+' ขั้นตอน)');
  _cr.step=6;crRender();
}

// Multi-level approve: check level completion → advance to next level
function crDoApprove(id){
  const subs=DB.get('custreg_subs')||[];const sub=subs.find(s=>s.id===id);if(!sub)return;
  const comment=document.getElementById('cr-apv-comment')?.value||'';
  const ts=new Date().toISOString();

  if(sub.levels?.length){
    // Multi-level workflow
    const lv=sub.levels[sub.currentLevel];
    if(!lv){toast('ไม่พบขั้นตอนอนุมัติ','warn');return;}
    const a=lv.approvers.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    // Sync flat approvers
    const fa=sub.approvers?.find(x=>x.uid===UID);if(fa){fa.status='approved';fa.comment=comment;fa.ts=ts;}
    // Check level completion
    const lvDone=(lv.mode==='any')?lv.approvers.some(x=>x.status==='approved'):lv.approvers.every(x=>x.status==='approved');
    if(lvDone){
      if(sub.currentLevel+1 < sub.levels.length){
        sub.currentLevel++;
        // Unlock next level's approvers (set to pending if was pending)
        toast(`ผ่านขั้น ${sub.currentLevel} → รออนุมัติขั้น ${sub.currentLevel+1}`);
      } else {
        sub.status='approved';
        toast('✅ อนุมัติครบทุกขั้นตอน '+sub.docNo);
      }
    } else {
      toast('✓ บันทึกการอนุมัติแล้ว — รอผู้อนุมัติคนอื่น');
    }
  } else {
    // Legacy flat approval
    const a=sub.approvers?.find(x=>x.uid===UID);
    if(a){a.status='approved';a.comment=comment;a.ts=ts;}
    if((sub.approvers||[]).every(x=>x.status==='approved'))sub.status='approved';
    toast('อนุมัติเรียบร้อย '+sub.docNo);
  }
  DB.set('custreg_subs',subs);audit('CUSTREG_APPROVE',sub.docNo,{shop:sub.shop});crHideDetail();
}

function showGroupImport(mode){
  const title=mode==='prod'?'Import กลุ่มสินค้า':'Import กลุ่มลูกค้า';
  const hint=mode==='prod'?'Format: ชื่อกลุ่ม\tรหัส SKU':'Format: ชื่อกลุ่ม\tรหัสลูกค้า';
  openMod(`<div class="mh"><div class="mt2">${title}</div><span class="mx" onclick="closeM()">✕</span></div>
    <div class="al alw" style="margin-bottom:10px">วางข้อมูลจาก Excel โดยมี 2 คอลัมน์: ชื่อกลุ่ม, รหัส</div>

    <div id="grp-pv" style="margin-top:10px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">

      <button class="btn btn-p" onclick="cfmGroupImport('${mode}')">นำเข้าทั้งหมด</button>
    </div>`);
  window._grpImport={mode,items:[]};
}
function handleGroupPaste(e,mode){
  e.preventDefault();
  const text=e.clipboardData.getData('text').trim();
  const rows=text.split(/\r?\n/).map(r=>r.split(/\t|;/).map(c=>c.trim()));
  const items=[];
  rows.forEach(r=>{
    if(r.length<2) return;
    const group=r[0]?.trim();
    const code=r[1]?.trim();
    if(group && code) items.push({group,code});
  });
  window._grpImport = {mode,items};
  const pv=document.getElementById('grp-pv');
  if(!pv) return;
  if(!items.length){pv.innerHTML='<div class="al alw">ไม่พบข้อมูลที่ใช้ได้</div>';return;}
  pv.innerHTML=`<div class="al als">พบ ${items.length} รายการ</div><div style="max-height:240px;overflow:auto;border:1px solid var(--BD);border-radius:10px;padding:10px;background:var(--bg2)">${items.slice(0,20).map(i=>`<div>${esc(i.group)} → <span class="mono">${esc(i.code)}</span></div>`).join('')}</div>`;
}
function cfmGroupImport(mode){
  const data=window._grpImport?.items||[];
  if(!data.length){toast('ยังไม่มีข้อมูลนำเข้า');return;}
  if(mode==='prod'){
    const groups=DB.get('product_groups')||{};
    data.forEach(({group,code})=>{if(!groups[group])groups[group]=[]; if(!groups[group].includes(code)) groups[group].push(code);});
    saveProductGroups(groups);audit('IMPORT_PRODUCT_GROUPS','product_groups',{count:data.length});
    toast('นำเข้ากลุ่มสินค้าสำเร็จ '+data.length+' รายการ');
    closeM(); pgGroupAdmin();
  } else {
    const profs=customerProfiles();
    const rows=allCustomerRows();
    const knownCodes=new Set(rows.map(c=>c.c));
    data.forEach(({group,code})=>{if(!knownCodes.has(code)) return; if(!profs[code])profs[code]={}; profs[code].corporate=group; profs[code].edited_by=UID; profs[code].edited_at=new Date().toISOString();});
    DB.set('customer_profiles',profs);audit('IMPORT_CUSTOMER_GROUPS','customer_profiles',{count:data.length});
    toast('นำเข้ากลุ่มลูกค้าสำเร็จ '+data.length+' รายการ');
    closeM(); pgGroupAdmin();
  }
}
function saveCustomerGroup(code,field,val){
  const profs=customerProfiles();if(!profs[code])profs[code]={};
  profs[code][field]=val;profs[code].edited_by=UID;profs[code].edited_at=new Date().toISOString();
  DB.set('customer_profiles',profs);audit('EDIT_CUSTOMER_GROUP',code,{field,val});toast('บันทึกกลุ่มลูกค้าแล้ว');
}
function expCustomerGroups(){
  const rows=salesCustomers().map(c=>[c.c,c.n,c.corp||'',c.category||'',c.slm||'']);
  toXLSX([['Customer Groups',['รหัสลูกค้า','ลูกค้า','Corporate group','Category','Sales'],rows]],'Customer_Groups_'+todayStr()+'.xlsx');
}

// ── PERMISSIONS ───────────────────────────────────────────────────
const ALL_NAV_PAGES=[
  {id:'dash',lbl:'📊 Dashboard'},{id:'mysales',lbl:'📈 Sales Overview'},
  {id:'forecast',lbl:'📝 Sales Forecast'},{id:'planstock',lbl:'📦 Stock & Planning'},
  {id:'po',lbl:'📋 PO Planning'},{id:'custmap',lbl:'🗺️ Customer Map / สรุปยอดขาย'},
  {id:'custreg',lbl:'🏪 ลงทะเบียนลูกค้า'},{id:'skuadmin',lbl:'⚙️ SKU Settings'},
  {id:'groups',lbl:'🏷️ จัดการกลุ่มสินค้า/ลูกค้า'},
  {id:'reports',lbl:'📄 Reports'},{id:'users',lbl:'👥 จัดการผู้ใช้'},
  {id:'wms',lbl:'🔗 WMS System'},{id:'reserve',lbl:'📦 การจองสินค้า'},
  {id:'auditlog',lbl:'🔍 Audit Log'},
];
const ALL_ROLES_PERM=['manager','planning','warehouse','sales'];
const ROLE_LBL_P={manager:'Manager',planning:'Planning',warehouse:'Warehouse',sales:'Sales'};

function pgPerms(){
  const customPerms=DB.get('nav_perms')||{};
  // Seed defaults from RNAV if not set
  ALL_ROLES_PERM.forEach(r=>{if(!customPerms[r])customPerms[r]={pages:(RNAV[r]||[]).map(([id])=>id)};});
  document.getElementById('ct').innerHTML=`
  <div class="al ali">กำหนดหน้าที่แต่ละ Role เข้าถึงได้ — มีผลเมื่อ Login ใหม่ (Superadmin เข้าได้ทุกหน้าเสมอ)</div>
  <div class="card">
    <div class="ch"><div class="ct2">ตาราง Role × หน้า</div><button class="btn btn-sm btn-g" onclick="savePerms()">💾 บันทึก</button></div>
    <div class="tw">
    <table>
      <thead><tr>
        <th style="min-width:180px">หน้า / ฟังก์ชัน</th>
        ${ALL_ROLES_PERM.map(r=>`<th style="text-align:center;min-width:90px">${ROLE_LBL_P[r]}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${ALL_NAV_PAGES.map(pg=>`<tr>
          <td style="font-size:12.5px">${pg.lbl}</td>
          ${ALL_ROLES_PERM.map(r=>{
            const has=(customPerms[r]?.pages||[]).includes(pg.id);
            return `<td style="text-align:center"><input type="checkbox" id="perm-${r}-${pg.id}" ${has?'checked':''} style="width:15px;height:15px;accent-color:var(--BL);cursor:pointer"></td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-sm" onclick="resetPerms()">↺ คืนค่าเริ่มต้น</button>
      <button class="btn btn-sm btn-g" onclick="savePerms()" style="margin-left:8px">💾 บันทึก</button>
    </div>
  </div>`;
}
function savePerms(){
  const perms=DB.get('nav_perms')||{};
  ALL_ROLES_PERM.forEach(r=>{
    perms[r]={pages:ALL_NAV_PAGES.map(pg=>pg.id).filter(id=>document.getElementById(`perm-${r}-${id}`)?.checked)};
  });
  DB.set('nav_perms',perms);
  toast('บันทึกสิทธิ์แล้ว — มีผลเมื่อ Login ใหม่');
}
function resetPerms(){
  DB.set('nav_perms',{});
  pgPerms();
  toast('คืนค่าเริ่มต้นแล้ว');
}

// ── WMS SYSTEM ────────────────────────────────────────────────────
function pgWMS(){
  const wmsUrl=DB.get('wms_url')||'http://localhost:3000';
  document.getElementById('ct').innerHTML=`
  <div class="krow" id="wms-kpis">
    <div class="kpi b"><div class="kl">สถานะ</div><div class="kv" style="font-size:16px">กำลังโหลด...</div></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ct2">🔗 เชื่อมต่อ WMS</div></div>
    <div class="al ali" style="margin-bottom:12px">ข้อมูล Stock ใช้ร่วมกันระหว่าง WMS และ Supply Chain ผ่าน Supabase — อัปเดต Real-time</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <input id="wms-url-inp" style="flex:1;min-width:220px;padding:8px 10px;border:1px solid var(--BD);border-radius:7px;font-size:13px;font-family:var(--font)" value="${wmsUrl}" placeholder="http://localhost:3000">
      <button class="btn btn-sm btn-t" onclick="saveWmsUrl()">บันทึก URL</button>
      <a id="wms-open-btn" href="${wmsUrl}" target="_blank" class="btn btn-p">🔗 เปิด WMS</a>
    </div>
    <div style="font-size:11px;color:var(--TX3)">Session SSO บันทึกไว้แล้ว — WMS จะรู้จักผู้ใช้ปัจจุบันโดยอัตโนมัติ</div>
  </div>
  <div class="card">
    <div class="ch">
      <div class="ct2">📦 Stock จาก WMS (Live)</div>
      <button class="btn btn-sm" onclick="wmsLoadStock()">🔄 รีเฟรช</button>
    </div>
    <div id="wms-stk-body" style="padding:16px;text-align:center;color:var(--TX3)">กำลังโหลด...</div>
  </div>`;
  wmsLoadStock();
}
function saveWmsUrl(){
  const url=document.getElementById('wms-url-inp')?.value.trim();
  if(url){
    DB.set('wms_url',url);
    const btn=document.getElementById('wms-open-btn');
    if(btn)btn.href=url;
  }
  toast('บันทึก WMS URL แล้ว');
}
async function wmsLoadStock(){
  const el=document.getElementById('wms-stk-body');if(!el)return;
  try{
    const stock=await CACHE.get('stock',()=>SB.getStock());
    const entries=Object.entries(stock);
    const kpis=document.getElementById('wms-kpis');
    if(kpis)kpis.innerHTML=`
      <div class="kpi g"><div class="kl">SKU ใน WMS</div><div class="kv">${entries.length}</div></div>
      <div class="kpi b"><div class="kl">Total Stock</div><div class="kv">${fmt(entries.reduce((a,[,s])=>a+(s.qty||0),0))}</div><div class="kh">กก.</div></div>
      <div class="kpi t"><div class="kl">โหลดเมื่อ</div><div class="kv" style="font-size:14px">${new Date().toLocaleTimeString('th-TH')}</div></div>`;
    if(!entries.length){el.innerHTML='<div style="padding:16px;color:var(--TX3)">ยังไม่มีข้อมูล Stock จาก WMS</div>';return;}
    el.innerHTML=`<div class="tw"><table>
      <thead><tr><th>รหัสสินค้า</th><th style="text-align:right">จำนวน</th><th>หน่วย</th></tr></thead>
      <tbody>${entries.slice(0,80).map(([sku,s])=>`<tr>
        <td class="mono">${sku}</td>
        <td style="text-align:right;font-weight:700;color:${(s.qty||0)<50?'var(--R)':'inherit'}">${(s.qty||0).toLocaleString()}</td>
        <td style="color:var(--TX3)">${s.unit||'กก.'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }catch(e){
    const kpis=document.getElementById('wms-kpis');
    if(kpis)kpis.innerHTML=`<div class="kpi r"><div class="kl">สถานะ</div><div class="kv" style="font-size:16px">❌ เชื่อมต่อไม่ได้</div></div>`;
    if(el)el.innerHTML=`<div class="al ald">เชื่อมต่อ Supabase ไม่สำเร็จ: ${e.message}</div>`;
  }
}

function showAddSkuModal(){
  openMod(`<div>
    <div class="mh"><div class="mt2">➕ เพิ่มสินค้าใหม่</div><div class="mx" onclick="closeM()">✕</div></div>
    <div class="fg">
      <div class="field"><label>รหัสสินค้า *</label><input id="ns-code" placeholder="เช่น 99999-10" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%"></div>
      <div class="field"><label>ชื่อสินค้า *</label><input id="ns-name" placeholder="ชื่อสินค้า" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%"></div>
      <div class="field"><label>โรง</label><input id="ns-plant" placeholder="เช่น TSS" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%"></div>
      <div class="field"><label>กลุ่มสินค้า</label><select id="ns-grp" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%">
        <option value="">— เลือกกลุ่ม —</option>
        ${skuGroupNames().map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('')}
      </select></div>
      <div class="field"><label>Lead Time (วัน)</label><input id="ns-lt" type="number" value="7" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%"></div>
      <div class="field"><label>MOQ</label><input id="ns-moq" type="number" value="0" style="padding:8px;border:1px solid var(--BD);border-radius:7px;width:100%"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn" onclick="closeM()" style="flex:1">ยกเลิก</button>
      <button class="btn btn-g" onclick="saveNewSku()" style="flex:1;justify-content:center">💾 บันทึก</button>
    </div>
  </div>`);
}
function saveNewSku(){
  const code=document.getElementById('ns-code')?.value.trim();
  const name=document.getElementById('ns-name')?.value.trim();
  if(!code||!name){toast('กรุณากรอกรหัสสินค้าและชื่อสินค้า','warn');return;}
  const custom=DB.get('custom_skus')||[];
  if(custom.find(s=>s.code===code)||SKUS_MASTER.find(s=>s.code===code)){toast('รหัสสินค้านี้มีอยู่แล้ว','warn');return;}
  const grp=document.getElementById('ns-grp')?.value||'';
  const lt=parseInt(document.getElementById('ns-lt')?.value)||7;
  const moq=parseInt(document.getElementById('ns-moq')?.value)||0;
  const plant=document.getElementById('ns-plant')?.value.trim()||'';
  const newSku={code,name,plant,lt,moq,custom:true};
  custom.push(newSku);
  DB.set('custom_skus',custom);
  if(grp){
    const groups=DB.get('product_groups')||{};
    if(!groups[grp])groups[grp]=[];
    if(!groups[grp].includes(code))groups[grp].push(code);
    saveProductGroups(groups);
  }
  closeM();
  audit('ADD_SKU',code,{name,plant});
  toast('เพิ่มสินค้า '+code+' แล้ว');
  pgSKUAdmin();
}
function getSkusMerged(){
  const custom=DB.get('custom_skus')||[];
  return [...SKUS_MASTER,...custom.filter(c=>!SKUS_MASTER.find(m=>m.code===c.code))];
}
